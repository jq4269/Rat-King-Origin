actors.hero.spells.spellempower$limitbreak$cooldown.name=limit break cooldown
actors.hero.spells.spellempower$limitbreak$cooldown.desc=The Paladin has recently cast Limit Break, and must wait before casting it again.\n\nTurns remaining: %s
actors.hero.spells.spellempower$emendatioiactus.name=emendatio iactus
actors.hero.spells.spellempower$emendatioiactus.desc=The Cenobite temporarily empowers the Holy Tome with _%s aspect_, allowing them to use up to _%.1f charges_ worth of spells without limit in exchange for _%d turns_ of cooldown from when the spell is cast.
actors.hero.spells.spellempower$emendatioiactus$buff.name=emendatio iactus
