#warrior
actors.hero.talent.hearty_meal.title=hearty meal
actors.hero.talent.hearty_meal.desc=_+0:_ Eating food heals the Warrior for _3 HP_ when he is at or below 30% health.\n\n_+1:_ Eating food heals the Warrior for _6 HP_ when he is at or below 30% health.\n\n_+2:_ Eating food heals the Warrior for _9 HP_ when he is at or below 30% health.
actors.hero.talent.hearty_meal.comment="An essential skill of any good hero: quickly healing off critical damage by stopping to take a snack."
actors.hero.talent.veterans_intuition.title=veteran's intuition
actors.hero.talent.veterans_intuition.desc=_+0:_ The Warrior identifies weapons _1.75x faster_ and armor _2.5x faster_.\n\n_+1:_ The Warrior identifies weapons _2.5x faster_ and armor _when he equips it_. When picking them up for the first time, he also has a _30% chance_ to identify armor.\n\n_+2:_ The Warrior identifies weapons _when he equips them_. When picking them up for the first time, the Warrior has a _60% chance_ to identify armor and a _30% chance_ to identify weapons.
actors.hero.talent.veterans_intuition.comment="Who's to say you can't just outright tell whether something's good by simply holding it? Heck, true armor connoisseurs can tell just by LOOKING at them."
actors.hero.talent.provoked_anger.title=provoked anger
actors.hero.talent.provoked_anger.desc=_+0:_ When the Warrior's shielding breaks, his _next physical attack_ will deal _2 bonus damage_.\n\n_+1:_ When the Warrior's shielding breaks, his _next two physical attacks_ will deal _3 bonus damage_.\n\n_+2:_ When the Warrior's shielding breaks, his _next two physical attacks_ will deal _5 bonus damage_.
actors.hero.talent.provoked_anger.comment="You broke my shielding. Prepare to die."

actors.hero.talent.iron_will.title=iron will
actors.hero.talent.iron_will.desc=_+0:_ The max shield provided by the Warrior's seal is _increased by 1_, and the amount of time taken for the seal to fully recharge is _reduced by 30 turns_.\n\n_+1:_ The max shield provided by the Warrior's seal is _increased by 3,_ and the amount of time taken for the seal to fully recharge is _reduced by 60 turns._\n\n_+2:_ The max shield provided by the Warrior's seal is _increased by 5,_ and the amount of time taken for the seal to fully recharge is _reduced by 90 turns._\n\n"Even if they could damage you, you'll just heal it off anyway."
actors.hero.talent.weapon_mastery.title=weapon mastery
actors.hero.talent.weapon_mastery.desc=_+1:_ Minimal damage is increased by _3_ on melee weapons and by _1_ on thrown weapons.\n\n_+2:_ Minimal damage is increased by _4_ on melee weapons and by _2_ on thrown weapons.
actors.hero.talent.weapon_mastery.comment="Recapture that glory of vanilla shortsword!"
actors.hero.talent.weapon_mastery.comment_mage="Most consistent 5.5 damage in my life.
"
actors.hero.talent.iron_stomach.title=iron stomach
actors.hero.talent.iron_stomach.desc=_+0:_ Eating food grants the Warrior _75% damage resistance while eating_.\n\n_+1:_ Eating food takes the Warrior 1 turn and grants him _100% damage resistance_ for _1 turn_.\n\n_+2:_ Eating food takes the Warrior 1 turn and grants him _invulnerability_ for _2 turns_.
actors.hero.talent.iron_stomach.comment="An essential skill of any good hero: being able to stop to snack IN THE MIDDLE OF BATTLE. Don't ask me how this works, but you'll be able to crack out the picnic basket riiight in front of a raging gnoll brute or an impending deathgaze and avoid pretty much all the damage."
actors.hero.talent.liquid_willpower.title=liquid willpower
actors.hero.talent.liquid_willpower.desc=_+0_: The Warrior instantly regains _50%_ of the shielding from his broken seal when drinking or throwing a potion, brew, or elixir.\n\n_+1:_ The Warrior instantly regains _100% of the shielding_ from his broken seal when drinking or throwing a potion, brew, or elixir.\n\n_+2:_ The Warrior instantly regains _150% of the shielding_ from his broken seal when drinking or throwing a potion, brew, or elixir.\n\nThe shield regeneration effect is doubled when using potions of strength, experience, or alchemy items that must be crafted using those potions.\n\nFor alchemy items with higher output quantities (e.g. aqua brew), this talent has a chance to trigger based on how many of that item is produced.\nThis effect can also be triggered with drinking from waterskin, with its power depending on how dew is consumed; 10 drops is 100% potency.
actors.hero.talent.liquid_willpower.comment="Dying directly after you drink a potion of healing is depressing. Good thing we have this talent."
actors.hero.talent.liquid_willpower.meta_desc=_If this talent is gained by a different hero_ it will instead grant shielding equal to 8% max hp at +1, or 12% max hp at +2.
actors.hero.talent.runic_transference.title=runic transference
actors.hero.talent.runic_transference.desc=_+1:_ The Warrior's broken seal can _transfer any glyph_ in the same way it transfers an upgrade, as long as the glyph is inscribed to an armor that the seal is attached to.\n\n_+2:_ The Warrior's broken seal can _absorb glyphs from armors it is attached to_ and transfer them to same way it transfers an upgrade.\n\nThe seal can only transfer glyphs if they were applied to the armor when the seal was attached.
actors.hero.talent.runic_transference.comment_warrior="When the dungeon gives you lemons (leather armor of thorns), make lemonade (plate armor of thorns)."
actors.hero.talent.runic_transference.meta_desc=_If this talent is gained by a different hero_ it will instead help glyphs on your armor resist being removed by scrolls of upgrade. Glyphs will begin to be lost when upgrading from level 8 (up from 4) at +1, or level 10 (up from 4) at +2.
actors.hero.talent.lethal_momentum.title=lethal momentum
actors.hero.talent.lethal_momentum.desc=_+1:_ When the Warrior lands a killing blow on an enemy with a physical weapon, it has a _67% chance_ to take 0 turns.\n\n_+2:_ When the Warrior lands a killing blow on an enemy with a physical weapon, it has a _100% chance_ to take 0 turns.\n\nThis mechanic is effective even against brutes, ghouls, and enemies affected by death mark.\n\nWhen this talent activates, the warrior gains 2x accuracy for that turn.
actors.hero.talent.lethal_momentum.comment="Probably the most op talent ever when fighting multiple enemies, and now it even works against ghouls and brutes! I tossed 2x accuracy on top because we all hate missing our damage-augmented glaives."
actors.hero.talent.lethal_momentum.comment_rogue="Assassin: but we already have Lethal Momentum!\nAssassin: Right?\nThis Talent: *exists*\nAssassin: Right?"
actors.hero.talent.lethal_momentum.comment_huntress="Lethal Momentum Sniper Shot goes brrrrr. And don't get me started on all the ways you can exploit Multishot with this talent..."
actors.hero.talent.improvised_projectiles.title=improvised projectiles
actors.hero.talent.improvised_projectiles.desc=_+0:_ The Warrior can blind an enemy for _2 turns_ by throwing any item that isn't a thrown weapon at them. This has a 50 turn cooldown.\n\n_+1:_ The Warrior can blind an enemy for _3 turns_ by throwing any item that isn’t a thrown weapon at them. This has a 25 turn cooldown.\n\n_+2:_ The Warrior can blind an enemy for _4 turns_ by throwing any item that isn’t a thrown weapon at them. This has a 25 turn cooldown.
actors.hero.talent.improvised_projectiles.comment="Apparently Evan dreamed this up after watching a show where the protagonist defeated the bad guys armed only with canned food."
actors.hero.talent.improvised_projectiles.comment_huntress="Big shrouding fog gamers, arise!"
actors.hero.talent.big_rush.title=big rush
actors.hero.talent.big_rush.desc=_+1:_ If enemy is on path of the Warrior, he will attack it with dealing bonus damage in amount of _up to max 75% shielding_ from the Warrior's broken seal.\n\n_+2:_ If enemy is on path of the Warrior, he will attack it with dealing bonus damage in amount of _up to 150% max shielding_ from the Warrior's broken seal.\n\n"I cannot accept the concept of something foolishly staying in my way!"
actors.hero.talent.big_rush.meta_desc=_If this talent is gained by a different hero_, the bonus damage will come from 7.5% of max HP at +1, and 11% of max HP at +2.
actors.hero.talent.hold_fast.title=hold fast
actors.hero.talent.hold_fast.desc=_+0:_ When the Warrior waits he gains _1-2 armor_ until he moves.\n\n_+1:_ When the Warrior waits he gains _2-4 armor_ until he moves.\n\n_+2:_ When the Warrior waits he gains _3-6 armor_ until he moves.\n\n\_+3:_ When the Warrior waits he gains 4-8 armor_ until he moves.
actors.hero.talent.hold_fast.comment="Click wait, become a tank!"
actors.hero.talent.strongman.title=strongman
actors.hero.talent.strongman.desc=\
  _+0:_ The Warrior's strength is _increased by 8%,_ rounded down.\n\n\
  _+1:_ The Warrior's strength is _increased by 13%,_ rounded down.\n\n\
  _+2:_ The Warrior's strength is _increased by 21%,_ rounded down.\n\n\
  _+3:_ The Warrior's strength is _increased by 29%,_ rounded down.
actors.hero.talent.strongman.comment="All the strength you could need. Right after you finished the area where you probably wanted it most."
actors.hero.talent.strongman.comment_rogue=Hopefully you took freerunner so you can completely break the game with evasive armor.

actors.hero.talent.monastic_might.title=Monastic Might
actors.hero.talent.monastic_might.desc=\
  _+0:_ The Monk's strength is _increased by 8%,_ rounded down.\n\n\
  _+1:_ The Monk's strength is _increased by 13%,_ rounded down.\n\n\
  _+2:_ The Monk's strength is _increased by 21%,_ rounded down.\n\n\
  _+3:_ The Monk's strength is _increased by 29%,_ rounded down.
actors.hero.talent.monastic_might.comment="With great power comes great strength."
# todo fix
actors.hero.talent.bear_paw.title=bearable paw
actors.hero.talent.bear_paw.desc=_+1:_ At _25% HP and lower_ the Warrior will inflict enemies with Bleeding.\n\n_+2:_ At _25% HP and lower_ the Warrior will inflict enemies with Bleeding and get +1 range.\n\n_+3:_ At _25% HP and lower_ the Warrior will heal for 33% of his damage, inflict enemies with Bleeding and get +1 range.
actors.hero.talent.bear_paw.comment="The cornered beast is the most dangerous."
actors.hero.talent.bear_paw.comment_mage="The sharpest object in the world is apparently wooden stick."
actors.hero.talent.endless_rage.title=endless rage
actors.hero.talent.endless_rage.desc=_+1:_ The Berserker can reach a max of _125% rage_\n\n_+2:_ The Berserker can reach a max of _150% rage_\n\n_+3:_ The Berserker can reach a max of _175% rage_.\n\nEach point of rage above 100% increases berserk shielding by 1% and reduces cooldown by 1%, but does not increase the damage bonus beyond +50%.
actors.hero.talent.endless_rage.comment="Think of the most intense feeling of pure, unadulterated rage. That's what we're working with here."
actors.hero.talent.deathless_fury.title=deathless fury
actors.hero.talent.deathless_fury.desc=_+1:_ Berserk automatically triggers if the Berserker is about to die and rage is at or above 100%, but it has a cooldown of _3 hero levels_ when this happens.\n\n_+2:_ Berserk automatically triggers if the Berserker is about to die and rage is at or above 100%, but it has a cooldown of _2 hero levels_ when this happens.\n\n_+3:_ Berserk automatically triggers if the Berserker is about to die and rage is at or above 100%, but it has a cooldown of _1 hero level_ when this happens.\n\nNote that the Berserker will still die if he has 0 HP when berserking ends.\n\nRegardless of level, the berserker is able to gain rage while recovering proportional to the amount recovered.\n\nThis talent is retroactive.
actors.hero.talent.deathless_fury.comment="Did you think killing me would be enough to make me die?"
actors.hero.talent.berserking_stamina.title=berserking stamina
actors.hero.talent.berserking_stamina.desc=_+0_: The berserker gains rage up to _17% faster_ at low health.\n\n_+1:_ The Berserker gains rage up to _33% faster_ at low health.\n\n_+2:_ The Berserker gains rage up to _67% faster_ at low health.\n\n_+3:_ The Berserker gains rage up to _100% faster_ at low health.
actors.hero.talent.berserking_stamina.comment="Where's my rage when I need it?"\n"RIGHT HERE!!!"
actors.hero.talent.enraged_catalyst.title=enraged catalyst
actors.hero.talent.enraged_catalyst.desc=_+1:_ Enchantments, glyphs, and curses trigger more often the more rage the berserker has, to a maximum of _20% more often_ at 100% rage.\n\n_+2:_ Enchantments, glyphs, and curses trigger more often the more rage the berserker has, to a maximum of _40% more often_ at 100% rage.\n\n_+3:_ Enchantments, glyphs, and curses trigger more often the more rage the berserker has, to a maximum of _60% more often_ at 100% rage.
actors.hero.talent.enraged_catalyst.comment="Now with glyph support!"
actors.hero.talent.one_man_army.title=one man army
actors.hero.talent.one_man_army.desc=_+1_: When in combat with multiple enemies, each additional enemy after the first increases the Berserker's attack speed by _11%_.\n\n_+2_: When in combat with multiple enemies, each enemy after the first increases the Berserker's attack speed by _22%_\n\n_+3_: When in combat with multiple enemies, each enemy after the first increases the Berserker's attack speed by _33%_.
actors.hero.talent.one_man_army.comment="You know, Watabou had the right idea with his berserker. Attacking faster is good, and now you can combo this talent with Lethal Momentum to simply delete all the enemies around you in an instant."
actors.hero.talent.bravery.title=bravery
actors.hero.talent.bravery.desc=_+1:_ Up to _+125%_ rage can be gathered from damage unblocked with Berserker's armor value.\n\n_+2:_ Up to _+175%_ rage can be gathered from damage unblocked with Berserker's armor value.\n\n_+3:_ Up to _+225%_ rage can be gathered from damage unblocked with Berserker's armor value.\n\n"Somebody have been expressing their opinions on how Shattered's berserker playstyle is cardinally different from berserkers in other fantasy fiction: full of armor instead of rushing forward unprotected. This talent aims to change that."
actors.hero.talent.cleave.title=battle tendency
actors.hero.talent.cleave.desc=_+1:_ If Gladiator fails to hit enemy within 5 turns, his combo will decay at rate of _2 points per turn_ instead of resetting.\n\n_+2:_ If Gladiator fails to hit enemy within 5 turns, his combo will decay at rate of _1 point per turn_ instead of resetting.\n\n_+3:_ If Gladiator fails to hit enemy within 5 turns, his combo will decay at rate of _0.5 points per turn_ instead of resetting.\n\n"Hopefully this is enough time for you to find your next enemy."
actors.hero.talent.lethal_defense.title=lethal defense
actors.hero.talent.lethal_defense.desc=_+1:_ When the Gladiator kills an enemy with a combo move, he _regains 50%_ of the broken seal's shielding.\n\n_+2:_ When the Gladiator kills an enemy with a combo move, he _regains 100%_ of the broken seal's shielding.\n\n_+3:_ When the Gladiator kills an enemy with a combo move, he _regains 150%_ of the broken seal's shielding.\n\n"While pre-v0.9.2 SHPD Gladiator's Slam may have been lost, this should help you recapture some of that power."
actors.hero.talent.efficient_training.title=combo meal
actors.hero.talent.efficient_training.desc=_+1:_ Eating food takes the Warrior 1 turn and grants _1 extra combo_ and _7 turns of extra combo time_.\n\n_+2:_ Eating food takes the Warrior 1 turn and grants _2 extra combo_ and _7 turns of extra combo time_.\n\n_+3:_ Eating food takes the Warrior 1 turn and grants _3 extra combo_ and _7 turns of extra combo time_.\n\n"Make sure you don't get caught using this in competitive multiplayer."
actors.hero.talent.enhanced_combo.title=enhanced combo
actors.hero.talent.enhanced_combo.desc=\
  _+0:_ When the Gladiator's combo is _8 or higher_, Clobber's knockback range increases to 3, it inflicts vertigo, and it can knock enemies into pits. Additionally, the Gladiator can _leap combo/5 tiles_ when using Slam, Crush, or Fury.\n\n\
  _+1:_ When the Gladiator's combo is _12 or higher_, Parry works on multiple attacks. Additionally, Clobber is now empowered at _6 combo_ instead of 8, and the Gladiator can _leap combo/4 tiles_ when using Slam, Crush, or Fury.\n\n\
  _+2:_ Clobber and Parry can be used _twice_. Additionally, Parry is now _empowered at 9 combo_, Clobber is now _empowered at 4 combo_, and and the Gladiator can _leap combo/3 tiles_ when using Slam, Crush, or Fury.\n\n\
  _+3:_ Clobber and Parry can be used _three times_ and are _always empowered_. Additionally, the Gladiator can _leap combo/2 tiles_ when using Slam, Crush, or Fury.
actors.hero.talent.enhanced_combo.comment="Feature creep? No such thing."
actors.hero.talent.skill.title=skill
actors.hero.talent.skill.desc=_+1:_ The Gladiator's combo moves use the highest of two damage rolls for bonus consistency. Also, hitting enemies sets combo time to 6, up from 5.\n\n_+2_: The gladiator has a 33% chance to gain combo even when missing, and his combo time is increased to 7.\n\n_+3_: The gladiator has a 33% chance to gain an extra combo when hitting, and his combo time is increased to 8.\n\n"RNG is a thing to be dominated. Only skill matters."
actors.hero.talent.everything_is_a_weapon.title=everything is a weapon
actors.hero.talent.everything_is_a_weapon.desc=\
  _+1_: The Gladiator has a _33% chance_ to gain combo when throwing items that aren't thrown weapons or shooting wands at targets.\n\n\
  _+2_: The Gladiator has a _67% chance_ to gain combo when throwing items that aren't thrown weapons or shooting wands at targets.\n\n\
  _+3_: The Gladiator has a _100% chance_ to gain combo when throwing items that aren't thrown weapons or shooting wands at targets.\n\n\
  When this talent fails to proc, it will still reset combo time.
actors.hero.talent.everything_is_a_weapon.comment="It's the thought that counts."
actors.hero.talent.power_stabilizer.title=power stabilizer
actors.hero.talent.power_stabilizer.desc=_+1:_ The max charge for Temporary Strength is _20_.\n\n_+2:_ The max charge for Temporary Strength is _25_.\n\n_+3:_ The max charge for Temporary Strength is _30_.\n\n"I guess it could be the perfect opportunity to slam you three times, my friend."
actors.hero.talent.arcanity_ensues.title=arcanity ensues
actors.hero.talent.arcanity_ensues.desc=_+1:_ Wands benefit from _20%_ of the Brawler's damage multiplier.\n\n_+2:_ Wands benefit from _40%_ of the Brawler's damage multiplier.\n\n_+3:_ Wands benefit from _60%_ of the Brawler's damage multiplier.\n\n"This is not a huge news than wands are really strong. Everyone is using wands. Let's give our warrior a bit of synergy with them."
actors.hero.talent.in_my_memories.title=in my memories
actors.hero.talent.in_my_memories.desc=_+1:_ Special attacks get flat damage boost from _40%_ of seal's shielding. When seal is at max shielding, Brawler charges up _25%_ faster.\n\n_+2:_ Special attacks get flat damage boost from _80%_ of seal's shielding. When seal is at max shielding, Brawler charges up _35%_ faster.\n\n_+3:_ Special attacks get flat damage boost from _120%_ of seal's shielding. When seal is at max shielding, Brawler charges up _45%_ faster.\n\n"Broken seal is purely passive right now. It's not like its benefits can't be turned good for combat, right?"
actors.hero.talent.holeric_burst.title=holeric burst
actors.hero.talent.holeric_burst.desc=_+1:_ Successful kill with special attack heals for _5 HP_.\n\n_+2:_ Successful kill with special attack heals for _10 HP_.\n\n_+1:_ Successful kill with special attack heals for _15 HP_.\n\n"Wait, warrior wasn't viable for chals in first place? Oh well."
actors.hero.talent.pride_of_steel.title=pride of steel
actors.hero.talent.pride_of_steel.desc=_+1:_ Brawler's special attacks ignore enemy's armor value.\n\n_+2:_ Brawler's special attacks ignore enemy's armor value and drop Ring of Wealth items if they manage to kill enemy.\n\n_+3:_ Brawler's special attacks ignore enemy's armor value, make enemy Targeted for _4 turns_ and drop Ring of Wealth items if they manage to kill enemy.\n\n"Strike the fear in hearts of any challengers on your path!"

actors.hero.talent.body_slam.title=body slam
actors.hero.talent.body_slam.desc=_+0:_ When the Warrior lands after jumping, all adjacent enemies take damage equal to _1-4 plus 25%_ of his damage blocking power.\n\n_+1:_ When the Warrior lands after jumping, all adjacent enemies take damage equal to _2-8 plus 50%_ of his damage blocking power.\n\n_+2:_ When the Warrior lands after jumping, all adjacent enemies take damage equal to _3-12 plus 75%_ of his damage blocking power.\n\n_+3:_ When the Warrior lands after jumping, all adjacent enemies take damage equal to _4-16 plus 100%_ of his damage blocking power.\n\n_+4:_ When the Warrior lands after jumping, all adjacent enemies take damage equal to _5-20 plus 125%_ of his damage blocking power.\n\nThis effect will trigger equipped weapon's enchantment, if _Heroic Enchanting_ is active.
actors.hero.talent.body_slam.comment="Is it a bird? Is it a plane? No, it's death from above!"
actors.hero.talent.impact_wave.title=impact wave
actors.hero.talent.impact_wave.desc=_+1:_ When the Warrior lands after jumping, all adjacent enemies are knocked _3 tiles_ back and have a _40% chance_ of becoming vulnerable for 5 turns.\n\n_+2:_ When the Warrior lands after jumping, all adjacent enemies are knocked _4 tiles_ back and have a _60% chance_ of becoming vulnerable for 5 turns.\n\n_+3:_ When the Warrior lands after jumping, all adjacent enemies are knocked _4 tiles_ back and have a _80% chance_ of becoming vulnerable for 5 turns.\n\n_+4:_ When the Warrior lands after jumping, all adjacent enemies are knocked _6 tiles_ back and have a _100% chance_ of becoming vulnerable for 5 turns.\n\n"Just like playing pool... if only they could bounce off walls and each other. Maybe later..."
actors.hero.talent.double_jump.title=double jump
actors.hero.talent.double_jump.desc=_+1:_ If the Warrior performs a second leap within 5 turns, that leap has a _50% reduced_ charge cost.\n\n_+2:_ If the Warrior performs a second leap within 5 turns, that leap _is free_.\n\n_+3:_ If the Warrior performs a second leap within 5 turns, that leap _is free_. If the Warrior performs a third leap within 5 turns, that leap has a _24% reduced_ charge cost.\n\n_+4:_ If the Warrior performs a second leap within 5 turns, that leap _is free_. If the Warrior performs a third leap within 5 turns, that leap has a _42% reduced_ charge cost.\n\n"Bouncy bouncy bouncy bouncy..."
actors.hero.talent.alice_gambit.title=alice's gambit
actors.hero.talent.alice_gambit.desc=_+1:_ When the Warrior lands after jumping, all adjacent enemies will be shrunken for _2.5_ turns.\n\n_+2:_ When the Warrior lands after jumping, all adjacent enemies will be shrunken for _5_ turns.\n\n_+3:_ When the Warrior lands after jumping, all adjacent enemies will be shrunken for _7.5_ turns.\n\n_+4:_ When the Warrior lands after jumping, all adjacent enemies will be shrunken for _10_ turns.\n\n“I call it purring, not growling.”

actors.hero.talent.expanding_wave.title=expanding wave
actors.hero.talent.expanding_wave.desc=_+0:_ Shockwave's range is _6 tiles_ and its width is _75 degrees._\n\n_+1:_ Shockwave's range is _7 tiles_ and its width is _90 degrees._\n\n_+2:_ Shockwave's range is _8 tiles_ and its width is _105 degrees._\n\n_+3:_ Shockwave's range is _9 tiles_ and its width is _120 degrees._\n\n_+4:_ Shockwave's range is _10 tiles_ and its width is _135 degrees._
actors.hero.talent.striking_wave.title=striking wave
# fixme implemented shpd sw
actors.hero.talent.striking_wave.desc=_+1:_ Shockwave has a _30% chance_ to also use on-hit effects like enchantments and combo.\n\n_+2:_ Shockwave has a _60% chance_ to also use on-hit effects like enchantments and combo.\n\n_+3:_ Shockwave has a _90% chance_ to also use on-hit effects like enchantments and combo.\n\n_+4:_ Shockwave has a _100% chance_ to also use on-hit effects like enchantments and combo, and it gives enchantments _+20% power_.
actors.hero.talent.shock_force.title=shock force
# implemented shpd shock force
actors.hero.talent.shock_force.desc=_+1:_ Shockwave deals _25% more damage_ and has a _25% chance_ to stun instead of cripple.\n\n_+2:_ Shockwave deals _50% more damage_ and has a _50% chance_ to stun instead of cripple.\n\n_+3:_ Shockwave deals _75% more damage_ and has a _75% chance_ to stun instead of cripple.\n\n_+4:_ Shockwave deals _100% more damage_ and has a _100% chance_ to stun instead of cripple.
actors.hero.talent.cockatriocious.title=cockatriocious
actors.hero.talent.cockatriocious.desc=_+1:_ Shockwave will _petrify_ enemies for _3 turns_.\n\n_+2:_ Shockwave will _petrify_ enemies for _5 turns_.\n\n_+3:_ Shockwave will _petrify_ enemies for _7 turns_.\n\n_+4:_ Shockwave will _petrify_ enemies for _9 turns_.\n\n"Never anger the tanking man."

actors.hero.talent.sustained_retribution.title=sustained retribution
actors.hero.talent.sustained_retribution.desc=_+1:_ The Warrior deals _115% bonus damage_ spread over _2 hits_, instead of 100% bonus damage in 1 hit.\n\n_+2:_ The Warrior deals _130% bonus damage_ spread over _3 hits_, instead of 100% bonus damage in 1 hit.\n\n_+3:_ The Warrior deals _145% bonus damage_ spread over _4 hits_, instead of 100% bonus damage in 1 hit.\n\n_+4:_ The Warrior deals _160% bonus damage_ spread over _5 hits_, instead of 100% bonus damage in 1 hit.
actors.hero.talent.shrug_it_off.title=shrug it off
actors.hero.talent.shrug_it_off.desc=_+1:_ The Warrior's damage reduction while enduring is _increased to 60%_, from 50%.\n\n_+2:_ The Warrior's damage reduction while enduring is _increased to 68%_, from 50%.\n\n_+3:_ The Warrior's damage reduction while enduring is _increased to 74%_, from 50%.\n\n_+4:_ The Warrior's damage reduction while enduring is _increased to 80%_, from 50%.
actors.hero.talent.even_the_odds.title=even the odds
actors.hero.talent.even_the_odds.desc=_+1:_ The Warrior deals an additional _5% bonus damage_ for every enemy within 2 tiles when enduring ends.\n\n_+2:_ The Warrior deals an additional _10% bonus damage_ for every enemy within 2 tiles when enduring ends.\n\n_+3:_ The Warrior deals an additional _15% bonus damage_ for every enemy within 2 tiles when enduring ends.\n\n_+4:_ The Warrior deals an additional _20% bonus damage_ for every enemy within 2 tiles when enduring ends.
actors.hero.talent.demonshader.title=demonshader
actors.hero.talent.demonshader.desc=_+1:_ The Warrior deals an additional _1-8_ burning damage when enduring ends. His endure-empowered attacks also extend combo by _2 turns_ and generate rage from 25% of damage roll.\n\n_+2:_ The Warrior deals an additional _3-13_ burning damage when enduring ends. His endure-empowered attacks also extend combo by _4 turns_ and generate rage from 50% of damage roll.\n\n_+3:_ The Warrior deals an additional _5-18_ burning damage when enduring ends. His endure-empowered attacks also extend combo by _6 turns_ and generate rage from 75% of damage roll.\n\n_+4:_ The Warrior deals an additional _7-23_ burning damage when enduring ends. His endure-empowered attacks also extend combo by _8 turns_ and generate rage from 100% of damage roll.\n\nRage generation is calculated from damage before rage damage boost.\n\n"Another overpowered flame damage..."

#mage
actors.hero.talent.energizing_meal_i.title=energizing meal I
actors.hero.talent.energizing_meal_i.desc=_+1:_ Eating food grants the Mage _5 turns_ of wand recharging.\n\n_+2_: Eating food grants the Mage _8 turns_ of wand recharging.
actors.hero.talent.energizing_meal_i.comment="Once upon a time this was actually a t1 talent in Shattered. Is having +3 damage to your wand better than 8 turns of recharging? You tell me."
actors.hero.talent.energizing_meal_i.comment_rogue="Da gift for you, wand sprinters."
actors.hero.talent.scholars_intuition.title=scholar's intuition
# todo buff
actors.hero.talent.scholars_intuition.desc=_+1:_ The Mage identifies wands _3x faster_, identifies their levels _when he uses them_, and has a _1/3 chance_ to identify scrolls and potions upon picking them up.\n\n_+2:_ The Mage identifies wands _when he uses them_ and has a _1/2 chance_ to identify scrolls and potions upon picking them up.
actors.hero.talent.scholars_intuition.comment="Considering he's supposed to be a scholar, it would be odd if he couldn't recognize consumables. Also, here's the on-zap level effect back."
actors.hero.talent.scholars_intuition.comment_rat_king="Hey look at this! Stuff that I couldn't already do!"
# todo buff
actors.hero.talent.lingering_magic.title=lingering magic
actors.hero.talent.lingering_magic.desc=_+0_: When the Mage zaps with a wand or staff, his _next physical attack_ deals _1-2_ bonus damage.\n\n_+1:_ When the Mage zaps with a wand or staff, his _next 2 physical attacks_ deal _2 bonus damage_.\n\n_+2:_ When the Mage zaps with a wand or staff, his _next two physical attacks_ deal _3 bonus damage_.
actors.hero.talent.lingering_magic.comment="Never say the mage was one to put all his eggs in one basket"
actors.hero.talent.backup_barrier.title=backup barrier
# todo revisit
actors.hero.talent.backup_barrier.desc=_+1:_ The Mage gains _5 shielding_ whenever he spends the last charge in his staff.\n\n_+2:_ The Mage gains _8 shielding_ whenever he spends the last charge in his staff.
actors.hero.talent.backup_barrier.comment="Can't zap your op wands? Here's a bunch of shielding!"
actors.hero.talent.backup_barrier.meta_desc=_If this talent is gained by a different hero_ it will instead trigger from the hero's highest level wand.

actors.hero.talent.arcane_boost.title=arcane boost
actors.hero.talent.arcane_boost.desc=_+1:_ The Mage's wands recharge _9 turns_ faster.\n\n_+2:_ The Mage's wands recharge _14 turns_ faster.\n\nThis talent has no effect on Mage's Staff.\n\n"Other wands in the holster need your love too!"
actors.hero.talent.energizing_meal_ii.title=energizing meal II
actors.hero.talent.energizing_meal_ii.desc=_+1:_ Eating food takes the Mage 1 turn and instantly recharges all wands for _1 charge_.\n\n_+2:_ Eating food takes the Mage 1 turn and instantly recharges all wands for _1.5 charges_.\n\n"This is for that one guy who's too impatient to wait for recharging to give them back their charges. Also, enjoy the overcharge."
actors.hero.talent.inscribed_power.title=inscribed power
actors.hero.talent.inscribed_power.desc=_+1:_ When the Mage reads a scroll or uses a spell item, his next three wand zaps will get _+4 levels_.\n\n_+2:_ When the Mage reads a scroll or uses a spell item, his next three wand zaps will get _+6 levels_.\n\nThe number of enhanced wand zaps is doubled when using a scroll of upgrade, transmutation, or alchemy items that must be crafted using those scrolls.\n\nFor alchemy items with higher output quantities (e.g. most spells), this talent has a chance to trigger based on how many of that item is produced.\n\n"Virgin SHPD Mage: +0 wands are +0. Can be boosted to +2 via inscribed power.\nChad Inscribed Power RKPD2 Mage: Read a scroll, +0 wand -> +6 wand!"
actors.hero.talent.wand_preservation.title=wand preservation
# todo buff
actors.hero.talent.wand_preservation.desc=_+0:_ When the Mage imbues a new wand into his staff, the old wand is returned at +0, _but this can only be done once._\n\n_+1:_ When the Mage imbues a new wand into his staff, the old wand is returned at +0, _this can be repeated with a one hero level cooldown._\n\n_+2:_ When the Mage imbues a new wand into his staff, the old wand is returned at +0, _with no limit_.
actors.hero.talent.wand_preservation.meta_desc=_If this talent is gained by a different hero_ it will instead increase the amount of arcane resin gained when putting a wand into an alchemy pot by 1/2/4 at +0/+1/+2
actors.hero.talent.arcane_vision.title=arcane vision
actors.hero.talent.arcane_vision.desc=_+1:_ When the Mage zaps an enemy, he gains mind vision on them for _20 turns_.\n\n_+2:_ When the Mage zaps an enemy, he gains mind vision on them for _30 turns_.
actors.hero.talent.arcane_vision.comment="Who needs torches when you have a wand of fireblast?"
actors.hero.talent.arcane_vision.comment_rogue="Disintegration? More like eyesight augmentation."
actors.hero.talent.pyromaniac.title=pyromaniac
actors.hero.talent.pyromaniac.desc=_+1:_ The damage from fire is increased by _13%_ (wand of firebolt's damage is increased by _9%_).\n\n_+2:_ The damage from fire is increased by _25%_ (wand of firebolt's damage is increased by _17%_).\n\nThe fire damage includes Blazing enchantment and wands of Fireblast and Firebolt, alongside with their battlemage effects.\n\nThe damage from enviromental fire is increased for you as well.
actors.hero.talent.pyromaniac.comment="It burns burns BUUUUURNS!!!"
actors.hero.talent.pyromaniac.comment_rogue="To be honest, it never occured to me than fireblast is weak. But burning fist deserves +damage to firebolt."
actors.hero.talent.empowering_scrolls.title=empowering scrolls
actors.hero.talent.empowering_scrolls.desc=_+1:_ When the Mage reads a scroll, his next two wand zaps will get _+2 levels_.\n\n_+2:_ When the Mage reads a scroll, his next two wand zaps will get _+4 levels_.\n\n_+3:_ When the Mage reads a scroll, his next two wand zaps will get _+6 levels_.
actors.hero.talent.empowering_scrolls.comment="Virgin SHPD Mage: +0 wands are +0. Can be boosted to +3 via empowering scrolls.\nChad Empowering Scrolls RKPD2 Mage: Read a scroll, +0 wand -> +8 wand!"
actors.hero.talent.empowering_scrolls.comment_rogue="Absolutely enourmous 8-headed... corrosion."

actors.hero.talent.shield_battery.title=shield battery
actors.hero.talent.shield_battery.desc=_+1:_ The Mage can self-target with a wand to convert all of its charges into shielding at a rate of _6% max HP per charge_.\n\n_+2:_ The Mage can self-target with a wand to convert all of its charges into shielding at a rate of _9% max HP per charge_.\n\n"What does a mage do when he has so many charges he can't hope to use them all? Create an impenetratable barrier, of course!"

actors.hero.talent.desperate_power.title=desperate power
actors.hero.talent.desperate_power.desc=_+1:_ The Mage's wands and staff gain _+2 levels_ on their final zap when they are down to their last charge.\n\n_+2:_ The Mage's wands and staff gain _+4 levels_ on their final zap when they are down to their last charge.\n\n_+3:_ The Mage's wands and staff gain _+6 levels_ on their final zap when they are down to their last charge.
actors.hero.talent.desperate_power.comment=Did you think +0->+6 was weak? What about +0->+12?
actors.hero.talent.ally_warp.title=ally warp
actors.hero.talent.cryonic_spell.title=cryonic spell
actors.hero.talent.cryonic_spell.desc=_+1:_ The wand of fireblast is empowered to use frost fire instead of regular one.\n\n_+2:_ The wand of fireblast and wand of firebolt are empowered to use frost fire instead of regular one. Wand of frost with 50% chance will freeze enemies instead of chilling.\n\n_+3:_ The wand of fireblast and wand of firebolt and their Battlemage effects are empowered to use frost fire instead of regular one. Wand of frost effects enemies and terrain in 3x3 and with 50% chance will freeze enemies instead of chilling.\n\n"Improving fire even further by decreasing its temperature? Sounds great, sadly Evan will only consider adding that."
actors.hero.talent.ally_warp.desc=_+1:_ The Mage can select an ally to instantly swap places with them, with a _4 tile range_.\n\n_+2:_ The Mage can select an ally to instantly swap places with them, with a _8 tile range_.\n\n_+3:_ The Mage can select an ally to instantly swap places with them, with a _12 tile range_.\n\nThe Mage cannot swap places with immobile allies.
actors.hero.talent.ally_warp.comment="When you've gotta switch places with a nearby wraith, look no further."
actors.hero.talent.ally_warp.comment_huntress="Wonder how this interacts with spirit hawk..."

actors.hero.talent.empowered_strike.title=empowered strike
actors.hero.talent.empowered_strike.desc=_+1:_ The Battlemage's first melee strike with his staff after zapping with it deals _20% extra magical damage_ and the staff's bonus effect gets _+67% power_.\n\n_+2:_ The Battlemage's first melee strike with his staff after zapping with it deals _40% extra magical damage_ and the staff's bonus effect gets _+133% power_.\n\n_+3:_ The Battlemage's first melee strike with his staff after zapping with it deals _60% extra magical damage_ and the staff's bonus effect gets _+200% power_.\n\nThe magical damage will be same type as staff's current wand.\n\n"Those people who say the staff has bad damage are total liars. They're just not using it properly..."
actors.hero.talent.mystical_charge.title=mystical charge
actors.hero.talent.mystical_charge.desc=_+0:_ Striking with his staff grants the Battlemage _0.5 turns_ worth of artifact recharging.\n\n_+1:_ Striking with his staff grants the Battlemage _1 turn_ worth of artifact recharging.\n\n_+2:_ Striking with his staff grants the Battlemage _1.5 turns_ worth of artifact recharging.\n\n_+3:_ Striking with his staff grants the Battlemage _2 turns_ worth of artifact recharging.\n\n"Artifacts are good. Why not make them better?"
actors.hero.talent.excess_charge.title=excess charge
actors.hero.talent.excess_charge.desc=_+1:_ When the Battlemage's staff is fully charged, its next zap will grant him _1 shielding_ per level of the staff.\n\n_+2:_ When the Battlemage's staff is fully charged, its next zap will grant him _2 shielding_ per level of the staff.\n\n_+3:_ When the Battlemage's staff is fully charged, its next zap will grant him _3 shielding_ per level of the staff.
actors.hero.talent.excess_charge.comment="You know what's better than a staff that's literally always at full charge? A staff at full charge AND tonnes of shielding!"
actors.hero.talent.sorcery.title=sorcery
actors.hero.talent.sorcery.desc=_+1_: When zapping wands, the Battlemage has a _17% chance_ to proc his on-hit wand imbue effect and a _10% chance_ to proc the rest of the staff's on-hit effects. \n\n_+2_: When zapping wands, the Battlemage has a _33% chance_ to proc his staff's wand imbue effect and a _20% chance_ to proc the rest of the staff's on-hit effects.\n\n_+3_: When zapping wands, the Battlemage has a _50% chance_ to proc his on-hit wand imbue effect and a _30% chance_ to proc the rest of the staff's on-hit effects.\n\n_-_ Only melee and thrown weapons can proc empowered strike.\n_-_ Melee and thrown weapons benefit twice as much from this talent.\n_-_ The staff's magic can proc this talent, but it is half as likely to proc it.\n\n"Battlemage effects are nice. The fact that they are limited to the staff is less nice."
actors.hero.talent.spectre_allies.title=spectre allies
actors.hero.talent.spectre_allies.desc=_+1:_ Mirror and prismatic images are not hit by projectiles, deal _20% more damage_ and have _1 extra range._\n\n_+2:_ Mirror and prismatic images are not hit by projectiles, deal _40% more damage_, have _2 extra range_ and trigger Battlemage's wand effects.\n\n_+3:_ Mirror and prismatic images are not hit by projectiles, deal _60% more damage_, have _3 extra range_ and trigger Battlemage's wand effects and Sorcery effects. Mirror images also scale their HP with depth.\n\n"Oh look, some ghosts to help you around!"
actors.hero.talent.soul_siphon.title=soul siphon
#todo revisit, this was nerfed in v0.9.3
actors.hero.talent.soul_siphon.desc=_+1:_ Magical damage and damage not originating from the Warlock triggers soul mark at _20% effectiveness,_ and physical damage dealt by other characters triggers soul mark at _20% effectiveness._\n\n_+2:_ Magical damage and damage not originating from the Warlock triggers soul mark at _30% effectiveness,_ and physical damage dealt by other characters triggers soul mark at _40% effectiveness._\n\n_+3:_ Magical damage and damage not originating from the Warlock triggers soul mark at _40% effectiveness,_ and physical damage dealt by other characters triggers soul mark at _60% effectiveness._\n\n"In Shattered, this only applies to melee damage from other characters. Why??? I want to heal as my enemies melt to death!"
actors.hero.talent.soul_eater.title=soul eater
actors.hero.talent.soul_eater.desc=_+1:_ Soul mark grants _0.5 turns_ of satiety for each damage dealt. Soul marked enemies have a _15% chance_ to trigger on-eat effects when they die.\n\n_+2:_ Soul mark grants _1 turn_ of satiety for each damage dealt. Soul marked enemies have a _30% chance_ to trigger on-eat effects when they die.\n\n_+3:_ Soul mark grants _1.5 turns_ of satiety for each damage dealt. Soul marked enemies have a _45% chance_ to trigger on-eat effects when they die.
actors.hero.talent.soul_eater.comment_mage="Watabou had the right idea with warlock, and now Evan has provided a way to recapture its spirit (once I tuned it up, of course!). Simply kill a soulmarked enemy to get loads of wand recharging!"
actors.hero.talent.soul_eater.comment_huntress="No recharging here, but plenty of adrenaline to go around (assuming you invested into Adrenalizing Meal)!"
actors.hero.talent.necromancers_minions.title=necromancer's minions
actors.hero.talent.necromancers_minions.desc=_+0:_ When a soul marked enemy dies, the Warlock has a _13% chance_ to raise them as a corrupted wraith.\n\n_+1:_ When a soul marked enemy dies, the Warlock has a _27% chance_ to raise them as a corrupted wraith.\n\n_+2:_ When a soul marked enemy dies, the Warlock has a _53% chance_ to raise them as a corrupted wraith.\n\n_+3_: When a soul marked enemy dies, the warlock has a _80%_ chance to raise to raise them as a corrupted wraith.
actors.hero.talent.necromancers_minions.comment_mage="The next best thing when you can't find corpse dust or wands of corruption."
actors.hero.talent.necromancers_minions.comment_huntress="Wand of Corruption? Corrupting enchantment? Nope. Corrupted Wraiths? Check."
actors.hero.talent.warlocks_touch.title=warlock's touch
# with all the shifting I could easily have a +0 effect with 5/10/10, but I worry that would be confusing.
actors.hero.talent.warlocks_touch.desc=\
  _+1_: The warlock and allies of the warlock have a _15% chance_ to inflict soul mark for 6 turns with their melee attacks. The warlock's thrown weapons have a _20% chance_ to do the same.\n\n\
  _+2_: The warlock and allies of the warlock have a _25% chance_ to inflict soul mark for 6 turns with their melee attacks. The warlock's thrown weapons have a _35% chance_ to do the same.\n\n\
  _+3_: The warlock and allies of the warlock have a _35% chance_ to inflict soul mark for 6 turns with their melee attacks. The warlock's thrown weapons have a _50% chance_ to do the same.
actors.hero.talent.warlocks_touch.comment="Why limit soul marking to just wands? That's just lazy writing."
actors.hero.talent.warlocks_touch.comment_huntress=The spirit bow and its arrows are treated as melee weapons by this talent.\n\n"If you don't have any good or reliable wands, have no fear, warlock's touch is here!"
actors.hero.talent.banished.title=banished
actors.hero.talent.banished.desc=_+1:_ Zapping soul marked entity will banish it to shadow realm, _instantly killing it without loot._ This has _250 turns_ cooldown.\n\n_+2:_ Zapping soul marked entity will banish it to shadow realm, _instantly killing it without loot._ This has _220 turns_ cooldown.\n\n_+3:_ Zapping soul marked entity will banish it to shadow realm, _instantly killing it without loot._ This has _190 turns_ cooldown.\n\nBanished enemies will reward Warlock with restoration from 50% of enemy's HP.\nThis talent doesn't trigger if enemy dies from magic zap.
actors.hero.talent.banished.comment="Their souls were so tasty than I swallowed them as a whole!"
actors.hero.talent.banished.comment_huntress="Even the weakest wands will demolish your opponents with dark magic."
actors.hero.talent.ectotoughness.title=auxiliary charge
actors.hero.talent.ectotoughness.desc=_+1:_ Using wands gives _3 additional_ spirit charges into storage.\n\n_+2:_ Using wands gives _5 additional_ spirit charges into storage.\n\n_+3:_ Using wands gives _7 additional_ spirit charges into storage.\n\n"Give me a new spirit please... mine is not working..."
actors.hero.talent.i_hate_all_elements.title=I hate all of the elements
actors.hero.talent.i_hate_all_elements.desc=_+1:_ Wraiths are immune to _Burning and Poison_.\n\n_+2:_ Wraiths are immune to _Burning, Poison, Electricity and Toxic Gas._\n\n_+3:_ Wraiths are immune to _Burning, Toxic Gas, Poison, Electricity, Paralysis and Corrosion._\n\n"I am not pyrophobic. I am everything-phobic."
actors.hero.talent.stab_from_nowhere.title=stab from nowhere
actors.hero.talent.stab_from_nowhere.desc=_+1:_ Wraiths can teleport to their enemies if they are _3 tiles_ from each other.\n\n_+2:_ Wraiths can teleport to their enemies if they are _6 tiles_ from each other.\n\n_+3:_ Wraiths can teleport to their enemies and hit them if they are _6 tiles_ from each other.\n\n"Why we can't just kill succubi and inherit their powers!"
actors.hero.talent.power_in_numbers.title=power in numbers
actors.hero.talent.power_in_numbers.desc=_+1:_ Zapping a mob will target all your wraiths to attack them.\n\n_+2:_ Zapping a mob will target all your wraiths to attack them. Wraiths deal _4 more damage_ if they see any other wraith.\n\n_+3:_ Zapping a mob will target all your wraiths to attack them. Wraiths deal _4 more damage_ if they see any other wraith. Wraiths explode into several smaller weaker wraiths.\n\n"It's void time, mah boi!"
actors.hero.talent.mind_breaker.title=mind breaker
actors.hero.talent.mind_breaker.desc=_+1:_ With _5% chance_ an allied wraith will possess its targeted enemy, making it corrupted.\n\n_+2:_ With _11% chance_ an allied wraith will possess its targeted enemy, making it corrupted.\n\n_+3:_ With _17% chance_ an allied wraith will possess its targeted enemy, making it corrupted.\n\n"Wraiths are pretty pathetic in terms of abilities, let's bring more guys!"
actors.hero.talent.blast_radius.title=blast radius
actors.hero.talent.blast_radius.desc=_+0:_ Elemental blast's radius is _5 tiles_.\n\n_+1:_ Elemental blast's radius is _6 tiles_.\n\n_+2:_ Elemental blast's radius is _7 tiles_.\n\n_+3:_ Elemental blast's radius is _8 tiles_.\n\n_+4:_ Elemental blast's radius is increased to _9 tiles_.\n\nEveryone likes to see a single elemental blast affect 81 tiles in one go.
actors.hero.talent.elemental_power.title=elemental power
actors.hero.talent.elemental_power.desc=_+1:_ The power of elemental blast is increased by _33%_.\n\n_+2:_ The power of elemental blast is increased by _67%_.\n\n_+3:_ The power of elemental blast is increased by _100%_.\n\n_+4:_ The power of elemental blast is increased by _133%_.\n\n"Elemental blast? More like elemental nuke!"
actors.hero.talent.reactive_barrier.title=reactive barrier
actors.hero.talent.reactive_barrier.desc=_+1:_ The Mage gains _3 shielding_ for every character affected by elemental blast, to a max of 5 characters.\n\n_+2:_ The Mage gains _6 shielding_ for every character affected by elemental blast, to a max of 6 characters.\n\n_+3:_ The Mage gains _9 shielding_ for every character affected by elemental blast, to a max of 7 characters.\n\n_+4:_ The Mage gains _12 shielding_ for every character affected by elemental blast, to a max of 8 characters.
actors.hero.talent.reactive_barrier.comment="Elemental blast can't just be good offensively, y'know? It needs that little something extra... like a boatload of shielding on demand."
actors.hero.talent.empowered_strike_ii.title=empowered strike II
actors.hero.talent.empowered_strike_ii.desc=_+1:_ The power, range and effect of elemental blast are doubled, but base cost is increased to _80_, from 35.\n\n_+2:_ The power, range and effect of elemental blast are doubled, but base cost is increased to _75_, from 35.\n\n_+3:_ The power, range and effect of elemental blast are doubled, but base cost is increased to _70_, from 35.\n\n_+4:_ The power, range and effect of elemental blast are doubled, but base cost is increased to _65_, from 35.\n\n"If you are still believing than staff has bad damage..."

actors.hero.talent.wild_power.title=wild power
# unchanged, this is affected by mage innate boost.
actors.hero.talent.wild_power.desc=_+1:_ When using wild magic, wands will be boosted by either _2 or 3, up to +4_.\n\n_+2:_ When using wild magic, wands will be boosted by _3, up to +5_.\n\n_+3:_ When using wild magic, wands will be boosted by either _3 or 4, up to +6_.\n\n_+4:_ When using wild magic, wands will be boosted by _4, up to +7_.
actors.hero.talent.fire_everything.title=fire everything
actors.hero.talent.fire_everything.desc=_+1:_ Wild magic now fires _5 times_ up from 4, and each wand has a _25% chance_ to be usable 3 times.\n\n_+2:_ Wild magic now fires _6 times_ up from 4, and each wand has a _50% chance_ to be usable 3 times.\n\n_+3:_ Wild magic now fires _7 times_ up from 4, and each wand has a _75% chance_ to be usable 3 times.\n\n_+4:_ Wild magic now fires _8 times_ up from 4, and each wand has a _100% chance_ to be usable 3 times.\n\n"When you run into a roadblock, oftentimes the wisest thing to do is mercilessly annihilate it."
actors.hero.talent.conserved_magic.title=conserved magic
# fixme unchanged
actors.hero.talent.conserved_magic.desc=_+1:_ Each zap from wild magic now uses _0.33 charges_ instead of 0.5, and wild magic has a _25% chance_ to not spend a turn.\n\n_+2:_ Each zap from wild magic now uses _0.225 charges_ instead of 0.5, and wild magic has a _50% chance_ to not spend a turn.\n\n_+3:_ Each zap from wild magic now uses _0.15 charges_ instead of 0.5, and wild magic has a _75% chance_ to not spend a turn.\n\n_+4:_ Each zap from wild magic now uses _0.1 charges_ instead of 0.5, and wild magic has a _100% chance_ to not spend a turn.
actors.hero.talent.eldritch_blessing.title=eldritch blessing
actors.hero.talent.eldritch_blessing.desc=_+1:_ Wild magic fires up to _2_ more times, but all wand effects are _cursed_.\n\n_+2:_ Wild magic fires up to _3_ more times, but all wand effects are _cursed_. Cursed effects from wild magic are less harmful to user.\n\n_+3:_ Wild magic fires up to _3_ more times, but all wand effects are _cursed_. Cursed effects from wild magic are slightly stronger and less harmful to user. Non-common effects are _10%_ more frequent.\n\n_+4:_ Wild magic fires up to _4_ more times, but all wand effects are _cursed_. Cursed effects from wild magic are slightly stronger and are either neutral or positive for user. Non-common effects are _10%_ more frequent.\n\nEach wands can be used 3 times if necessary.\n\n"Cursed wands are fun. 100% more cursed wands is over 9000% more fun."

actors.hero.talent.telefrag.title=Telefrag
#fixme this is level-shifted, and I may not want that anymore
actors.hero.talent.telefrag.desc=_+0:_ If the Mage warps into another character he deals _10-15 damage_ to it, but also takes _5 damage_.\n\n_+1:_ If the Mage warps into another character he deals _20-30 damage_ to it, but also takes _10 damage_.\n\n_+2:_ If the Mage warps into another character he deals _30-45 damage_ to it, but also takes _15 damage_.\n\n_+3:_ If the Mage warps into another character he deals _40-60 damage_ to it, but also takes _15 damage_.\n\n_+4:_ If the Mage warps into another character he deals _50-75 damage_ to it, but also takes _20 damage_.\n\nThe hero cannot be killed by this talent, and the self damage can be reduced by magic resisting effects.
actors.hero.talent.remote_beacon.title=Remote Beacon
actors.hero.talent.remote_beacon.desc=_+1:_ The Mage can place a beacon at any location within _4 tiles_.\n\n_+2:_ The Mage can place a beacon at any location within _8 tiles_.\n\n_+3:_ The Mage can place a beacon at any location within _12 tiles_.\n\n_+4:_ The Mage can place a beacon at any location within _16 tiles_.\n\nThe Mage cannot place beacons in locations that are inaccessible.\n\n"Nothing like warping rings around your foes..."
actors.hero.talent.longrange_warp.title=Longrange Warp
actors.hero.talent.longrange_warp.desc=_+0:_ The Mage can warp between floors at _150% charge cost_.\n\n_+1:_ The Mage can warp between floors at _125% charge cost_.\n\n_+2:_ The Mage can warp between floors at _100% charge cost_.\n\n_+3:_ The Mage can warp between floors at _75%_ charge cost.\n\n_+4:_ The Mage can warp between floors at _50% charge cost_.\n\nThe Mage cannot use longrange warp to leave a locked floor.
actors.hero.talent.chrono_screw.title=chrono screw
actors.hero.talent.chrono_screw.desc=_+1:_ The Mage recieves _1 turn_ of time bubble after warping.\n\n_+2:_ The Mage recieves _2.5 turns_ of time bubble after warping.\n\n_+3:_ The Mage recieves _4 turns_ of time bubble after warping.\n\n_+4:_ The Mage recieves _5.5 turns_ of time bubble after warping.\n\n"I hope you don't get stuck in hammerspace."

#rogue
actors.hero.talent.cached_rations.title=cached rations
actors.hero.talent.cached_rations.desc=_+1:_ The Rogue can find _4 supply rations_ placed in chests while he explores the next few floors of the dungeon.\n\n_+2:_ The Rogue can find _6 supply rations_ placed in chests while he explores the next few floors of the dungeon.\n\nSupply rations are eaten quickly, restore a moderate amount of satiety, heal 5 hp, and restore 1 charge to the cloak of shadows.
actors.hero.talent.cached_rations.comment="Starving? what's that? I'm swimming in food!"
actors.hero.talent.thiefs_intuition.title=thief's intuition
actors.hero.talent.thiefs_intuition.desc=_+0_: The Rogue identifies rings _2x faster_ and identifies the type of a ring _when he equips it_.\n\n_+1:_ The Rogue identifies rings and artifacts _when he equips them_ and identifies the type of a ring _when he picks it up_. He also has a 33% chance to detect curses in rings and artifacts.\n\n_+2:_ The Rogue identifies rings and artifacts _when he picks them up_.\n\n"This is for those people who think that identifying rings at 2x speed and ring type on equip isn't fast enough. I also added curse-checking to seal the deal."
actors.hero.talent.sucker_punch.title=sucker punch
actors.hero.talent.sucker_punch.desc=_+1:_ The Rogue's first strike against an unaware enemy deals _2 bonus damage._\n\n_+2_: The Rogue's first strike against an unaware enemy deals _3 bonus damage._
actors.hero.talent.mending_shadows.title=mending shadows
actors.hero.talent.mending_shadows.desc=_+1:_ The Rogue gains one shielding _every other turn_ he is invisible, _to a max of 3_. He will also gain one HP _every 4 turns_ if he is not starving.\n\n_+2:_ The Rogue gains one shielding _every turn_ he is invisible, _to a max of 5_. He will also gain one HP _every other turn_ if he isn't starving.\n\n"'Shielding by itself is so boring, we want health!' Well, here you go!"
actors.hero.talent.faraday_cage.title=faraday cage
actors.hero.talent.faraday_cage.desc=_+1:_ The Rogue is immune to electric fields. Electric fields stay for _10%_ longer.\n\n_+2_: The Rogue is immune to electric fields and takes 50% damage from electric damage and shock elementals. Electric fields stay for _20%_ longer.
actors.hero.talent.faraday_cage.comment="Funny sparks from traps - now 100% more beneficial!"
actors.hero.talent.faraday_cage.comment_rk="I love when my titular wand doesn't make me powerless for seconds!"
actors.hero.talent.mystical_meal.title=mystical meal
actors.hero.talent.mystical_meal.desc=_+1:_ Eating food takes the Rogue 1 turn (supply rations are eaten instantly) and grants him _5 turns of artifact recharging_.\n\n_+2:_ Eating food takes the Rogue 1 turn (supply rations are eaten instantly) and grants him _8 turns of artifact recharging_.\n\nThis can stack upon itself. \n\n"Nothing like recharging your cloak for 2/3 charges per food eaten..."
actors.hero.talent.inscribed_stealth.title=inscribed stealth
actors.hero.talent.inscribed_stealth.desc=_+1:_ The Rogue gains _6 turns_ of invisibility after reading a scroll or using a spell item.\n\n_+2:_ The Rogue gains _10 turns_ of invisibility after reading a scroll or using a spell item.\n\nThe invisibility duration is doubled when using a scroll of upgrade, scroll of transmutation, or alchemy items that must be crafted using those scrolls.\n\nFor alchemy items with higher output quantities (e.g. most spells), this talent has a chance to trigger based on how many of that item is produced.
actors.hero.talent.inscribed_stealth.comment="Who needs silly things like cloak charges or potions when you can just read a scroll and get out of literally any situation?"
actors.hero.talent.mystical_upgrade.title=dual wielding
actors.hero.talent.mystical_upgrade.desc=_+1:_ Using missile weapon after using a wand takes 0 turns.\n\n_+1:_ Using missile weapon after using a wand takes 0 turns. Using wand after using a missile weapon also takes 0 turns.\n\nThis cannot be chained.
actors.hero.talent.mystical_upgrade.comment="They think they can use shuriken then burn enemy away in a blink of time. They don't realize what they are missing for a full puzzle.\n-Dual Wielding Rogues"
actors.hero.talent.mystical_upgrade.comment_huntress="What about you getting the heck out of my way.\n-Dual Wielding Huntresses
actors.hero.talent.wide_search.title=wide search
actors.hero.talent.wide_search.desc=_+1:_ The Rogue's search radius is increased from 5x5 to _7x7_.\n\n_+2:_ The Rogue's search radius is increased from 7x7 to _9x9_.
actors.hero.talent.wide_search.comment="No tile left unturned."\n- Rogues with Wide Search
actors.hero.talent.wide_search.meta_desc=_If this talent is gained by a different hero_ it will instead increase their search radius from 3x3 to a 5x5 at +1, or a 7x7 at +2.
actors.hero.talent.silent_steps.title=silent steps
actors.hero.talent.silent_steps.desc=_+1:_ The Rogue will not wake sleeping enemies while he is _3 or more tiles away from them_.\n\n_+2:_ The Rogue will not wake sleeping enemies while he is _not adjacent to them_.
actors.hero.talent.silent_steps.comment="Now you can make all the silly faces you want at that enemy who is practically right next to you."
actors.hero.talent.silent_steps.comment_huntress="I wonder why they never take a first turn."
actors.hero.talent.rogues_foresight.title=rogue's foresight
# todo buff, the buff was better than mine :(
actors.hero.talent.rogues_foresight.desc=_+1:_ When the Rogue is on a level with a secret room, he has a _75% chance to notice_ that the level contains a secret. The chance for the Rogue to notice a secret without searching is increased by 50%.\n\n_+2:_ When the Rogue is on a level with a secret room, he has a _100% chance to notice_ that the level contains a secret. The chance for the Rogue to notice a secret without searching is increased by 50%.
actors.hero.talent.rogues_foresight.comment="Finding secret rooms is good. This makes it more consistent."
actors.hero.talent.efficient_shadows.title=efficient shadows
actors.hero.talent.efficient_shadows.desc=_+1:_ Cloak of Shadows loses 50% charge bonus, but gives _6 turns of invisibility_ per charge, from 4.\n\n_+2:_ Cloak of Shadows loses 50% charge bonus, but gives _7 turns of invisibility_ per charge, from 4.\n\n"Evan Evenest might have nerfed our cloak but we can use this talent to get that glorious invisibility duration back! It's even better than pre-0.6.2!"
actors.hero.talent.efficient_shadows.meta_desc=_If this talent is gained by a different hero_, they will get extra turn of invisibility, when their actual invisibility is dispelled; at +2, when this bonus invisibility ends, the hero's artifacts will be slightly charged.
actors.hero.talent.light_cloak.title=light cloak
# this *sounds* weaker than shpd's, but is actually stronger due to the innate rogue boost.
actors.hero.talent.light_cloak.desc=_Innate_: The Rogue can use his cloak of shadows when it is not equipped, but it recharges at _17% speed_ when unequipped.\n\n_+1:_ The Rogue can use his cloak of shadows when it is not equipped, but it recharges at _33% speed_ when unequipped.\n\n_+2:_ The Rogue can use his cloak of shadows when it is not equipped, but it recharges at _67% speed_ when unequipped.\n\n_+3:_ The Rogue can use his cloak of shadows when it is not equipped, _with no penalty_.
actors.hero.talent.light_cloak.comment_rogue="Because actually having the cloak equipped is such a drag."
actors.hero.talent.light_cloak.meta_desc=_If this talent is gained by a different hero_ it will instead increase the charging speed of all artifacts by 10/20/30% at +1/+2/+3.
actors.hero.talent.enhanced_rings.title=enhanced rings
actors.hero.talent.enhanced_rings.desc=_+1:_ When the Rogue uses an artifact, his rings gains +2 upgrades for _3 turns_.\n\n_+2:_ When the Rogue uses an artifact, his rings gain +2 upgrades for _6 turns_.\n\n_+3:_When the Rogue uses an artifact, his rings gain +2 upgrades for _9 turns_.\n\n"While Rogue might not get the +4 natural ring bonus that he gets in Rat King Dungeon, this is pretty damn close. Equipping two rings of the same type will make that dream a reality."
actors.hero.talent.trapper_mastery.title=trapper's mastery
actors.hero.talent.trapper_mastery.desc=_+1:_ If rogue steps on trap, it will instantly disappear instead of triggering. This effect has _170 turns_ cooldown.\n\n_+2:_ If rogue steps on trap, it will instantly disappear instead of triggering. This effect has _150 turns_ cooldown.\n\n_+3:_ If rogue steps on trap, it will instantly disappear instead of triggering. This effect has _130 turns_ cooldown.\n\n"If shock traps were not the obstacle in your journey, this talent is for you."
actors.hero.talent.enhanced_lethality.title=enhanced lethality
# TODO add message
actors.hero.talent.enhanced_lethality.desc=_+1:_ The Assassin can assassinate enemies left at below _4/13/27/67% health_ per level of preparation, up from 3/10/20/50%.\n\n_+2:_ The Assassin can assassinate enemies left at below _5/17/33/83% health_ per level of preparation, up from 3/10/20/50%.\n\n_+3:_ The Assassin can assassinate enemies left at below _6/20/40/100% health_ per level of preparation, up from 3/10/20/50%.
actors.hero.talent.assassins_reach.title=assassin's reach
actors.hero.talent.assassins_reach.desc=_+1:_ The Assassin's blink range per level of preparation is increased to _2/3/5/6 tiles_, from 1/2/3/4.\n\n_+2:_ The Assassin's blink range per level of preparation is increased to _3/5/7/10 tiles_, from 1/2/3/4.\n\n_+3:_ The Assassin's blink range per level of preparation is increased to _4/7/10/14 tiles_, from 1/2/3/4.\n\nThis blink can go through hazards and enemies, but not through solid terrain like walls.\n\n"I am inevitable."\n- You after blinking 10 tiles to oneshot that scorpio.
actors.hero.talent.bounty_hunter.title=bounty hunter
# todo implement
actors.hero.talent.bounty_hunter.desc=_+1:_ When the Assassin kills an enemy with a prepared strike their item drop chance is increased by _4/8/16/32%_, per level of preparation.\n\n_+2:_ When the Assassin kills an enemy with a prepared strike their item drop chance is increased by _8/16/32/64%_, per level of preparation.\n\n_+3:_ When the Assassin kills an enemy with a prepared strike their item drop chance is increased by _12/24/48/96%_, per level of preparation.
actors.hero.talent.bounty_hunter.comment="What's the use of all that preparing if you don't get paid for it? Time is money!"
actors.hero.talent.lethal_momentum_2.title=lethal momentum
actors.hero.talent.lethal_momentum_2.desc=_+1:_ When the Assassin lands a killing blow with a prepared strike, it and has a _50% chance_ to take 0 turns, and follow-up killing strikes will also take 0 turns.\n\n_+2:_ When the Assassin lands a killing blow with a prepared strike, it has a _75% chance_ to take 0 turns, and follow-up killing strikes will also take 0 turns.\n\n_+3_: When the Assassin lands a killing blow with a prepared strike, it has a _100% chance_ to take 0 turns, and follow-up killing strikes will also take 0 turns.\n\nThis mechanic is effective even against brutes, ghouls, and enemies affected by death mark.
actors.hero.talent.lethal_momentum_2.comment="Completely unique talent that was born of a very much original idea, and then buffed silly."
actors.hero.talent.darkening_steps.title=energized steps
actors.hero.talent.darkening_steps.desc=_+1:_ With successful assassination the Assassin will get _2 turns_ of artifact recharging.\n\n_+2:_ With successful assassination the Assassin will get _4 turns_ of artifact recharging.\n\n_+3:_ With successful assassination the Assassin will get _6 turns_ of artifact recharging.\n\nThis talent can also proc with just prepared kills but only with _67%_ chance.\n\n"Chaining assassination is hard because it uses cloak charges. Let's try to boost a bit our cloak's sustainability."
actors.hero.talent.evasive_armor.title=evasive armor
actors.hero.talent.evasive_armor.desc=_+1:_ While freerunning, the Freerunner gains an additional _+6.7% evasion_ per excess point of strength on his armor.\n\n_+2:_ While freerunning, the Freerunner gains an additional _+13.3% evasion_ per excess point of strength on his armor.\n\n_+3:_ While freerunning, the Freerunner gains an additional _+20% evasion_ per excess point of strength on his armor.\n\n"What's that? I can't hear you over the sound of MISSING!"
actors.hero.talent.projectile_momentum.title=projectile momentum
actors.hero.talent.projectile_momentum.desc=_+0:_ While freerunning, the Freerunner gains _+1_ level to his wands.\n\n_+1:_ While freerunning, the Freerunner gains _+20% accuracy and +15% damage_ with thrown weapons and _+2 levels_ to his wands.\n\n_+2:_ While freerunning, the Freerunner gains _+40% accuracy and +30% damage_ with thrown weapons and _+3 levels_ to his wands.\n\n_+3:_ While freerunning, the Freerunner gains _+60% accuracy and +45% damage_ with thrown weapons and _+4 levels_ to his wands.\n\n"When you're getting free +5 boosts to all your wands and you realize that mage only gets +2. Inferior class."\n- the Freerunner Gang.
actors.hero.talent.speedy_stealth.title=speedy stealth
actors.hero.talent.speedy_stealth.desc=_+1:_ The Freerunner gains 3 stacks of momentum per turn while he is invisible.\n\n_+2:_ In addition to the benefits of +1, freerunning does not count down while the Freerunner is invisible, and each turn invisible reduces the amount of time spent recovering by 1.\n\n_+3:_ In addition to the benefits of +1 and +2, the Freerunner is treated as freerunning while invisible.\n\n"Almost like if you were never seen again..."
actors.hero.talent.fast_recovery.title=marathon runner
actors.hero.talent.fast_recovery.desc=_+1:_ Freerun duration is _increased by 16%._\n\n_+2:_ Freerun duration is _increased by 33%._\n\n_+3:_ Freerun duration is _increased by 50%._\n\n"Some people complain that freerun doesn't last long enough. Not sure exactly what they are talking about."
actors.hero.talent.olympic_stats.title=olympic stats
actors.hero.talent.olympic_stats.desc=_+1:_ The Freerunner can freerun at 3x speed from 2x, but exhaustion duration is increased by _50%_.\n\n_+2:_ The Freerunner can freerun at 3x speed from 2x, but exhaustion duration is increased by _40%_.\n\n_+3:_ The Freerunner can freerun at 3x speed from 2x, but exhaustion duration is increased by _30%_. Maximum momentum is increased to _15_.\n\n"What is more broken than more freerunning? More speed! And even more freerunning!"
actors.hero.talent.energon_fusion.title=energon fusion
actors.hero.talent.energon_fusion.desc=_+1:_ While in alternate mode, attacking will grant Shadowflare _0.17 turns_ worth of artifact and wand recharging.\n\n_+2:_ While in alternate mode, attacking will grant Shadowflare _0.34 turn_ worth of artifact and wand recharging.\n\n_+3:_ While in alternate mode, attacking will grant Shadowflare _0.5 turns_ worth of artifact and wand recharging.\n\n"Now you can zap more, while you zap to zap more later."
actors.hero.talent.laser_precision.title=plague drive
actors.hero.talent.laser_precision.desc=_+1:_ Debuffed enemies will spread their effects as they walk.\n\n_+2:_ Debuffed enemies will spread effects as they walk, while taking 50% less damage from them.\n\n_+3:_ Debuffed enemies will spread effects as they walk, while taking 50% less damage from them. Inflicted debuffs last 50% longer.\n\nDebuffs are spreading in 5x5 range.\n\n"You thought than marking enemy for extra damage is just worse Assassin gimmick, but no, it's more than that."
actors.hero.talent.eradicating_charge.title=eradicating charge
actors.hero.talent.eradicating_charge.desc=_+1:_ Shooting in alternate mode gives _1 shielding_ and has _10%_ chance to inflict Slowed for 3 turns.\n\n_+2:_ Shooting in alternate mode gives _2 shielding_ and has _20%_ chance to inflict Slowed for 3 turns.\n\n_+3:_ Shooting in alternate mode gives _3 shielding_ and has _30%_ chance to inflict Slowed for 3 turns.\n\n"How that energy doesn't melt you?"
actors.hero.talent.void_wrath.title=void wrath
actors.hero.talent.void_wrath.desc=_+1:_ Shadowflare takes _75% less damage_ while transforming.\n\n_+2:_ Shadowflare takes _75% less damage_ and lights attackers on fire while transforming.\n\n_+3:_ Shadowflare takes _75% less damage_ and lights attackers on fire while transforming. Killing debuffed enemy will heal Shadowflare for 9 HP.\n\n"You can't just resist it enough, right?"
actors.hero.talent.mechanical_power.title=mechanical power
actors.hero.talent.mechanical_power.desc=_+1:_ Shadowflare has 25% damage reduction against physical attacks.\n\n_+2:_ Shadowflare has 25% damage reduction against physical attacks and when he kills any enemy, he gains barkskin equivalent to his level which fades every turn.\n\n_+3:_ Shadowflare has 25% damage reduction against physical attacks and he kills any enemy, he gains barkskin equivalent to his level which fades every four turn. Attacking will disable enemy's magical abilities for _3 turns_.\n\nSome godly entities are immune to +3 effect.\n\n"See this warlock? Go smack him in face. Do it. Just to show that sucker than his trickery will not work on you."

actors.hero.talent.hasty_retreat.title=hasty retreat
actors.hero.talent.hasty_retreat.desc=_+1:_ After blinking the Rogue gains _2 turns_ of haste and invisibility.\n\n_+2:_ After blinking the Rogue gains _3 turns_ of haste and invisibility.\n\n_+3:_ After blinking the Rogue gains _4 turns_ of haste and invisibility.\n\n_+4:_ After blinking the Rogue gains _5 turns_ of haste and invisibility.
actors.hero.talent.body_replacement.title=body replacement
actors.hero.talent.body_replacement.desc=_+1:_ After blinking, the Rogue leaves a wooden decoy behind that has _20 health and 1-5 armor_.\n\n_+2:_ After blinking, the Rogue leaves a wooden decoy behind that has _40 health and 2-10 armor_.\n\n_+3:_ After blinking, the Rogue leaves a wooden decoy behind that has _60 health and 3-15 armor_.\n\n_+4:_ After blinking, the Rogue leaves a wooden decoy behind that has _80 health and 4-20 armor_.\n\nOnly one decoy can be active at a time.
actors.hero.talent.shadow_step.title=shadow step
# shpd = 16/30/41/50
# rkpd2 v1 = 24/42/56/67
actors.hero.talent.shadow_step.desc=_+1:_ If the rogue uses smoke bomb while invisible, it occurs instantly and has a _20% reduced_ charge cost, but it also doesn't blind enemies or trigger other talents.\n\n_+2:_ If the rogue uses smoke bomb while invisible, it occurs instantly and has a _36% reduced_ charge cost, but it also doesn't blind enemies or trigger other talents.\n\n_+3:_ If the rogue uses smoke bomb while invisible, it occurs instantly and has a _50% reduced_ charge cost, but it also doesn't blind enemies or trigger other talents.\n\n_+4:_ If the rogue uses smoke bomb while invisible, it occurs instantly and has a _60% reduced_ charge cost, but it also doesn't blind enemies or trigger other talents.
actors.hero.talent.frigid_touch.title=frigid touch
actors.hero.talent.frigid_touch.desc=_+1:_ After blinking the Rogue covers his FOV in frost fire for _1 turn_.\n\n_+2:_ After blinking the Rogue covers his FOV in frost fire for _3 turns_.\n\n_+3:_ After blinking the Rogue covers his FOV in frost fire for _5 turns_.\n\n_+4:_ After blinking the Rogue covers his FOV in frost fire for _7 turns_.\n\nWhile area is burning, the Rogue is protected by frost imbue.\nWooden decoy is immune to Frostburn.\n\n"Adults like me should be freezing in heaven."

actors.hero.talent.fear_the_reaper.title=fear the reaper
actors.hero.talent.fear_the_reaper.desc=_+1:_ When a death marked enemy reaches 0 hp, they become _dizzy_.\n\n_+2:_ When a death marked enemy reaches 0 hp, they become _terrified and dizzy_.\n\n_+3:_ When a death marked enemy reaches 0 hp, they become _terrified and dizzy_ and enemies within 3 tiles become _dizzy_.\n\n_+4:_ When a death marked enemy reaches 0 hp, they and enemies within three tiles become _terrified and dizzy_.\n\n"The adorable sight of enemies running around in circles should make you want to take this talent."
actors.hero.talent.deathly_durability.title=deathly durability
# todo revert? added complexity for no reason.
actors.hero.talent.deathly_durability.desc=_+0:_ Enemies killed by death mark give the Rogue shielding equal to _13%_ of their hp when they were marked.\n\n_+1:_ Enemies killed by death mark give the Rogue shielding equal to _25%_ of their hp when they were marked.\n\n_+2:_ Enemies killed by death mark give the Rogue shielding equal to _38%_ of their hp when they were marked.\n\n_+3:_ Enemies killed by death mark give the Rogue shielding equal to _50%_ of their hp when they were marked.\n\n_+4:_ Enemies killed by death mark give the rogue shielding equal to _63%_ of their hp when they were marked.
actors.hero.talent.double_mark.title=double mark
actors.hero.talent.double_mark.desc=_+1:_ Marking a second target at the same time as the first one has a _50% reduced_ charge cost.\n\n_+2:_ Marking a second target at the same time as the first one _is free_.\n\n_+3:_ Marking a second target at the same time as the first one _is free_. Marking a third target at the same time as the first one has a _33% reduced_ charge cost.\n\n_+4:_ Marking a second target at the same time as the first one _is free_. Marking a third target at the same time as the first one has a _55% reduced_ charge cost.\n\n"C'mon, we gotta spread the death around..."
actors.hero.talent.cataclysmic_energy.title=cataclysmic energy
actors.hero.talent.cataclysmic_energy.desc=_+1:_ Death mark duration is increased to _7 turns_ and damage boost is lost, but when a death marked enemy reaches 0 hp, they start to explode.\n\n_+2:_ Death mark duration is increased to _8 turns_ and damage boost is lost, but when a death marked enemy reaches 0 hp, they start to explode.\n\n_+3:_ Death mark duration is increased to _9 turns_ and damage boost is lost, but when a death marked enemy reaches 0 hp, they start to explode.\n\n_+4:_ Death mark duration is increased to _10 turns_ and damage boost is lost, but when a death marked enemy reaches 0 hp, they start to explode.\nMarked enemy will continue exploding until death mark runs out.\n\n"You know what? Screw you. *gives rogue AoE damage*" 

actors.hero.talent.shadow_blade.title=shadow blade
actors.hero.talent.shadow_blade.desc=_+1:_ The shadow clone gains _10%_ of the hero's damage per turn, and has a _25% chance_ to use the enchantment on the hero's weapon.\n\n_+2:_ The shadow clone gains _20%_ of the hero's damage per turn, and has a _50% chance_ to use the enchantment on the hero's weapon.\n\n_+3:_ The shadow clone gains _30%_ of the hero's damage per turn, and has a _75% chance_ to use the enchantment on the hero's weapon.\n\n_+4:_ The shadow clone gains _40%_ of the hero's damage per turn, and has a _100% chance_ to use the enchantment on the hero's weapon.
actors.hero.talent.cloned_armor.title=cloned armor
actors.hero.talent.cloned_armor.desc=_+1:_ The shadow clone gains _16%_ of the hero's armor value, and has a _25% chance_ to use the glyph on the hero's armor.\n\n_+2:_ The shadow clone gains _32%_ of the hero's armor value, and has a _50% chance_ to use the glyph on the hero's armor.\n\n_+3:_ The shadow clone gains _48%_ of the hero's armor value, and has a _75% chance_ to use the glyph on the hero's armor.\n\n_+4:_ The shadow clone gains _60%_ of the hero's armor value, and has a _100% chance_ to use the glyph on the hero's armor.
actors.hero.talent.perfect_copy.title=perfect copy
actors.hero.talent.perfect_copy.desc=_+1:_ The shadow clone gains _13%_ of the hero's max HP, and can instantly swap places with the hero up to _2 tiles_ away.\n\n_+2:_ The shadow clone gains _25%_ of the hero's max HP, and can instantly swap places with the hero up to _4 tiles_ away.\n\n_+3:_ The shadow clone gains _38%_ of the hero's max HP, and can instantly swap places with the hero up to _6 tiles_ away.\n\n_+4:_ The shadow clone gains _50%_ of the hero's max HP, and can instantly swap places with the hero up to _8 tiles_ away.\n\n"You thought you were dealing with Shadow Clone, but really you're dealing with the real thing..."
actors.hero.talent.dar_magic.title=dar magic
actors.hero.talent.dar_magic.desc=_+1:_ The shadow clone can shoot kunai from a distance for _25% damage_.\n\n_+2:_ The shadow clone can shoot kunai from a distance for _50% damage_.\n\n_+3:_ The shadow clone can blink to its target, but deals _75% damage._\n\n_+4:_ The shadow clone can blink to its target and instantaneously retreat to hero's position.\n\n"Why bow and boomerang, when you have your own doppelganger?"

#huntress
actors.hero.talent.natures_bounty.title=nature's bounty
actors.hero.talent.natures_bounty.desc=_+1:_ The Huntress can find _6 berries_ hidden in tall grass as she explores the next few floors of the dungeon.\n\n_+2:_ The Huntress can find _9 berries_ hidden in tall grass as she explores the next few floors of the dungeon.\n\nBerries are eaten quickly, restore a small amount of satiety, and might contain a usable seed.
actors.hero.talent.survivalists_intuition.title=survivalist's intuition
actors.hero.talent.survivalists_intuition.desc=_+1:_ The Huntress identifies all equipment _2.5x faster_ and has a _20% chance_ to determine if an item is cursed when picking it up. \n\n_+2:_ The Huntress identifies all equipment _3.75x faster_ and has a _40% chance_ to notice whether an item is cursed when first picking it up.
actors.hero.talent.survivalists_intuition.comment_rk="I will never have to suffer from curses again!"
actors.hero.talent.followup_strike.title=followup strike
actors.hero.talent.followup_strike.desc=_+1:_ When the Huntress hits an enemy with her bow or a thrown weapon, her next melee attack against that enemy deals _3 bonus damage_.\n\n_+2:_ When the Huntress hits an enemy with her bow or a thrown weapon, her next melee attack against that enemy deals _4-5 bonus damage_.
actors.hero.talent.natures_aid.title=nature's aid
actors.hero.talent.natures_aid.desc=_+1:_ The Huntress gains 0-3 armor of barkskin, which fades every _3 turns_ when a plant's effect is activated in her vision.\n\n_+2:_ The Huntress gains 0-3 armor of barkskin, which fades every _5 turns_ when a plant's effect is activated in her vision.
actors.hero.talent.nature_aid_2.title=greenfields
actors.hero.talent.nature_aid_2.desc=_+1:_ When the Huntress is staying in furrowed grass, she regenerates health _35%_ faster.\n\n_+2:_ When the Huntress is staying in furrowed grass, she regenerates health _70%_ faster.\n\n"Being on diet is not that bad, actually."
actors.hero.talent.invigorating_meal.title=adrenalizing meal
actors.hero.talent.invigorating_meal.desc=Witness the ultimate victory of the space dragon over the shattered pixel with every delicious meal! Behold:\n\n_+1:_ Eating food takes the Huntress 1 turn (berries are eaten instantly) and grants her _3 turns of adrenaline_.\n\n_+2:_ Eating food takes the Huntress 1 turn (berries are eaten instantly) and grants her _5 turns of adrenaline_.
actors.hero.talent.liquid_nature.title=liquid nature
actors.hero.talent.liquid_nature.desc=_+1:_ When the Huntress drinks or throws a potion, brew, or elixir, _up to 5 grass tiles_ sprout in the surrounding area, and adjacent enemies are rooted for _2 turns_.\n\n_+2:_ When the Huntress drinks or throws a potion, brew, or elixir, _up to 8 grass tiles_ sprout in the surrounding area, and adjacent enemies are rooted for _3 turns_.\n\nThe amount of grass and root duration are doubled when using potions of strength, experience, or alchemy items that must be crafted using those potions.\n\nFor alchemy items with higher output quantities (e.g. aqua brew), this talent has a chance to trigger based on how many of that item is produced.\nThis effect can also be triggered with drinking from waterskin, with its power depending on how dew is consumed; 10 drops is 100% potency.
actors.hero.talent.rejuvenating_steps.title=rejuvenating steps
actors.hero.talent.rejuvenating_steps.desc=_+1:_ When the Huntress steps on short grass or embers, they spring up into tall grass which the Huntress immediately furrows. This has a _5 turn cooldown_.\n\n_+2:_ When the Huntress steps on short grass or embers, they spring up into tall grass which the Huntress immediately furrows. This has a _2.5 turn cooldown_.\n\nThis talent will produce furrowed grass if passive regeneration effects are disabled or the hero has not gained exp in a long time.\n\n"There's a faction of players that believe Rejuvenating Steps is the one of best tier 2 talents in Shattered Pixel Dungeon. This is for them."
actors.hero.talent.heightened_senses.title=heightened senses
actors.hero.talent.heightened_senses.desc=_+1:_ The Huntress gains mind vision on characters within _3 tiles of her position_.\n\n_+2:_ The Huntress gains mind vision on characters within _4 tiles of her position_.
actors.hero.talent.heightened_senses.comment="Now you can take full advantage of that projecting bow!"
actors.hero.talent.heightened_senses.comment_rogue="Yo, what if disintegration?"
actors.hero.talent.durable_projectiles.title=durable projectiles
actors.hero.talent.durable_projectiles.desc=_+1:_ Thrown weapons have _+125% durability_.\n\n_+2:_ Thrown weapons have _+188% durability_.
actors.hero.talent.durable_projectiles.comment="What is degradation anyway?"
actors.hero.talent.scourging_the_universe.title=scout's agility
actors.hero.talent.scourging_the_universe.desc=_+1:_ Huntress can dodge magical and physical attacks equally well.\n\n_+2:_ Huntress can dodge magical and melee attacks equally well, and her evasion against ranged attacks is increased by _50%_.
actors.hero.talent.scourging_the_universe.comment="Bullet-time, baby."
actors.hero.talent.scourging_the_universe.comment_rogue="If I ever encounter another some mage, I will not fall to them."
actors.hero.talent.point_blank.title=marksman
actors.hero.talent.point_blank.desc=_Base:_ Thrown weapons (and spirit arrows) have -50% accuracy when used at melee range and +50% accuracy when used at a distance.\n\n_+1:_ Thrown weapons (and spirit arrows) have -30% accuracy when used at melee range and +70% accuracy when used at a distance.\n\n_+2:_ Thrown weapons (and spirit arrows) have -10% accuracy when used at melee range and +90% accuracy when used at a distance.\n\n_+3:_ Thrown weapons (and spirit arrows) have +10% accuracy when used at melee range and +110% accuracy when used at a distance.
actors.hero.talent.point_blank.comment="Thrown weapons are cool. You know what's even better? Thrown weapons that don't miss!"
actors.hero.talent.seer_shot.title=like a bullet
actors.hero.talent.seer_shot.desc=_+1:_ Increases the starting power of super-shot to _+45%_, from +32% and the distance multiplier to _+18%_, from +13%.\n\n_+2:_ Increases the starting power of super-shot to _+58%_, from +32% and the distance multiplier to _+23%_, from +13%.\n\n_+3:_ Increases the starting power of super-shot to _+71%_, from +32% and the distance multiplier to _+28%_, from +13%.
actors.hero.talent.seer_shot.meta_desc=_If this talent is gained by a hero lacking the spirit bow_ it will trigger from any thrown weapon.
actors.hero.talent.auto_reload.title=auto-reload
actors.hero.talent.auto_reload.desc=_+1:_ The Huntress can automatically repair her thrown weapons with liquid metal to prevent them from breaking.\n\n_+2:_ The Huntress can automatically repair her thrown weapons with liquid metal to prevent them from breaking. Automatic repairing grants +1 level to thrown weapons for 3 turns.\n\n_+3:_ The Huntress can automatically repair her thrown weapons with liquid metal to prevent them from breaking. Automatic repairing grants +1 level to thrown weapons for 3 turns. The amount of liquid metal acquired from alchemy is increased by 60%.\n\n"Once repairing was added, it was only a matter of time than it would be automated. That's just how everything in Minecraft works."
actors.hero.talent.farsight.title=farsight
actors.hero.talent.farsight.desc=_+0_: The Sniper's vision range _is increased by 25%_.\n\n_+1:_ The Sniper's vision range is _increased by 50%_.\n\n_+2:_ The Sniper's vision range is _increased by 75%_.\n\n_+3:_ The Sniper's vision range is _increased by 100%_.\n\n"None shall escape my gaze... or my +10 bow."
actors.hero.talent.shared_enchantment.title=shared enchantment
actors.hero.talent.shared_enchantment.desc=_+1:_ Thrown weapons use the enchantment on the Sniper's bow with _50% effectiveness_.\n\n_+2:_Thrown weapons use the enchantment on the Sniper's bow with _100% effectiveness_.\n\n_+3:_ Thrown weapons use the enchantment on the Sniper's bow with _150% effectiveness_.\n\n"We like it when our shurikens explode. Right??? Now works with enchanted crossbows!"
actors.hero.talent.shared_upgrades.title=shared upgrades
actors.hero.talent.shared_upgrades.desc=_+0:_ When the Sniper attacks with an upgraded thrown weapon, each level increases the damage of her special attack by _2.5%_ per tier of the thrown weapon.\n\n_+1:_ When the Sniper attacks with an upgraded thrown weapon, each level increases the damage of her special attack by _5%_ per tier of the the thrown weapon.\n\n_+2:_ When the Sniper attacks with an upgraded thrown weapon, each level increases the damage of her special attack by _10%_ per tier of the thrown weapon.\n\n_+3:_ When the Sniper attacks with an upgraded thrown weapon, each level increases the damage of her special attack by _15%_ per tier of the thrown weapon.\n\n_-_ Having access to this talent causes thrown weapons to increase the duration of sniper's mark by 1 turn per level of the thrown weapon.\n\n"Nothing says 'screw you' to an enemy like being hit by a sniper special that does triple damage."
actors.hero.talent.multishot.title=multi-shot
actors.hero.talent.multishot.desc=\
  _+1:_ If the target of sniper's mark is defeated, _the special can be freely targeted_, instead of being lost.\n\n\
  _+2:_ In addition to the +1 effect, the Sniper can have _one additional sniper's mark_ active at one time, and free-targeted marks last _2x_ longer.\n\n\
  _+3:_ In addition to the +1 effect, the Sniper can have _three additional sniper's marks_ active at one time. Additionally, free-targeted marks last _3x_ longer.\n\n\
  \
  _-_ The free-targeted sniper's marks can stack with actual sniper's marks.\n\
  _-_ Using a sniper special with multiple marks active will cause the Sniper to attempt to use a sniper special on all marks at the same time.\n\
  _-_ Targeting can project through marked targets.
actors.hero.talent.multishot.comment="The ability you never knew you wanted, but now will never want to go without."
actors.hero.talent.archery_mark.title=archery's mark
actors.hero.talent.archery_mark.desc=_+1:_ Spirit Bow's arrows will bounce to nearest enemy for _20%_ damage.\n\n_+2:_ Spirit Bow's arrows will bounce to nearest enemy for _40%_ damage.\n\n_+3:_ Spirit Bow's arrows will bounce to nearest enemy for _60%_ damage.\n\n"Attack two enemies with ease!"
actors.hero.talent.durable_tips.title=durable tips
actors.hero.talent.durable_tips.desc=_+0:_ Tipped darts have _2x durability_ when the Warden uses them.\n\n_+1:_ Tipped darts have _3x durability_ when the Warden uses them.\n\n_+2:_ Tipped darts have _4x durability_ when the Warden uses them.\n\n_+3:_ Tipped darts have _5x durability_ when the Warden uses them.\n\n"Retipping darts is just gross."
actors.hero.talent.barkskin.title=barkskin
actors.hero.talent.barkskin.desc=_+0:_ When stepping in grass, the Warden gains _0-40% of her level_ in barkskin armor that fades every turn.\n\n_+1:_ When stepping in grass, the Warden gains _0-80% of her level_ in barkskin armor that fades every turn.\n\n_+2:_ When stepping in grass, the Warden gains _0-160% of her level_ in barkskin armor that fades every turn.\n\n_+3:_ When stepping in grass, the Warden gains barkskin equivalent to _0-240% of her level_ that fades every turn.
actors.hero.talent.barkskin.comment="'Faith is my armor'? Huh? Better start saying 'GRASS is my armor' with all the armor you're getting from this.."
actors.hero.talent.shielding_dew.title=shielding dew
actors.hero.talent.shielding_dew.desc=_+1:_ Dewdrops can shield the Warden for 1.25% of her max HP each, up to _20% of her max HP_.\n\n_+2:_ Dewdrops can shield the Warden for 2.5% of her max HP each, up to _40% of her max HP_.\n\n_+3:_ Dewdrops can shield the Warden for 3.75% of her max HP, up to _60% of her max HP_.\n\nThe shielding is applied on top of the standard 5% max HP/drop heal if the Warden's HP is not full, otherwise that HP is converted into shielding until the cap is reached.\n\n"For Dew Enthusiasts"
actors.hero.talent.natures_better_aid.title=nature's better aid
actors.hero.talent.natures_better_aid.desc=_+1_: When the Warden triggers talent Rejuvenating steps by stepping on trampled grass or embers, a corrupted Rot Lasher spawns along with the tall grass. Up to _3_ Rot Lashers may appear at a time.\n\n_+2_: Rot Lashers can attack immdeiately. Up to _5_ Rot Lashers may appear at a time.\n\n _+3_: Rot Lashers have 25% chance to root enemies for 2 turns and 25% chance to poison enemies they hit. Up to _7_ Rot Lashers may appear at a time.\n\n_-_ If the Warden did not already have the talent Rejuvenating Steps, this talent wil trigger anyway, with a 10 turn cooldown.\n\n_-_ Shooting a Rot Lasher with an arrow from the spirit bow will instantly kill them.\n\n"Hopefully this will convince the Sniper mains to start playing Warden"
actors.hero.talent.indirect_benefits.title=indirect benefits
actors.hero.talent.indirect_benefits.desc=_+1:_ If mob steps on plant, it will activate for Warden too with _17%_ chance. If Warden steps on a plant, it will also activate for one of her Rot Lashers with _17%_ chance.\n\n_+2:_ If mob steps on plant, it will activate for Warden too with _33%_ chance. If Warden steps on a plant, it will also activate for one of her Rot Lashers with _33%_ chance.\n\n_+3:_ If mob steps on plant, it will activate for Warden too with _50%_ chance. If Warden steps on a plant, it will also activate for one of her Rot Lashers with _50%_ chance.\n\n_-_ Rot Lashers will use the warden's seed effect if possible.\n\n"How that does even work? United nature, indirect interactions, bio-Wi-Fi?"
actors.hero.talent.bigger_bow.title=bigger bow
actors.hero.talent.bigger_bow.desc=_+1:_ The spirit bow has _50%_ more hp and deals _75%_ of its original dmg when auto attacking. \n\n_+2:_ The spirit bow has _100%_ more hp and deals _100%_ of its original dmg when auto attacking. \n\n_+3:_ The spirit bow has _150%_ more hp and deals _125%_of its original dmg when auto attacking. \n\n_-_ Note that the spirit bow deals 50% of its original dmg when auto attacking by default.\n\n"Why bother shooting enemies when you can just throw away your bow for free dmg?"
actors.hero.talent.drifting_spirit.title=drifting spirit
actors.hero.talent.drifting_spirit.desc=_+1:_ If there are no enemies to attack, the spirit bow will drift toward you at a speed of _0.25_. \n\n_+2:_ If there are no enemies to attack, the spirit bow will drift toward you at a speed of _0.33_. \n\n_+3:_ If there are no enemies to attack, the spirit bow will drift toward you at a speed of _0.5_. \n\n"Y'know I always thought the spirit bow looked like a boomerang... don't you think so?"
actors.hero.talent.patient_bow.title=patient bow
actors.hero.talent.patient_bow.desc=_+1:_ The bow heals _1_ hp per turn when not in combat.\n\n_+2:_ The bow heals _1_ hp per turn when not in combat. Each turn spent not in combat gives _2.5_% chance of knocking back the enemy on the next shot.\n\n_+3:_ The bow heals _1_ hp per turn when not in combat. Each turn spent not in combat gives _1_% more dmg and _5_% chance of knocking back the enemy on the next shot.\n\n"Legends say that even the great rat king himself needs time to rest."
actors.hero.talent.channeling_sight.title=channeling sight
actors.hero.talent.channeling_sight.desc=_+1:_ The spirit bow shares its field of view with the Channeler at all times.\n\n_+2:_ In addition to the _+1_ effect, the spirit bow can contibue to apply its enchantment while it is auto attacking.\n\n_+3:_ In addition to the effect at _+1_ and _+2_, the spirit bow has 3 extra range.\n\n"Oh boy, this just keeps getting better..."
actors.hero.talent.sentry_spirit.title=sentry spirit
actors.hero.talent.sentry_spirit.desc=_+1:_ Sentries shoot an additional spirit arrow for free when they attack.\n\n_+2:_ Sentries and wards shoot an additional arrow for free when they attack.\n\n_+3:_ Sentries and wards share their vision with the spirit bow and shoot an additional arrow for free when they attack.\n\n_-_ Sentries and wards come from the Wand of Warding.\n\n"Wand of Warding is fun, but not op. Let's try to change that."

# fixme these talents should be moved to huntress section
actors.hero.talent.fan_of_blades.title=fan of blades
# 50% -> 75% splash damage (?), something to consider...
# technically it should be 1/2.5/4/5.5/7, but fractional stuff is iffy.
actors.hero.talent.fan_of_blades.desc=_+0:_ Spectral blades can hit up to _1 additional target_ for 50% damage. The target must be visible and within a _30 degree_ cone AOE.\n\n_+1:_ Spectral blades can hit up to _2-3 additional targets_ for 50% damage. The targets must be visible and within a _45 degree_ cone AOE.\n\n_+2:_ Spectral blades can hit up to _4 additional targets_ for 50% damage. The targets must be visible and within a _90 degree_ cone AOE.\n\n_+3:_ Spectral blades can hit up to _5-6 additional targets_ for 50% damage. The targets must be visible and within a _135 degree_ cone AOE.\n\n_+4:_ Spectral blades can hit up to _7 additional targets_ for 50% damage. The targets must be visible and within a _180 degree_ cone AOE.\n\n"Fan...more like BROADSIDE of Blades. Fire the cannons--erm--blades!
actors.hero.talent.projecting_blades.title=projecting blades
actors.hero.talent.projecting_blades.desc=_+0:_ Spectral blades can penetrate up to _1 solid tile_.\n\n_+1:_ Spectral blades has _+33% accuracy_, and can penetrate up to _3 solid tiles_.\n\n_+2:_ Spectral blades has _+67% accuracy_, and can penetrate up to _5 solid tiles_.\n\n_+3:_ Spectral blades has _+100% accuracy_, and can penetrate up to _7 solid tiles_.\n\n_+4:_ Spectral blades has _+133% accuracy_, and can penetrate up to _9 solid tiles_.\n\n"Walls? Fake. Missing? Also fake."
actors.hero.talent.spirit_blades.title=spirit blades
actors.hero.talent.spirit_blades.desc=_+1:_ Spectral blades has a _30% chance_ to also use the enchantment on the spirit bow.\n\n_+2:_ Spectral blades has a _60% chance_ to also use the enchantment on the spirit bow.\n\n_+3:_ Spectral blades has a _90% chance_ to also use the enchantment on the spirit bow.\n\n_+4:_ Spectral blades has a _100% chance_ to also use the enchantment on the spirit bow, and it gives each enchantment _+10% power_.
actors.hero.talent.spectral_shot.title=spectral shot
actors.hero.talent.spectral_shot.desc=_+1:_ Spectral blades trigger Sniper's mark and Multishot.\n\n_+2:_ Spectral blades trigger Sniper's mark and Multishot and shoot an arrow from Huntress's bow.\n\n_+3:_ Spectral blades benefit from ring of Sharpshooting, trigger Sniper's mark and Multishot and shoot an arrow from Huntress's bow.\n\n_+4:_ Spectral blades benefit from ring of Sharpshooting, trigger Sniper's mark and Multishot and shoot Sniper's special from Huntress's bow.\n\n"Why be just limited by enchantments? Explode thrice in a row!"

actors.hero.talent.growing_power.title=growing power
actors.hero.talent.growing_power.desc=_+0:_ The attack and movespeed boosts from nature's power are _33% and 100%_.\n\n_+1:_ The attack and movespeed boosts from nature's power are increased to _39% and 133%_.\n\n_+2:_ The attack and movespeed boosts from nature's power are increased to _44% and 167%_.\n\n_+3:_ The attack and movespeed boosts from nature's power are increased to _50% and 200%_.\n\n_+4:_ The attack and movespeed boosts from nature's power are increased to _56% and 233%_.\n\n"Not even a ripper can keep up with this rush."
actors.hero.talent.natures_wrath.title=nature's wrath
actors.hero.talent.natures_wrath.desc=_+1:_ While nature's power is active, shots from the spirit bow have a _10% chance_ to trigger a random harmful plant effect.\n\n_+2:_ While nature's power is active, shots from the spirit bow have a _20% chance_ to trigger a random harmful plant effect.\n\n_+3:_ While nature's power is active, shots from the spirit bow have a _30% chance_ to trigger a random harmful plant effect.\n\n_+4:_ While nature's power is active, shots from the spirit bow have a _40% chance_ to trigger a random harmful plant effect.\n\nThe plants that can be triggered are: blindweed, firebloom, icecap, sorrowmoss, and stormvine.\n\n"Devastation.... complete and utter devastation.... That is what awaits those who oppose the mightiest class wielding the mightiest ability...."
actors.hero.talent.wild_momentum.title=wild momentum
actors.hero.talent.wild_momentum.desc=_+0:_ Killing an enemy with the spirit bow prolongs the duration of nature's power by _1 turn_. The duration can be extended by a max of _2 turns_.\n\n_+1:_ Killing an enemy with the spirit bow prolongs the duration of nature's power by _2 turns_. The duration can be extended by a max of _4 turns_.\n\n_+2:_ Killing an enemy with the spirit bow prolongs the duration of nature's power by _3 turns_. The duration can be extended by a max of _6 turns_.\n\n_+3:_ Killing an enemy with the spirit bow prolongs the duration of nature's power by _4 turns_. The duration can be extended by a max of _8 turns_.\n\n_+4:_ Killing an enemy with the spirit bow prolongs the duration of nature's power by _5 turns_. The duration can be extended by a max of _10 turns_.\n\n"Horde of overpowered enemies? One Huntress on steroids? Who are we kidding, better start getting the body bags...."
actors.hero.talent.primal_awakening.title=primal awakening
actors.hero.talent.primal_awakening.desc=_+1:_ While nature's power is active, killed mobs will have _7%_ chance to reincarnate as gnoll tricksters.\n\n_+2:_ While nature's power is active, killed mobs will have _13%_ chance to reincarnate as gnoll tricksters.\n\n_+3:_ While nature's power is active, killed mobs will have _20%_ chance to reincarnate as gnoll tricksters.\n\n_+4:_ While nature's power is active, killed mobs will have _27%_ chance to reincarnate as gnoll tricksters.\n\nThe gnoll tricksters are scaled up to compete with mobs in Demon Halls and Abyss.\n\n"I am not a furry, I am not a furry, I am no-"

actors.hero.talent.eagle_eye.title=eagle eye
actors.hero.talent.eagle_eye.desc=_+1:_ The spirit hawk's vision range is increased to _7 tiles_ from 6.\n\n_+2:_ The spirit hawk's vision range is increased to _8 tiles_ from 6.\n\n_+3:_ The spirit hawk's vision range is increased to _9 tiles_ from 6, and it gets _2 tiles_ of mind vision.\n\n_+4:_ The spirit hawk's vision range is increased to _10 tiles_ from 6, and it gets _3 tiles_ of mind vision.
actors.hero.talent.go_for_the_eyes.title=go for the eyes
actors.hero.talent.go_for_the_eyes.desc=_+1:_ Attacks from the spirit hawk blind enemies for _2 turns_.\n\n_+2:_ Attacks from the spirit hawk blind enemies for _5 turns_.\n\n_+3:_ Attacks from the spirit hawk blind enemies for _5 turns_ and cripple them for _2 turns_.\n\n_+4:_ Attacks from the spirit hawk blind enemies for _5 turns_ and cripple them for _5 turns_.
actors.hero.talent.swift_spirit.title=swift spirit
actors.hero.talent.swift_spirit.desc=_+1:_ The spirit hawk's movement speed is increased to _2.5 tiles_ from 2, and it is guaranteed to dodge the first _2 attacks_ made against it.\n\n_+2:_ The spirit hawk's movement speed is increased to _3 tiles_ from 2, and it is guaranteed to dodge the first _4 attacks_ made against it.\n\n_+3:_ The spirit hawk's movement speed is increased to _3.5 tiles_ from 2, and it is guaranteed to dodge the first _6 attacks_ made against it.\n\n_+4:_The spirit hawk's movement speed is increased to _4 tiles_ from 2, and it is guaranteed to dodge the first _8 attacks_ made against it.
actors.hero.talent.beak_of_power.title=beak of power
actors.hero.talent.beak_of_power.desc=_+1:_ The spirit hawk with _50% chance_ will not spend any turns on killing blow, mark enemy for arcane vision for _5 turns_, not awaken any enemies if they are _3 or more tiles away from them_ and proc spirit bow's enchantment with _25% chance_.\n\n_+2:_ The spirit hawk will not spend any turns on killing blow, mark enemy for arcane vision for _10 turns_, not awaken any enemies if they are _not adjacent_ and proc spirit bow's enchantment with _50% chance_.\n\n_+3:_ The spirit hawk will not spend any turns on killing blow, mark enemy for arcane vision for _15 turns_, not awaken any enemies at all and proc spirit bow's enchantment with _75% chance_.\n\n_+4:_ The spirit hawk will not spend any turns on killing blow, mark enemy for arcane vision for _20 turns_, not awaken any enemies at all, proc spirit bow's enchantment with _100% chance_ and shoot spirit arrows outside of melee combat.\n\n"If you still be not useful after all of this..."

actors.hero.talent.auric_tesla.title=auric tesla ability
actors.hero.talent.auric_tesla.desc=My armorcrafting abilities allows me to augment this incredible power!\n\n_+1:_ I will deal _25% of my blocking power_ and _3 turns of paralysis_ to enemies caught in area of my landing and apply bow's enchantment and my staff's battlemage effect at same time with _25% chance_ on each enemy in sight. After all of that, I will get _1.5 turns_ of adrenaline!\n\n_+2:_ I will deal _50% of my blocking power_ and _4 turns of paralysis_ to enemies caught in area of my landing and apply bow's enchantment and my staff's battlemage effect at same time with _50% chance_ on each enemy in sight. After all of that, I will get _3 turns_ of adrenaline!\n\n_+3:_ I will deal _75% of my blocking power_ and _5 turns of paralysis_ to enemies caught in area of my landing and apply bow's enchantment and my staff's battlemage effect at same time with _75% chance_ on each enemy in sight. After all of that, I will get _4.5 turns_ of adrenaline!\n\n_+3:_ I will deal _100% of my blocking power_ and _6 turns of paralysis_ to enemies caught in area of my landing and apply bow's enchantment and my staff's battlemage effect at same time with _100% chance_ on each enemy in sight. After all of that, I will get _6 turns_ of adrenaline!
actors.hero.talent.quantum_position.title=quantum positioning
actors.hero.talent.quantum_position.desc=I have enough strength to bypass the puny limits of FOV!\n\n_+1:_ My Divine Fury works in range of _9 tiles_, from 6! On throwing smoke bomb, I will make enemies around me _terrified and dizzy_ for _3 turns_!\n\n_+2:_ My Divine Fury works in range of _12 tiles_, from 6! On throwing smoke bomb, I will make enemies around me _terrified and dizzy_ for _6 turns_! \n\n_+3:_ My Divine Fury works in range of _15 tiles_, from 6! On throwing smoke bomb, I will make enemies around me _terrified and dizzy_ for _9 turns_! \n\n_+4:_ My Divine Fury works in range of _18 tiles_, from 6! On throwing smoke bomb, I will make enemies around me _terrified and dizzy_ for _12 turns_!
actors.hero.talent.rat_age.title=rat age origins
actors.hero.talent.rat_age.desc=Even mighty dragons are afraid of my gaze!\n\n_+1:_ I get _Fire_ imbue for _9 turns_ while my previous enemies are getting ravaged by _inferno!_ On jumping, I will shrink nearby enemies for _2 turns_ and make them take _1-3_ damage per point of my strength over 10!\n\n_+2:_ I get _Fire and Ice_ imbues for _9 turns_ while my previous enemies are getting ravaged by _inferno and blizzard!_ On jumping, I will shrink nearby enemies for _3 turns_ and make them take _2-4_ damage per point of my strength over 10!\n\n_+3:_ I get _Fire, Ice and Purity_ imbues for _9 turns_ while my previous enemies are getting ravaged by _inferno, blizzard and vertigo!_ On jumping, I will shrink nearby enemies for _4 turns_ and make them take _3-5_ damage per point of my strength over 10!\n\n_+4:_ I get _Fire, Ice and Purity_ imbues for _9 turns_ while my previous enemies are getting ravaged by _inferno, blizzard, vertigo and vegetation!_ On jumping, I will shrink nearby enemies for _5 turns_ and make them take _4-6_ damage per point of my strength over 10!
actors.hero.talent.avalon_power_up.title=avalon power-up
actors.hero.talent.avalon_power_up.desc=The presense in the godhood gave me opportunity to overwhelm any possible foes!\n\n \
_+1:_ In molten earth phase, I will cast Elemental Blast in radius of _6 tiles_. On jumping, I will knock enemies around me with _great force_. When throwing the blades, there is _17% chance_ that I will shoot an arrow from my spirit bow to accompany the blade.\n\n \
_+2:_ In molten earth phase, I will cast Elemental Blast in radius of _7 tiles_. On jumping, I will knock enemies around me with _huge force_. When throwing the blades, there is _33% chance_ that I will shoot an arrow from my spirit bow to accompany the blade.\n\n \
_+3:_ In molten earth phase, I will cast Elemental Blast in radius of _8 tiles_. On jumping, I will knock enemies around me with _extreme force_. When throwing the blades, there is _50% chance_ that I will shoot an arrow from my spirit bow to accompany the blade.\n\n \
_+4:_ In molten earth phase, I will cast Elemental Blast in radius of _9 tiles_. On jumping, I will knock enemies around me with _ludicrous force_. When throwing the blades, there is _67% chance_ that I will shoot an arrow from my spirit bow to accompany the blade.\
  \n\nAnd after all of this, I will summon _1 loyal rat_, with _10% chance_ for it to be albino!

actors.hero.talent.bloodflare_skin.title=bloodflare skin
actors.hero.talent.bloodflare_skin.desc=Rat Kingdom is known for its sturdy and loyal citizens!\n\n\
_+1:_ Endure damage bonus is increased to _115%_ and spread over 2 hits, and while enduring I cannot take more than _71% of max HP_ and I get _5% bonus damage_ for every enemy around me after enduring. Not only that, but my clone gets _10%_ of my max HP and my owl moves _25% faster_ and can dodge _1 attack_!\n\n\
_+2:_ Endure damage bonus is increased to _130%_ and spread over 3 hits, and while enduring I cannot take more than _50% of max HP_ and I get _10% bonus damage_ for every enemy around me after enduring. Not only that, but my clone gets _20%_ of my max HP and my owl moves _50% faster_ and can dodge _2 attacks_!\n\n\
_+3:_ Endure damage bonus is increased to _145%_ and spread over 4 hits, and while enduring I cannot take more than _35% of max HP_ and I get _15% bonus damage_ for every enemy around me after enduring. Not only that, but my clone gets _30%_ of my max HP and my owl moves _75% faster_ and can dodge _3 attacks_!\n\n\
_+4:_ Endure damage bonus is increased to _160%_ and spread over 5 hits, and while enduring I cannot take more than _25% of max HP_ and I get _20% bonus damage_ for every enemy around me after enduring. Not only that, but my clone gets _40%_ of my max HP and my owl moves _100% faster_ and can dodge _4 attacks_!

actors.hero.talent.astral_charge.title=astral charge
actors.hero.talent.astral_charge.desc=Teleportation is the future of transportation!\n\n\
_+1:_ I can place beacon _3 tiles_ further, teleport to it from any other level for _150% charge_ and damage characters at beacon for _10-15 damage_ while taking _5_. I also can instantly switch places with my clone up to _1 tile away_ and my wild magic uses _44%_ less wand charges, treats wands as _+1-+2_ and fire _5 times_!\n\n\
_+2:_ I can place beacon _6 tiles_ further, teleport to it from any other level for _117% charge_ and damage characters at beacon for _20-30 damage_ while taking _8_. I also can instantly switch places with my clone up to _2 tiles away_ and my wild magic uses _69%_ less wand charges, treats wands as _+2_ and fire _6 times_!\n\n\
_+3:_ I can place beacon _9 tiles_ further, teleport to it from any other level for _83% charge_ and damage characters at beacon for _30-45 damage_ while taking _12_. I also can instantly switch places with my clone up to _3 tiles away_ and my wild magic uses _82%_ less wand charges, treats wands as _+2-+3_ and fire _7 times_!\n\n\
_+4:_ I can place beacon _12 tiles_ further, teleport to it from any other level for _50% charge_ and damage characters at beacon for _45-60 damage_ while taking _15_. I also can instantly switch places with my clone up to _4 tiles away_ and my wild magic uses _90%_ less wand charges, treats wands as _+3_ and fire _8 times_!

actors.hero.talent.shadowspec_slice.title=shadowspec slice
actors.hero.talent.shadowspec_slice.desc=My allies are the real powerhouse here!\n\n\
_+1:_ My clone gains _6%_ of my damage per turn and _13% of my armor value_ and uses enchantments on my weapon and armor with _25% chance_ for each! In addition, I leave wooden decoy behind with _20 HP and 1-5 armor_ when I teleport to my beacon! And to seal the deal, my owl will blind enemies for _2 turns_ and see _1 tile_ further!\n\n\
_+2:_ My clone gains _13%_ of my damage per turn and _25% of my armor value_ and uses enchantments on my weapon and armor with _50% chance_ for each! In addition, I leave wooden decoy behind with _40 HP and 2-10 armor_ when I teleport to my beacon! And to seal the deal, my owl will blind enemies for _3 turns_ and see _2 tiles_ further!\n\n\
_+3:_ My clone gains _18%_ of my damage per turn and _38% of my armor value_ and uses enchantments on my weapon and armor with _75% chance_ for each! In addition, I leave wooden decoy behind with _60 HP and 3-15 armor_ when I teleport to my beacon! And to seal the deal, my owl will blind enemies for _4 turns_ and see _3 tiles_ further!\n\n\
_+4:_ My clone gains _25%_ of my damage per turn and _50% of my armor value_ and uses enchantments on my weapon and armor! In addition, I leave wooden decoy behind with _80 HP and 4-20 armor_ when I teleport to my beacon! And to seal the deal, my owl will blind enemies for _5 turns_ and see _4 tiles_ further!

actors.hero.talent.silva_range.title=silva range
actors.hero.talent.silva_range.desc=Dryads from around the world are helping me!\n\n\
_+1:_ While nature power is active, my attack and movement speed are increased by _38% and 125%_, my shots with _8% chance_ will trigger a random harmful plant and killing enemies will extend the duration of effect by _1 turn_ up to 2 times. As huge bonus, my shadow clone will shoot kunai for _13% damage_ from distance!\n\n\
_+2:_ While nature power is active, my attack and movement speed are increased by _42% and 150%_, my shots with _17% chance_ will trigger a random harmful plant and killing enemies will extend the duration of effect by _2 turns_ up to 2 times. As huge bonus, my shadow clone will shoot kunai for _25% damage_ from distance!\n\n\
_+3:_ While nature power is active, my attack and movement speed are increased by _46% and 175%_, my shots with _25% chance_ will trigger a random harmful plant and killing enemies will extend the duration of effect by _3 turns_ up to 2 times. As huge bonus, my shadow clone will shoot kunai for _38% damage_ from distance!\n\n\
_+4:_ While nature power is active, my attack and movement speed are increased by _50% and 200%_, my shots with _33% chance_ will trigger a random harmful plant and killing enemies will extend the duration of effect by _4 turns_ up to 2 times. As huge bonus, my shadow clone will shoot kunai for _50% damage_ from distance!
#duelist
actors.hero.talent.strengthening_meal.title=strengthening meal
actors.hero.talent.strengthening_meal.desc=_+1:_ Eating food grants the Duelist 3 bonus damage the next _4 times_ she hits an enemy with a physical attack.\n\n_+2:_ Eating food grants the Duelist 3 bonus damage the next _6 times_ she hits an enemy with a physical attack.
actors.hero.talent.adventurers_intuition.title=adventurer's intuition
actors.hero.talent.adventurers_intuition.desc=_+0:_ The Duelist identifies weapons _2.5x faster_ and armor _1.75x faster_.\n\n_+1:_ The Duelist identifies weapons _when she equips them_ and armor _2.5x faster_. When picking them up for the first time, she also has a _30% chance_ to identify weapons.\n\n_+2:_ The Duelist identifies weapons _when she equips them_. When picking them up for the first time, the Duelist has a _60% chance_ to identify weapons and a _30% chance_ to identify armor.
actors.hero.talent.adventurers_intuition.comment="Who's to say that love can't happen at first sight?"
actors.hero.talent.adventurers_intuition.comment_warrior="Hmm, looks familiar..."
actors.hero.talent.patient_strike.title=patient strike
actors.hero.talent.patient_strike.desc=_+1:_ If the Duelist waits before performing a melee attack, she will deal _3 bonus damage_.\n\n_+2:_ If the Duelist waits before performing a melee attack, she will deal _4-5 bonus damage_.
actors.hero.talent.aggressive_barrier.title=aggressive barrier
# fixme buff
actors.hero.talent.aggressive_barrier.desc=_+0_: The Duelist gains _2 shielding_ when she uses a weapon ability and is at or below 50% health.\n\n_+1:_ The Duelist gains _5 shielding_ when she uses a weapon ability and is at or below 50% health.\n\n_+2:_ The Duelist gains _8 shielding_ when she uses a weapon ability and is at or below 50% health.
actors.hero.talent.aggressive_barrier.meta_desc=_If this talent is gained by a different hero_ it will instead grant 8 shielding when making a melee attack at 20/40/60% health, with a 50 turn cooldown.

actors.hero.talent.focused_meal.title=focused meal
actors.hero.talent.focused_meal.desc=_+0:_ Eating food grants the Duelist _0.5 charges_ on her primary weapon.\n\n_+1:_ Eating food _takes the Duelist 1 turn_ and grants her _1 charge_ on her primary weapon.\n\n_+2:_ Eating food takes the Duelist 1 turn and grants her _1.5 charge_ on her primary weapon.
actors.hero.talent.focused_meal.meta_desc=_If this talent is gained by a different hero_ it will instead grant bonus damage to their next attack equal to their level/4 at +0, level/3 at +1, and level/2 at +2.
actors.hero.talent.focused_meal.comment="Less waiting, more lunging!
# todo buff
actors.hero.talent.liquid_agility.title=liquid agility
actors.hero.talent.liquid_agility.desc=_+1:_ When drinking or throwing a potion, brew, or elixir, the Duelist has 3x evasion, _which lasts for an additional turn after_, and has 3x accuracy on her _next two melee attacks within 10 turns_.\n\n_+2:_ When drinking or throwing a potion, brew, or elixir, the Duelist has _infinite evasion_, which lasts for an additional turn after, and has _infinite accuracy_ on her next two melee attacks within 10 turns.\n\nThe evasion bonus lasts twice as long and the accuracy bonus lasts twice as many attacks when using potions of strength, experience, or alchemy items that must be crafted using those potions.\n\nFor alchemy items with higher output quantities (e.g. aqua brew), this talent has a chance to trigger based on how many of that item is produced.\n\nThis effect can also be triggered with drinking from waterskin, with its power depending on how dew is consumed; 10 drops is 100% potency.
actors.hero.talent.liquid_agility.comment="Fast-tracking a ban from the Olympics, are we?"
actors.hero.talent.weapon_recharging.title=weapon recharging
# todo resolve
actors.hero.talent.weapon_recharging.desc=_+1:_ The Duelist gains one weapon charge every _5 turns_ and _+10% melee damage_ when under the effect of wand or artifact recharging buffs\n\n_+2:_ The Duelist gains one primary weapon charge every _3 turns_ and _+15%_ melee damage when under the effect of wand or artifact recharging buffs.
actors.hero.talent.weapon_recharging.comment_duelist="Why do other heroes get to have all the fun? Here's the damage boost that you would have gotten as literally any other class!"
actors.hero.talent.weapon_recharging.meta_desc=_If this talent is gained by a different hero_ it will instead cause them to deal +20% melee damage while recharging at +1, or +30% melee damage while recharging at +2.
actors.hero.talent.lethal_haste.title=lethal rush
actors.hero.talent.lethal_haste.desc=_+0:_ When the Duelist lands a killing blow on an enemy with a weapon ability, she gains _3 turns_ of instant movement.\n\n_+1:_ When the Duelist lands a killing blow on an enemy, she gains _3 turns of adrenaline_. If it was with a weapon ability, she also gains _3 turns of instant movement_.\n\n_+2_: When the Duelist lands a killing blow on an enemy, she gains _5 turns of adrenaline_. If it was with a weapon ability, she also gains _5 turns_ of instant movement.
actors.hero.talent.lethal_haste.meta_desc=_If this talent is gained by a different hero_, the instant movement aspect will instead proc on regular weapon attacks with a 50 turn cooldown.
actors.hero.talent.lethal_haste.comment="Whoops, I did it again..."
actors.hero.talent.swift_equip.title=swift equip
actors.hero.talent.swift_equip.desc=_+1:_ The Duelist can switch her equipped weapon instantly _one time_ every 20 turns.\n\n_+2:_ The Duelist can switch her equipped weapon instantly _two times_ every 20 turns.\n\nIf the Duelist has this talent and it is not on cooldown, quick-using an unequipped weapon will equip it.

actors.hero.talent.precise_assault.title=precise assault
actors.hero.talent.precise_assault.desc=_+1:_ When the Duelist uses a weapon ability, she gains _2x accuracy_ on her next two melee attacks within 5 turns.\n\n_+2:_ When the Duelist uses a weapon ability, she gains _5x accuracy_ on her next two melee attacks within 5 turns.\n\n_+3:_ When the Duelist uses a weapon ability, she gains _infinite accuracy_ on her next two melee attacks within 5 turns.
actors.hero.talent.precise_assault.meta_desc=_If this talent is gained by a different hero_ it will instead increase melee accuracy by 10% at +1, 20% at +2, or 30% at +3.
actors.hero.talent.precise_assault.comment="missing is boring"
actors.hero.talent.deadly_followup.title=deadly followup
actors.hero.talent.deadly_followup.desc=_+1:_ When the Duelist hits an enemy with a thrown weapon or wand, she will deal _16% more melee damage_ to them for 5 turns.\n\n_+2:_ When the Duelist hits an enemy with a thrown weapon or wand, she will deal _32% more melee damage_ to them for 5 turns.\n\n_+3:_ When the Duelist hits an enemy with a thrown weapon or wand, she will deal _48% more melee damage_ to them for 5 turns.
actors.hero.talent.deadly_followup.comment="Watch my blade.... at your own peril!"

# todo buff
actors.hero.talent.varied_charge.title=varied charge
actors.hero.talent.varied_charge.desc=_+1:_ The Champion instantly regains _0.17 weapon charges_ when she uses two different weapon abilities, with no time limit.\n\n_+2:_ The Champion instantly regains _0.33 weapon charges_ when she uses two different weapon abilities, with no time limit.\n\n_+3:_ The Champion instantly regains _0.5 weapon charges_ when she uses two different weapon abilities, with no time limit.
actors.hero.talent.twin_upgrades.title=twin upgrades
actors.hero.talent.twin_upgrades.desc=_+1:_ If one of the Champion's two equipped weapons has a lower level and is _2 or more tiers lower_ than the other weapon, it will be boosted to the other weapon's level.\n\n_+2:_ If one of the Champion's two equipped weapons has a lower level and is _1 or more tiers lower_ than the other weapon, it will be boosted to the other weapon's level.\n\n_+3:_ If one of the Champion's two equipped weapons has a lower level and is _the same tier or lower_ than the other weapon, it will be boosted to the other weapon's level.
actors.hero.talent.combined_lethality.title=combined lethality
actors.hero.talent.combined_lethality.desc=_+1:_ If the Champion attacks with a melee weapon immediately after using a different weapon's ability, that attack will execute any non-boss enemy left at _below 13% HP_.\n\n_+2:_ If the Champion attacks with a melee weapon immediately after using a different weapon's ability, that attack will execute any non-boss enemy left at _below 27% HP_.\n\n_+3:_ If the Champion attacks with a melee weapon immediately after using a different weapon's ability, that attack will execute any non-boss enemy left at _below 40% HP_.\n\nThis attack can be a regular melee weapon attack, or part of a weapon ability.

actors.hero.talent.elite_dexterity.title=elite dexterity
actors.hero.talent.elite_dexterity.desc=_+1:_ The Champion can equip a thrown weapon in place of a secondary weapon. The thrown weapon benefits from talents and the weapon's enchantment and can be used to extend the reach of most attacking abilities at double cost.\n\n_+2:_ The Champion can have a thrown weapon and a secondary weapon equipped at the same time.\n\n_+3:_ The Champion can have a third melee weapon equipped instead of a thrown weapon.
actors.hero.talent.elite_dexterity.comment="Something something 'melee' class. Pffft." (ignore the obvious visual bugs here)

actors.hero.talent.unencumbered_spirit.title=unencumbered spirit
actors.hero.talent.unencumbered_spirit.desc=_+1:_ The Monk gains _50% more energy_ for each piece of _tier 3 or lower_ equipment she is using.\n\n_+2:_ This talent's effect is increased to _75% more energy_ for each piece of _tier 2 or lower_ equipment the Monk is using.\n\n_+3:_ This talent's effect is increased to _100% more energy_ for each piece of _tier 1_ equipment the Monk is using. She also gains a free cloth armor and studded gloves.\n\nNote that this talent gives no benefit from being unarmed or attacking with a Ring of Force.
actors.hero.talent.monastic_vigor.title=monastic vigor
actors.hero.talent.monastic_vigor.desc=_+1:_ If the Monk has _100% energy_, her abilities are empowered.\n\n_+2:_ If the Monk has _80% or more energy_, her abilities are empowered.\n\n_+3:_ If the Monk has _60% or more energy_, her abilities are empowered.\n\nWhen empowered:\n- Flurry applies your weapon's enchantment\n- Focus is instantaneous\n- Dash gains +4 range\n- Dragon Kick deals +50% damage and applies its knock back and stun effect to all adjacent enemies\n- Meditate slowly heals 20% of missing HP and grants 80% damage resistance.
actors.hero.talent.combined_energy.title=combined energy
actors.hero.talent.combined_energy.desc=_+1:_ If the Monk uses a weapon ability and a _4+ energy_ ability within 5 turns of each other, she regains 1 spent energy.\n\n_+2:_ If the Monk uses a weapon ability and a _3+ energy_ ability within 5 turns of each other, she regains 1 spent energy.\n\n_+3:_ If the Monk uses a weapon ability and a _2+ energy_ ability within 5 turns of each other, she regains 1 spent energy.

actors.hero.talent.close_the_gap.title=close the gap
actors.hero.talent.close_the_gap.desc=_+1:_ The Duelist blinks _up to two tiles_ toward her target when starting a duel.\n\n_+2:_ The Duelist blinks _up to three tiles_ toward her target when starting a duel.\n\n_+3:_ The Duelist blinks _up to four tiles_ toward her target when starting a duel.\n\n_+4:_ The Duelist blinks _up to five tiles_ toward her target when starting a duel.\n\nThis blink can go through hazards and enemies, but not solid terrain like walls. The blink is taken into account when determining if an enemy is in range to be challenged.
actors.hero.talent.invigorating_victory.title=invigorating victory
actors.hero.talent.invigorating_victory.desc=_+1:_ If the Duelist defeats her target before the duel ends, she heals for _5 HP plus 30% of the damage_ she took during the duel.\n\n_+2:_ If the Duelist defeats her target before the duel ends, she heals for _10 HP plus 50% of the damage_ she took during the duel.\n\n_+3:_ If the Duelist defeats her target before the duel ends, she heals for _15 HP plus 65% of the damage_ she took during the duel.\n\n_+4:_ If the Duelist defeats her target before the duel ends, she heals for _20 HP plus 75% of the damage_ she took during the duel.
actors.hero.talent.elimination_match.title=elimination match
actors.hero.talent.elimination_match.desc=_+1:_ If the Duelist challenges again within 3 turns of a duel ending, that challenge has a _16% reduced_ charge cost.\n\n_+2:_ If the Duelist challenges again within 3 turns of a duel ending, that challenge has a _30% reduced_ charge cost.\n\n_+3:_ If the Duelist challenges again within 3 turns of a duel ending, that challenge has a _40% reduced_ charge cost.\n\n_+4:_ If the Duelist challenges again within 3 turns of a duel ending, that challenge has a _50% reduced_ charge cost.

actors.hero.talent.elemental_reach.title=elemental reach
actors.hero.talent.elemental_reach.desc=_+1:_ Elemental strike's range is increased to _5 tiles_ from 4, and its width is increased to _75 degrees_ from 65.\n\n_+2:_ Elemental strike's range is increased to _6 tiles_ from 4, and its width is increased to _85 degrees_ from 65.\n\n_+3:_ Elemental strike's range is increased to _7 tiles_ from 4, and its width is increased to _95 degrees_ from 65.\n\n_+4:_ Elemental strike's range is increased to _8 tiles_ from 4, and its width is increased to _105 degrees_ from 65.
actors.hero.talent.striking_force.title=striking force
actors.hero.talent.striking_force.desc=_+1:_ The power of elemental strike's effect is increased by _30%_.\n\n_+2:_ The power of elemental strike's effect is increased by _60%_.\n\n_+3:_ The power of elemental strike's effect is increased by _90%_.\n\n_+4:_ The power of elemental strike's effect is increased by _120%_.
actors.hero.talent.directed_power.title=directed power
actors.hero.talent.directed_power.desc=_+1:_ The direct attack from elemental strike gains _+30% enchantment power_ for each enemy in range of elemental strike's effect, including the attack target.\n\n_+2:_ The direct attack from elemental strike gains _+60% enchantment power_ for each enemy in range of elemental strike's effect, including the attack target.\n\n_+3:_ The direct attack from elemental strike gains _+90% enchantment power_ for each enemy in range of elemental strike's effect, including the attack target.\n\n_+4:_ The direct attack from elemental strike gains _+120% enchantment power_ for each enemy in range of elemental strike's effect, including the attack target.

actors.hero.talent.feigned_retreat.title=feigned retreat
actors.hero.talent.feigned_retreat.desc=_+1:_ If an enemy attacks the Duelist's afterimage, she gains _2 turns_ of haste.\n\n_+2:_ If an enemy attacks the Duelist's afterimage, she gains _4 turns_ of haste.\n\n_+3:_ If an enemy attacks the Duelist's afterimage, she gains _6 turns_ of haste.\n\n_+4:_ If an enemy attacks the Duelist's afterimage, she gains _8 turns_ of haste.
actors.hero.talent.expose_weakness.title=expose weakness
actors.hero.talent.expose_weakness.desc=_+1:_ Enemies that attack the Duelist's afterimage become weak and vulnerable for _2 turns_.\n\n_+2:_ Enemies that attack the Duelist's afterimage become weak and vulnerable for _4 turns_.\n\n_+3:_ Enemies that attack the Duelist's afterimage become weak and vulnerable for _6 turns_.\n\n_+4:_ Enemies that attack the Duelist's afterimage become weak and vulnerable for _8 turns_.
actors.hero.talent.counter_ability.title=counter ability
actors.hero.talent.counter_ability.desc=_+1:_ If the Duelist uses a weapon ability within 3 turns of her afterimage being attacked, she will instantly regain _0.38 charges_.\n\n_+2:_ If the Duelist uses a weapon ability within 3 turns of her afterimage being attacked, she will instantly regain _0.77 charges_.\n\n_+3:_ If the Duelist uses a weapon ability within 3 turns of her afterimage being attacked, she will instantly regain _1.13 charges_.\n\n_+4:_ If the Duelist uses a weapon ability within 3 turns of her afterimage being attacked, she will instantly regain _1.5 charges_.

#cleric
actors.hero.talent.satiated_spells.title=Satiated Spells
actors.hero.talent.satiated_spells.desc=_+0:_ Eating food causes the Cleric to gain _2 shielding_ the next time they cast a spell.\n\n_+1:_ Eating food causes the Cleric to gain _5 shielding_ the next time they cast a spell.\n\n_+2_: Eating food causes the Cleric to gain _8 shielding_ the next time they cast a spell.
actors.hero.talent.satiated_spells.comment="None of this 'attack them while they're busy casting' nonsense here..."
actors.hero.talent.satiated_spells.meta_desc=_If this talent is gained by a different hero_ it will instead grant shielding immediately, which will start to decay normally after 10 turns.
actors.hero.talent.holy_intuition.title=holy intuition
actors.hero.talent.holy_intuition.desc=_+1:_ The Cleric can cast _Holy Intuition,_ a spell that reveals whether an item is cursed at the cost of _3 charges._\n\n_+2:_ The Cleric can cast _Holy Intuition,_ a spell that reveals whether an item is cursed at the cost of _2 charges._\n\nThe spell is also able to identify uncursed items and remove curses on uncursed items with a 25% chance. Uses on items known to be cursed or uncursed have this chance increased to 33%.
actors.hero.talent.holy_intuition.meta_desc=_If this talent is gained by a different hero_ it will instead let the hero identify and remove the curse status on a cursed item just before equipping it, 10% of the time at +0, 30% of the time at +1, and 50% of the time at +2.
actors.hero.talent.holy_intuition.comment="Trust me, you'll get it this time. Just one more roll."
actors.hero.talent.searing_light.title=searing light
actors.hero.talent.searing_light.desc=_+0:_ The Cleric's physical attacks on enemies illuminated by _Guiding Light_ deal _+2 damage._\n\n_+1:_ The Cleric's physical attacks on enemies illuminated by _Guiding Light_ deal _+5 damage._\n\n_+2:_ The Cleric's physical attacks on enemies illuminated by _Guiding Light_ deal _+8 damage._
actors.hero.talent.searing_light.meta_desc=_If this talent is gained by a different hero_ it will instead grant its bonus damage after a wand or artifact is used on an enemy, with a 20 turn cooldown.
actors.hero.talent.searing_light.comment="the light.... it buuuuuuuurns....."
actors.hero.talent.shield_of_light.title=shield of light
actors.hero.talent.shield_of_light.desc=\
  _+0:_ The Cleric can cast _Shield of Light,_ a spell that is cast instantly and grants them _2-4 armor_ against a target for 10 turns at the cost of 1 charge.\n\n_+1:_ The Cleric can cast _Shield of Light,_ a spell that is cast instantly and grants them _3-6 armor_ against a target for 10 turns at the cost of 1 charge.\n\n_+2:_ The Cleric can cast _Shield of Light,_ a spell that is cast instantly and grants them _4-8 armor_ against a target for 10 turns at the cost of 1 charge.
actors.hero.talent.shield_of_light.meta_desc=_If this talent is gained by a different hero_ it will instead reduce physical damage taken from your targeted enemy by 1, 25% of the time at +0, 50% of the time at +1, or 100% of the time at +2.
actors.hero.talent.shield_of_light.comment="Turns out that armor is not actually necessary for defense. Don't you love magic?"
actors.hero.talent.metaexpression.title=metaexpression
actors.hero.talent.metaexpression.desc=_+1:_ The Cleric can cast _Metaexpression,_ a spell which imbues them with power of random trinket, upgraded to _+1_, for 250 turns at the cost of _3 charges_.\n\n_+2:_ The Cleric can cast _Metaexpression,_ a spell which imbues them with power of random trinket, upgraded to _+2_, for 250 turns at the cost of _4 charges_.\n\nYou can get multiple trinket effects at same time by reusing the spell.
actors.hero.talent.metaexpression.meta_desc=_If this talent is gained by a different hero_ it will instead grant powers of random of trinket, upgraded to +1/+2, for 500 turns every time hero enters a new level.
actors.hero.talent.metaexpression.comment="Be careful, what you wish for... maybe that doesn't apply, when you can't choose your wish..."

actors.hero.talent.enlightening_meal.title=Enlightening Meal
actors.hero.talent.enlightening_meal.desc=_+0:_ Eating food grants the Cleric _0.5 charges_ on their holy tome and 2 turns of wand and artifact recharging_.\n\n_+1:_ Eating food takes the Cleric 1 turn_ and grants them _1 charge_ on their holy tome and 2 turns of wand and artifact recharging.\n\n_+2_: Eating food takes the Cleric 1 turn and grants them _1.5 charges_ on their holy tome and 2 turns of wand and artifact recharging.
actors.hero.talent.enlightening_meal.meta_desc=_If this talent is gained by a different hero_ it will instead grant 2/3/5 turns of wand and artifact recharging at +0/+1/+2.
actors.hero.talent.enlightening_meal.comment_rat_king="Worse royal meal... or is it???"
actors.hero.talent.enlightening_meal.comment="Now with more recharge!!!"
actors.hero.talent.recall_inscription.title=Recall Inscription
actors.hero.talent.recall_inscription.refunded=Your item was refunded!
actors.hero.talent.recall_inscription.desc=_+1:_ The Cleric can cast _Recall Inscription,_ a spell that lets them repeat the effect of the last runestone or scroll they used within _10 turns._\n\n_+2:_ The Cleric can cast _Recall Inscription,_ a spell that lets them repeat the effect of the last runestone or scroll they used within _300 turns._\n\nRecall Inscription cannot be used with scrolls of upgrade. This spell's charge cost varies based on which item was used recently: 2 for a runestone, 3 for a scroll, 4 for an exotic scroll. This charge cost is also doubled when used with a scroll of transmutation, or alchemy items that must be crafted using transmutation or upgrade.\n\nThe spell can be cast multiple times, but the cost increases by 50% every time the spell is cast, unless the spell is currently empowered by Limit Break or Divine Advent.
actors.hero.talent.recall_inscription.meta_desc=_If this talent is gained by a different hero_ it will instead refund any scroll or runestone 20% of the time at +1 or 30% of the time at +2. Scrolls of Upgrade are exempt from this effect.
actors.hero.talent.recall_inscription.comment="You know what's better than one stone of blast? two stones of blast. you know what's better than twwwo stones of blast? Three!!"
actors.hero.talent.sunray.title=Sunray
actors.hero.talent.sunray.desc=_+1:_ The Cleric can cast _Sunray,_ a spell that deals _6-10 damage_ and blinds the target for _6 turns,_ at the cost of 1 charge.\n\n_+2:_ The Cleric can cast _Sunray,_ a spell that deals _9-15 damage_ and blinds the target for _9 turns,_ at the cost of 1 charge.\n\nSunray can only blind each target once, but if the target is already blinded by Sunray then it paralyses instead. Sunray always deals maximum damage to demonic and undead foes.
actors.hero.talent.sunray.meta_desc=_If this talent is gained by a different hero_ it will instead cause wands and artifacts to blind enemies for 4 turns, 15% of the time at +1 or 25% of the time at +2.
actors.hero.talent.divine_sense.title=Divine Sense
actors.hero.talent.divine_sense.desc=_+1:_ The Cleric can cast _Divine Sense,_ a spell that grants them _8 tiles_ of Mind Vision for 60 turns, at the cost of 2 charges.\n\n_+2:_ The Cleric can cast _Divine Sense,_ a spell that grants them _12 tiles_ of Mind Vision for 60 turns, at the cost of 2 charges.
actors.hero.talent.divine_sense.meta_desc=_If this talent is gained by a different hero_ it will instead grant them mind vision for a brief moment after using a wand or artifact with a range of 3/5/7 tiles at +0/+1/+2.
# I get the impression my jokes suck sometimes...
actors.hero.talent.divine_sense.comment="I SEE YOU"
actors.hero.talent.bless.title=Bless
actors.hero.talent.bless.desc=_+1:_ The Cleric can cast _Bless,_ a spell that grants _10 turns of bless and 15 shielding_ when cast on themselves or _15 turns of bless and 15 healing_ when cast on another character, at the cost of 1 charge.\n\n_+2:_ The Cleric can cast _Bless,_ a spell that grants _15 turns of bless and 25 shielding_ when cast on themselves or _25 turns of bless and 25 healing_ when cast on another character, at the cost of 1 charge.\n\nExcess healing from this spell is converted into shielding.\n\nCasting this spell on targets that are already blessed will grant them _1/2 turns_ of adrenaline at +1/+2.
# todo improve this
actors.hero.talent.bless.comment="A blessing for you! A blessing for *you*, and a blessing for *you*!"
actors.hero.talent.bless.meta_desc=_If this talent is gained by a different hero_ it will instead boost accuracy and evasion for the hero and all allies by 3% at +1 or 5% at +2.

actors.hero.talent.radiant_grappler.title=Radiant Grappler
actors.hero.talent.radiant_grappler.desc=_+1:_ The Cleric can cast _Radiant Grappler,_ a spell that casts a grappling hook to collect items and activate traps from a distance at the cost of 1 charge.\n\n_+2:_ The Cleric can cast _Radiant Grappler,_ a spell that casts a grappling hook to move several tiles at once, collect items, activate items and hook in enemies from distance at the cost of 1 charge.\n\nThis spell cannot go through walls.
actors.hero.talent.radiant_grappler.meta_desc=_If this talent is gained by a different hero_ it will instead spawn consumable item versions of the spell in shops and infrequently on the ground.
actors.hero.talent.radiant_grappler.comment="Now that guard or DM machine can get over here too!"

actors.hero.talent.cleanse.title=Cleanse
actors.hero.talent.cleanse.desc=_+1:_ The Cleric can cast _Cleanse,_ a spell which is cast instantly, _grants 3 turns of negative status immunity_ to the Cleric and any nearby allies, and grants them _15 shielding,_ at the cost of 2 charges.\n\n_+2:_ The Cleric can cast _Cleanse,_ a spell which is cast instantly, _grants 5 turns of negative status immunity_ to the Cleric and any nearby allies, and grants them _30 shielding,_ at the cost of 2 charges.\n\n_+2:_ The Cleric can cast _Cleanse,_ a spell which is cast instantly, _grants 7 turns of negative status immunity_ to the Cleric and any nearby allies, and grants them _45 shielding,_ at the cost of 2 charges.
actors.hero.talent.cleanse.meta_desc=_If this talent is gained by a different hero_ it will instead cleanse negative status effects on the hero after using a wand or artifact, 15/30/45% of the time at +1/+2/+3.
actors.hero.talent.light_reading.title=Light Reading
actors.hero.talent.light_reading.desc=_+0:_ The Cleric can use their holy tome when it is not equipped, but it recharges at _25% speed_ when unequipped.\n\n_+1:_ The Cleric can use their holy tome when it is not equipped, but it recharges at _50% speed_ when unequipped.\n\n_+2:_ The Cleric can use their holy tome when it is not equipped, but it recharges at _75% speed_ when unequipped.\n\n_+3:_ The Cleric can use their holy tome when it is not equipped, _with no penalty_.
actors.hero.talent.light_reading.meta_desc=_If this talent is gained by a different hero_ it will instead increase the recharging speed of all wands by 13/25/40% at +1/+2/+3.
actors.hero.talent.exorcism.title=exorcism
actors.hero.talent.exorcism.desc=_+1:_ Using Cleric spells on enemies has 50% chance to ignite them with holy flames effect for _5 turns_.\n\n_+2:_ Using Cleric spells on enemies has 50% chance to ignite them with holy flames effect for _7 turns_.\n\n_+3:_ Using Cleric spells on enemies has 50% chance to ignite them with holy flames effect for _9 turns_.\n\nHoly flames deal damage similar to fire, but do more and more damage every turn, cannot be extinguished and does extra damage to undeads and demons.
actors.hero.talent.exorcism.meta_desc=_If this talent is gained by a different hero_ it will trigger the same effect from using damaging wands.
actors.hero.talent.exorcism.comment="Some may call this a gift of providence to unaware monsters."

actors.hero.talent.holy_lance.title=Holy Lance
actors.hero.talent.holy_lance.desc=_+1:_ The Priest can cast _Holy Lance,_ a devastating spell that deals _30-55 damage_ at the cost of 4 charges.\n\n_+2:_ The Priest can cast _Holy Lance,_ a devastating spell that deals _45-83 damage_ at the cost of 4 charges.\n\n_+3:_ The Priest can cast _Holy Lance,_ a devastating spell that deals _60-110 damage_ at the cost of 4 charges.\n\nHoly Lance always deals maximum damage to demonic and undead foes. Holy Lance has a 15 turn cooldown before it can be cast again.
actors.hero.talent.holy_lance.comment="Look! an enemy!"\n*thud*\n"What enemy?"
actors.hero.talent.hallowed_ground.title=Hallowed Ground
actors.hero.talent.hallowed_ground.desc=_+1:_ The Priest can cast _Hallowed Ground,_ a spell that hallows terrain in a _3x3 area_ for 20 turns, at the cost of 2 charges.\n\n_+2:_ The Priest can cast _Hallowed Ground,_ a spell that hallows terrain in a _5x5 area_ for 20 turns, at the cost of 2 charges.\n\n_+3:_ The Priest can cast _Hallowed Ground,_ a spell that hallows terrain in a _7x7 area_ for 20 turns, at the cost of 2 charges.\n\nWhen it is cast, Hallowed Ground heals allies for 10 HP, briefly roots enemies, and spreads short grass. Afterward, it slowly heals allies, cripples enemies, and causes tall grass to randomly grow. Hallowed ground is destroyed by fire.
actors.hero.talent.hallowed_ground.comment="Looking for a spell that does everything? Look no further."
actors.hero.talent.mnemonic_prayer.title=Mnemonic Prayer
actors.hero.talent.mnemonic_prayer.desc=_+1:_ The Priest can cast _Mnemonic Prayer,_ a spell that extends buffs/debuffs on an ally/enemy for _4 turns_ at 1 charge cost.\n\n_+2:_ The Priest can cast _Mnemonic Prayer,_ a spell that extends buffs/debuffs on an ally/enemy for _6 turns_ at 1 charge cost.\n\n_+3:_ The Priest can cast _Mnemonic Prayer,_ a spell that extends buffs/debuffs on an ally/enemy for _8 turns_ at 1 charge cost.\n\nMnemonic Prayer also re-illuminates the target if they were illuminated previously. Mnemonic Prayer can only extend a particular instance of a buff/debuff once, and cannot extend buffs from armor abilities.
actors.hero.talent.divine_advent.title=divine advent
actors.hero.talent.divine_advent.desc=\
  _+1_: The Priest can cast _Divine Advent_, which grants the Priest _4 turns of recharging_ and empowers _3 charges_ worth of spells at the cost of _7 charges_.\n\n\
  _+2_: The Priest can cast _Divine Advent_, which grants the Priest _6 turns of recharging_ and empowers _4 charges_ worth of spells, at the cost of _6 charges_.\n\n\
  _+3_: The Priest can cast _Divine Advent_, which grants the Priest _8 turns of recharging_ and empowers _5 charges_ worth of spells, at the cost of _5 charges_.\n\n\
  _-_ Spells can be cast during Divine Advent without regard for the tome's charges or even whether the Priest has invested into their talents.\n\
  _-_ Divine Advent can be cast regardless of the tome's current charge, but not from negative charge.\n\
  _-_ Divine Advent has a cooldown of 100 turns from when its buff expires.
actors.hero.talent.divine_advent.comment="Repent, sinner, for judgment has come."

actors.hero.talent.enduring_light.title=Enduring Light
actors.hero.talent.enduring_light.desc=\
  _+1_: Illuminated buffs have a _33%_ chance to reapplied when or after activating.\n\n\
  _+2_: Illuminated buffs have a _67%_ chance to be reapplied when or after activating.\n\n\
  _+3_: Illuminated buffs have a _100%_ chance to be reapplied when or after activating.
actors.hero.talent.enduring_light.comment="Seems a bit of a waste to lose these after spending so much effort..."

actors.hero.talent.lay_on_hands.title=lay on hands
actors.hero.talent.lay_on_hands.desc=_+1:_ The Paladin can cast _Lay on Hands,_ a spell that instantly heals a nearby character for _10 HP,_ or grants the Paladin _10 shielding,_ at the cost of 1 charge. It also gives _1 turn_ of adrenaline to the target.\n\n_+2:_ The Paladin can cast _Lay on Hands,_ a spell that instantly heals a nearby character for _15 HP,_ or grants the Paladin _15 shielding,_ at the cost of 1 charge.It also gives _2 turns_ of adrenaline to the target.\n\n_+3:_ The Paladin can cast _Lay on Hands,_ a spell that instantly heals a nearby character for _20 HP,_ or grants the Paladin _20 shielding,_ at the cost of 1 charge. It also gives _3 turns_ of adrenaline to the target.\n\nExcess healing from this spell is converted into shielding. Lay on Hands can be cast repeatedly, but cannot apply more than three casts worth of shielding at once.
actors.hero.talent.lay_on_hands.comment="For when something's not moving, and you want it to move. An extra little 'kick' has been added to really expedite things."
actors.hero.talent.aura_of_protection.title=aura of protection
actors.hero.talent.aura_of_protection.desc=_+1:_ The Paladin can cast _Aura of Protection,_ a spell that grants the Paladin and all allies within 2 tiles _10% damage resistance_ and the effect of the Paladin's armor glyph at _+50% power_ for 20 turns, at the cost of 2 charges.\n\n_+2:_ The Paladin can cast _Aura of Protection,_ a spell that grants the Paladin and all allies within 2 tiles _20% damage resistance_ and the effect of the Paladin's armor glyph at _+75% power_ for 20 turns, at the cost of 2 charges.\n\n_+3:_ The Paladin can cast _Aura of Protection,_ a spell that grants the Paladin and all allies within 2 tiles _30% damage resistance_ and the effect of the Paladin's armor glyph at _+100% power_ for 20 turns, at the cost of 2 charges.\n\nAura of Protection can be extended by casting spells, at a rate of 4 turns per charge spent.
actors.hero.talent.wall_of_light.title=wall of light
actors.hero.talent.wall_of_light.desc=_+1:_ The Paladin can cast _Wall of Light,_ a spell that creates a _3 tile wide_ solid wall in front of the Paladin that pushes away enemies and lasts for 20 turns, at the cost of 3 charges.\n\n_+2:_ The Paladin can cast _Wall of Light,_ a spell that creates a _5 tile wide_ solid wall in front of the Paladin that pushes away enemies and lasts for 20 turns, at the cost of 3 charges.\n\n_+3:_ The Paladin can cast _Wall of Light,_ a spell that creates a _7 tile wide_ solid wall in front of the Paladin that pushes away enemies and lasts for 20 turns, at the cost of 3 charges.\n\nThe wall can be placed cardinally or diagonally, only one wall can exist at a time.
actors.hero.talent.wall_of_light.comment="For when you REALLY want things to move"
actors.hero.talent.limit_break.title=limit break
actors.hero.talent.limit_break.desc=\
  _+1_: The Paladin can cast _Limit Break_, which empowers _2 charges_ worth of spells, at the cost of 4 charges.\n\n\
  _+2_: The Paladin can cast _Limit Break_, which empowers _4 charges_ worth of spells, at the cost of 4 charges.\n\n\
  _+3_: The Paladin can cast _Limit Break_, which empowers _8 charges_ worth of spells, at the cost of 4 charges.\n\n\
  _-_ Limit Break requires 300 turns of cooldown after use.\n\
  _-_ Spells cast during Limit Break can be cast even with insufficient charge and even without the required talents.\n\
  _-_ When used below 30% HP, Limit Break's charge cost is 2, it can be cast even with insufficient charge, and its cooldown is 150.
actors.hero.talent.limit_break.comment="What are limits for, if not to be broken..."

actors.hero.talent.triage.title=triage
actors.hero.talent.triage.desc=\
  _+1_: The Paladin can leap up to _1 tile_ when casting Smite, Lay on Hands, and Wall of Light.\n\n\
  _+2_: The Paladin can leap up to _2 tiles_ when casting Smite, Lay on Hands, and Wall of Light.\n\n\
  _+3_: The Paladin can leap up to _3 tiles_ when casting Smite, Lay on Hands, and Wall of Light.
actors.hero.talent.triage.comment="Determination > Range"

actors.hero.talent.ars_retractandi.title=ars retractandi
actors.hero.talent.ars_retractandi.desc=_+1:_ The Cenobite can cast _Ars Retractandi_, a spell which allows to transform selected talent into another random talent with same aspect, at cost of _4 charges_.\n\n_+2:_ The Cenobite can cast _Ars Retractandi_, a spell which allows to transform selected talent into another random talent with same aspect, at cost of _3 charges_.\n\n_+3:_ The Cenobite can cast _Ars Retractandi_, a spell which allows to transform selected talent into another random talent with same aspect, at cost of _2 charges_.\n\nThe resulting talent can be from another subclass or tier of talents.\nThe tier 3 and tier 4 talents have reduced chance to appear.
actors.hero.talent.ars_retractandi.comment="Your path is yours to shape as you see fit, regardless of the Fates' design. Together we may twist that path a bit, if you would like."
actors.hero.talent.messis_potentiae.title=messis potentiae
actors.hero.talent.messis_potentiae.desc=_+1:_ The Cenobite can cast _Messis Potentiae_, a spell that empowers their mind with energy for _20 turns_, at cost of 2 charges. While this effect is active, each enemy kill grants 0.5 tome charges.\n\n_+2:_ The Cenobite can cast _Messis Potentiae_, a spell that empowers their mind with energy for _30 turns_, at cost of 2 charges. While this effect is active, each enemy kill grants 0.5 tome charges.\n\n_+3:_ The Cenobite can cast _Messis Potentiae_, a spell that empowers their mind with energy for _40 turns_, at cost of 2 charges. While this effect is active, each enemy kill grants 0.5 tome charges.
actors.hero.talent.messis_potentiae.comment="Vengeance is an impulse I would better understand."
actors.hero.talent.petitio_magica.title=petitio magica
actors.hero.talent.petitio_magica.desc=_+1:_ The Cenobite can cast _Petitio Magica_, a spell that grants the Cenobite access to another spell they don't have for _100 turns_, at cost of 4 charges.\n\n_+2:_ The Cenobite can cast _Petitio Magica_, a spell that grants the Cenobite access to another spell they don't have for _150 turns_, at cost of 4 charges.\n\n_+3:_ The Cenobite can cast _Petitio Magica_, a spell that grants the Cenobite access to another spell they don't have for _200 turns_, at cost of 4 charges.\n\nIf a spell comes from a talent, that talent will be considered as fully upgraded.
actors.hero.talent.petitio_magica.comment="So many different possibilities to be explored, in no particular order..."
actors.hero.talent.emendatio_icatus.title=emendatio icatus
actors.hero.talent.emendatio_icatus.desc=\
  The Cenobite can cast _Emendatio Icatus_, a spell which empowers variable amount of charges worth of spells, depending on what is the most dominant talent aspect is in Cenobite's arsenal, at the cost of 4 charges.\n\n\
  _+1_: _Emendatio Icatus_ empowers _1 charge_ per aspect talent.\n\n\
  _+2_: _Emendatio Icatus_ empowers _1.5 charges_ per aspect talent.\n\n\
  _+3_: _Emendatio Icatus_ empowers _2 charges_ per aspect talent.\n\n\
  _-_ Emendatio Icatus requires 25 turns of cooldown per given charge after use.\n\
  _-_ Spells cast during Emendatio Icatus can be cast even with insufficient charge and even without the required talents.\n\
  _-_ Emendatio Icatus can be cast regardless of the tome's current charge, but not from negative charge.
actors.hero.talent.emendatio_icatus.comment="It pleases me that you are here again; for, through you I can tinker with reality, along the fringes that are not yet fully formed."
actors.hero.talent.recarga_addita.title=recarga addita
actors.hero.talent.recarga_addita.desc=_+1:_ The Cenobite's holy tome can go below 1 negative charge for each spell they obtained from other subclass.\n\n_+2:_ In addition to the benefits of +1, the Cenobite's holy tome's base recharge is reduced by 28%.\n\n_+3:_ In addition to benefits of +2, the Cenobite's spells get 75% more levels from aspects, if their holy tome is fully charged before the cast.
actors.hero.talent.recarga_addita.comment="Allow me to make your coming venture more interesting from the very start."

actors.hero.talent.heroic_infusion.title=heroic infusion
actors.hero.talent.heroic_infusion.desc=_+1:_ The Cleric gets instant _0.5 wand and artifact recharge_ on taking damage.\n\n_+2:_ The Cleric gets instant _0.75 wand and artifact recharge_ on taking damage.\n\n_+3:_ The Cleric gets instant _1 wand and artifact recharge_ on taking damage.\n\n_+1:_ The Cleric gets instant _1.25 wand and artifact recharge_ on taking damage.\n\nThis talent doesn't proc if hero takes 0 damage or less.
actors.hero.talent.heroic_infusion.comment="As if access to those couldn't get more insane."

actors.hero.talent.divine_intervention.title=divine intervention
actors.hero.talent.divine_intervention.desc=_+1:_ While in Ascended Form, the Cleric can cast _Divine Intervention,_ which boosts the Cleric and all allies up to _150 shielding_ and extends Ascended Form by _1 turn._\n\n_+2:_ While in Ascended Form, the Cleric can cast _Divine Intervention,_ which boosts the Cleric and all allies up to _200 shielding_ and extends Ascended Form by _2 turns._\n\n_+3:_ While in Ascended Form, the Cleric can cast _Divine Intervention,_ which boosts the Cleric and all allies up to _250 shielding_ and extends Ascended Form by _3 turns._\n\n_+4:_ While in Ascended Form, the Cleric can cast _Divine Intervention,_ which boosts the Cleric and all allies up to _300 shielding_ and extends Ascended Form by _4 turns._\n\nDivine Intervention costs a whopping 5 tome charges, and can only be cast once in the same ascended form.
actors.hero.talent.judgement.title=judgement
actors.hero.talent.judgement.desc=_+1:_ While in Ascended Form, the Cleric can cast _Judgement,_ which deals _10-20 damage_ to all visible enemies.\n\n_+2:_ While in Ascended Form, the Cleric can cast _Judgement,_ which deals _15-30 damage_ to all visible enemies.\n\n_+3:_ While in Ascended Form, the Cleric can cast _Judgement,_ which deals _20-40 damage_ to all visible enemies.\n\n_+4:_ While in Ascended Form, the Cleric can cast _Judgement,_ which deals _25-50 damage_ to all visible enemies.\n\nJudgement costs 3 tome charges. Judgement deals an additional 5-10 damage for every spell the Cleric has cast since entering ascended form or since the last cast of Judgement.
actors.hero.talent.flash.title=flash
actors.hero.talent.flash.desc=_+1:_ While in Ascended Form, the Cleric can cast _Flash_ to teleport up to _3 tiles_ away.\n\n_+2:_ While in Ascended Form, the Cleric can cast _Flash_ to teleport up to _4 tiles_ away.\n\n_+3:_ While in Ascended Form, the Cleric can cast _Flash_ to teleport up to _5 tiles_ away.\n\n_+4:_ While in Ascended Form, the Cleric can cast _Flash_ to teleport up to _6 tiles_ away.\n\nFlash costs 1 tome charge initially, and 1 more charge for each use in the same ascended form.
actors.hero.talent.divine_proficiency.title=divine proficiency
actors.hero.talent.divine_proficiency.desc=_+1:_ Every time Ascended Form ends, its duration will be permanently increased by _1 turn_, to the maximum of _+5 turns_.\n\n_+2:_ Every time Ascended Form ends, its duration will be permanently increased by _1 turn_, to the maximum of _+10 turns_.\n\n_+3:_ Every time Ascended Form ends, its duration will be permanently increased by _2 turn_, to the maximum of _+15 turns_.\n\n_+4:_ Every time Ascended Form ends, its duration will be permanently increased by _2 turn_, to the maximum of _+20 turns_.
actors.hero.talent.divine_proficiency.comment="Perseverance... each time you get little bit better at using this ability."

actors.hero.talent.body_form.title=body form
actors.hero.talent.body_form.desc=The Cleric can cast _Body Form_, which imbues Trinity with the power of an enchantment or glyph that the Cleric has identified this run, at the cost of 2 charges.\n\n_+1:_ When Trinity is used, the Cleric gains the chosen effect for _20 turns._\n\n_+2:_ When Trinity is used, the Cleric gains the chosen effect for _27 turns._\n\n_+3:_ When Trinity is used, the Cleric gains the chosen effect for _33 turns._\n\n_+4:_ When Trinity is used, the Cleric gains the chosen effect for _40 turns._\n\nTrinity can only be imbued with one body effect at a time. Trinity's armor charge cost is higher if the chosen glyph is rare and powerful.
actors.hero.talent.mind_form.title=mind form
actors.hero.talent.mind_form.desc=The Cleric can cast _Mind Form_, which imbues Trinity with the power of a wand or thrown weapon that the Cleric has used this run, at the cost of 3 charges.\n\n_+1:_ When Trinity is used, the Cleric uses the zap or throw effect of the chosen item, as if it were _+3._\n\n_+2:_ When Trinity is used, the Cleric uses the zap or throw effect of the chosen item, as if it were _+4._\n\n_+3:_ When Trinity is used, the Cleric uses the zap or throw effect of the chosen item, as if it were _+5._\n\n_+4:_ When Trinity is used, the Cleric uses the zap or throw effect of the chosen item, as if it were _+6._\n\nTrinity can only be imbued with one mind effect at a time.
actors.hero.talent.spirit_form.title=spirit form
actors.hero.talent.spirit_form.desc=The Cleric can cast _Spirit Form_, which imbues Trinity with the power of a ring or artifact that the Cleric has identified this run (except the holy tome), at the cost of 4 charges.\n\n_+1:_ When Trinity is used, the Cleric will gain a ring's effect at _+1_ for 20 turns, or will trigger an artifact's effect at _+4._\n\n_+2:_ When Trinity is used, the Cleric will gain a ring's effect at _+2_ for 20 turns, or will trigger an artifact's effect at _+6._\n\n_+3:_ When Trinity is used, the Cleric will gain a ring's effect at _+3_ for 20 turns, or will trigger an artifact's effect at _+8._\n\n_+4:_ When Trinity is used, the Cleric will gain a ring's effect at _+4_ for 20 turns, or will trigger an artifact's effect at _+10._\n\nTrinity can only be imbued with one spirit effect at a time. Artifacts have varied effects and armor charge costs when triggered by Trinity.
actors.hero.talent.meta_form.title=meta form
actors.hero.talent.meta_form.desc=The Cleric can cast _Meta Form_, which imbues Trinity with the power of a talent at max potency that the Cleric can choose out of 10 possible options, at the cost of 5 charges.\n\n_+1:_ When Trinity is used, the Cleric gains the chosen talent for _100 turns._\n\n_+2:_ When Trinity is used, the Cleric gains the chosen talent for _125 turns._\n\n_+3:_ When Trinity is used, the Cleric gains the chosen talent for _150 turns._\n\n_+4:_ When Trinity is used, the Cleric gains the chosen talent for _175 turns._\n\nTrinity can only be imbued with one meta effect at a time.\n\nUnlike other forms, meta form preemptively consumes tome charges.

actors.hero.talent.beaming_ray.title=beaming ray
actors.hero.talent.beaming_ray.desc=The Cleric can cast _Beaming Ray_ from an empowered ally at the cost of 1 charge. This ray can go through walls and teleports the ally to a targeted location. If an enemy is at that location, the ally appears next to the enemy and will target them. Beaming Ray can even teleport normally immobile allies, but has half range when doing so.\n\n_+1:_ Beaming Ray has a max range of _4 tiles,_ and increases Power of Many's bonus to _+35% damage_ against the closest enemy for 10 turns.\n\n_+2:_ Beaming Ray has a max range of _8 tiles,_ and increases Power of Many's bonus to _+40% damage_ against the closest enemy for 10 turns.\n\n_+3:_ Beaming Ray has a max range of _12 tiles,_ and increases Power of Many's bonus to _+45% damage_ against the closest enemy for 10 turns.\n\n_+4:_ Beaming Ray has a max range of _16 tiles,_ and increases Power of Many's bonus to _+50% damage_ against the closest enemy for 10 turns.
actors.hero.talent.life_link.title=life link
actors.hero.talent.life_link.desc=The Cleric can cast _Life Link_ between themselves and an empowered ally at the cost of 2 charges. This spell causes damage to be shared between the Cleric and their ally, and causes beneficial cleric spells of tier 3 or lower to apply to both if either is being affected.\n\n_+1:_ Life Link lasts for _6 turns_ and increases Power of Many's bonus to _-35% damage taken._\n\n_+2:_ Life Link lasts for _8 turns_ and increases Power of Many's bonus to _-40% damage taken._\n\n_+3:_ Life Link lasts for _10 turns_ and increases Power of Many's bonus to _-45% damage taken._\n\n_+4:_ Life Link lasts for _12 turns_ and increases Power of Many's bonus to _-50% damage taken._
actors.hero.talent.stasis.title=Stasis
actors.hero.talent.stasis.desc=The Cleric can cast _Stasis_ on an empowered ally at the cost of 1 charge. Stasis temporarily removes the ally from the dungeon and preserves the remaining time on all buffs, including Power of Many. The ally will reappear next to you when the effect ends. Stasis can be re-cast instantly and at no cost to end the effect early. Stasis works on immobile allies, but cannot move them between dungeon floors.\n\n_+1:_ Stasis lasts for a max of _40 turns._\n\n_+2:_ Stasis lasts for a max of _60 turns._\n\n_+3:_ Stasis lasts for a max of _80 turns._\n\n_+4:_ Stasis lasts for a max of _100 turns._\n\nThe Cleric can also cast Beaming Ray when an ally is in stasis to resummon them, or cast Life Link to pre-emptively apply its effect. Allies do not benefit from Life Link while in stasis however.
actors.hero.talent.enrage.title=enrage
actors.hero.talent.enrage.desc=The Cleric can cast _Enrage_ at empowered ally at the cost of 3 charges. This spell causes ally to temporarily deal 1.5x more physical damage, but also take 1.5x more damage.\n\n_+1:_ Enrage lasts for _4 turns_.\n\n_+2:_ Enrage lasts for _8 turns_.\n\n_+3:_ Enrage lasts for _16 turns_.\n\n_+4:_ Enrage lasts for _12 turns_.


# fixme should *probably* rework meta_description entirely, otherwise this ends up looking completely absurd lmao
actors.hero.talent.royal_privilege.title=royal privilege
actors.hero.talent.royal_privilege.desc=Starving is unbecoming of a king!\
  \n\n_+1:_ Eating heals me for _3 HP_ when I am below 30% health and also grants me _2 bonus damage_ on the next three times I deal damage with a wand. Not only that, but I can find _2 small rations_ placed in chests and _4 berries_ hidden in tall grass in the earlier stages of the dungeon.\
  \n\n_+2:_ Eating heals me for _5 HP_ when I am below 30% health and also grants me _3 bonus damage_ on the next three times I deal damage with a wand. Not only that, but I can find _3 small rations_ placed in chests and _6 berries_ hidden in tall grass in the earlier stages of the dungeon.
actors.hero.talent.royal_privilege.comment_mage="R E C H A R G E"
actors.hero.talent.royal_intuition.title=royal intuition
actors.hero.talent.royal_intuition.desc=I identify things super fast!\
  \n\n_+1:_ I identify weapons, armors, and rings _2.75x faster_ and wands _3.75x faster_! I also identify the type of a ring _as soon as I equip it_!\
  \n\n_+2:_ I identify all equipment _upon equipping them_ and can determine the type of a ring immediately on _picking it up_!
actors.hero.talent.kings_wisdom.title=king's wisdom
actors.hero.talent.kings_wisdom.desc=Fight smarter, not harder!\
  \n\n_+1:_ My first strikes against unaware enemy deals _1-2 bonus damage_, and when I hit an enemy with my bow or a thrown weapon, my next melee attack against that enemy deals _2 bonus damage_. Additionally, I get a separate _1-2 bonus damage_ to my next physical attack after zapping a wand or staff. To top it off, when my shielding breaks, my next physical attack deals _2 bonus damage_!\
  \n\n_+2:_ My first strike against an unaware enemy deals _2 bonus damage_, and when I hit an enemy with my bow or a thrown weapon, my next melee attack against that enemy deals _3 bonus damage_. Additionally, I get a separate _2 bonus damage_ to my next hit after zapping a wand or staff. To top it off, when my shielding breaks, my next physical attack deals _3 bonus damage_!
actors.hero.talent.noble_cause.title=noble cause
actors.hero.talent.noble_cause.desc=None can match my sheer determination to succeed!\
  \n\n_+1:_ The max shield provided by my seal is _increased by 1_, and I gain _3 shielding_ whenever I spend the last charge in my staff. Not only that, but I also gain one shielding _every other turn_ my cloak is activated, _to a max of 3_, and whenever a plant is trampled in my vision I gain 0-2 armor of barkskin that fades every _3 turns_!\
  \n\n_+2:_ The max shield provided by my seal is _increased by 2_, and I gain _5 shielding_ whenever I spend the last charge in my staff. Not only that, but I also gain one shielding _every turn_ my cloak is activated, _to a max of 5_, and whenever a plant is trampled in my vision I gain 0-2 armor of barkskin that fades every _5 turns_!
actors.hero.talent.noble_cause.meta_desc=\
  _- If this talent is gained by a hero who does not possess the seal_ it will grant its shielding benefit anyway.\n\
  _- If this talent is gained by a hero who does not possess a staff_ the shielding will be granted when the last charge from the hero's highest level wand is spent.

actors.hero.talent.royal_meal.title=royal meal
actors.hero.talent.royal_meal.desc=Only the finest effects from eating!\
  \n\n_+1:_ Eating food takes me 1 turn (berries are eaten instantly) and gives me _5 turns_ of wand recharging, _3 turns_ of artifact recharging, and _1 turn_ of haste. While eating, I take _75% less damage._\
  \n\n_+2:_ Eating food takes me 1 turn (berries are eaten instantly) and gives me _8 turns_ of wand recharging, _5 turns_ of artifact recharging, and _2 turns_ of haste. While eating, I take _100% less damage!_
actors.hero.talent.royal_meal.comment_mage="Well, would ya look at that. All eating effects wrapped up nicely just waiting to be used..."
actors.hero.talent.kings_vision.title=king's vision
actors.hero.talent.kings_vision.desc=Nothing escapes my gaze!\n\n\
  _+1:_ I gain mind vision on any enemy within _2 tiles of my position._ My search radius becomes a _7x7 circle,_ and I also gain mind vision on any enemy I zap with a wand for _10 turns._ To seal the deal, with a 50 turn cooldown I can blind an enemy for _2 turns_ by throwing any item that isn’t a thrown weapon at them.\n\n\
  _+2:_ I gain mind vision on any enemy within _3 tiles of my position._ My search radius becomes a _7x7 square,_ and I also gain mind vision on any enemy I zap with a wand for _15 turns._ To seal the deal, with a 50 turn cooldown I can blind an enemy for _3 turns_ by throwing any item that isn’t a thrown weapon at them.
# note rogue is excluded from this
actors.hero.talent.kings_vision.meta_desc=_If this talent is gained by a hero other than the Rogue_ it will instead increase their search radius from a 3x3 square to a 5x5 circle at +1, or a 5x5 square at +2.
actors.hero.talent.restoration.title=Law of Consumption
actors.hero.talent.restoration.desc=Every action has an equal and opposite reaction. Or so I've been told, anyway.\n\n\
  _+1_: Reading a scroll will grant me _3 turns_ of invisibility and give my _next two wand zaps_ +2 levels, while using a potion instantly recharges _50% of the shielding_ from the broken seal and sprouts _up to 4 grass tiles_ in the surrounding area, rooting adjacent enemies for _1 turn_. I can also self-target with a wand to instantly convert its charges into shielding at a rate of _4% max HP per charge_.\n\n\
  _+2_: Reading a scroll will grant me _5 turns_ of invisibility and give my _next 3 wand zaps_ +2 levels, while using a potion instantly recharges _75% of the shielding_ from the broken seal and and sprouts _up to 6 grass tiles_ in the surrounding area, rooting adjacent enemies for _2 turns_. I can also self-target with a wand to instantly convert its charges into shielding at a rate of _6% max HP per charge_.\
  \n\nInvisibility duration and amount of enhanced wand zaps are doubled are doubled when reading a scroll of upgrade, transmutation, enchantment, or metamorphosis, while the amount of shielding, grass, and root duration are doubled when using potions of strength, experience, mastery, or divine inspiration.\nThis effect can also be triggered with drinking from waterskin, with its power depending on how dew is consumed; 10 drops is 100% potency.
actors.hero.talent.restoration.meta_desc=\
  _- If this talent is gained by a hero without the broken seal_ it will instead grant shielding equal to 5% max hp at +1, or 7.5% max hp at +2.
actors.hero.talent.power_within.title=power within
actors.hero.talent.power_within.desc=Sometimes its worth remembering the stuff I already have!\
  \n\n_+1:_ The broken seal can now transfer _regular glyphs_ in the same way it transfers an upgrade, and when I imbue a new wand into my staff, the old wand will be returned at +0, _but this can only be done once._. In addition, when I first enter a level with a secret room, I have a _75% chance to notice_ that the level contains a secret. Finally, when I step on short grass or embers, they spring up into tall grass which I immediately furrow (with a _10 turn cooldown_).\
  \n\n_+2:_ The broken seal can now transfer _any glyph_ in the same way it transfers an upgrade, and when I imbue a new wand into my staff, the old wand is returned at +0, _this can be repeated with a one hero level cooldown._ In addition, when I first enter a level with a secret room, I have a _100% chance to notice_ that the level contains a secret. Finally, when I step on short grass or embers, they spring up into tall grass which I immediately furrow (with a _5 turn cooldown_).
actors.hero.talent.power_within.meta_desc=_- If this talent is gained by a hero without a staff_ it will increase the amount of arcane resin gained when putting a wand into an alchemy pot by 1/2 at +1/+2.\n\n_- If this talent is gained by a hero without a seal_ it will increase the level that armor glyphs are guaranteed to be preserved at when upgrading armor up to level 6 from 4 at +1, or level 7 from 4 at +2. The level where glyphs are guaranteed to be lost is unchanged at +8.
actors.hero.talent.pursuit.title=pursuit
actors.hero.talent.pursuit.desc=Enemies? More like "Prey!"\
  \n\n_+1:_ I will not wake sleeping enemies while _3 or more tiles away from them_. In addition, my thrown weapons have _+50% durability_, and my killing blows with physical attacks have a _67% chance_ to be instantaneous.\
  \n\n_+2:_ I will not wake sleeping enemies while _not adjacent to them_. In addition, my thrown weapons have _+75% durability_, and and my killing blows with physical attacks have a _100% chance_ to be instantaneous.
actors.hero.talent.pursuit.comment_rogue="Silent Steps 2.0, with Lethal Momentum as a bonus!"
actors.hero.talent.pursuit.comment_huntress="Just good stuff here..."

actors.hero.talent.rk_berserker.title=inevitability
actors.hero.talent.rk_berserker.desc=Resistance is futile in the face of THE KING! Even attacking me makes me stronger!\n\n\
  _+1_: I can reach a maximum of _116% rage_, and enchantments/curses trigger more often the more rage I have, _up to 15% more often_ at 100% rage. My strength is _increased by 8%_ (rounded down), and waiting causes me to to gain _+2 armor_ until I move. In fact, not even death is insurmountable: _at full rage, I will berserk instead of dying_ (4 hero level cooldown)!\n\n\
  _+2_: I can reach a maximum of _133% rage_, and enchantments/curses trigger more often the more rage I have, _up to 30% more often_ at 100% rage. My strength is _increased by 12%_ (rounded down), and waiting causes me to to gain _+4 armor_ until I move. In fact, not even death is insurmountable: at full rage, I will berserk instead of dying (_3_ hero level cooldown)!\n\n\
  _+3_: I can reach a maximum of _150% rage_, and enchantments/curses trigger more often the more rage I have, _up to 45% more often_ at 100% rage. My strength is _increased by 18%_ (rounded down), and waiting causes me to to gain _+6 armor_ until I move. In fact, not even death is insurmountable: at full rage, I will berserk instead of dying (_2_ hero level cooldown)!\n\n\
  Each point of rage above 100% increases berserk shielding by 1% and reduces cooldown by 1%, but does not increase the damage bonus beyond +50%.
actors.hero.talent.rk_gladiator.title=tactics
actors.hero.talent.rk_gladiator.desc=True strength comes from knowing one's weaknesses!\nThis talent allows me to stack _combo_ with melee and throwing attacks. When I have enough combo, I can use the powerful _finishers_!\n\n \
  _+1_: When I kill an enemy, my combo cooldown is _increased to 15 turns_. If I kill them with a combo move, however, I will instead _regain 33%_ of my seal's shielding! Not only that, but when my combo is 7 or higher, _Clobber has a knockback range of 3, can knock enemies into pits, and even inflicts vertigo!_\n\n\
  _+2_: When I kill an enemy, my combo cooldown is _increased to 30 turns_. If I kill them with a combo move, however, I will instead _regain 67%_ of my seal's shielding! Not only that, but if my combo is 9 or higher, _my Parry works on multiple attacks!_\n\n\
  _+3_: When I kill an enemy, my combo cooldown is _increased to 45 turns._ If I kill them with a combo move, however, I will instead _regain all_ of my seal's shielding! Not only that, but I can _leap combo/3 tiles when using Slam, Crush, or Fury!_
actors.hero.talent.rk_battlemage.title=Rat Magic
actors.hero.talent.rk_battlemage.desc=This talent imbues my staff with ability to _recharge_ all my wands on melee hits. Not only that, but I also get _unique on-hit effects_ depending on imbued wand!\n\n\
  _+1_: My wands gain _+1 level_ when they are on their last charge. Additionally, after zapping a wand, my next melee strike with my staff deals _+16% damage_ and its bonus effect gets _+50%_ power. Striking with my staff grants me _0.5 turns_ of artifact recharging, and if that wasn't enough, zapping my staff when it is fully charged grants _0.67 shielding_ per level of the staff!\n\n\
  _+2_: My wands gain _+2 levels_ when they are on their last charge. Additionally, after zapping a wand, my next melee strike with my staff deals _+33% damage_ and its bonus effect gets _+100%_ power. Striking with my staff grants me _1 turn_ of artifact recharging, and if that wasn't enough, zapping my staff when it is fully charged grants _1.33 shielding_ per level of the staff!\n\n\
  _+3_: My wands gain _+3 levels_ when they are on their last charge. Additionally, after zapping a wand, my next melee strike with my staff deals _+50% damage_ and its bonus effect gets _+150%_ power. Striking with my staff grants me _1.5 turn_ of artifact recharging, and if that wasn't enough, zapping my staff when it is fully charged grants _2 shielding_ per level of the staff!
actors.hero.talent.rk_warlock.title=royal presence
actors.hero.talent.rk_warlock.desc=Dwarf King isn't the only one who can manage his subjects!\nThis talent makes my magic _mark_ my enemies with dark hex, allowing me to _steal life_ from them!\n\n\
  _+1_: I can tap an ally to instantly swap places with them, with a _2 tile range_. Melee damage dealt by other characters triggers soul mark at _13% effectiveness_. Soul mark grants _0.33 turns_ of satiety for each damage dealt. Also, when a soul marked enemy dies, I have a _10% chance_ to trigger my on-eat effects and a _13% chance_ to raise them as a corrupted wraith.\n\n\
  _+2_: I can tap an ally to instantly swap places with them, with a _4 tile range_. Melee damage dealt by other characters triggers soul mark at _27% effectiveness_. Soul mark grants _0.67 turns_ of satiety for each damage dealt. Also, when a soul marked enemy dies, I have a _20% chance_ to trigger my on-eat effects and a _27% chance_ to raise them as a corrupted wraith.\n\n\
  _+3_: I can tap an ally to instantly swap places with them, with a _6 tile range_. Melee damage dealt by other characters triggers soul mark at _40% effectiveness_. Soul mark grants _1 turn_ of satiety for each damage dealt. Also, when a soul marked enemy dies, I have a _30% chance_ to trigger my on-eat effects and a _40% chance_ to raise them as a corrupted wraith.
actors.hero.talent.rk_assassin.title=flash
actors.hero.talent.rk_assassin.desc=They won't even see me coming!\nThis talent makes me gain _preparation_ when I am invisible. This ability allows me to _insta-kill_ my foes with enough effort!\n\n\
  _+1_: I can assassinate enemies below _4/13/27/67% health_ per level of preparation, up from 3/10/20/40%, and my blink range per level of preparation is increased to _1/3/4/6 tiles_, from 1/2/3/4. When I kill an enemy with a prepared strike their item drop chance is increased by _2/4/8/16%_, per level of preparation. When I use an artifact, my rings gain +1 upgrade for _3 turns_.\n\n\
  _+2_: I can assassinate enemies below _5/17/30/83% health_ per level of preparation, and my blink range per level of preparation is increased to _2/4/6/8 tiles_. When I kill an enemy with a prepared strike their item drop chance is increased by _4/8/16/32%_ per level of preparation, and when I use an artifact, my rings gain +1 upgrade for _6 turns_.\n\n\
  _+3_: I can assassinate enemies below _6/20/40/100% health_ per level of preparation, and my blink range per level of preparation is increased to _2/5/7/10 tiles_. When I kill an enemy with a prepared strike their item drop chance is increased by _6/12/24/48%_ per level of preparation, and when I use an artifact, my rings gain +1 upgrade for _9 turns_.
actors.hero.talent.rk_freerunner.title=timeless running
actors.hero.talent.rk_freerunner.desc=This talent allows me to gain _momentum_ with running. With press of a button, I can go into _freerunning_ state, significantly increasing my speed! This ability requires some recovery after using, unfortunately.\n\n\
  _+1_: While freerunning, I gain an additional _+1 evasion_ per point of excess strength on my armor as well as _+20% accuracy and +15% damage_ with thrown weapons and my bow. Not only that, I _gain 2 stacks of momentum per turn while invisible_! To top things off, I can use the cloak of shadows even while it is unequipped, though it _recharges at 25% speed_.\n\n\
  _+2_: While freerunning, I instead gain _+2 evasion_ per point of excess strength as well as _+40% accuracy and +30% damage_ with thrown weapons and my bow. My cloak now _recharges at 50% speed_ when unequipped, and _freerunning no longer counts down while I am invisible_!\n\n\
  _+3_: While freerunning, I instead gain _+3 evasion_ per point of excess strength as well as _+60% accuracy and +45% damage_ with thrown weapons and my bow. My cloak now _recharges at 75% speed_ when unequipped, and _I move at 2x speed while invisible_ regardless of whether or not I'm freerunning!
actors.hero.talent.rk_sniper.title=ranged terror
actors.hero.talent.rk_sniper.desc=This talent makes my bow ignore armor and assist throwing attacks with certain _special attacks!_\n\n\
  _+1_: My vision range is increased by _25%_, and my thrown weapons have a _33% chance_ to use the enchantment on my bow (unless they are darts fired from an enchanted crossbow). When I attack with an upgraded thrown weapon, each level increases the duration of sniper's mark by 1 turn and the damage of my special attack by _2.5%_ per tier of the thrown weapon. To top things off, thrown weapons used at melee range have _-30% accuracy_ (instead of -50%).\n\n\
  _+2_: My vision range is increased by _50%_, and my thrown weapons have a _67% chance_ to use the enchantment on my bow. When I attack with an upgraded thrown weapon, each level now increases the damage of my special attack by _5%_ per tier of the thrown weapon. To top things off, thrown weapons used at melee range have _-10% accuracy_.\n\n\
  _+3_: My vision range is increased by _75%_, and my thrown weapons have a _100% chance_ to use the enchantment on my bow. When I attack with an upgraded thrown weapon, each level now increases the damage of my special attack by _7.5%_ per tier of the thrown weapon. To top things off, thrown weapons used at melee range have _+10% accuracy._
actors.hero.talent.rk_warden.title=natural dominance
actors.hero.talent.rk_warden.desc=This talent allows me to _see through grass_ and gives _special effects_ to every flower planted by me!\n\n\
  _+1_: When stepping in grass, I gain barkskin equivalent to my _50%_ of my level that fades every turn. Also, when my health is full, dewdrops can shield me for up to _20%_ of my max HP. Not only that, but when I fire an arrow at at the ground, it grants vision in a 3x3 area around it for _5 turns_ with a 20 turn cooldown. To top things off, my tipped darts have _2x durability_!\n\n\
  _+2_: I now gain barkskin equal to _100%_ of my level, and dewdrops can now shield me for up to _40%_ of my max HP. Not only that, but when I fire an arrow at at the ground, it grants vision in a 3x3 area around it for _10 turns_. To top things off, my tipped darts have _3x durability_!\n\n\
  _+3_: I now gain barkskin equal to _150%_ of my level, and dewdrops can shield me for up to _60%_ of my max HP. Not only that, but when I fire an arrow at at the ground it grants vision in a 3x3 area around it for _15 turns_. To top things off, my tipped darts have _4x durability_!

actors.hero.talent.rk_fire.title=darkest ashes
actors.hero.talent.rk_fire.desc=_+1:_ The damage from my fire attacks is increased by _13%_ (wand of firebolt's damage is increased by _9%_).\n\n_+2:_ The damage from my fire attacks is increased by _25%_ (wand of firebolt's damage is increased by _17%_).\n\n_+3:_ The damage from my fire attacks is increased by _38%_ (wand of firebolt's damage is increased by _27%_).\n\n_When I am Burning champion:_\n\n_+1:_ I have _17% chance_ to inflict Red Burning instead of Burning and _25% chance_ to light my surroundings on fire while taking damage.\n\n_+2:_ I have _33% chance_ to inflict Red Burning instead of Burning and _50% chance_ to light my surroundings on fire while taking damage.\n\n_+3:_ I have _50% chance_ to inflict Red Burning instead of Burning and _75% chance_ to light my surroundings on fire while taking damage. My burning attacks also last 1.5x longer!\n\n"Once you learn what is light for you, it might be too late before you realize the damage from your afterburner."
actors.hero.talent.rk_project.title=spectre reach
actors.hero.talent.rk_project.desc=_+1:_ My ranged weapons deal _4%_ more damage per one tile of distance, with up to _25%_ boost.\n\n_+2:_ My ranged weapons deal _6%_ more damage per one tile of distance, with up to _50%_ boost.\n\n_+3:_ My ranged weapons deal _8%_ more damage per one tile of distance, with up to _75%_ boost.\n\n_When I am Projecting champion:_\n\n_+1:_ My melee attacks deal _11% more damage_ and my ranged weapons can strike _25% further_ without colliding walls.\n\n_+2:_ My melee attacks deal _22% more damage_ and my ranged weapons can strike _50% further_ without colliding walls.\n\n_+3:_ My melee attacks deal _33% more damage_ and my ranged weapons can strike _75% further_ without colliding walls. My wands also can trickshot much more easily!\n\n"Obstacle is just suggestion for me, not a problem."
actors.hero.talent.rk_antimagic.title=thaumic forcefield
actors.hero.talent.rk_antimagic.desc=_+1:_ I gain _1 shielding_ every turn, _to a max of 8_ when under the effect of wand or artifact recharging buffs.\n\n_+2:_ I gain _1.5 shielding_ every turn, _to a max of 16_ and _1 HP_ every turn when under the effect of wand or artifact recharging buffs.\n\n_+3:_ I gain _1.5 shielding_ every turn, _to a max of 16_ and _1 HP_ every turn when under the effect of wand or artifact recharging buffs; the effect is doubled _when I have both kinds of recharging_!\n\n_When I am Antimagic champion:_\n\n_+1:_ Mages take _4 damage_ while attacking me, and I also heal for _2 HP_.\n\n_+2:_ Mages take _8 damage_ while attacking me, and I also heal for _4 HP_.\n\n_+3:_ Mages take _12 damage_ while attacking me, and I also heal for _6 HP_. My wands also get a third of a charge when I am being attacked by magic!\n\n"Most dangerous damage in the game? Don't make me laugh, non-rodent."
actors.hero.talent.rk_giant.title=big time
actors.hero.talent.rk_giant.desc=_+1:_ My armor value grows in effectiveness with lower HP, with up to _+33% boost_ on 0% HP.\n\n_+2:_ My armor value grows in effectiveness with lower HP, with up to _+67% boost_ on 0% HP.\n\n_+3:_ My armor value grows in effectiveness with lower HP, with up to _+100% boost_ on 0% HP.\n\n_When I am Giant champion:_\n\n_+1:_ _25% of damage_ taken before damage reduction is turned into conserved damage. I also have _8% chance_ to stun enemies I am attacking!\n\n_+2:_ _50% of damage_ taken before damage reduction is turned into conserved damage. I also have _15% chance_ to stun enemies I am attacking!\n\n_+3:_ _75% of damage_ taken before damage reduction is turned into conserved damage. I also have _23% chance_ to stun enemies I am attacking, and my armor glyphs are twice as powerful!\n\n"This is the perfect opportunity to strangle this robot to wall and tear him apart!"
actors.hero.talent.rk_blessed.title=hand of the god
actors.hero.talent.rk_blessed.desc=_+1:_ Each point of shielding increases my accuracy by _0.75%_ and evasion by _0.5%_.\n\n_+2:_ Each point of shielding increases my accuracy by _1.5%_ and evasion by _1%_.\n\n_+3:_ Each point of shielding increases my accuracy by _2.25%_ and evasion by _1.5%_.\n\n_When I am Blessed champion:_\n\n_+1:_ My melee attacks damage enemies in 3x3 AoE for _25% of initial damage._\n\n_+2:_ My melee attacks damage enemies in 5x5 AoE for _30% of initial damage._\n\n_+3:_ My melee attacks damage enemies in 7x7 AoE for _35% of initial damage._\n\n"I cannot shoot lightning bolts, but this does its job too."
actors.hero.talent.rk_cursed.title=controlled madness
actors.hero.talent.rk_cursed.desc=_+1:_ My maximum warp is increased by _15 points_ and my wands get _+1 per each 30 points of warp_ I currently have.\n\n_+2:_ My maximum warp is increased by _30 points_ and my wands get _+1 per each 25 points of warp_ I currently have.\n\n_+3:_ My maximum warp is increased by _45 points_ and my wands get _+1 per each 20 points of warp_ I currently have.\n\n_When I am Cursed champion:_\n\n_+1:_ Cursed effects from my attacks are less harmful to me!\n\n_+2:_ Cursed effects from my attacks are less harmful to me! Non-common effects are _10%_ more frequent!\n\n_+3:_ Cursed effects from my attacks are stronger and are either neutral or positive for me! Non-common effects are _10%_ more frequent.\n\n"Control the curse. Control the darkness. Control the primal chaos in your mind."
actors.hero.talent.rk_splint.title=mirror wars
actors.hero.talent.rk_splint.desc=_+1:_ My allies get armor boost equal to _33% of my armor roll_.\n\n_+2:_ My allies get armor boost equal to _67% of my armor roll_.\n\n_+3:_ My allies get armor boost equal to _100% of my armor roll_.\n\n_When I am Splintering champion:_\n\n_+1:_ Mirror images summoned by my splintering will react immediately after spawning.\n\n_+2:_ Mirror images summoned by my splintering will react immediately after spawning and get Fury buff at 50% HP that will boost their power by 75%.\n\n_+3:_ Mirror images summoned by my splintering will react immediately after spawning and get Fury buff at 50% HP that will boost their power by 75%. They also have 25% more HP.\n\n"We had animal wars, clone wars, civil wars... It's not too late to organize another one, my dear Prat?"
actors.hero.talent.rk_paladin.title=shielding behind the army
actors.hero.talent.rk_paladin.desc=_+1:_ For each visible type of ally, I gain _2 extra HP_ and _+7.5%_ health regeneration speed.\n\n_+2:_ For each visible type of ally, I gain _5 extra HP_ and _+15%_ health regeneration speed.\n\n_+3:_ For each visible type of ally, I gain _8 extra HP_ and _+22.5%_ health regeneration speed.\n\nAlly types include bees, summoned elementals, summons from talents, my loyal rats, sheep, golden lotuses, mirror images, corrupted and enthralled enemies, all that stuff...\n\n_When I am Paladin champion:_\n\n_+1:_ I have _5% chance_ to get on-eat effects when my allies get attacked.\n\n_+2:_ I have _10% chance_ to get on-eat effects when my allies get attacked.\n\n_+1:_ I have _15% chance_ to get on-eat effects when my allies get attacked. I also can switch places with my warriors within _3 tiles_ range.\n\n"Got cornered? Just shield yourself with funny rats and watch massacre."

# wrath
actors.hero.talent.aftershock.title=aftershock
# note that shockwave's talent effects are toned down to compensate for the range 'boost'. Shock force damage boost is down slightly, stun chance is down 20%, expanding is roughly 2x as effective, striking is down roughly 33%.
actors.hero.talent.aftershock.desc=_+1:_ The shockwave caused by my impact affects everyone within _1-2 tiles_ and has a _20% chance_ to proc on-hit effects like enchantments and combo. In addition, it deals _15% more damage_ and has a _20% chance to stun_ instead of cripple.\n\n_+2:_ The shockwave caused by my impact affects everyone within _2 tiles_ and has a _40% chance_ to proc on-hit effects like enchantments and combo. In addition, it deals _30% more damage_ and has a _40% chance_ to stun instead of cripple.\n\n_+3:_ The shockwave caused by my impact affects everyone within _2-3 tiles_ and has a _60% chance_ to proc on-hit effects like enchantments and combo. In addition, it deals _45% more damage_ and has a _60% chance_ to stun instead of cripple.\n\n_+4:_ The shockwave caused by my impact affects everyone within _3 tiles_ and has an _80% chance_ to proc on-hit effects like enchantments and combo. In addition, it deals _60% more damage_ and has a _80% chance_ to stun instead of cripple.

actors.hero.talent.rat_blast.title=rat blast
actors.hero.talent.rat_blast.desc=_+1:_ The radius of my elemental blast is _increased to 5 tiles_. It also has _25% more power_ and gives me _2.5 shielding_ for every character affected by the blast, up to a max of 5 characters.\n\n_+2:_ The radius of my elemental blast is _increased to 6 tiles_. It also has _50% more power_ and gives me _5 shielding_ for every character affected by the blast, up to a max of 6 characters.\n\n_+3:_ The radius of my elemental blast is _increased to 7 tiles._ It also has _75% more power_ and gives me _8 shielding_ for every character affected by the blast, up to a max of 7 characters.\n\n_+4:_ The radius of my elemental blast is _increased to 8 tiles_. It also has _100% more power_ and gives me _10 shielding_ for every character affected by the blast, to a max of 8 characters.

actors.hero.talent.smoke_and_mirrors.title=smoke and mirrors
actors.hero.talent.smoke_and_mirrors.desc=_+1:_ After blinking, I leave a statue of myself that has _20 health and 1-3 armor._ Additionally, after finishing my Wrath, I gain _1 turn_ of haste and invisibility. Alternatively, if I use Wrath while invisible, I will instantly blink to a new valid location instead of using Wrath, with _20% reduced_ charge cost.\n\n_+2:_ After blinking, I leave a statue of myself that has _40 health and 2-6 armor._ Additionally, after finishing my Wrath, I gain _2 turns_ of haste and invisibility. Alternatively, if I use Wrath while invisible, I will instantly blink to a new valid location instead of using Wrath, with _36% reduced_ charge cost.\n\n_+3:_ After blinking, I leave a statue of myself that has _60 health and 3-9 armor._ Additionally, after finishing my Wrath, I gain _3 turns_ of haste and invisibility. Alternatively, if I use Wrath while invisible, I will instantly blink to a new valid location instead of using Wrath with _50% reduced_ charge cost.\n\n_+4:_ After blinking, I leave a statue of myself that has _80 health and 4-12 armor._ Additionally, after finishing my Wrath, I gain _4 turns_ of haste and invisibility. Alternatively, if I use Wrath while invisible, I will instantly blink to a new valid location instead of using Wrath with _60% reduced_ charge cost.

actors.hero.talent.sea_of_blades.title=sea of blades
actors.hero.talent.sea_of_blades.desc=_+0:_ The total effectiveness of spectral blades' damage and on-hit effects is _100%,_ divided equally between all targets.\n\n_+1:_ The total effectiveness of spectral blades is increased to _150%,_ and they have a _30% chance_ to also use the enchantment on the spirit bow. Spectral blades also have _+25% accuracy_ and can penetrate up to _2 solid tiles._\n\n_+2:_ The total effectiveness of spectral blades is increased to _200%,_ and they have a _60% chance_ to also use the enchantment on the spirit bow. Spectral blades also have _+50% accuracy_ and can penetrate up to _4 solid tiles._\n\n_+3:_ The total effectiveness of spectral blades is increased to _250%,_ and they have a _90% chance_ to also use the enchantment on the spirit bow. Spectral blades also have _+75% accuracy_ and can penetrate up to _6 solid tiles._\n\n_+4:_ The total effectiveness of spectral blades is increased to _300%,_ and they have a _100% chance_ to also use the enchantment on the spirit bow in addition to a _+10% proc chance_ for all proccable effects after effectiveness is applied. Spectral blades also have _+100% accuracy_ and can penetrate up to _8 solid tiles._\n\nSpirit Bow proccing is subject to the total effectiveness modifier.\n\nNo target can get more than 100% of spectral blades' effectiveness.

actors.hero.talent.fun.title=The Greatest Fun
actors.hero.talent.fun.desc= \
  _+1:_ My blades are turned into _birds_ that inflict Vulnerable for _3 turns_! I also use them two times!\n\n\
  _+2:_ My blades are used 2 times and are turned into _birds_ that inflict Vulnerable for _6 turns_! I also use random wand zaps on enemies caught in elemental blast!\n\n\
  _+3:_ My blades are used 2 times and are turned into _birds_ that inflict Vulnerable for _9 turns_ and my elemental blast unleashes random wand zaps on enemies! Additionally, my body replacement gains 4 shadow immobile bodyguards, and my smoke bomb makes me hide in cloud of smoke screen and gain magical sight for 3 _turns_!\n\n\
  _+4:_ My blades are used 2 times and are turned into _birds_ that inflict Vulnerable for _12 turns_, elemental blast unleashes random wand zaps on enemies, body replacement gains 4 shadow immobile bodyguards and smoke bomb makes me hide in cloud of smoke screen and gain magical sight for 6 _turns_! I also use 25% less HP for overcharge!\n\n\
  Each point into this talent increases charge cost by 6 points.

#universal
actors.hero.talent.heroic_energy.title=heroic energy
actors.hero.talent.heroic_energy.rat_title=ratroic energy
actors.hero.talent.heroic_energy.desc=_+0:_ The hero's armor ability has a _20% reduced_ charge cost.\n\n_+1:_ The hero's armor ability has a _35% reduced_ charge cost.\n\n_+2:_ The hero's armor ability has a _48% reduced_ charge cost\n\n_+3:_ The hero's armor ability has a _58% reduced_ charge cost.\n\n_+4_: The hero's armor ability has a _66% reduced_ charge cost.
actors.hero.talent.heroic_energy.comment="Sure you could just supercharge it, but why, when you can make it dirt cheap?"
actors.hero.talent.heroic_endurance.title=heroic enchanting
actors.hero.talent.heroic_endurance.desc=_+1:_ The Warrior uses his weapon's enchantment as extra glyph for his armor, when attacked, with enchantment getting _15% extra power_.\n\n_+2:_ The Warrior uses his weapon's enchantment as extra glyph for his armor, when attacked, with enchantment getting _30% extra power_.\n\n_+3:_ The Warrior uses his weapon's enchantment as extra glyph for his armor, when attacked, with enchantment getting _45% extra power_.\n\n_+4:_ The Warrior uses his weapon's enchantment as extra glyph for his armor, when attacked, with enchantment getting _60% extra power_.\n\nNot all enchantments will work.\nThis talent's enchantment power boost stacks above all other enchantment boosts.
actors.hero.talent.heroic_endurance.comment="The true parry mastery is finally here!"
actors.hero.talent.heroic_wizardry.title=heroic wizardry
actors.hero.talent.heroic_wizardry.desc=_+1:_ The Mage can use wands up to _-1 charge_.\n\n_+2:_ The Mage can use wands up to _-2 charges_.\n\n_+3:_ The Mage can use wands up to _-3 charges_.\n\n_+4:_ The Mage can use wands up to _-4 charges_.
actors.hero.talent.heroic_wizardry.comment="Unleash the power of 1.5x more charges!"
actors.hero.talent.heroic_wizardry.comment_rogue="I thought than lightning was as spammable as it gets!"
actors.hero.talent.heroic_stamina.title=heroic stamina
actors.hero.talent.heroic_stamina.desc=_+1:_ When the Rogue uses an artifact, he gains Stamina for _1.25 turns_.\n\n_+2:_ When the Rogue uses an artifact, he gains Stamina for _2.5 turns_.\n\n_+3:_ When the Rogue uses an artifact, he gains Stamina for _4.75 turns_.\n\n_+4:_ When the Rogue uses an artifact, he gains Stamina for _6 turns_.\n\nThis buff stacks upon itself.
actors.hero.talent.heroic_stamina.comment="What is a normal walking speed?"
actors.hero.talent.heroic_archery.title=heroic archery
actors.hero.talent.heroic_archery.desc=_+1:_ The Huntress has _14% chance_ to not use durability of a thrown weapon.\nIncreases the max damage of super-shot to _375%_, from 350%.\n\n_+2:_ The Huntress has _29% chance_ to not use durability of a thrown weapon.\nIncreases the max damage of super-shot to _400%_, from 350%.\n\n_+3:_ The Huntress has _43% chance_ to not use durability of a thrown weapon.\nIncreases the max damage of super-shot to _425%_, from 350%.\n\n_+4:_ The Huntress has _57% chance_ to not use durability of a thrown weapon.\nIncreases the max damage of super-shot to _450%_, from 350%.
actors.hero.talent.heroic_archery.comment="Launch the TOMAHAWKS!"
actors.hero.talent.heroic_ratiness.title=advanced education
actors.hero.talent.heroic_ratiness.desc=_+1:_ I can invest one more point into tier 1 talent!\n\n _+2:_ Not only tier 1, I also can learn additional tier 2 talent!\n\n_+3:_ In addition to tier 1 and tier 2, I can put an auxilary point into tier 3 talent! (but I need to be level 25 to use that point, though)
actors.hero.talent.heroic_adaptability.title=heroic adaptability
actors.hero.talent.heroic_adaptability.desc=_+1:_ The Duelist's evasion is increased by _5%_ per each unoccupied and passable cell around her. The Duelist's accuracy is increased by _6.5%_ per each occupied or unpassable cell around her target.\n\n_+2:_ The Duelist's evasion is increased by _8%_ per each unoccupied and passable cell around her. The Duelist's accuracy is increased by _10%_ per each occupied or unpassable cell around her target.\n\n_+3:_ The Duelist's evasion is increased by _11%_ per each unoccupied and passable cell around her. The Duelist's accuracy is increased by _13.5%_ per each occupied or unpassable cell around her target.\n\n_+4:_ The Duelist's evasion is increased by _14%_ per each unoccupied and passable cell around her. The Duelist's accuracy is increased by _17%_ per each occupied or unpassable cell around her target.
actors.hero.talent.heroic_adaptability.comment="Just like that yet another hide-and-seek game I played with my friends a long time ago."

actors.hero.talent.drratedon.title=drratedon
actors.hero.talent.drratedon.desc=_+1:_ Allied rats ignore armor of their enemies and benefit from Sniper talents.\n\n_+2:_ Allied rats ignore armor of their enemies, their movement and attack speed is increased by 33% and they benefit from talents of Sniper and Freerunner.\n\n_+3:_ Allied rats ignore armor of their enemies, their movement and attack speed is increased by 33%, they are able to get rage and benefit from talents of Sniper, Berserker and Freerunner.\n\n_+4:_ Allied rats ignore armor of their enemies, their movement and attack speed is increased by 33%, they are able to get rage, inflict soul mark with 22.5% chance and benefit from talents of Sniper, Berserker, Freerunner and Warlock.
actors.hero.talent.drratedon.comment="Nobody asked, but there it is, rat classes."
actors.hero.talent.drratedon.desc_rat_king=_+0:_ Allied rats ignore armor of their enemies and benefit from Sniper talents.\n\n_+1:_ Allied rats ignore armor of their enemies, their movement and attack speed is increased by 33% and they benefit from talents of Sniper and Freerunner.\n\n_+2:_ Allied rats ignore armor of their enemies, their movement and attack speed is increased by 33%, they are able to get rage and benefit from talents of Sniper, Berserker and Freerunner.\n\n_+3:_ Allied rats ignore armor of their enemies, their movement and attack speed is increased by 33%, they are able to get rage, inflict soul mark with 22.5% chance and benefit from talents of Sniper, Berserker, Freerunner and Warlock.\n\n_+4:_ Allied rats spawn with champion title, ignore armor of their enemies, their movement and attack speed is increased by 33%, they are able to get rage, inflict soul mark with 22.5% chance and benefit from talents of Sniper, Berserker, Freerunner and Warlock.
actors.hero.talent.drratedon.comment_rat_king="Only my strongest rats deserve the Draedon technologies!"
actors.hero.talent.ratsistance.title=ratsistance
# fixme this is a custom compromise.
actors.hero.talent.ratsistance.desc=_+1:_ Hostile ratmogrified enemies deal _-13% damage_.\n\n_+2:_ Hostile ratmogrified enemies deal _-25% damage_.\n\n_+3:_ Hostile ratmogrified enemies deal _-38% damage_.\n\n_+4:_ Hostile ratmogrified enemies deal _-50% damage_.\n\n"If you are going to strip away enemy's abilities, why not also humiliate it?"
actors.hero.talent.ratsistance.desc_rat_king=_+0:_ Hostile ratmogrified enemies deal _-15% damage_.\n\n_+1:_ Hostile ratmogrified enemies deal _-30% damage_.\n\n_+2:_ Hostile ratmogrified enemies deal _-45% damage_.\n\n_+3:_ Hostile ratmogrified enemies deal _-60% damage_.\n\n_+4:_ Hostile ratmogrified enemies deal _-75% damage_.\n\n"How dare you attack your better???"
actors.hero.talent.ratlomacy.title=ratlomacy
actors.hero.talent.ratlomacy.desc=_+1:_ Using ratmogrify on a ratmogrified enemy makes them friendly and makes the transformation permanent.\n\n_+2:_ Using ratmogrify on a ratmogrified enemy makes them friendly, makes the transformation permanent, and gives them _4 turns_ of adrenaline.\n\n_+3:_ Using ratmogrify on a ratmogrified enemy makes them friendly, makes the transformation permanent, and gives them _8 turns_ of adrenaline.\n\n_+4:_ Using ratmogrify on a ratmogrified enemy makes them friendly, makes the transformation permanent, and gives them _12 turns_ of adrenaline.\n\n"Make this scorpio an your ally!"
actors.hero.talent.ratlomacy.desc_rat_king=_+0:_ Using ratmogrify on a ratmogrified enemy makes them permanently friendly.\n\n_+1:_ Using ratmogrify on a ratmogrified enemy makes them permanently friendly and gives them _4 turns_ of adrenaline.\n\n_+2:_ Using ratmogrify on a ratmogrified enemy makes them permanently friendly and gives them _8 turns_ of adrenaline.\n\n_+3:_ Using ratmogrify on a ratmogrified enemy makes them permanently friendly and gives them _12 turns_ of adrenaline.\n\n_+4:_ Using ratmogrify on a ratmogrified enemy makes them permanently friendly and gives them _16 turns_ of adrenaline.\n\n"None can resist my call to arms!"
actors.hero.talent.ratforcements.title=ratforcements
actors.hero.talent.ratforcements.desc=_+1:_ Using ratmogrify on yourself _spawns 1_ ally marsupial rat next to you.\n\n_+2:_ Using ratmogrify on yourself _spawns 2_ loyal rats next to you.\n\n_+3:_ Using ratmogrify on yourself _spawns 3_ loyal rats next to you.\n\n_+4:_ Using ratmogrify on yourself _spawns 4_ loyal rats next to you.\n\nThese loyal rats have stats scaled to the current depth, making them much stronger than sewer rats, and there is a small chance that a given summon will be a loyal albino.\n\n"Everybody likes having cute rats around."
actors.hero.talent.ratforcements.desc_rat_king=_+0:_ Using ratmogrify on yourself _spawns 1_ ally marsupial rat next to you.\n\n_+1:_ Using ratmogrify on yourself _spawns 2_ loyal rats next to you.\n\n_+2:_ Using ratmogrify on yourself _spawns 3_ loyal rats next to you.\n\n_+3:_ Using ratmogrify on yourself _spawns 4_ loyal rats next to you.\n\n_+4:_ Using ratmogrify on yourself _spawns 5_ loyal rats next to you.\n\nThese loyal rats have stats scaled to the current depth, making them much stronger than sewer rats, and there is a small chance that a given summon will be a loyal albino.\n\n"The full weight of the Rat Kingdom is behind me!"

#lost talents:tm:
actors.hero.talent.willpower_of_injured.title=willpower of injured
actors.hero.talent.willpower_of_injured.desc=_+1:_ The Warrior's broken seal recharges its shielding faster with loss of HP, maxing out at _+50% boost_ at 10% max HP.\n\n_+2:_ The Warrior's broken seal recharges its shielding faster with loss of HP, maxing out at _+100% boost_ at 10% max HP.\n\nThis stacks with Iron Will.
actors.hero.talent.willpower_of_injured.comment="The only thing missing is determination. Wait-"
actors.hero.talent.willpower_of_injured.meta_desc=_If this talent is gained by a different hero_, it will boost regeneration's speed up to +50%/+100% boost at 10% max HP.

actors.hero.talent.energizing_upgrade.title=energizing upgrade
actors.hero.talent.energizing_upgrade.desc=_+1:_ Exhausting any wand that is not in a staff will recover all its charges in _5 turns_. This has _50 turns_ cooldown.\n\n_+2:_ Exhausting any wand that is not in a staff will recover all its charges in _5 turns_. This has _35 turns_ cooldown.
actors.hero.talent.energizing_upgrade.comment="first clear your mind then visualize mass of white ki in your dan tien visualize it going through your body making glow around you then get your hand shoulder within apart then get it down like your elbowing someone and visualise the ki exploding all around your fucking wands"

actors.hero.talent.dual_wielding.title=dual wielding
actors.hero.talent.dual_wielding.desc=_+1:_ Using missile weapon after using a wand takes 0 turns.\n\n_+1:_ Using missile weapon after using a wand takes 0 turns. Using wand after using a missile weapon also takes 0 turns.\n\nThis cannot be chained.
actors.hero.talent.dual_wielding.comment="They think they can use shuriken then burn enemy away in a blink of time. They don't realize what they are missing for a full puzzle.\n-Dual Wielding Rogues"
actors.hero.talent.dual_wielding.comment_huntress="What about you getting the heck out of my way.\n-Dual Wielding Huntresses

actors.hero.talent.ivylash.title=ivylash
actors.hero.talent.ivylash.desc=_+1:_ Huntress's _Super-Shots_ root targets for _2 turns_.\n\n_+2:_ Huntress's _Super-Shots_ root targets for _3 turns_.
actors.hero.talent.ivylash.meta_desc=_If this talent is gained by a different hero_, the effect will trigger from any thrown weapon, but trigger cooldown with 1.33x of Super-Shot cooldown's duration.
actors.hero.talent.ivylash.comment="Don't even ask me if I am into this kink..."

actors.hero.talent.scouts_barrier.title=scout's barrier
actors.hero.talent.scouts_barrier.desc=_+1:_ After successful Super-Shot, Huntress gains _4 shielding_.\n\n_+2:_ After successful Super-Shot, Huntress gains _6 shielding_.
actors.hero.talent.scouts_barrier.comment="Say SIKE right now, challenged space dragon."
actors.hero.talent.scouts_barrier.meta_desc=_If this talent is gained by a different hero_, the effect will trigger from any thrown weapon, but trigger cooldown with 1.33x of Super-Shot cooldown's duration.

actors.hero.talent.protein_infusion.title=protein infusion
actors.hero.talent.protein_infusion.desc=_+1:_ When the Rogue is not starving, he gets boost to his movespeed and evasion, up to _+25%_ when at full satiety.\n\n_+2:_ When the Rogue is not starving, he gets boost to his movespeed and evasion, up to _+50%_ when at full satiety.
actors.hero.talent.protein_infusion.comment="Maybe that will make you eat your leftover rations."
actors.hero.talent.protein_infusion.comment_huntress="Invigorating Meal but Awesome"
actors.hero.talent.protein_infusion.comment_rk="Maybe freerun wasn't as necessary as I thought initially..."

actors.hero.talent.like_a_bullet.title=like a bullet
actors.hero.talent.like_a_bullet.desc=_+1:_ Increases the starting power of super-shot to _+45%_, from +32% and the distance multiplier to _+18%_, from +13%.\n\n_+2:_ Increases the starting power of super-shot to _+58%_, from +32% and the distance multiplier to _+23%_, from +13%.\n\n_+3:_ Increases the starting power of super-shot to _+71%_, from +32% and the distance multiplier to _+28%_, from +13%.
actors.hero.talent.like_a_bullet.meta_desc=_If this talent is gained by a different hero_, it will make thrown weapons benefit from damage bow sniper special's damage scaling at 100%/150%/200% potency; this effect has cooldown with 1.33x of Super-Shot cooldown's duration.

actors.hero.talent.bloodbath.title=bloodbath
actors.hero.talent.bloodbath.desc=_+1:_ With successful assassination the Assassin will hit _5x5_ area of enemies with blood burst equal to 60% of his damage roll.\n\n_+2:_ With successful assassination the Assassin will hit _7x7_ area of enemies with blood burst equal to 60% of his damage roll.\n\n_+3:_ With successful assassination the Assassin will hit _9x9_ area of enemies with blood burst equal to 60% of his damage roll.\n\nThis talent can also proc with just prepared kills but only with _67%_ chance.\n\n"When splashing blood instead of drinking is not a waste."
actors.hero.talent.thinking_with_portals.title=thinking with portals
actors.hero.talent.thinking_with_portals.desc=_+1:_ The Rogue can use his cloak's charge to insantly teleport to desired location, spending _1.15 charge per tile of distance._\n\n_+2:_ The Rogue can use his cloak's charge to insantly teleport to desired location, spending _1 charge per tile of distance._\n\n_+3:_ The Rogue can use his cloak's charge to insantly teleport to desired location, spending _0.75 charge per tile of distance._\n\nUsing this talent charges up Preparation at _50%_ efficiency.\n\n"Sometimes you just need to return to one point later. This talent is for you."
actors.hero.talent.adapt_and_overcome.title=adapt and overcome
actors.hero.talent.adapt_and_overcome.desc=_+1:_ Prepared strike has extra chance to roll higher damage.\n\n_+2:_ Prepared strike has extra chance to roll higher damage. Damage wands can trigger _assassination_ if enemy is damaged enough.\n\n_+3:_ Prepared strike has extra chance to roll higher damage. Damage wands can trigger _assassination_ if enemy is damaged enough. After doing any action that would dispel invisibility effect, the Assassin has _extra turn of invisibility_ instead.\nThis cannot be chained and if the Assassin had any level of preparation, it will be reduced by _1_.\n\nOnly one enemy at the time can be assassinated with wand.\n\n"If you can't use your weapon skills with real weapons, are you even a killer?"

actors.hero.talent.indiscriminate_rage.title=indiscriminate rage
actors.hero.talent.indiscriminate_rage.desc=_+1:_ Non-physical damage will generate rage at _20%_ efficiency.\n\n_+2:_ Non-physical damage will generate rage at _40%_ efficiency.\n\n_+3:_ Non-physical damage will generate rage at _60%_ efficiency.\n\nNote than you still need magic resistance to reduce damage from enemy spells, and that the rage speed increase stacks additively with that of catalyst and one man army.\n\n"Why being on fire doesn't piss the warrior off? That's just unrealistic."

actors.hero.talent.battle_tendency.title=battle tendency
actors.hero.talent.battle_tendency.desc=_+1:_ If Gladiator fails to hit enemy within 5 turns, his combo will decay at rate of _2 points per turn_ instead of resetting.\n\n_+2:_ If Gladiator fails to hit enemy within 5 turns, his combo will decay at rate of _1 point per turn_ instead of resetting.\n\n_+3:_ If Gladiator fails to hit enemy within 5 turns, his combo will decay at rate of _0.5 points per turn_ instead of resetting.\n\n"Hopefully this is enough time for you to find your next enemy."

actors.hero.talent.pointy_black.title=point blank
actors.hero.talent.pointy_black.desc=_+1:_ When the Huntress uses her bow or a thrown weapon at melee range it has _-30% accuracy,_ instead of -50% and has _13% chance_ to knockback enemy.\n\n_+2:_ When the Huntress uses her bow or a thrown weapon at melee range it has _-10% accuracy,_ instead of -50% and has _25% chance_ to knockback enemy.\n\n_+3:_ When the Huntress uses her bow or a thrown weapon at melee range it has _+10% accuracy,_ instead of -50% and has _38% chance_ to knockback enemy.\n\nNote that thrown weapons or the spirit bow always have +50% accuracy when used at a distance.
actors.hero.talent.pointy_black.comment="It's all nice and good that the bow can be equipped, but this dude in the door is just too cocky to be right next to me."

actors.hero.talent.adventurous_snoozing.title=adventurous snoozing
actors.hero.talent.adventurous_snoozing.desc=_+1:_ While Duelist is sleeping, she recharges 1 weapon charge every _50 turns_.\n\n_+2:_ While Duelist is sleeping, she recharges 1 weapon charge every _33 turns_.\n\nThis effect is not affected by weapon charge modifiers like Champion's innate.
actors.hero.talent.adventurous_snoozing.meta_desc=_If this talent is gained by a different hero_, it will heal 3 HP at +1 and 5 at +2, if hero's sleep was forcefully interrupted.
actors.hero.talent.adventurous_snoozing.comment="Sleeping is important part of every person's life, that allows to regain energy."

actors.hero.talent.spellblade_forgery.title=spellblade forgery
actors.hero.talent.spellblade_forgery.desc=_+1:_ Slashing weapons will _additionally hit enemies_ adjacent to main target for _40% damage_.\n\n_+2:_ Slashing weapons will _additionally hit enemies_ adjacent to main target for _60% damage_.\n\nSlashing weapons can be identified by having well straight blade as the biggest part of a weapon.\nThis effect also triggers for dried rose's ghost and other allies, if they use slashing weapons.
actors.hero.talent.spellblade_forgery.comment="Changing the axis of a swing does wonders to your perception of combat."

actors.hero.talent.grassy_offense.title=grassy offense
actors.hero.talent.grassy_offense.desc=The Duelist is able to imbue her weapons with _up to 15_ grass from her inventory (with each piece giving 3 grass charge), allowing them to do increased damage at cost of grass charge. Weapon abilities will consume some grass charge instead of normal weapon charges.\n\n_+1:_ Grass-imbued weapons deal _17% more damage_. Weapon abilities cost _6 grass charge_.\n\n_+2:_ Grass-imbued weapons deal _25% more damage_. Weapon abilities cost _5 grass charge_.\n\n_+3:_ Grass-imbued weapons deal _50% more damage_. Weapon abilities cost _4 grass charge_. The Duelist will heal _3 HP_ with each hit with grass-imbued weapon.
actors.hero.talent.grassy_offense.comment="You thought than being a lawnmover is a worse Huntress gameplay? Think again."

actors.hero.talent.sixth_sense.title=sixth sense
actors.hero.talent.sixth_sense.desc=_+1:_ When Duelist is choosing a cell, the _cells with unaware enemies_ will be highlighted for a short time, even showing things beyond nearby walls.\n\n_+2:_ When Duelist is choosing a cell, the _cells with unaware enemies_ will be highlighted for a short time, even showing things beyond nearby walls. She is able to _throw or zap anything at highlighted targets, ignoring obstacles_. This ability has 15 turns cooldown.
actors.hero.talent.sixth_sense.comment="I can sniff you even through your cologne!"

actors.hero.talent.helper_to_hero.title=helper to hero
actors.hero.talent.helper_to_hero.desc=_+1:_ Prismatic image _is not hit by player's projectiles and wands_ and benefits from secondary weapon's enchantments and other effects.\n\n_+2:_ Prismatic image _is not hit by player's projectiles and wands_, benefits from second weapon's enchantments and other effects, its damage is increased by _50% of secondary weapon's damage roll_ and its death timer no longer decreases. When inactive, prismatic guard regeneration is affected by hero's regeneration boosts.\n\n_+3:_ Prismatic image _is not hit by player's projectiles and wands_, benefits from second weapon's enchantments and other effects and its damage is increased by _75% of secondary weapon's damage roll_. When inactive, prismatic guard regeneration is 2x faster and is affected by hero's regeneration boosts. When dying, prismatic image will instantly revert into inactive state with 50% HP and enter recovery state for _125 turns_.\nWhen recovering, it will be not able to regenerate and participate in fights.
actors.hero.talent.helper_to_hero.comment="Just give that secondary weapon to your friend, they'll figure out how to use it."

actors.hero.talent.attunexploration.title=attunexploration
actors.hero.talent.attunexploration.desc=_+1:_ Depending on a level's special feeling, the Monk will _gain a passive positive effect_ and one of her abilities _will be buffed or changed_.\n\n_+2:_ Depending on a level's special feeling, the Monk will _gain a passive positive effect_ and one of her abilities _will be buffed or changed_. Increased the chance for special feeling from _50%_ to _100%_.\n\n_+3:_ Depending on a level's special feeling, the Monk will _gain a passive positive effect_ and one of her abilities _will be buffed or changed_. Increased the chance for special feeling from _50%_ to _100%_. On revealing secret door, the Monk will _gain 2.5 energy_; this amount is not affected by Unencumbered Spirit talent.
actors.hero.talent.attunexploration.comment="Feel the live and story of each dungeon's depth in first person!"

actors.hero.talent.grass_munching.title=grass munching
actors.hero.talent.grass_munching.desc=_+1:_ Eating _5 grass_ will make the Monk grassitate for _5 turns_. This clears most negative effects.\n\n_+2:_ Eating _5 grass_ will make the Monk grassitate for _10 turns_. This clears most negative effects and grants her _7 turns of wand and artifact recharging_.\n\n_+3:_ Eating _5 grass_ will make the Monk grassitate for _15 turns_. This clears most negative effects, slowly _heals 20% of missing HP_ and grants her _14 turns of wand and artifact recharging_ and 40% damage resistance.
actors.hero.talent.grass_munching.comment="Don't you know? Weed makes you fully rejuvenated. That's a factual thing."

actors.hero.talent.dungeons_championship.title=dungeon's championship
actors.hero.talent.dungeons_championship.desc=_+1:_ Duelist's target gets _2 champion titles_, but drops _one Ring of Wealth +12_ item, if it is defeated before duel ends.\n\n_+2:_ Duelist's target gets _3 champion titles_, but drops _three Ring of Wealth +12_ items, if it is defeated before duel ends.\n\n_+3:_ Duelist's target gets _4 champion titles_, but drops _five Ring of Wealth +12_ items, if it is defeated before duel ends.\n\n_+4:_ Duelist's target gets _5 champion titles_, but drops _seven Ring of Wealth +12_ items, if it is defeated before duel ends.\n\nThis talent doesn't trigger on boss enemies.
actors.hero.talent.dungeons_championship.comment="Here we are, at the most anticipated death battle in history: most overpowered enemy in existence VS. clever dark skinned girl!"

actors.hero.talent.empowered_swipe.title=empowered swipe
actors.hero.talent.empowered_swipe.desc=_+1:_ The elemental strike effect's power, range and width are increased by _7.5% for Duelist's each primary weapon's charge_, but using elemental strike uses all primary weapon charges.\n\n_+2:_ The elemental strike effect's power, range and width are increased by _10% for Duelist's each primary weapon's charge_, but using elemental strike uses all primary weapon charges.\n\n_+3:_ The elemental strike effect's power, range and width are increased by _12.5% for Duelist's each primary weapon's charge_, but using elemental strike uses all primary weapon charges.\n\n_+4:_ The elemental strike effect's power, range and width are increased by _15% for Duelist's each primary weapon's charge_, but using elemental strike uses all primary weapon charges.
actors.hero.talent.empowered_swipe.comment="McDuely cannon laser ACTIVATE! Hold up- *everything's erased by arcane nuke*"

actors.hero.talent.warped_aggression.title=warped aggression
actors.hero.talent.warped_aggression.desc=_+1:_ The feint effect duration and afterimage duration are extended to _2 turns_, but enemies, that attack afterimage, will be _affected by average warp effects_. The ability's cost is also increased from 50 to _65_.\n\n_+2:_ The feint effect duration and afterimage duration are extended to _3 turns_, but enemies, that attack afterimage, will be _affected by above-average warp effects_. The ability's cost is also increased from 50 to _70_.\n\n_+3:_ The feint effect duration and afterimage duration are extended to _4 turns_, but enemies, that attack afterimage, will be _affected by strong warp effects_. The ability's cost is also increased from 50 to _75_.\n\n_+4:_ The feint effect duration and afterimage duration are extended to _5 turns_, but enemies, that attack afterimage, will be _affected by very strong warp effects_. The ability's cost is also increased from 50 to _80_.
actors.hero.talent.warped_aggression.comment="You know, how being mad from kromers makes you question your life and be hurt? Yeah, lets put your enemies through the same mental misery."

actors.hero.talent.party_feeling.title=party feeling
actors.hero.talent.party_feeling.desc=_+1:_ When the Highness is energized, the visible allies will have _+80% boost to accuracy and evasion_.\n\n_+2:_ When the Highness is energized, the visible allies will have _+80% boost to accuracy and evasion_ and heal at double rate of the Highness.\n\n_+3:_ When the Highness is energized, the visible allies will have _+80% boost to accuracy and evasion_, heal at double rate of the Highness and _their actions take 50% less time_.
actors.hero.talent.party_feeling.comment="Nobody will be left behind on this weed fest!"

actors.hero.talent.slash_runner.title=slash runner
actors.hero.talent.slash_runner.desc=_+1:_ When the Highness is energized, killing enemies grants _0.5 weapon charge_.\n\n_+2:_ When the Highness is energized, killing enemies grants _0.5 weapon charge_ and enchantment power is increased by _100%_.\n\n_+3:_ When the Highness is energized, killing enemies grants _0.5 weapon charge_ and enchantment power is increased by _100%_. Killing enemies with weapon ability, while energized, restores _2 turns of energizing_; this bonus cannot go past max turns from one grass.
actors.hero.talent.slash_runner.comment="Being high into your mind is the opposite of weakness for you!"

actors.hero.talent.prolonged_joy.title=prolonged joy
actors.hero.talent.prolonged_joy.desc=_+1:_ The amount of energizing from each grass is increased to _5 turns_, from 4, but recovery length ramping is increased by _8%_.\n\n_+2:_ The amount of energizing from each grass is increased to _6 turns_, from 4, but recovery length ramping is increased by _17%_.\n\n_+3:_ The amount of energizing from each grass is increased to _7 turns_, from 4, but recovery length ramping is increased by _25%_.\n\nThe ramping also starts from fewer grass consumed.
actors.hero.talent.prolonged_joy.comment="The weeds in dungeon are nice and all, but don't you wish they lasted... longer? With more flair and intensity to it each time? No? Not at all???"

actors.hero.talent.wound_ignorance.title=wound ignorance
actors.hero.talent.wound_ignorance.desc=_+1:_ Transitioning into energized state instantly heals _12.5% of max HP_.\n\n_+2:_ In addition to the benefits of +1, taking damage in energized state gives _12.5% of taken damage_ back as shielding.\n\n_+3:_ In addition to the benefits of +1 and +2, the Highness takes _80% less_ elemental damage, while recovering.
actors.hero.talent.wound_ignorance.comment="Resisting that feel of green dopamine is futile! Being weak to it, however..."

actors.hero.talent.drug_moderation.title=drug moderation
actors.hero.talent.drug_moderation.desc=_+1:_ Overall recovery length is increased by 33%, but using items during energizing reduces recovery length by _2.5 turns_.\n\n_+2:_ Overall recovery length is increased by 33%, but using items during energizing reduces recovery length by _5 turns_.\n\n_+3:_ Overall recovery length is increased by 33%, but using items during energizing reduces recovery length by _7.5 turns_.\n\nThose items include physical weapons, wands, artifacts, bombs, food, potions, scrolls, runestones, plants and everything, that is crafted with them.
actors.hero.talent.drug_moderation.comment="It all seems overwhelming at first, but proper lucidity is achievable with practice."

###npcs
actors.mobs.npcs.blacksmith.name=troll blacksmith
actors.mobs.npcs.blacksmith.intro_quest_rat_king=RAT KING??? Is that you??? I'm your biggest fan!
#actors.mobs.npcs.blacksmith.greeting=Hey human! Wanna be useful, eh? Take dis pickaxe and-\n\nWhat?! You're here on behalf of RAT KING?!\n\nI'm so sorry. I... owe Rat King a favor, so I can do some smithin' for ya. Consider yourself lucky, I'm the only blacksmith around.
actors.mobs.npcs.blacksmith.intro_quest_warrior=Hey Human! You look like a tough one.
actors.mobs.npcs.blacksmith.intro_quest_mage=Hey Human! You look like a smart one.
actors.mobs.npcs.blacksmith.intro_quest_rogue=Hey Human! You look like a sneaky one.
actors.mobs.npcs.blacksmith.intro_quest_huntress=Hey Human! You look like a quick one.
actors.mobs.npcs.blacksmith.intro_quest_duelist=Hey Human! You look like a brave one.
actors.mobs.npcs.blacksmith.intro_quest_cleric=Hey Human! You look like an important one.
# todo adapt, you don't order around rat king lmao
actors.mobs.npcs.blacksmith.intro_quest_start_rat_king=While you're here, if you could do me a little favor it would mean the world to me. I built dis workshop ontop of an old mine, it's just down dat ladder. Take dis pickaxe and mine me some _dark gold ore_. 40---hmm, no---30 pieces should be enough. The rock down der is nice and soft so _you'll be able to mine through the walls with some effort._\n\nWhat-what do you mean, how am I gonna pay? \n\n...\n\nOk, ok, I can do some smithin' for you. Consider yourself lucky, I'm the only blacksmith around.
actors.mobs.npcs.blacksmith.intro_quest_start=Wanna be useful, eh? Yeah I got something you could do. I built dis workshop ontop of an old mine, it's just down dat ladder. Take dis pickaxe and mine me some _dark gold ore_. 40---hmm, no---30 pieces should be enough. The rock down der is nice and soft so _you'll be able to mine through the walls with some effort._\n\nWhat do you mean, how am I gonna pay? You greedy...\n\nOk, ok, I can do some smithin' for you. Consider yourself lucky, I'm the only blacksmith around.
actors.mobs.npcs.blacksmith.bonus_item=Also, here's a couple of stones of clairvoyance for your trouble. Dey tend to be useful for dis sort of thing.
actors.mobs.npcs.blacksmith.intro_quest_common=Careful though, the mine's dangerous for a little human like you.
actors.mobs.npcs.blacksmith.intro_quest_common_rat_king=I don't believe you'll have any trouble with it, but here's what's up.
actors.mobs.npcs.blacksmith.intro_quest_crystal=It's been abandoned for a while, and bunch of crystals have started growing. They're shiny, but too fragile to be worth anythin', and they've got some magic things protecting 'em. They're pretty strong, so _be careful where you mine_ or you'll get their attention.\n\nThere's a _giant crystal_ somewhere too. It's a lot tougher, so be prepared for a fight if you start breakin' it. I'll bet smashing it will slow all the crystal growth down though, so I'll pay extra if you can do it.
actors.mobs.npcs.blacksmith.intro_quest_gnoll=Some gnolls want the gold too and now they're wreckin' the place. They're stupid things, so their mining has caused all sorts of collapses and cave-ins. You'll have to mine through it, so _look for recently disturbed rock._\n\nI think one of the gnolls is causing most of the trouble, probably a _geomancer shaman_ or somethin'. I'll pay extra, if you can find and kill it, but I'm sure it'll fight back.
actors.mobs.npcs.blacksmith.intro_quest_fungi=There's some sorta fungus monster that's been growing down there. It's got mushroom sentries that're really deadly if they see you, but they can't get up and chase you at least. _Keep out of sight_ if you want to stay alive.\n\nI'll pay extra if you can manage to take down the _biggest mushrom,_ but it'll take some real effort. It's connected to a bunch of mycelium nodes that're hidden in the walls. You'll have to break most of 'em before you can really damage it.
actors.mobs.npcs.blacksmith.reminder=The mine entrance is over there, whenever you get a chance.
actors.mobs.npcs.blacksmith.reminder_crystal=Bring me as much gold as you can, and try to break the big crystal too.
actors.mobs.npcs.blacksmith.reminder_gnoll=Bring me as much gold as you can, and try to kill the gnoll geomancer too.
actors.mobs.npcs.blacksmith.reminder_fungi=Bring me as much gold as you can, and try to kill the giant mushroom too.
actors.mobs.npcs.blacksmith.lost_pick=Are you kiddin' me? Where is my pickaxe?!
actors.mobs.npcs.blacksmith.lost_pick_rat_king=Are you- ... I need the pickaxe back.
actors.mobs.npcs.blacksmith.quest_start_prompt=You ready to go down? Make sure you've got some free space for the gold.\n\n_I'm only lettin' you down der once!_
actors.mobs.npcs.blacksmith.enter_yes=I'm Ready
actors.mobs.npcs.blacksmith.enter_no=Not Yet
actors.mobs.npcs.blacksmith.exit_warn_none=You done already? You've hardly got any gold at all! You should be able to get _40 pieces._\n\n_Remember, I'm not lettin' you back in once you come up._
actors.mobs.npcs.blacksmith.exit_warn_low=You done already? Doesn't look like you've got a lot of gold. You should be able to get _40 pieces._\n\n_Remember, I'm not lettin' you back in once you come up._
actors.mobs.npcs.blacksmith.exit_warn_med=You done? You've got some gold at least, but there's definitely more in the mine. You should be able to get _40 pieces._\n\n_Remember, I'm not lettin' you back in once you come up._
actors.mobs.npcs.blacksmith.exit_warn_high=You done? Looks like you've got a good amount of gold, but I could use a bit more. You should be able to get _40 pieces._\n\n_Remember, I'm not lettin' you back in once you come up._
actors.mobs.npcs.blacksmith.exit_warn_full=You done? You've got lots of gold, but make sure you haven't left any of your gear behind.\n\n_Remember, I'm not lettin' you back in once you come up._
actors.mobs.npcs.blacksmith.exit_warn_crystal=That giant crystal's still down there too. I'll pay extra if you destroy it.
actors.mobs.npcs.blacksmith.exit_warn_gnoll=That gnoll geomancer's still down there too. I'll pay extra if you kill it.
actors.mobs.npcs.blacksmith.exit_warn_fungi=That giant mushroom's still down there too. I'll pay extra if you kill it.
actors.mobs.npcs.blacksmith.exit_yes=I'm Done
actors.mobs.npcs.blacksmith.exit_no=Not Yet
actors.mobs.npcs.blacksmith.get_lost=Good luck!
actors.mobs.npcs.blacksmith.entrance_blocked=The way down is blocked.
actors.mobs.npcs.blacksmith.cant_enter_old=That area is not accessible on this run. Play a new game to try the new quest!
actors.mobs.npcs.blacksmith.def_verb=blocked
actors.mobs.npcs.blacksmith.desc=This troll blacksmith looks like all trolls look: he is tall and lean, and his skin resembles stone in both color and texture. The troll blacksmith is tinkering with disproportionally small tools.

actors.mobs.npcs.ghost.name=sad ghost
actors.mobs.npcs.ghost.rat_1=Hello %s... Once I was like you - strong and confident... But I was slain by a foul beast... I can't leave this place... Not until I have my revenge... Slay the _fetid rat,_ that has taken my life...\n\nIt stalks this floor... Spreading filth everywhere... _Beware its cloud of stink and corrosive bite, the acid dissolves in water..._
actors.mobs.npcs.ghost.rat_2=Please... Help me... Slay the abomination...\n\n_Fight it near water... Avoid the stench..._
actors.mobs.npcs.ghost.gnoll_1=Hello %s... Once I was like you - strong and confident... But I was slain by a devious foe... I can't leave this place... Not until I have my revenge... Slay the _gnoll trickster,_ that has taken my life...\n\nIt is not like the other gnolls... It hides and uses thrown weapons... _Beware its poisonous and incendiary darts, don't attack from a distance..._
actors.mobs.npcs.ghost.gnoll_2=Please... Help me... Slay the trickster...\n\n_Don't let it hit you... Get near to it..._
actors.mobs.npcs.ghost.crab_1=Hello %s... Once I was like you - strong and confident... But I was slain by an ancient creature... I can't leave this place... Not until I have my revenge... Slay the _great crab,_ that has taken my life...\n\nIt is unnaturally old... With a massive single claw and a thick shell... _Beware its claw, you must surprise the crab or it will block with it..._
actors.mobs.npcs.ghost.crab_2=Please... Help me... Slay the Crustacean...\n\n_It will always block... When it sees you coming..._
actors.mobs.npcs.ghost.find_me=Thank you... come find me...
actors.mobs.npcs.ghost.desc=The ghost is barely visible. It looks like a shapeless spot of faint light with a sorrowful face.

actors.mobs.npcs.imp.name=ambitious imp
actors.mobs.npcs.imp.intro=Are you an adventurer? I love adventurers! You can always rely on them if something needs to be killed, am I right? For a bounty of course ;)
actors.mobs.npcs.imp.intro_rat_king=RAT KING?!! What brings you out here???\nI'm really sorry to ask this, but I need a really big favor from you! I'll make it worth your while ;)
actors.mobs.npcs.imp.golems_1=In my case it's _golems_ that need to be killed. You see, I'm going to start a little business here, but those stupid golems are bad for business! It's very hard to negotiate with wandering lumps of granite, damn them! So please, kill... let's say _3 of them_ and a reward is yours.
actors.mobs.npcs.imp.monks_1=In my case it's _monks_ who need to be killed. You see, I'm going to start a little business here, but those lunatics don't buy anything themselves and will scare away other customers. So please kill... let's say _3 of them_ and a reward is yours.
actors.mobs.npcs.imp.golems_2=How is your golem safari going? Just don't forget to grab those tokens.
actors.mobs.npcs.imp.monks_2=Oh, you're still alive! I knew that your kung-fu would be stronger ;) Just don't forget to grab those tokens.
actors.mobs.npcs.imp.cya=See you, %s!
actors.mobs.npcs.imp.hey=Psst, %s!
actors.mobs.npcs.imp.desc=Imps are lesser demons. They are notable for neither their strength nor their magic talent, but they are quite smart and sociable. Many imps prefer to live among non-demons.

actors.mobs.npcs.impshopkeeper.name=ambitious imp
actors.mobs.npcs.impshopkeeper.greetings=Hello, %s!
actors.mobs.npcs.impshopkeeper.greetings_ascent=What did you do %s? Shop quickly, I've got to get out of here!
actors.mobs.npcs.impshopkeeper.thief=I thought I could trust you!
actors.mobs.npcs.impshopkeeper.buyback=The imp cheerily returns your item.
actors.mobs.npcs.impshopkeeper.desc=The imp has set up a little shop on the border of the inner halls. It's nice to see a friendly face, but his prices certainly don't seem friendly.

actors.mobs.npcs.mirrorimage.name=mirror image
actors.mobs.npcs.mirrorimage.desc=This illusion bears a close resemblance to you, even seeming to wield your current weapon and armor.\n\nMirror images will seek and attack enemies using their mimicked weapon, which behaves the same as yours, but deals less damage. They start out nearly invisible, but must take on a form that's more easily seen in order to attack.\n\nWhile their offensive power can be potent, mirror images have no durability, and will fade the moment they take damage.

actors.mobs.npcs.prismaticimage.name=prismatic image
actors.mobs.npcs.prismaticimage.desc=This shimmering illusion bears a close resemblance to you, even seeming to wield your current weapon and armor.\n\nPrismatic images will attempt to seek and draw focus from enemies, using their enhanced defense and health to protect you. While they do not have the same offensive power as mirror images, they have enhanced durability, including receiving benefits from your armor.\n\nWhen reduced to 0 hp, prismatic images will fade over several turns, and can still be healed during this time. When no enemies are present, prismatic images will fade and rejoin their master.

actors.mobs.npcs.ratking.name=rat king
actors.mobs.npcs.ratking.not_sleeping=I'm not sleeping!
actors.mobs.npcs.ratking.what_is_it=What is it? I have no time for this nonsense. My kingdom won't rule itself!
actors.mobs.npcs.ratking.confused=Wha... Where am I? My kingdom needs me!
actors.mobs.npcs.ratking.crownshard=Hmm, that shard you have... No, I have my crown right here!
actors.mobs.npcs.ratking.crown_clothes=Put some clothes on! You're in no state to talk to royalty!
actors.mobs.npcs.ratking.crown_desc=Oooh, is that crown for me!? It looks much shinier than mine, so I graciously accept!\n\nIn fact, I think I can offer you something as a reward for this crown. A tremendous power befitting a hero such as yourself! Would you like that?
actors.mobs.npcs.ratking.crown_yes=Of course!
actors.mobs.npcs.ratking.crown_info=Tell me more first.
actors.mobs.npcs.ratking.crown_no=I'd rather not...
actors.mobs.npcs.ratking.crown_thankyou=Hehehe, thank you! Now go and make your king proud!
actors.mobs.npcs.ratking.crown_fine=Fine! It's not like I wanted it anyway...
actors.mobs.npcs.ratking.crown_after=Enjoying your new armor? No take-backsies!
actors.mobs.npcs.ratking.desc_crown=This rat is a little bigger than a regular marsupial rat. It's wearing dwarf king's crown on its head.
actors.mobs.npcs.ratking.desc_birthday=This rat is a little bigger than a regular marsupial rat. It's wearing a tiny green party hat instead of its usual crown. Happy birthday Rat King!
actors.mobs.npcs.ratking.desc_winter=This rat is a little bigger than a regular marsupial rat. It's wearing a tiny festive hat instead of its usual crown. Happy Holidays!
actors.mobs.npcs.ratking.desc=This rat is a little bigger than a regular marsupial rat. It's wearing a tiny crown on its head.
actors.mobs.npcs.ratking.rankings_desc=Defeated the higher being in impossible battle
actors.mobs.npcs.ratking.amulet=What is it? I-\n\nWait, is that the _AMULET_? I've been waiting so long for this moment. Now everyone will know the name of RAT KING and I can stand alone as the so-\n\nWHAT DO YOU MEAN you are leaving? I was helping you for entire adventure, and you just decide _to betray me?_\n\nThis can't be missed so easily. _Prepare for a fight,_ non-rodent!

actors.mobs.ratkingboss.name=Rat King
actors.mobs.ratkingboss.name_rat_king=Rat King's mirror image
actors.mobs.ratkingboss.notice_have=Prepare to cry!
actors.mobs.ratkingboss.notice_have_rat_king=Prepare!
actors.mobs.ratkingboss.enraged=What is it? I have no time for this nonsense. My kingdom won't rule itself! POWER OVERCHARGE!
actors.mobs.ratkingboss.enraged_rat_king=...
actors.mobs.ratkingboss.enraged_2=I CANNOT FALL FROM HANDS OF A MERE HUMAN!
actors.mobs.ratkingboss.enraged_2_rat_king=I cannot die indeed!
actors.mobs.ratkingboss.desc=This rat considered you an ally, the new hero fighting for glory of Rat Kingdom. But your selfish desires to take the Amulet of Yendor for yourself was a last straw for mightiest RAT KING. Now you will feel pain, traitor and coward.\nYou hoped than tiny rats will miss the chance to get out of this dungeon and get unlimited powers? What an foolish primate!\n\nThe Rat King has different attack patterns, that are indicated by _color filter of the battlefield_. With HP loss, the boss will act more aggressively and tank more damage, keep that in mind.\n\n_Due to his presence,_ your shielding decays at much higher pace.
actors.mobs.ratkingboss.desc_rat_king=This rat is just an afterimage of your glory, but it's extremely powerful, watch out.\n\n_Due to his presence,_ your shielding decays at much higher pace.
actors.mobs.ratkingboss.phase3=Once just a rat, now ascended to godhood to finish you off.\nIn this state Rat King is at his maximum power, being immune to any sort of damage or status effect and fighting at full strength. Due to power concentration, he will switch patterns 2x faster, but will die at the end of cycle.
actors.mobs.ratkingboss.phase3_rat_king=This ghost just cannot die, can't it?
actors.mobs.ratkingboss.emperor=The Rat King is now in _Emperor_ state. He will rapidly summon his loyal rats and special cavalry called _threadrippers_.
actors.mobs.ratkingboss.faster_summons=_If you are getting swarmed,_ summoned rats will include albinos and more threadrippers.
actors.mobs.ratkingboss.gladiator=The Rat King is now in _Gladiator_ state. He has increased armor value and he will chase you and attack with _Royal Brand_ for very heavy damage.
actors.mobs.ratkingboss.healing=_If you are on diet,_ the Rat King will steal your satiety and heal yourself if he managed to hit you.
actors.mobs.ratkingboss.battlemage=The Rat King is now in _Battlemage_ state. He will cast various wands in his arsenal, which will get stronger with _Badder Bosses_. Certain challenges also add new magical attacks. Every magic cast has cross AoE with 4 tiles next to you.
actors.mobs.ratkingboss.assassin=The Rat King is now in _Assassin_ state. He is completely covered by shadows, and he will assault you with increased speed. Occasionally or when stabbing you he will prepare _Phantom Spears_ and shoot them after two turns, with teleport afterwards. After spears the Rat King will also probably use some _Tengu tricks_.
actors.mobs.ratkingboss.dark=_If you are living in a darkness,_ the Rat King will shoot spears right at you and spears will blind you.
actors.mobs.ratkingboss.sniper=The Rat King is now in _Sniper_ state. He will shoot his enchanted bow at you, dealing small armor-piercing damage and spawning traps everywhere. If you try to hide, you will be get teleported right next to boss every few turns.
actors.mobs.ratkingboss.runes=_If some runes are harder to find,_ the Rat King's attacks will have chance to nullify your upgrades for short time.
actors.mobs.ratkingboss.armor=_If you are putting faith instead of wearing armor,_ the Rat King's attacks will have chance to decrease your physical resistance and charm you.
actors.mobs.ratkingboss.bad_boss=_While Badder Bosses is active,_ the Rat King will take _75% more time_ to change pattern.
actors.mobs.ratkingboss$laststand.name=Last Stand
actors.mobs.ratkingboss$laststand.desc=This status effect will show how much power is left in Rat King's possession.

actors.mobs.npcs.sheep.name=sheep
actors.mobs.npcs.sheep.baa!=Baa!
actors.mobs.npcs.sheep.baa?=Baa?
actors.mobs.npcs.sheep.baa.=Baa.
actors.mobs.npcs.sheep.baa...=Baa...
actors.mobs.npcs.sheep.def_verb=blocked
actors.mobs.npcs.sheep.desc=This is a magic sheep. What's so magical about it? You can't kill it. It will stand there until it magically fades away, all the while chewing cud with a blank stare.

actors.mobs.npcs.shopkeeper.name=shopkeeper
actors.mobs.npcs.shopkeeper.thief=Thief, Thief!
actors.mobs.npcs.shopkeeper.warn=Watch it! I won't warn you again.
actors.mobs.npcs.shopkeeper.flee=The shopkeeper flees!
actors.mobs.npcs.shopkeeper.sell=Sell an item
actors.mobs.npcs.shopkeeper.talk=Talk
actors.mobs.npcs.shopkeeper.buyback=The shopkeeper reluctantly returns your item.
actors.mobs.npcs.shopkeeper.talk_prison_intro=I have everything you need for a successful adventure!
actors.mobs.npcs.shopkeeper.talk_prison_warrior=That's an interesting seal you've got there, they're usually in one piece. You a disgraced hero or something? Well whatever you've done is none of my business, your coins are still good.
actors.mobs.npcs.shopkeeper.talk_prison_mage=Hehe, I think I've seen a wanted poster with your name on it somewhere in the city. On the run are we? Oh you're innocent are you? Of course, of course... Don't fret, I've got better things to do than report on you, but perhaps you should buy something to be sure?
actors.mobs.npcs.shopkeeper.talk_prison_rogue=Have you come from the thieves guild to clear the area? No, just shopping? Well kill a few monsters while you're here anyway. Don't expect a discount either, I pay good protection money to you people and you're barely keeping me safe down here.
actors.mobs.npcs.shopkeeper.talk_prison_huntress=You seem to be out of your element miss. Tight dungeon corridors aren't as spacious as grand halls or the forests surrounding the city are they? Hehe, oh don't mind my rambling, why not buy something?
actors.mobs.npcs.shopkeeper.talk_prison_duelist=Well if it isn't the travelling hero! If you're trying to save another town then good luck, the dangers here are much worse than petty bandit gangs. I'm sure you'll do better than anyone else could, just try to not die right outside my store.
actors.mobs.npcs.shopkeeper.talk_prison_cleric=Well hello there Your Highness, or is it Your Holiness now? Hehe, either way this is no place for you, a lot of people would be quite distraught if you wound up dead. Surely you have some coins though, why not buy something to help prevent that?
actors.mobs.npcs.shopkeeper.talk_caves=Spend money, live longer.\n\nOh and say hello to that Troll blacksmith for me if you see him. Remind the lug that he still owes me money for that hammer I sold him last week!
actors.mobs.npcs.shopkeeper.talk_city=My wares can keep you safe down here.\n\n...And don't loiter if you please. It took forever to get the locals down here to leave me alone, I don't want you attracting any trouble!
actors.mobs.npcs.shopkeeper.talk_halls=Hey there, I've got special prices for demon hunters!\n\nOh and be careful down there! The demons below won't care how courageous you are. You can't come back up and spend more money if you're dead! ;)\n\nAre the demons like me? Hehe, not at all. I'm just a small fellow, not much of a fighter, and I've managed to keep my mind intact. The demons below are much stronger things, and they've all been enslaved by... well... just be careful down there.
actors.mobs.npcs.shopkeeper.talk_ascent=I don't know what you're planning to do with that amulet but I want no part of it. Buy something and move on, we both need to leave this place!
actors.mobs.npcs.shopkeeper.desc=This stout guy looks more appropriate for a trade district in some large city than for a dungeon. His prices explain why he prefers to do business here.

actors.mobs.npcs.wandmaker.name=old wandmaker
actors.mobs.npcs.wandmaker.intro_warrior=Oh, hello there! What a pleasant surprise to meet a warrior from the north in such a depressing place! You must have travelled quite far to get here. If you're looking for adventure, I may have a task for you.
actors.mobs.npcs.wandmaker.intro_rat_king=RAT KING?!?! I have been blessed by your presence. Normally I'd do anything for you, but I'm really in need of your royal assistance right now. It shouldn't be that bad and I'll make it worth your while.
actors.mobs.npcs.wandmaker.intro_rogue=Oh Goodness, you startled me! I haven't met a bandit from this place that still has his sanity, so you must be from the surface! If you're up to helping a stranger out, I may have a task for you.
actors.mobs.npcs.wandmaker.intro_mage=Oh, hello %s! I heard there was some ruckus regarding you and the wizards institute? Oh never mind, I never liked those stick-in-the-muds anyway. If you're willing, I may have a task for you.
actors.mobs.npcs.wandmaker.intro_huntress=Oh, hello miss! A friendly face is a pleasant surprise down here isn't it? In fact, I swear I've seen your face before, but I can't put my finger on it... Oh never mind, if you're here for adventure, I may have a task for you.
actors.mobs.npcs.wandmaker.intro_duelist=Oh, hello miss! What a pleasant surprise to meet a hero in such a depressing place! If you're up to helping an old man out, I may have a task for you.
actors.mobs.npcs.wandmaker.intro_cleric=Oh, hello Your Highness! What a pleasant surprise to meet you in such a depressing place! I hate to impose, but I may have a task for you.
actors.mobs.npcs.wandmaker.intro_1=\n\nI came here to find a rare ingredient for a wand, but I've gotten myself lost, and my magical shield is weakening. I'll need to leave soon, but can't bear to go without getting what I came for.
actors.mobs.npcs.wandmaker.intro_dust=I'm looking for some _corpse dust._ It's a special kind of cursed bone meal that usually shows up in places like this. There should be a barricaded room around here somewhere, I'm sure some dust will turn up there. Do be careful though, the curse the dust carries is quite potent, _get back to me as fast as you can_ and I'll cleanse it for you.
actors.mobs.npcs.wandmaker.intro_ember=I'm looking for some _fresh embers_ from a newborn fire elemental. Elementals usually pop up when a summoning ritual isn't controlled, so just find some candles and a ritual site and I'm sure you can get one to pop up. You'll want to _avoid boxing yourself in_ while fighting it though, or you could _keep some sort of freezing item handy._ Newborn Elementals are pretty powerful and chaotic, but they can't stand the cold.
actors.mobs.npcs.wandmaker.intro_berry=The old warden of this prison kept a _rotberry plant,_ and I'm after one of its seeds. The plant has probably gone wild by now though, so getting it to give up a seed might be tricky. Its garden should be somewhere around here. Try to _keep away from its vine lashers_ if you want to stay in one piece. Using fire might be tempting but please don't, you'll kill the plant and destroy its seeds.
actors.mobs.npcs.wandmaker.intro_2=\n\nIf you can get that for me, I'll be happy to pay you with one of my finely crafted wands! I brought two with me, so you can take whichever one you prefer.
actors.mobs.npcs.wandmaker.reminder_dust=Any luck with corpse dust, %s? Look for some barricades.
actors.mobs.npcs.wandmaker.reminder_ember=Any luck with those embers, %s? You'll need to find four candles and the ritual site.
actors.mobs.npcs.wandmaker.reminder_berry=Any luck with a Rotberry seed, %s? Look for a room filled with vegetation.
actors.mobs.npcs.wandmaker.def_verb=blocked
actors.mobs.npcs.wandmaker.desc=This old yet hale gentleman wears a slightly confused expression. He is protected by a magic shield.



###mobs
actors.mobs.acidic.name=acidic scorpio
actors.mobs.acidic.desc=These huge arachnid-like demonic creatures avoid close combat, preferring to fire crippling serrated spikes from long distances. This one appears to be dripping with corrosive ooze.

actors.mobs.albino.name=albino rat
actors.mobs.albino.desc=This is a rare breed of marsupial rat, with pure white fur and jagged teeth.
actors.mobs.albino.desc_enemy=Sadly it's just as intent on disobeying Rat King's royal authority as the rest of them...
actors.mobs.albino.desc_enemy_no_rk=Such potent animal warrior roaming around killing others...

actors.mobs.armoredstatue.name=armored statue
actors.mobs.armoredstatue.desc=You would think that it's just another one of this dungeon's inanimate statues, but its red glowing eyes give it away.\n\nIt seems to be in great condition because of the armor it's wearing, it might be very hard to kill.
actors.mobs.armoredstatue.desc_arm_wep=While the statue itself is made of stone, the _%1$s_ and _%2$s_ it's wielding look real.

actors.mobs.bandit.name=rogue spirit
actors.mobs.bandit.desc=An elite thief, distinguished by their more opulent purple robe. Despite their greater skill, they've become just as mindless as regular thieves.\n\nIn addition to stealing from you, crazed bandits will briefly blind, cripple, and poison you! They're much more likely to be carrying extra loot than a regular thief though.

actors.mobs.bat.name=vampire bat
actors.mobs.bat.desc=These brisk and tenacious inhabitants of the caves are much more dangerous than they seem. They replenish their health with each successful attack, which allows them to defeat much larger opponents.\n\nTheir unmatchable agility _could be useful_, I had ability to steal life from my prey...

actors.mobs.bee.name=golden bee
actors.mobs.bee.desc_honey=Despite their small size, golden bees tend to protect their home fiercely. This one has been placated, and seems to want to follow you.
actors.mobs.bee.desc=Despite their small size, golden bees tend to protect their home fiercely. This one is very mad, better keep your distance.

actors.mobs.bowspirit.name=spirit bow
actors.mobs.bowspirit.desc=Your loyal spirit bow has come to life and is fighting for you. If I were a weapon, I'd be pretty sad if my owner threw me away, but this bow doesn't seem to mind that. 

actors.mobs.brute.name=rat warrior
actors.mobs.brute.enraged=enraged
actors.mobs.brute.def_verb=blocked
actors.mobs.brute.desc=This was a Rat King's brilliant guardian, before being abducted by evil forces and forced to breed with filthy gnolls. Their titular ability is berserking, allowing them to cheat death for a few moments.
actors.mobs.brute.desc_no_rk=This was a Rat Kingdom's brilliant guardian, before switching sides to gnolls after collapse of his homeland. Their titular ability is berserking, allowing them to cheat death for a few moments.
actors.mobs.brute$bruterage.name=brute rage
actors.mobs.brute$bruterage.desc=This rat is dying, but wants to take you with it!\n\nThe rat warrior will die when its shielding wears off, either due to time or if it is damaged. In the meantime, it will deal hugely increased damage, so watch out!\n\nShield remaining: %d.

actors.mobs.causticslime.name=caustic slime
actors.mobs.causticslime.desc=This slime seems to have been tainted by the dark magic emanating from below. It has lost its usual green color, and drips with caustic ooze.

actors.mobs.crab.name=sewer crab
actors.mobs.crab.desc=These huge crabs are at the top of the food chain in the sewers. They are extremely fast and their thick carapace can withstand heavy blows. Their aggressive nature and strength is what makes them dangerous for any creature, including rats.

actors.mobs.crystalguardian.name=crystal guardian
actors.mobs.crystalguardian.def_verb=blocked
actors.mobs.crystalguardian.desc=These large crystalline guardians almost look like statues, if it weren't for their bright glowing eyes. The hardened crystal they're made out of causes them to be sluggish but very tough, so _it's best to leave them to sleep in their crystal nest for as long as possible._\n\nDue to their size, crystal guardians will move much more slowly in enclosed spaces. They're also so durable that they're impossible to kill outright. They can be beaten down and temporarily disabled, but they'll just get back up again after a little while.

actors.mobs.crystalmimic.name=crystal mimic
actors.mobs.crystalmimic.ate=The mimic ate your %s!
actors.mobs.crystalmimic.escaped=The crystal mimic has escaped!
actors.mobs.crystalmimic.desc=Mimics are magical creatures which can take any shape they wish. In dungeons they almost always choose a shape of a treasure chest, in order to lure in unsuspecting adventurers.\n\nCrystal mimics are trickier than their regular cousins, and prefer to avoid conflict while stealing loot. They will attempt to sprint away once discovered, and have the ability to reposition enemies when they attack.

actors.mobs.crystalspire.name=crystal spire
actors.mobs.crystalspire.warning=The crystal vibrates as you strike it. Keeping this up is bound to draw attention to you...
actors.mobs.crystalspire.alert=The vibration grows and rumbles through the whole cave!
actors.mobs.crystalspire.desc=This gigantic spire of ultra hard crystal is probably the source of all the strange crystalline creatures in this cave. Your regular weapons are ineffective against it, so you'll need to use your pickaxe if you want to destroy it.\n\n_Make sure you're prepared before you start breaking it._ Such a big crystal is likely to take a while to mine through, and you probably won't be able to do it undisturbed. The spire itself may even have some means of defending itself as well. _Perhaps the spire's own attacks could be used against its minions._

actors.mobs.crystalwisp.name=crystal wisp
actors.mobs.crystalwisp.beam_kill=The beam of light killed you...
actors.mobs.crystalwisp.desc=A small angry floating chunk of hardened crystal that's producing a bright glow. While not especially strong, crystal wisps will shoot a damaging beam of light at you if they have a clear shot.\n\nWisps are small enough to easily move through the various crystal outcroppings, but they aren't able to shoot through them.

actors.mobs.demonspawner.name=demon spawner
actors.mobs.demonspawner.on_death=The demonic energy here seems to lessen as the spawner dies.
actors.mobs.demonspawner.desc=This twisting amalgam of dwarven flesh is responsible for creating ripper demons from the dwarves that have died in this region. Clearly the demons see no issue with using every resource they can against their enemies.\n\nWhile visually terrifying, demon spawners have no means of moving or directly defending themselves. Their considerable mass makes them hard to kill quickly however, and they will spawn ripper demons more quickly when they are under threat.\n\n_Demon spawners seem to be connected to some central source of demonic power. Killing them may weaken it._

actors.mobs.dm100.name=DM-100
actors.mobs.dm100.zap_kill=The lightning bolt killed you...
actors.mobs.dm100.desc=The DM-100 is an early model of dwarven 'defense machine' which was designed to protect dwarven miners in the caves below this prison. Their electrical shocks proved too weak however, and so they were gifted to the human city above. They went unused for years and eventually found their way to the prison, where the warden initially deemed them too cruel to use. However, as the prisoners became more unruly they became a necessity.\n\nThe legends tell than they contain souls of today extinct magic school of gnoll, that were capable of shooting lightnings.

actors.mobs.dm200.name=DM-200
actors.mobs.dm200.vent=The DM-200 fires a jet of toxic exhaust!
actors.mobs.dm200.desc=The DM-200 is the second generation of dwarven 'defense machine', which was designed to protect dwarven miners in the caves and city below. They are much larger and bulkier than their predecessors, and attack with devastating hydraulic fists.\n\nTheir increased size is also their primary weakness, as they are unable to fit into the narrow tunnels and doorways of the dungeon. The dwarves were able to compensate for the DM-200's lack of mobility by allowing them to vent their toxic exhaust fumes at distant enemies, or enemies they cannot reach. This machine could fit several rats in it!

actors.mobs.dm201.name=DM-201
actors.mobs.dm201.vent=The DM-201 lobs a corrosive grenade!
actors.mobs.dm201.desc=The dwarves briefly experimented with more heavily emphasizing the DM-200's lack of mobility and created some DM models that are entirely stationary. The DM-201 is a retrofitted DM-200 which acts as a sentry turret that has no movement ability. In exchange for the lack of mobility, DM-201s have significantly more durability and attacking power.\n\nAs DM-201s have no engine to vent exhaust from, the dwarves instead outfitted them with corrosive gas grenades! DM-201s are careful with these grenades however, and will only lob them when attacked from a distance.

actors.mobs.dm300.name=DM-300
actors.mobs.dm300.notice=UNAUTHORIZED PERSONNEL DETECTED!
actors.mobs.dm300.notice_rk=RAT KING DETECTED! EXTERMINATE RAT KING!
actors.mobs.dm300.shield=DM-300 pulls power from the exposed wires and shields itself!
actors.mobs.dm300.charging=SUSTAINING DAMAGE! ACTIVATING POWER PYLON!
actors.mobs.dm300.charging_hint=DM-300 is invulnerable while it is being energized by a pylon!
actors.mobs.dm300.supercharged_rk=EXTERMINATE!
actors.mobs.dm300.supercharged=DESTROY!
actors.mobs.dm300.charge_lost=PYLON DESTROYED! REVERTING TO LOCAL POWER!
actors.mobs.dm300.pylons_destroyed=ALERT! INSTABILITY DETECTED IN POWER GRID!
actors.mobs.dm300.rankings_desc=Crushed by the DM-300
actors.mobs.dm300.def_verb=blocked
actors.mobs.dm300.defeated=CRITICAL DAMAGE! ATTEMPTING SHUTDO-
actors.mobs.dm300.desc=The DM-300 is the largest yet most stupid 'defense machine' that the dwarves ever built. Such an awesome machine is difficult to manufacture, so the dwarves only ever made a few to guard the entrances to their underground metropolis.\n\nIt is equipped with vents to jet its toxic exhaust fumes and a high power drill that it can use both to attack and disrupt the earth. DM-300 can also connect to an energy grid, further enhancing its power, not like it's very useful.
actors.mobs.dm300.desc_supercharged=DM-300 is currently charged full of electrical energy. In this form DM-300 cannot be damaged and moves at double speed! Additionally, its drill now spins fast enough for it to _tunnel through solid rock,_ though it moves much more slowly when doing this.\n\nAttacking DM-300 directly is pointless while it is supercharged, but _something in the area must be providing it with this energy,_ destroying that may weaken it.

actors.mobs.dwarfking.name=King of Dwarves
actors.mobs.dwarfking.notice=How dare you! You have no idea what you're interfering with!
actors.mobs.dwarfking.notice2_rat_king=Wait... is that you??? RAT KING!! I AM THE STRONGER KING!!! PREPARE TO DIE AT MY HANDS!!!! *crazed laugh*
actors.mobs.dwarfking.notice2=You're telling me you're here on behalf of Rat King?! HOW DARE YOU CHOOSE THE INFERIOR KING!! DIE FOR YOUR INSOLENCE!!!
actors.mobs.dwarfking.notice2_no_rk=There is no way you are intending to rebuild Rat Kingdom!!! NO SUCH INSOLENCE IS ALLOWED IN MY DOMAIN!
actors.mobs.dwarfking.first_summon=My minions actually come when I call for them!
actors.mobs.dwarfking.outmatched_rat_king=Rat King! You are outmatched! Surrender now and I'll make your death quick!
actors.mobs.dwarfking.strong=My minions are powerful! Unlike your pathetic 'subjects'! BWAHAHAHAHA!!
actors.mobs.dwarfking.golem=Rat King doesn't have access to these!
actors.mobs.dwarfking.golem_no_rk=The puny rats don't have access to these!
actors.mobs.dwarfking.golem_rat_king=I've prepared these special, JUST FOR YOU!!!!
actors.mobs.dwarfking.first_special_rat_king=Unlike in your pathetic kingdom, my minions actually obey me!
actors.mobs.dwarfking.corrupted=HOW CAN THIS BE?! How dare that %s choose the inferior king! You will pay!!!
actors.mobs.dwarfking.lifelink_1=I have need of your essence, slave!
actors.mobs.dwarfking.lifelink_2=Bleed for me, slave!
actors.mobs.dwarfking.teleport_1=Deal with them, slave!
actors.mobs.dwarfking.teleport_rat_king=Show him my power!!!
actors.mobs.dwarfking.teleport_2=Keep them busy, slave!
actors.mobs.dwarfking.wave_1=Enough! Arise my slaves! Show this buffoon the futility of their quest!
actors.mobs.dwarfking.wave_2=More! Bleed for the superior and more handsome king!!
actors.mobs.dwarfking.wave_2_no_rk=More! Bleed for the only ruling king!!
actors.mobs.dwarfking.wave_3=I need more power! KILL THEM NOW!
actors.mobs.dwarfking.enraged=USELESS!! PREPARE FOR MY ULTIMATE TECHNIQUE!
actors.mobs.dwarfking.losing=No! I am the stronger king! I must be!
actors.mobs.dwarfking.defeated_rat_king=Defeated.. by... a rat....
actors.mobs.dwarfking.defeated_1=I...accept defeat...
actors.mobs.dwarfking.defeated_2=Your power...was....otherworldly....
actors.mobs.dwarfking.hero_killed=Let Rat King take this as a lesson...
actors.mobs.dwarfking.hero_killed_no_rk=Let Rat Kingdom remnants take this as a lesson...
actors.mobs.dwarfking.hero_killed_rat_king=I am truly the superior king...

actors.mobs.dwarfking.rankings_desc=Fell Before the King of Dwarves
actors.mobs.dwarfking.desc=Many years ago one of the highest wizards in the dwarven court uncovered secrets which gave him tremendous power over life and death. He soon put this power to use, subjugating and corrupting his peers, his king, and eventually every dwarven citizen. Now he is king, ruler over a legion of undead subjects.\n\nThe King of Dwarves is an aggressive foe, who will attempt to surround and overwhelm his enemies with his horde of undead minions.\n\nHe seems oddly obsessed with proving he is a better king than Rat King.
actors.mobs.dwarfking.desc_no_rk=Many years ago one of the highest wizards in the dwarven court uncovered secrets which gave him tremendous power over life and death. He soon put this power to use, subjugating and corrupting his peers, his king, and eventually every dwarven citizen. Now he is king, ruler over a legion of undead subjects.\n\nThe King of Dwarves is an aggressive foe, who will attempt to surround and overwhelm his enemies with his horde of undead minions.\n\nHe seems oddly obsessed with proving he is only king, that can maintain his home land.
actors.mobs.dwarfking$dkghoul.rankings_desc=Fell Before the King of Dwarves
actors.mobs.dwarfking$dkmonk.rankings_desc=Fell Before the King of Dwarves
actors.mobs.dwarfking$dkwarlock.rankings_desc=Fell Before the King of Dwarves
actors.mobs.dwarfking$dkgolem.rankings_desc=Fell Before the King of Dwarves

actors.mobs.ebonymimic.name=ebony mimic
actors.mobs.ebonymimic.reveal=There was a mimic there!
actors.mobs.ebonymimic.hidden_name=suspicious outline
actors.mobs.ebonymimic.hidden_desc=There seems to be something here, but it's almost totally transparent.
actors.mobs.ebonymimic.desc=Mimics are magical creatures which can take any shape they wish. In dungeons they almost always choose a shape of a treasure chest, in order to lure in unsuspecting adventurers.\n\nEbony mimics are stealthy mimics with the ability to make themselves almost invisible. They lurk on things that adventurers are likely to interact with, but do contain loot of their own as well. They aren't any tougher than a regular mimic once discovered, but their surprise bite is devastating.

actors.mobs.ech.name=ech
actors.mobs.ech.desc=ech

actors.mobs.elemental$fireelemental.name=fire elemental
actors.mobs.elemental$fireelemental.desc=Elementals are chaotic creatures that are often created when powerful occult magic isn't properly controlled. Elementals have minimal intelligence, and are usually associated with a particular type of magic.\n\nFire elementals are a common type of elemental which deals damage with fiery magic. They will set their target ablaze with melee attacks, and can occasionally shoot bolts of fire as well.
actors.mobs.elemental$newbornfireelemental.name=newborn fire elemental
actors.mobs.elemental$newbornfireelemental.charging=The elemental is charging up!
actors.mobs.elemental$newbornfireelemental.desc=Elementals are chaotic creatures that are often created when powerful occult magic isn't properly controlled. Elementals have minimal intelligence, and are usually associated with a particular type of magic.\n\nThis fire elemental is freshly summoned, but still quite dangerous!
actors.mobs.elemental$newbornfireelemental.desc_boss=Because of the chaotic nature of its summoning, this elemental can only spread fire in inaccurate blasts after charging for a turn.
actors.mobs.elemental$newbornfireelemental.desc_ally=Because this elemental was summoned by a spell, it has a little more control over its flame. It's incapable of making ranged attacks, but will ignite enemies it attacks in melee.
actors.mobs.elemental$frostelemental.name=frost elemental
actors.mobs.elemental$frostelemental.desc=Elementals are chaotic creatures that are often created when powerful occult magic isn't properly controlled. Elementals have minimal intelligence, and are usually associated with a particular type of magic.\n\nFrost elementals are a common type of elemental which weakens enemies with chilling magic. They will chill their target with melee and occasional ranged attacks. Their magic is much more effective in water.
actors.mobs.elemental$shockelemental.name=shock elemental
actors.mobs.elemental$shockelemental.desc=Elementals are chaotic creatures that are often created when powerful occult magic isn't properly controlled. Elementals have minimal intelligence, and are usually associated with a particular type of magic.\n\nShock elementals are a less common type of elemental which disrupts its enemies with electricity and flashes of light. In melee they will arc electricity to nearby enemies, and deal bonus damage to their primary target if they are in water. They will also occasionally focus a ranged blast of light at their target, temporarily blinding them.
actors.mobs.elemental$chaoselemental.name=chaos elemental
actors.mobs.elemental$chaoselemental.desc=Elementals are chaotic creatures that are often created when powerful occult magic isn't properly controlled. Elementals have minimal intelligence, and are usually associated with a particular type of magic.\n\nChaos elementals are rare and dangerous elementals which haven't stabilized to a particular element. They will unleash wild unpredictable magic when they attack.

actors.mobs.eye.name=evil eye
actors.mobs.eye.deathgaze_kill=The deathgaze killed you...
actors.mobs.eye.desc=Evil Eyes are floating balls of pent up demonic energy. While they are capable of melee combat, their true strength comes from their magic.\n\nAfter building energy for a short time an Evil Eye will unleash a devastating beam of energy called the _deathgaze._ Anything (including kings) within the Evil Eye's sights will take tremendous damage, wise adventurers will run for cover.

actors.mobs.fetidrat.name=fetid rat
actors.mobs.fetidrat.desc=Something is clearly wrong with this rat. Its greasy black fur and rotting skin are very different from the healthy rats you've seen previously. Its pale green eyes make it seem especially menacing.\n\nIf the sight of a previously loyal subject being corrupted so completely wasn't enough to bring you to tears, the rat carries a cloud of horrible stench with it that almost certainly will. It's overpoweringly strong up close.\n\nDark ooze dribbles from the rat's mouth, it eats through the floor but seems to dissolve in water.
actors.mobs.ally_desc=Somehow it recognizes Rat King's authority?!
# suppressed
actors.mobs.fetidrat.enemy=
actors.mobs.fetidrat.enemy_desc=

actors.mobs.fungalcore.name=fungal core
actors.mobs.fungalcore.desc=This gigantic mushroom must be the source of all the fungal activity in this cave.

actors.mobs.fungalsentry.name=fungal sentry
actors.mobs.fungalsentry.desc=This especially tall mushroom acts as a point of defense for the larger fungal network living in this cave.\n\nIt is immobile, but will shoot precise blasts of poison at anything that gets within its line of sight. While the impact of these blasts is fairly weak, _they can stack up deadly amounts of poison very quickly._ While it can be killed, it's probably best to avoid it.

actors.mobs.fungalspinner.name=fungal spinner
actors.mobs.fungalspinner.desc=This cave spinner appears to be being controlled by a parasitic fungus. The fungus has also changed its abilities, replacing its web and venom sacks with fungal growth.\n\nThe fungal spinner will spit plant life at you instead of webs, spreading fungal vegetation and potentially rooting you. While it can't poison, the fungal spinner will gain substantial damage resistance if it is adjacent to any mushrooms.

actors.mobs.ghoul.name=dwarven ghoul
actors.mobs.ghoul.desc=As dwarven society slowly began to collapse, and the current king of the dwarves seized absolute power, those who were weak or who resisted him were not treated well. As the king grew more adept at wielding dark magic, he bent these dwarves to his will, and now they make up the footsoldiers of his army.\n\nGhouls are not especially strong on their own, but always travel in groups and are much harder to kill in large numbers. _When a ghoul is defeated, it will rise again after a few turns as long as another ghoul is nearby._

actors.mobs.gnoll.name=gnoll scout
actors.mobs.gnoll.desc=Gnolls are hyena-like humanoids. They dwell in sewers and dungeons, venturing up to raid the surface from time to time. Perhaps sensing a weakness in the Rat Kingdom, these raids have become so common that it's starting to feel more like an invasion. Good thing you're here to teach them whose boss!\n\nGnoll scouts are regular members of their pack, they are not as strong as brutes and not as intelligent as shamans.

actors.mobs.gnollgeomancer.name=gnoll geomancer
actors.mobs.gnollgeomancer.warning=The geomancer begins to stir. Make sure you're ready before you continue!
actors.mobs.gnollgeomancer.alert=The geomancer awakens! The entire cave seems to shift as it leaps away while laughing madly!
actors.mobs.gnollgeomancer.rock_kill=The flying boulder killed you...
actors.mobs.gnollgeomancer.rockfall_kill=The falling rocks killed you...
actors.mobs.gnollgeomancer.desc=This impressively tall senior gnoll must be the source of the various earth-moving magic around here, and the organizer of all the gnoll activity. Unlike the gnoll sappers in the area, the geomancer is quite adept with its magic, and cannot be damaged by thrown or falling rocks. It doesn't have any way to fight in melee combat though.
actors.mobs.gnollgeomancer.desc_armor=The geomancer is currently encased in a layer of rock armor. _You'll need to get up close and break it away with your pickaxe before you can damage the geomancer._
actors.mobs.gnollgeomancer.desc_armor_sapper=_A nearby gnoll sapper is holding a device that is empowering the geomancer's rock armor. You won't be able to damage it at all right now!_
actors.mobs.gnollgeomancer.desc_sleeping=This impressively tall gnoll shaman is surrounded by a layer of rock, and looks almost like a statue. Looking closely you can see the rock magically move in time with the senior gnoll's breathing. It can't be harmed while encased in rock like this, and it appears to be enjoying a literal dirt nap.\n\nYou can probably break through the layers of rock with your pickaxe, but _be sure you're ready for a fight when you do so._ The geomancer must be the source of the various earth-moving magic around here, and the organizer of all the gnoll activity. _Defeating the gnolls scattered around here before fighting it might be a good idea._

actors.mobs.gnollguard.name=gnoll guard
actors.mobs.gnollguard.def_verb=blocked
actors.mobs.gnollguard.spear_warn=The gnoll lands a vicious blow with the tip of its spear!
actors.mobs.gnollguard.desc=A large and tough looking gnoll wielding a spear and a shield, but no helmet. These guards are likely brutes in training, roped into helping protect the mine from encroaching wildlife.\n\nThe gnoll guard is strong enough to wield the spear in one hand, but can't use it very well. _It will need fairly open space to attack at a distance, and will do notably less damage to you if you get up close._
actors.mobs.gnollguard.desc_armor=_A nearby gnoll sapper is holding a device that is granting this guard earthen armor, heavily reducing the damage it takes._

actors.mobs.gnollsapper.name=gnoll sapper
actors.mobs.gnollsapper.desc=A small and weak but intelligent gnoll with pale fur and a satchel full of various gadgets. They are likely here to assist with prospecting and mining dark gold, and have a nearby guard for protection. They are capable of fighting, but their attacks are pitifully weak, no stronger than a gnoll scout.\n\nInstead of fighting directly, sappers prefer to use the various gadgets they have to make the rocky environment attack for them. They don't know earth-moving magic themselves though, and so are pretty likely to use their gadgets recklessly. _There should be lots of ways to use their attacks against them, or their guard._

actors.mobs.gnolltrickster.name=gnoll trickster
actors.mobs.gnolltrickster.desc=A strange looking creature, even by gnoll standards. It hunches forward with a wicked grin, almost cradling the satchel hanging over its shoulder. Once the most notorious gnoll assassin in the land, it seems it has lost most of its sanity to all the dark magic around here, making it even more dangerous than the previous times he's attempted to take His Royal Rattiness's life. Its eyes are wide with a strange mix of fear and excitement, it seems that is all it can feel anymore... But why should I be feeling bad for an assassin?\n\nThere is a large collection of poorly made darts in its satchel, they all seem to be tipped with various harmful substances.

actors.mobs.goldenmimic.name=golden mimic
actors.mobs.goldenmimic.desc=Mimics are magical creatures which can take any shape they wish. In dungeons they almost always choose a shape of a treasure chest, in order to lure in unsuspecting adventurers.\n\nGolden mimics are tougher mimics which try to attract the strongest adventurers. They have better loot, but are also much stronger than regular mimics.

actors.mobs.golem.name=golem
actors.mobs.golem.def_verb=blocked
actors.mobs.golem.desc=Golems are an attempt to correct the previous flaws in dwarven machinery via the dwarves newfound use of magic. They are much more compact and efficient compared to the DM-300 while still being very deadly.\n\nWhile golems are still too large to fit into passageways, the dwarves have given them new magical abilities to compensate. Golems can teleport themselves between rooms, and teleport enemies to them when they are out of reach.

actors.mobs.goo.name=Goo
actors.mobs.goo.notice=GLURP-GLURP!
actors.mobs.goo.defeated=glurp... glurp...
actors.mobs.goo.!!!=!!!
actors.mobs.goo.pumpup=Goo is pumping itself up!
actors.mobs.goo.enraged=enraged
actors.mobs.goo.gluuurp=GLUUUURP!
actors.mobs.goo.rankings_desc=Absorbed by the Goo
actors.mobs.goo.bolt_kill=You were killed by warped Goo magic...
actors.mobs.goo.desc=Little is known about The Goo. It's quite possible that it is not even a creature, but rather a conglomerate of vile substances from the sewers that somehow gained basic intelligence. Regardless, dark magic is certainly what has allowed Goo to exist.\n\nIts gelatinous nature has let it absorb lots of dark energy, you feel a chill just from being near. If Goo is able to do its OP attack...

actors.mobs.greatcrab.name=great crab
actors.mobs.greatcrab.noticed=The crab blocks with its massive claw.
actors.mobs.greatcrab.def_verb=blocked
actors.mobs.greatcrab.desc=Once known as the Crab King, this crab no longer appears to respond to reason thanks to the invading dark magic. It is attacking a previously steadfast ally, a true shame considering the long history it has with the majestic King of Rats...\n\nThis crab is gigantic, even compared to other sewer crabs. Its blue shell is covered in cracks and barnacles, showing great age. Unfortunately the wisdom that Rat King most treasured from his fellow king is long gone, however. It lumbers around slowly, barely keeping balance with its massive claw.\n\nWhile the crab only has one claw, its size easily compensates. The crab holds the claw in front of any threat, shielding itself behind an impenetrable wall of carapace. However, the crab cannot block attacks it doesn't see coming, or attacks from multiple enemies at once.
actors.mobs.greatcrab.desc_no_rk=Once known as the Crab King, this crab no longer appears to respond to reason thanks to the invading dark magic. It is attacking a previously steadfast ally, a true shame considering the long history it has with the majestic royal family of Rats...\n\nThis crab is gigantic, even compared to other sewer crabs. Its blue shell is covered in cracks and barnacles, showing great age. Unfortunately the wisdom that Rat Kingdom archivists most treasured is long gone, however. It lumbers around slowly, barely keeping balance with its massive claw.\n\nWhile the crab only has one claw, its size easily compensates. The crab holds the claw in front of any threat, shielding itself behind an impenetrable wall of carapace. However, the crab cannot block attacks it doesn't see coming, or attacks from multiple enemies at once.

actors.mobs.guard.name=prison guard
actors.mobs.guard.scorpion=Get over here!
actors.mobs.guard.def_verb=blocked
actors.mobs.guard.desc=Once keepers of the prison, these guards have long since become no different than the inmates. They shamble like zombies, brainlessly roaming through the halls in search of anything out of place, like you!\n\nThey carry chains around their hip, possibly used to pull in enemies to close range.\n\nThey're so far gone that they won't even realize the guy they are attacking is actually a king...

actors.mobs.mimic.name=mimic
actors.mobs.mimic.reveal=That chest is a mimic!
actors.mobs.mimic.hidden_hint=Something about this chest feels off... Walking up and trying to open it might be a bad idea.
actors.mobs.mimic.desc=Mimics are magical creatures which can take any shape they wish. In dungeons they almost always choose a shape of a treasure chest, in order to lure in unsuspecting adventurers.\n\nMimics have a nasty bite, but often hold more treasure than a regular chest.

actors.mobs.necromancer.name=necromancer
actors.mobs.necromancer.desc=These apprentice dark mages have flocked to the prison, as it is the perfect place to practise their evil craft.\n\nNecromancers will summon and empower gross skeletons to fight for them. Killing the necromancer will also kill the skeleton it summons. Not a match for mightiest rat in the dungeon.
actors.mobs.necromancer$necroskeleton.name=necromancer's skeleton
actors.mobs.necromancer$necroskeleton.desc=This skeleton has been summoned by a necromancer. It behaves just like a regular skeleton, and will die when the necromancer which summoned it is slain.

actors.mobs.mob.died=You hear something die in the distance.
actors.mobs.mob.rage=#$%^
actors.mobs.mob.rankings_desc=Slain by: %s

actors.mobs.monk.name=dwarf monk
actors.mobs.monk.def_verb=blocked
actors.mobs.monk.parried=parried
actors.mobs.monk.desc=These monks are stans of their king, who have devoted themselves to protecting their king through physical might meant by king. So great is their devotion to king that they have totally surrendered their minds to their king, and now roam the dwarven city like mindless zombies.\n\nMonks rely solely on the art of hand-to-hand combat, and are able to use their unarmed kings both for offense and defense of king. When they become king, king will king the next king king against king, even if it was king. Kings build king more king while king, and king king when king. King.
actors.mobs.monk$focus.name=focused
actors.mobs.monk$focus.desc=This monk is perfectly honed in on their target, and seem to be anticipating their moves before they make them.\n\nWhile focused, the next physical attack made against this character is guaranteed to miss, no matter what circumstances there are. Parrying this attack will spend the monk's focus, and they will need to build it up again to parry another attack. Monks build focus more quickly while they are moving.

actors.mobs.phantompiranha.name=phantom piranha
actors.mobs.phantompiranha.teleport_away=The phantom piranha teleports away...
actors.mobs.phantompiranha.desc=Phantom piranhas are a rare breed of piranha with magical abilities and eerie translucent bodies. They are capable of teleporting as they are being attacked, either to escape or to quickly get close to their enemy!\n\nWhile they are annoying to fight, their meat is prized for its magical properties.

actors.mobs.piranha.name=giant piranha
actors.mobs.piranha.desc=These carnivorous fish are not natural inhabitants of underground pools. They were bred specifically to protect flooded treasure vaults.

actors.mobs.pylon.name=power pylon
actors.mobs.pylon.desc_inactive=A power pylon, meant to help regulate the electricity which powers the machinery in this area.\n\nThe pylon is currently inactive and immune to damage.
actors.mobs.pylon.desc_active=A power pylon, meant to help regulate the electricity which powers the machinery in this area. The pylon is currently surging with electrical energy, this must be what's supercharging DM-300!\n\nIn this state pylons are vulnerable, but will arc electricity to nearby cells in a clockwise pattern. Due to their heavy metal construction, pylons are resistant to large amounts of damage.

actors.mobs.rat.name=rat
actors.mobs.rat.enemy=heretic %s
actors.mobs.rat.enemy_no_rk=marsupial %s
actors.mobs.rat.ally=loyal %s
actors.mobs.rat.desc=Marsupial rats are aggressive but rather weak denizens of the sewers. They have a nasty bite, but are only life threatening in large numbers.
actors.mobs.rat.desc_enemy_no_rk=There is no one to guide them in such chaotic environment. Or was there?
actors.mobs.rat.desc_enemy=Unfortunately, in the chaos recently the heretic rats have dramatically risen in number, and they refuse to listen to Rat King anymore. Could someone be behind this?
actors.mobs.rat.desc_ally=This rat is one of Rat King's many loyal followers. It will fight for you even when all hope appears to be lost, for it is a rat, and rats get things done!
actors.mobs.rat.desc_ally_no_rk=This rat is one of Rat Kingdom's many remaining survivors. It will fight for you even when all hope appears to be lost, for it is a rat, and rats get things done!

actors.mobs.ripperdemon.name=ripper demon
actors.mobs.ripperdemon.leap=The ripper demon prepares to leap!
actors.mobs.ripperdemon.desc=These horrific creatures are the result of the many dwarven corpses in this region being put to use by demonic forces. Rippers are emaciated ghoulish creatures that resemble dwarves, but with broken bodies and long sharp claws made of bone.\n\nRipper demons are not particularly durable, but they are agile and dangerous. They are capable of leaping great distances to quickly reach targets before goring them with their claws.\n\nThankfully, however, they're not rats. If they were rats, this mission would be impossible.

actors.mobs.threadripper.name=threadripper
actors.mobs.threadripper.leap=The threadripper demon prepares to leap!
actors.mobs.threadripper.desc=The worst fears coming true: a rat, merged with ripper.\n\nIts stats seems to grow with each chapter, and it gets _increasingly stronger but less common_ with more active challenges.
actors.mobs.threadripper.desc_rat_king=The failed experiment to create perfect rat, it might be just enough strong to imitate the threat of ripper demon.

actors.mobs.rotheart.name=rot heart
actors.mobs.rotheart.desc=A Rotberry's fruit is very unique. Instead of rotting away and providing nutrients, the fruit grows, hardens, and encompasses the seed. It provides protection for the internal organs which grow inside the fruit. This giant orb is referred to as the heart of an adult rotberry plant.

actors.mobs.rotlasher.name=rot lasher
actors.mobs.rotlasher.desc=The rot lasher is a part of a mature rotberry plant's root structure, and also their primary means of defense. Lashers are blind and stuck into the ground, but will violently assault any nearby threat after taking a moment to detect them. When there is no nearby enemies, they stand motionless, attempting to blend in with surrounding vegetation.

actors.mobs.scorpio.name=rat acolyte
actors.mobs.scorpio.desc=This is one of Rat Queen's clones, who have been synthesised in order to protect smaller rodents and deflects attacks on the kingdom. Unfortunately, after she deceased the clones went unstable, attacking everyone without a sweat. In order to seal them away, RK had to make a deal with DK to send acolyte clones into "special hell" as it was called.\n\nBut what those artificial rats gonna do if the traitor have died in curb-stomp battle???

actors.mobs.senior.name=senior monk
actors.mobs.senior.desc=These monks are fanatics, who have devoted themselves to protecting their king through physical might. So great is their devotion that they have totally surrendered their minds to their king, and now roam the dwarven city like mindless zombies.\n\nThis monk has mastered the art of hand-to-hand combat, and is able to gain focus while moving much more quickly than regular monks. When they become focused, monks will parry the next physical attack used against them, even if it was otherwise guaranteed to hit. Monks build focus more quickly while on the move, and more slowly when in direct combat.

actors.mobs.shaman.name=gnoll shaman
actors.mobs.shaman.bolt_kill=The magic bolt killed you...
actors.mobs.shaman.desc=Gnoll shamans are intelligent gnolls who use battle spells to compensate for their lack of might. They have a very respected position in gnoll society, despite their weaker strength.
actors.mobs.shaman$redshaman.spell_desc=This shaman is wearing a red mask, and will use magic that temporarily _weakens your attacking power._
actors.mobs.shaman$blueshaman.spell_desc=This shaman is wearing a blue mask, and will use magic that temporarily _increases the damage you take._
actors.mobs.shaman$purpleshaman.spell_desc=This shaman is wearing a purple mask, and will use magic that temporarily _reduces your accuracy and evasion._

actors.mobs.armoredbrute.name=armored brute
actors.mobs.armoredbrute.desc=This is the real gnoll brute, wearing powerful armor to show their status. The armor makes these brutes much more resilient to physical damage, and their greater discipline means they can rage for much longer before succumbing to their wounds.

actors.mobs.skeleton.name=skeleton
actors.mobs.skeleton.explo_kill=You were killed by the explosion of bones...
actors.mobs.skeleton.def_verb=blocked
actors.mobs.skeleton.desc=Skeletons are composed of the bones of unlucky childrens and inhabitants of the prison, animated by emanations of bad time from the depths below Rat Kingdom. After they have been damaged enough, skeletons will disintegrate in an explosion of bones, which is definitely bullshit. The shrapnel from this explosion is harmful to anything nearby, but armor is very effective at mitigating it.

actors.mobs.slime.name=slime
actors.mobs.slime.def_verb=blocked
actors.mobs.slime.desc=Slimes are strange, slightly magical creatures with a rubbery outer body and a liquid core. The city sewers provide them with an ample supply of water and nutrients.\n\nBecause of their elastic outer membrane, it is difficult to deal more than _6 damage_ to slimes from any one attack. Could be worse.

actors.mobs.snake.name=sewer snake
actors.mobs.snake.hint=Try using the examine button on a snake to learn how to counter them.
actors.mobs.snake.desc=These oversized serpents are capable of quickly slithering around blows, making them quite hard to hit. Magical attacks or surprise attacks are capable of catching them off-guard however.\n\nYou can perform a surprise attack by attacking while out of the snake's vision. One way is to let a snake chase you through a doorway and then _strike just after it moves into the door._

actors.mobs.spectralnecromancer.name=spectral necromancer
actors.mobs.spectralnecromancer.desc=While Skeletons are a necromancer’s bread and butter, some prefer to look into other less corporeal minions. Spectral necromancers have chosen wraiths as their minion of choice!\n\nIndividual wraiths aren't as strong as skeletons, but these necromancers aren't afraid to summon a bunch of them!

actors.mobs.spinner.name=cave spinner
actors.mobs.spinner.desc=These greenish furry cave spiders try to avoid direct combat. Instead they prefer to wait in the distance while their victim struggles in their excreted cobweb, slowly dying from their venomous bite. They are capable of shooting their webs great distances, and will try to block whatever path their prey is taking.

actors.mobs.statue.name=animated statue
actors.mobs.statue.def_verb=blocked
actors.mobs.statue.desc=You would think that it's just another one of this dungeon's inanimate statues, but its red glowing eyes give it away.
actors.mobs.statue.desc_weapon=While the statue itself is made of stone, the _%s_ it's wielding looks real.

actors.mobs.succubus.name=succubus
actors.mobs.succubus.desc=Succubi are shapeshifting demons that manipulate the minds of their prey. This one has taken the form of a pale gothic humanoid, perhaps to attract dwarven warlocks or Rat King?\n\nSuccubi may temporarily charm their enemy when they attack, making their enemy unable to directly attack them. When succubi attack a charmed enemy, they will steal some of their life essence.
actors.mobs.succubus.desc_no_rk=Succubi are shapeshifting demons that manipulate the minds of their prey. This one has taken the form of a pale gothic humanoid, perhaps to attract dwarven warlocks?\n\nSuccubi may temporarily charm their enemy when they attack, making their enemy unable to directly attack them. When succubi attack a charmed enemy, they will steal some of their life essence.

actors.mobs.swarm.name=swarm of flies
actors.mobs.swarm.desc=The deadly swarm of flies buzzes angrily. Every non-magical attack will split it into two smaller but equally dangerous swarms.

actors.mobs.tengu.name=Tengu
actors.mobs.tengu.notice_gotcha=Gotcha, %s!
actors.mobs.tengu.interesting=Let's make this interesting...
actors.mobs.tengu.notice_have=I have you now, %s!
actors.mobs.tengu.defeated=Free at last...
actors.mobs.tengu.rankings_desc=Assassinated by the Tengu
actors.mobs.tengu.desc=A famous and enigmatic assassin, named for the mask grafted to his face.\n\nTengu is held down with large clasps on his wrists and knees, though he seems to have gotten rid of his chains (and his sanity) long ago.\n\nHe will try to use traps, deceptive magic, and precise attacks to eliminate the only thing stopping his escape: you.\n\nIt's a true shame he's insane, otherwise you might have pardoned him.

actors.mobs.tengu$bombability$bombblob.desc=A cloud of superheated smoke is billowing here. Watch out, it's going to explode!
actors.mobs.tengu$bombability$bombitem.name=Smoke Bomb
actors.mobs.tengu$bombability$bombitem.cant_pickup=It's stuck to the ground, you can't move it!
actors.mobs.tengu$bombability$bombitem.desc=Tengu has thrown a strange looking smoke bomb here, which is billowing a thick hot smoke. It's making a loud ticking noise, as if its counting down to an explosion!\n\nThe bomb has anchored itself to the ground, so you can't pick it up.

actors.mobs.tengu$fireability$fireblob.desc=Tengu has thrown a fine powder that seems to be catching into steam here, it's about to ignite!

actors.mobs.tengu$shockerability$shockerblob.desc=Electrical energy is building here, anything standing on this tile will be shocked next turn!
actors.mobs.tengu$shockerability$shockeritem.name=Shocker
actors.mobs.tengu$shockerability$shockeritem.cant_pickup=It's putting out too much electricity, you can't grab it!
actors.mobs.tengu$shockerability$shockeritem.desc=Tengu has thrown a curious machine here, which seems to be made of DM-100 parts. The machine is constantly arcing electricity around it, but it seems to be going in a predictable pattern.\n\nWith all the electricity arcing around it, there's no way you can pick this up.

actors.mobs.thief.name=rogue rat
actors.mobs.thief.stole=The rogue stole %s from you!
actors.mobs.thief.carries=\n\nThe rogue is carrying a _%s._ Illegally obtained, of course.
actors.mobs.thief.escapes=The rogue gets away with your %s!
actors.mobs.thief.desc=The mutated rat criminals, escaping from Rat King's gaze and inevitable punishment. They will keep running away for their freedom, not realizing the amorality of their actions.\n\nThese enemies are more likely to steal and run than they are to fight. Make sure to keep them in sight, or you might never see your stolen item again.
actors.mobs.thief.desc_no_rk=The mutated rat criminals, escaping from Rat Kingdom's unfair justice system and inevitable punishment. They will keep running away for their freedom, not realizing the amorality of their actions.\n\nThese enemies are more likely to steal and run than they are to fight. Make sure to keep them in sight, or you might never see your stolen item again.

actors.mobs.tormentedspirit.name=tormented spirit
actors.mobs.tormentedspirit.desc=Tormented spirits are otherwise good-natured spirits that have been afflicted by a curse. So long as they are cursed they will attack just like a wraith, and are more powerful as well!\n\nIt may be possible to cleanse the curse by using the right item while next to the spirit. If the curse is lifted the spirit will surely be grateful...
actors.mobs.tormentedspirit.thank_you=Thank you...

actors.mobs.warlock.name=dwarf warlock
actors.mobs.warlock.bolt_kill=The shadow bolt killed you...
actors.mobs.warlock.desc=As the dwarves' interests shifted from engineering to arcane arts, warlocks came to power in the city. They started with elemental magic, but soon switched to demonology and necromancy. The strongest of these warlocks seized the throne of the dwarven city, and his cohorts were allowed to continue practising their dark magic, so long as they surrendered their free will to him.\n\nThese warlocks possess powerful disruptive magic, and are able to temporarily hinder the upgrade magic applied to your equipment. The more upgraded an item is, the more strongly it will be affected.

actors.mobs.wraith.name=wraith
actors.mobs.wraith.desc=A wraith is a vengeful spirit of a sinner, whose grave or tomb was disturbed. Being an ethereal entity, it is very hard to hit with a regular weapon.

actors.mobs.yogdzewa.name=Yog-Dzewa
actors.mobs.yogdzewa.notice=I. SEE. YOU.
actors.mobs.yogdzewa.darkness=The darkness pulls in closer...
actors.mobs.yogdzewa.hope=YOUR. HOPE. IS. AN. ILLUSION!
actors.mobs.yogdzewa.defeated=...
actors.mobs.yogdzewa.rankings_desc=Devoured by Yog-Dzewa
actors.mobs.yogdzewa.desc=Yog-Dzewa is an Old God; a great monstrosity which reaches into mortal worlds and devours them to fuel its endless growth. The dwarves must have attracted the attention of this cosmic horror while toying with dark magics, and have been trying to keep it contained ever since.\n\nYog-Dzewa originates from a dimension of raw magical chaos, and cannot bring its true form into this world. Instead it has created avatars and summoned demonic minions to do its bidding here.\n\nThis giant eye is the focal point of Yog-Dzewa's power in this world. While the eye itself is immobile, it is capable of shooting powerful beams of demonic magic and summoning a variety of minions to aid it.\n\nIf that wasn't enough, this piece of **** has taken something valuable from you!
actors.mobs.yogdzewa.desc_spawners=You can feel waves of demonic energy radiating to the eye from the floors above. Something you left alive up there must be funneling power back into Yog-Dzewa. _Yog will use this energy to summon more powerful minions!_
actors.mobs.yogdzewa$larva.name=god's larva
actors.mobs.yogdzewa$larva.rankings_desc=Devoured by Yog-Dzewa
actors.mobs.yogdzewa$larva.desc=These tiny spawn of Yog-Dzewa are simple minions that are easy to produce. While individually weak, they are summoned quickly and can become overwhelming in large numbers.
actors.mobs.yogdzewa$yogripper.rankings_desc=Devoured by Yog-Dzewa
actors.mobs.yogdzewa$yogeye.rankings_desc=Devoured by Yog-Dzewa
actors.mobs.yogdzewa$yogscorpio.rankings_desc=Devoured by Yog-Dzewa

actors.mobs.yogfist.invuln_warn=The fist is invulnerable while near to the eye!
actors.mobs.yogfist.rankings_desc=Devoured by Yog-Dzewa
actors.mobs.yogfist.desc=This fist is an aspect of Yog-Dzewa's power. Fists are linked to the power of Yog-Dzewa, and will be protected from all damage when they are close to the eye.
actors.mobs.yogfist$burningfist.name=burning fist
actors.mobs.yogfist$burningfist.desc=This fist is formed out of chaotic fiery magic. As it moves it will constantly set terrain around it ablaze. It is also capable of shooting blasts of fiery power, which spread flames where they impact.\n\nThe fist's ability to spread flames is suppressed when near water, but its heat is so great that any water around it will evaporate after a short while!
actors.mobs.yogfist$soiledfist.name=soiled fist
actors.mobs.yogfist$soiledfist.desc=This fist is formed out of chaotic earthen magic. As it moves it will constantly cause vegetation to sprout around it. It can also shoot concentrated earthen blasts that will ensnare its target in rapidly growing vines and roots!\n\nThe fist derives power from this plant life, and will resist damage based on the amount of tall or furrowed vegetation near it!
actors.mobs.yogfist$rottingfist.name=rotting fist
actors.mobs.yogfist$rottingfist.desc=This fist is formed out of living corruption. It is a towering mass of decaying flesh that can spread caustic ooze in melee and toxic gas at range. Even worse, the fist's great mass causes it to bleed instead of taking damage directly.\n\nWater can be used to wash the ooze off, but the fist is also capable of absorbing water to heal itself! Additionally, damaging the fist while it is bleeding will cause the bleed to refresh, but not stack!
actors.mobs.yogfist$rustedfist.name=rusted fist
actors.mobs.yogfist$rustedfist.desc=This fist is formed out of living metal. It is a towering mass of shifting metal that has powerful melee attacks, and can cripple its targets at range. Because of its tremendous mass, the fist will take any damage dealt to it over time, instead of immediately.\n\nThe fist is inflexible however, and cannot move into tight passageways. Additionally, while it may take damage slowly, the deferred damage will continue to increase if the fist is hit multiple times.
actors.mobs.yogfist$brightfist.name=bright fist
actors.mobs.yogfist$brightfist.teleport=The fist teleports away in a flash of light that seriously blinds you!
actors.mobs.yogfist$brightfist.desc=This fist is formed out of pure light energy. It is capable of shooting powerful rays of searing light every turn! These beams will temporarily blind you in addition to dealing heavy damage. The fist is also capable of briefly engulfing the arena in blinding light in order to escape!\n\nThe fist has no special abilities which it can use in melee range however.
actors.mobs.yogfist$darkfist.name=dark fist
actors.mobs.yogfist$darkfist.teleport=The fist teleports away in a blast of darkness that extinguishes your light source!
actors.mobs.yogfist$darkfist.desc=This fist is formed out of pure dark energy. It is capable of shooting powerful blasts of dark magic every turn! These blasts will weaken your light source in addition to dealing heavy damage. The fist is also capable of briefly engulfing the arena in darkness in order to escape!\n\nThe fist has no special abilities which it can use in melee range however.


actors.mobs.abyssalspawner.name=abyssal spawner
actors.mobs.abyssalspawner.desc=This twisting amalgam of reality is responsible for creating abyssal creatures from oblivious void and passed souls.\n\nWhile visually terrifying, abyssal spawners have no means of moving or directly defending themselves. Their considerable density and regeneration makes them extremely hard to kill quickly however, and they will spawn enemies more quickly when they are under threat.\n\n_Finally defeating them will yield a special reward._
actors.mobs.abyssalspawner$clump.name=runic cluster
actors.mobs.abyssalspawner$clump.desc=This fragment of abyssal matter seems to be imbued with strange, yet familiar power of enhancement. One cluster doesn't have enough power to actually upgrade your equipment, however. Maybe two can combine into something usable?
actors.mobs.abyssalspawner$clump.piece1=You collect a runic cluster, but more is needed for an upgrading item.
actors.mobs.abyssalspawner$clump.piece2=Two collected runic clusters seem to merge together, creating a scroll of upgrade!

actors.mobs.darkestelf.name=darkest elf
actors.mobs.darkestelf.desc=This entity is so dark you can't even see his eyes, filled with despair and void. Using the chaotic magic of Abyss, darkest elfs summon slimy splitting darkness to aid them in battle.

actors.mobs.spectrerat.name=possessed rodent
actors.mobs.spectrerat.desc=This rat corpse has been reanimated by abyssal magic. In idle state, it spasms in place trying to get up, but once provoken, the rodent will spew harmful blasts of corruption.
actors.mobs.spectrerat.bolt_kill=The corrupting bolt killed you...

actors.mobs.ghostchicken.name=ghost chicken
actors.mobs.ghostchicken.desc=An one of abyssal spirits, ghost chickens can move at incredible speed, while absorbing all incoming damage and applying armor-piercing shrinking curse upon its enemies.

actors.mobs.phantom.name=phantom
actors.mobs.phantom.desc=Phantoms are natural inhabitants of the Abyss. They are completely invisible, only emitting small amount of dust at their position. Once awakened, they will spread lines of radioactive miasma to protect themselfes from melee hits. To avoid them, you can leave the rooms, as phantom are too bulky for doors.

actors.mobs.trappet.name=pelsjager
actors.mobs.trappet.desc=This humanoid can use endless amount of traps to corner his enemies. They do not have damaging spells, so you can counter those trappers by melee attacks.

actors.mobs.lostspirit.name=lost spirit
actors.mobs.lostspirit.desc=Lost spirits are one of elite monsters of the Abyss. They are composed of human souls consumed by eradicating lights and voidic energy of this place, which makes them to blast your enemies to make them stronger with champion mutations. Mutations can make creature spew fire out, swim in water, absorb damage or use chaotic magic.\n\nLost spirits, due to their humanity, have very low health and will refuse to attack you or your allies, but create protective barriers around themselves on using their spells and will actively retreat if critically wounded, simultaneously calling other abyssal monsters out of deeper levels for help.\n\nAttacking them from afar will be significantly less efficient than melee hits.


actors.buffs.shrink.name=Shrunken
actors.buffs.shrink.desc=It's hard to keep going when it seems like everything in universe got bigger.\n\nShrunk characters will receive more damage from all sources, have less accuracy and evasion, deal less damage with melee attacks and magical spells.\n\nShrinking is permanent, its effects only end in death.

actors.buffs.timedshrink.name=Shrunken
actors.buffs.timedshrink.desc=It's hard to keep going when it seems like everything in universe got bigger.\n\nShrink characters will receive more damage from all sources, have less accuracy and evasion, deal less damage with melee attacks and magical spells.\n\nTurns of shrinking remaining: %s.

actors.mobs.abyssalnightmare.name=abyssal nightmare
actors.mobs.abyssalnightmare.desc=Abyssal nightmares are one of elite monsters of the Abyss. They are highly resistant to any source of magical damage and all debuffs except amok and can copy itself to increase offensive power. Their fortitude also scales down with its missing health: the more damage it takes, the more it will take from future hits.\n\n\
As nightmares are united with Abyss itself, they can sense any disturbance outside and seek the opponent. Hiding behind walls will just make nightmare consume them to reach you.

actors.mobs.blinkingman.name=blinking man
actors.mobs.blinkingman.desc=Those abyssal demons are masters of distance. They shoot spirit javelins that have chance to push target away, and if its enemies reach them in melee range, blinking mans can teleport away in random direction to continue attacking.

actors.mobs.dragon.name=abyssal dragon
actors.mobs.dragon.desc=Abyssal dragons are one of elite monsters of the Abyss. They breath abyssal fire that inflicts frostburn and spawns smaller dragons around you, and their melee attacks attack your nearby allies.
actors.mobs.dragon$smalldragon.name=dragon spawn
actors.mobs.dragon$smalldragon.desc=While not being as strong as grown abyssal dragons, they still can cause troubles with how dragons can spawn them right next to you.

actors.mobs.finalfroggit.name=final froggit
actors.mobs.finalfroggit.bolt_kill=The eradication bolt killed you...
actors.mobs.finalfroggit.desc=Long ago, these frogs were artifical defenders of the lower levels of City. After the end of the dwarf civilization, Final Froggits were absorbed in dark energy and turned into the embodiment of eradicating light.\n\nThe presence of that creatures doesn't allow you to descend.

actors.mobs.finalfroggit$eradication.name=Eradication
actors.mobs.finalfroggit$eradication.desc=You're much more exposed to light.\n\nFinal Froggit will do more and more damage to you while this effect is active. \n\nTurns remaining: %1$s.\n\nDamage multiplier: %2$sx.

actors.mobs.darkslime.name=dark matter slime
actors.mobs.darkslime.desc=The embodiement of dungeon's dark energy. Every non-magical attack will split it into two slighty smaller but equally dangerous slimes. Although, slimes will take a lot more damage from arcane magic.

actors.char.kill=%s killed you...
actors.char.defeat=you defeated %s.
actors.char.def_verb=dodged
actors.char.absorbed=absorbed
actors.char.invulnerable=invulnerable
actors.char.immune=immune
