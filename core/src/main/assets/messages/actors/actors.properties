###blobs
actors.blobs.blizzard.name=blizzard
actors.blobs.blizzard.desc=A blizzard is swirling here.

actors.blobs.confusiongas.name=confusion gas
actors.blobs.confusiongas.desc=A cloud of confusion gas is swirling here.

actors.blobs.electricity.name=electricity
actors.blobs.electricity.desc=A field of electricity is sparking brightly here.
actors.blobs.electricity.rankings_desc=Electrocuted
actors.blobs.electricity.ondeath=You were shocked to death...

actors.blobs.fire.name=fire
actors.blobs.fire.desc=A fire is raging here.
actors.blobs.godslayerfire.desc=A red fire is raging here.
actors.blobs.frostfire.desc=A cold fire is raging here.
actors.blobs.miasma.desc=Specks of dark energy are swarming here. Don't touch this miasma, it will overwhelm every target with negative effects.

actors.blobs.foliage.name=foliage
actors.blobs.foliage.desc=Shafts of light pierce the gloom of the underground garden.

actors.blobs.freezing.name=freezing air
actors.blobs.freezing.desc=The air is unnaturally frigid here.

actors.blobs.goowarn.name=dark energy
actors.blobs.goowarn.desc=Specks of dark energy are swarming here!

actors.blobs.gravery.desc=The air is filled with ash and despair.
actors.blobs.gravery.ondeath=You turned into ghost...
actors.blobs.gravery.rankings_desc=Sacrificed themselves to Death

actors.blobs.inferno.name=inferno
actors.blobs.inferno.desc=An inferno is raging here.

actors.blobs.paralyticgas.name=paralytic gas
actors.blobs.paralyticgas.desc=A cloud of paralytic gas is swirling here.

actors.blobs.regrowth.name=regrowth

actors.blobs.sacrificialfire.name=sacrificial fire
actors.blobs.sacrificialfire.desc=There is an altar here with a sacrificial fire burning atop it. Any creature that's killed here will be consumed as an offering to the spirits of the dungeon.\n\nPerhaps a reward will be given if enough sacrifices are made?
actors.blobs.sacrificialfire.worthy=The fire consumes your offering and grows stronger.
actors.blobs.sacrificialfire.unworthy=The fire consumes your offering, but doesn't change.
actors.blobs.sacrificialfire.reward=The fire flares and then dissipates, leaving a reward behind!

actors.blobs.smokescreen.name=smokescreen
actors.blobs.smokescreen.desc=A cloud of thick black smoke is swirling here.

actors.blobs.stenchgas.name=stench gas
actors.blobs.stenchgas.desc=A cloud of fetid stench is swirling here.

actors.blobs.stormcloud.name=storm clouds
actors.blobs.stormcloud.desc=A cloud of billowing water vapor is swirling here.

actors.blobs.toxicgas.name=toxic gas
actors.blobs.toxicgas.desc=A greenish cloud of toxic gas is swirling here.
actors.blobs.toxicgas.rankings_desc=Suffocated
actors.blobs.toxicgas.ondeath=You died from the toxic gas...

actors.blobs.corrosivegas.name=corrosive gas
actors.blobs.corrosivegas.desc=A cloud of deadly caustic gas is swirling here.

actors.blobs.waterofawareness.name=water of awareness
actors.blobs.waterofawareness.procced=As you take a sip, you feel knowledge pour into your mind.
actors.blobs.waterofawareness.desc=Power of knowledge radiates from the water of this well. Drinking from the well will fully identify all equipped items, identify curses on all items in your inventory, and reveal all items on the current floor.

actors.blobs.waterofhealth.name=water of health
actors.blobs.waterofhealth.procced=As you take a sip, you feel your wounds heal completely.
actors.blobs.waterofhealth.desc=Power of health radiates from the water of this well. Drinking from this well will heal your wounds, satisfy hunger, and cleanse curses on any worn items.

actors.blobs.web.name=spider web
actors.blobs.web.desc=A thick web is covering everything here. Anything that touches or is thrown through the web will break it, but will also be stuck in place.



###buffs
actors.buffs.adrenaline.name=adrenaline
actors.buffs.adrenaline.desc=A surge of physical power, adrenaline enhanced both attack and movement speed.\n\nAdrenaline allows its target to run at 2x speed, and attack at 1.5x speed.\n\nTurns remaining: %s.

actors.buffs.adrenalinesurge.name=strength boost
actors.buffs.adrenalinesurge.desc=A surge of great might, but sadly not permanent.\n\nStrength boost: +%d.\nTurns until boost weakens: %s.

actors.buffs.amok.name=amok
actors.buffs.amok.desc=Amok causes a state of great rage and confusion in its target.\n\nWhen a creature is amoked, they will attack whatever is near them, whether they be friend or foe.\n\nTurns of amok remaining: %s.

actors.buffs.arcanearmor.name=arcane armor
actors.buffs.arcanearmor.desc=A thin shield is surrounding you, blocking some of the damage from magical attacks.\n\nYour magical armor is currently boosted by: 0-%d.\n\nTurns until arcane armor weakens: %s.

actors.buffs.artifactrecharge.name=artifact recharging
actors.buffs.artifactrecharge.desc=Energy is coursing through you, increasing the rate your equipped artifacts charge.\n\nEach artifact is affected a little differently, but they will all gain charge much faster than normal.\n\nTurns remaining: %s.

actors.buffs.ascensionchallenge.name=amulet's curse
actors.buffs.ascensionchallenge.desc=Somehow Yog-Dzewa is maintaining influence on this world through the amulet, and is trying to stop your ascent!\n\nYog's power is making the dungeon much more dangerous, increasing the number of enemies and making them stronger! This power will keep building if left unchecked, it can be weakened by defeating enemies that have been enhanced by Yog's power.
actors.buffs.ascensionchallenge.desc_clear=The dark energy radiating from the amulet has been weakened as much as possible for now.
actors.buffs.ascensionchallenge.desc_beckon=The amulet is currently _calling out to distant enemies,_ alerting them to your position.
actors.buffs.ascensionchallenge.desc_haste=The amulet is currently _hastening distant enemies,_ letting them reach you faster!
actors.buffs.ascensionchallenge.desc_slow=The amulet is currently _slowing you down,_ and negating speed boosting effects!
actors.buffs.ascensionchallenge.desc_damage=The energy from the amulet has gotten so strong that it's _directly harming you!_
actors.buffs.ascensionchallenge.beckon=The amulet begins calling out to distant enemies.
actors.buffs.ascensionchallenge.haste=The amulet begins hastening distant enemies!
actors.buffs.ascensionchallenge.slow=The amulet starts to feel like a lead weight in your inventory!
actors.buffs.ascensionchallenge.damage=The amulet begins radiating dark energy. It burns!
actors.buffs.ascensionchallenge.weaken_info=You must defeat enemies to weaken the amulet's curse!
actors.buffs.ascensionchallenge.weaken=You can feel the amulet's curse weaken slightly.
actors.buffs.ascensionchallenge.break=You take a moment to catch your breath and feel your wounds begin to close!
actors.buffs.ascensionchallenge.almost=You feel Yog's grip on the amulet begin to weaken, you're almost there!
actors.buffs.ascensionchallenge.on_kill=The dark energy consumes you...

actors.buffs.barkskin.name=barkskin
actors.buffs.barkskin.desc=Your skin is hardened, it feels rough and solid like bark.\n\nThe hardened skin increases your effective armor, allowing you to better defend against physical attack.\n\nYour armor is currently increased by: 0-%d.\nTurns until barkskin weakens: %s.\n\nIf you receive barkskin from multiple sources, only the strongest one will apply.

actors.buffs.barrier.name=barrier
actors.buffs.barrier.desc=A durable bubble of force which blocks all damage.\n\nThe barrier will take damage for whatever it is protecting so long as there is shielding left. The shielding will also slowly decay over time.\n\nShielding remaining: %d.

actors.buffs.berserk.angered=angered
actors.buffs.berserk.berserk=berserking
actors.buffs.berserk.exhausted=exhausted
actors.buffs.berserk.recovering=recovering
actors.buffs.berserk.angered_desc=The severity of the %1$s's injuries strengthen his blows. As the %1$s takes physical damage, his rage will build, granting him bonus damage. Damage which is blocked by armor still counts towards building rage.\n\nRage will fade over time. The lower the %1$s's health, the longer it will last.\n\nAt 100%% rage, the %1$s can go berserk, granting him 2x his seal's max shielding, increasing to 6x if he has very low health. This shielding decays over time and once it runs out the %1$s will have to rest before building rage again.
actors.buffs.berserk.current_rage=Current Rage: _%.0f%%_\n_+%.0f%%_ damage
actors.buffs.berserk.berserk_desc=At the brink of death, fear and uncertainty bleed away, leaving only anger. In this state of near-death the %1$s is extremely powerful _dealing %2$sx damage, gaining bonus shielding, and refusing to die._\n\nThis bonus shielding is equal to 2x his seal's max shielding, increasing to 6x if he has very low health. When this shielding is reduced to 0, berserking will end.\n\nAfter raging, the %1$s will need to recover before being able to build rage again.
actors.buffs.berserk.recovering_desc=Inner strength has its limits. The %s must rest before using his rage again.\n\nWhile recovering %s
actors.buffs.berserk.recovering_penalty_default=the %s does not build any rage from taking damage.
actors.buffs.berserk.recovering_desc_turns=Turns until recovered: _%d_
actors.buffs.berserk.recovering_desc_levels=Levels until recovered: _%.2f_
actors.buffs.berserk.recovering_penalty_berserk=the %s's ability to gain rage is hindered, effectively preventing him from refusing death until fully recovered.
actors.buffs.berserk.no_rages=Berserking will also permanently wear on him, reducing his max health each time.
actors.buffs.berserk.past_rages=Times berserker has raged: _%d_\nMax health reduced to: _%d%%_
actors.buffs.berserk.rankings_desc=Berserked to Death
actors.buffs.berserk.action_name=Berserk
actors.buffs.berserk.no_seal=You need your broken seal to berserk!

actors.buffs.bleeding.name=bleeding
actors.buffs.bleeding.ondeath=You bled to death...
actors.buffs.bleeding.heromsg=You are bleeding!
actors.buffs.bleeding.rankings_desc=Bled to Death
actors.buffs.bleeding.desc=That wound is leaking a worrisome amount of blood.\n\nBleeding causes damage every turn. Each turn the damage decreases by a random amount, until the bleeding eventually stops.\n\nCurrent bleed damage: %d.

actors.buffs.bless.name=blessed
actors.buffs.bless.desc=A great burst of focus, some say it is inspired by the gods.\n\nBlessing increases accuracy and evasion by 25%%, making the blessed much more effective in combat.\n\nTurns of bless remaining: %s.

actors.buffs.blindness.name=blinded
actors.buffs.blindness.heromsg=You are blinded!
actors.buffs.blindness.desc=Blinding turns the surrounding world into a dark haze.\n\nWhile blinded, a character's vision range is reduced to one tile, rendering ranged attacks useless and making it very easy to lose track of distant enemies. Additionally, a blinded hero is unable to read scrolls or books.\n\nTurns of blindness remaining: %s.

actors.buffs.buff.heromsg=

actors.buffs.burning.name=burning
actors.buffs.brawlerbuff.name=Temporary Strength
actors.buffs.brawlerbuff.action_name=special attack
actors.buffs.brawlerbuff.desc=With charging up, the Brawler can focus the physical power of his blows to increase his damage for next blow or to perform special attack. Each special attack requires 10 charge.\n\nCharge: _%s_\n\nDamage boost: _%s%%_

actors.buffs.burning.name=Burning
actors.buffs.burning.heromsg=You catch fire!
actors.buffs.burning.burnsup=%s burns up!
actors.buffs.burning.ondeath=You burned to death...
actors.buffs.burning.rankings_desc=Burned to Ash
actors.buffs.burning.desc=Few things are more distressing than being engulfed in flames.\n\nFire will deal damage every turn until it is put out by water or it expires. Fire can be extinquished by stepping into water, or from the splash of a shattering potion.\n\nAdditionally, the fire may ignite flammable terrain or items that it comes into contact with.\n\nTurns of burning remaining: %s.

actors.buffs.godslayerburning.name=Red Burning
actors.buffs.godslayerburning.heromsg=You catch flame!
actors.buffs.godslayerburning.burnsup=%s burns up!
actors.buffs.godslayerburning.ondeath=You burned to dark ashes...
actors.buffs.godslayerburning.rankings_desc=Burned to Dark Ashes
actors.buffs.godslayerburning.desc=I hope you survive at least one minute.\n\nThis variation of fire is 3x more dangerous to everything that is not immune to regular fire. It cannot be extinguished by any means, but heroes have resistance to it.\n\nTurns of burning remaining: %s.

actors.buffs.championenemy.warn=You sense a deadly presence.
actors.buffs.championenemy$blazing.name=blazing champion
actors.buffs.championenemy$blazing.desc=Blazing champions deal 25% more melee damage, ignite enemies they attack, are immune to fire, and spread fire around them as they die. They can't spread fire onto water however.
actors.buffs.championenemy$blazing.desc_rk=My weapons inflict burning and I am immune to fire!
actors.buffs.championenemy$projecting.name=projecting champion
actors.buffs.championenemy$projecting.desc=Projecting champions deal 25% more melee damage and have +3 attack range.
actors.buffs.championenemy$projecting.desc_rk=I can attack from 2 tiles further, and my thrown weapons can pierce walls!
actors.buffs.championenemy$antimagic.name=antimagic champion
actors.buffs.championenemy$antimagic.desc=Antimagic champions take 50% less damage and are completely immune to magical effects.
actors.buffs.championenemy$antimagic.desc_rk=Magic hurts me only for 50% damage!
actors.buffs.championenemy$giant.name=giant champion
actors.buffs.championenemy$giant.desc=Giant champions take 80% less damage and have +1 attack range, but cannot move through enclosed spaces.
actors.buffs.championenemy$giant.desc_rk=I have a trouble fitting through doors, but I take 50% less damage and attack from one tile further!
actors.buffs.championenemy$blessed.name=blessed champion
actors.buffs.championenemy$blessed.desc=Blessed champions have 4x accuracy and evasion.
actors.buffs.championenemy$blessed.desc_rk=I can dodge and hit stuff a lot more consistently!
actors.buffs.championenemy$stone.name=stone champion
actors.buffs.championenemy$stone.desc=Stone champions take less damage with loss of HP, up to 90% damage reduction.
actors.buffs.championenemy$splintering.name=splintering champion
actors.buffs.championenemy$splintering.desc=Splintering champions duplicate themselves with any sort of damage.
actors.buffs.championenemy$splintering.desc_rk=I am splitting into several rats while taking damage!
actors.buffs.championenemy$cursed.name=cursed champion
actors.buffs.championenemy$cursed.desc=Cursed champions cast cursed wand effect with their melee attacks.
actors.buffs.championenemy$cursed.desc_rk=I use cursed magic on my foes with each attack!
actors.buffs.championenemy$flowing.name=flowing champion
actors.buffs.championenemy$flowing.desc=Flowing champions cross any water lakes instantaneously.
actors.buffs.championenemy$voodoo.name=voodoo champion
actors.buffs.championenemy$voodoo.desc=Voodoo champions take 25% more damage and turn into another monster from same chapter on death.
actors.buffs.championenemy$explosive.name=explosive champion
actors.buffs.championenemy$explosive.desc=Explosive champions violently combust into explosions once they die.
actors.buffs.championenemy$growing.name=growing champion
actors.buffs.championenemy$growing.desc=Growing champions gain a steadily increasing bonus to accuracy, evasion, physical damage, and a reduction to damage taken.\n\nCurrent acc/eva/dmg boost: %1$d%%\nCurrent damage reduction: %2$d%%
actors.buffs.championenemy$swiftness.name=swiftness champion
actors.buffs.championenemy$swiftness.desc=Swiftness champions are small, but very fast.
actors.buffs.championenemy$reflective.name=reflective champion
actors.buffs.championenemy$reflective.desc=Reflective champions will reflect 50% of physical damage back to attacker.
actors.buffs.championenemy$paladin.name=paladin champion
actors.buffs.championenemy$paladin.desc=Paladin champions will not attack or move, but take 50% reduced damage, have increased vision and will protect anyone in its field of view from damage and status effects.
actors.buffs.championenemy$paladin.desc_rk=I can't move, but my allies take 75% less damage!

actors.buffs.charm.name=charmed
actors.buffs.charm.heromsg=You are charmed!
actors.buffs.charm.cant_attack=You are charmed by that enemy and can't attack them.
actors.buffs.charm.desc=A charm is manipulative magic that can make enemies temporarily adore each other.\n\nCharacters affected by charm are unable to directly attack the enemy they are charmed by. Attacking other targets is still possible however. The shock of pain will lessen the duration of charm.\n\nTurns of charm remaining: %s.

actors.buffs.chill.name=chilled
actors.buffs.chill.freezes=%s freezes!
actors.buffs.chill.desc=Not quite frozen, but still much too cold.\n\nChilled targets perform all actions more slowly, depending on how many turns are left in the effect. At its worst, this is equivalent to being slowed.\n\nTurns of chill remaining: %1$s.\nSpeed is reduced by: %2$s%%

actors.buffs.combo.name=combo
actors.buffs.combo.action_name=combo attack
actors.buffs.combo.combo=%d hit combo!
actors.buffs.combo.bad_target=You must target an enemy in attack range.
actors.buffs.combo.prompt=Select a target to attack.
actors.buffs.combo.desc=The %s builds momentum as they land successful blows. Each attack increases the combo counter by one, but taking too long between hits will reset the combo counter to 0.\n\nBuilding combo unlocks special combo attacks that cannot miss! A different attack is unlocked at 2, 4, 6, 8, and 10 combo count. Some moves reset combo and some do not, but each move can only be used once per combo session.\n\nCurrent combo: %d.\n\nTurns until Combo is lost: %s.
actors.buffs.combo$combomove.clobber.name=clobber
actors.buffs.combo$combomove.clobber.desc=Knocks an enemy back 2 tiles, but deals no damage and cannot knock into pits. Increments combo by 1.
actors.buffs.combo$combomove.clobber.empower_desc=Knocks an enemy back _3 tiles, inflicts vertigo, and can knock into pits,_ but deals no damage. Increments combo by 1.
actors.buffs.combo$combomove.slam.name=slam
actors.buffs.combo$combomove.slam.desc=Deals %d%% (combo*20%%) of your damage blocking power as bonus damage. Resets combo when used.
actors.buffs.combo$combomove.slam.empower_desc=_Leaps up to %1$d tile(s)_ and deals %2$d%% (combo*20%%) of your damage blocking power as bonus damage. Resets combo when used.
actors.buffs.combo$combomove.parry.name=parry
actors.buffs.combo$combomove.parry.desc=Blocks the next attack within 1 turn when activated, and instantly retaliates to it. Resets combo if nothing is parried.
actors.buffs.combo$combomove.parry.empower_desc=Blocks _all attacks_ within 1 turn when activated, and instantly retaliates to them. Resets combo if nothing is parried.
actors.buffs.combo$combomove.crush.name=crush
actors.buffs.combo$combomove.crush.desc=Deals %d%% (combo*25%%) damage to the primary target, and half that damage to all other enemies in a 7x7 AOE. Resets combo when used.
actors.buffs.combo$combomove.crush.empower_desc=_Leaps up to %1$d tile(s)_ and deals %2$d%% (combo*25%%) damage to the primary target, and half that damage to all other enemies in a 7x7 AOE. Resets combo when used.
actors.buffs.combo$combomove.fury.name=fury
actors.buffs.combo$combomove.fury.desc=Hits an enemy once for each combo you have, each hit deals 60% damage and can trigger enchantments. Resets combo when used.
actors.buffs.combo$combomove.fury.empower_desc=_Leaps up to %d tile(s)_ and hits an enemy once for each combo you have, each hit deals 60%% damage and can trigger enchantments. Resets combo when used.

actors.buffs.corruption.name=corrupted
actors.buffs.corruption.desc=Corruption seeps into the essence of a being, twisting them against their former nature.\n\nCorrupted creatures will attack their allies, and ignore their former enemies. Corruption is damaging as well, and will slowly cause its target to succumb.\n\nCorruption is permanent, its effects only end in death.

actors.buffs.cripple.name=crippled
actors.buffs.cripple.heromsg=You are crippled!
actors.buffs.cripple.desc=You're pretty sure legs aren't meant to bend that way.\n\nCrippled halves movement speed, making moving a tile usually take two turns instead of one.\n\nTurns of cripple remaining: %s.

actors.buffs.daze.name=dazed
actors.buffs.daze.heromsg=You are dazed!
actors.buffs.daze.desc=Ringing ears and blurred vision make it difficult to fight.\n\nWhile dazed, accuracy and evasion are reduced by 50%%, making both landing and evading blows much harder.\n\nTurns of daze remaining: %s.

actors.buffs.powerfuldegrade.name=Omnidegraded
actors.buffs.powerfuldegrade.desc=This stronger version of Degradation magic will nullify upgrades on every items, including artifacts.\n\nTurns of degradation remaining: %s.

actors.buffs.degrade.name=Degraded
actors.buffs.degrade.heromsg=Your equipment feels weaker!
actors.buffs.degrade.desc=Powerful dark magic is sapping the strength that scrolls of upgrade have applied to your equipment!\n\nWhile degraded, upgraded gear will be treated as if it is a lower level than it actually is. _Every upgrade after +3 becomes exponentially weaker than the last one._ The descriptions of your items will change to reflect their reduced power level.\n\nDegradation does not affect strength requirements, wand charges, durability of thrown weapons, or artifacts.\n\nTurns of degradation remaining: %s. Using a scroll of upgrade or remove curse will end degradation immediately.

actors.buffs.doom.name=doomed
actors.buffs.doom.desc=It's hard to keep going when it seems like the universe wants you dead.\n\nDoomed characters will receive +67% damage from all sources.\n\nDoom is permanent, its effects only end in death.

actors.buffs.dread.name=dread
actors.buffs.dread.desc=A terror so great that it will cause its target to flee the dungeon entirely!\n\nCreatures affected by dread will run from their opponent at high speed, and will disappear from the dungeon entirely once they are out of sight. Enemies that are defeated this way award half experience and drop no items. The shock of pain will lessen the duration of dread.\n\nTurns of dread remaining: %d.

actors.buffs.drowsy.name=drowsy
actors.buffs.drowsy.desc=A magical force is making it difficult to stay awake, after a few turns, the target will fall into a deep magical sleep.\n\nThe hero can resist drowsiness by taking damage or by being at full health.\n\nTurns until sleep: %s.

actors.buffs.earthimbue.name=imbued with earth
actors.buffs.earthimbue.desc=You are imbued with the power of earth!\n\nAll physical attacks will shift the earth under the enemy, crippling them for a short time.\n\nTurns of earth imbue remaining: %s.

actors.buffs.enhancedrings.name=enhanced rings
actors.buffs.enhancedrings.desc=The %s's recently used artifact is empowering %s rings, increasing their effective level by %s.\n\nTurns remaining: %s.

actors.buffs.fireimbue.name=imbued with fire
actors.buffs.fireimbue.desc=You are imbued with the power of fire!\n\nAll physical attacks will have a chance to light enemies ablaze. Additionally, you are completely immune to the effects of fire.\n\nTurns of fire imbue remaining: %s.

actors.buffs.flavourbuff.turns=Turns remaining: %s

actors.buffs.foresight.name=foresight
actors.buffs.foresight.desc=You are somehow able to see the layout of surrounding terrain with your mind.\n\nWhile under the effect of foresight all tiles in a wide radius are revealed to you, including any secret traps or doors.\n\nTurns of foresight remaining: %s.

actors.buffs.frost.name=frozen
actors.buffs.frost.freezes=%s freezes!
actors.buffs.frost.desc=Not to be confused with freezing solid, this more benign freezing simply encases the target in ice.\n\nFreezing acts similarly to paralysis, making it impossible for the target to act. Unlike paralysis, freezing is immediately cancelled if the target takes damage, as the ice will shatter.\n\nTurns of freeze remaining: %s.

actors.buffs.frostburn.name=Frostburn
actors.buffs.frostburn.heromsg=You catch cold fire!
actors.buffs.frostburn.burnsup=%s burns up by frost!
actors.buffs.frostburn.ondeath=You burned to death by winter...
actors.buffs.frostburn.rankings_desc=Burned to Dry Ice
actors.buffs.frostburn.desc=Frost burning might not be as damaging as regular fire, but it hurts A LOT and freezes your hands off.\n\nCold fire will deal damage each turn until it goes out. This kind of fire can only be extinguished by a splash of a shattering potion.\n\nAdditionally, the fire may ignite flammable terrain or items that it comes into contact with.\n\nTurns of cold fire remaining: %1$s.\nSpeed reduced by: %2$s%%

actors.buffs.frostimbue.name=imbued with frost
actors.buffs.frostimbue.desc=You are imbued with icy power!\n\nAll physical attacks will steadily stack chill on enemies. Additionally, you are completely immune to the cold.\n\nTurns of frost imbue remaining: %s.

actors.buffs.fury.name=furious
actors.buffs.fury.heromsg=You become furious!
actors.buffs.fury.desc=You are angry, enemies won't like you when you're angry.\n\nA great rage burns within you, increasing the damage you deal with physical attacks by 75%.\n\nThis rage will last as long as you are injured below 50% health.

actors.buffs.blobimmunity.name=purification barrier
actors.buffs.blobimmunity.desc=Some strange force is encasing you in a thin protective barrier, blocking out all harmful airborne effects.\n\nYou are immune to all area-bound effects while this barrier lasts.\n\nTurns of immunity remaining: %s.

actors.buffs.greaterhaste.name=greater haste
actors.buffs.greaterhaste.desc=An incredible boost of speed, for a moment it feels as if everything else is standing still.\n\nWhile under the effects of greater haste moving actions take no time at all, but other actions are still performed at normal speed. Each step of movement consumes a turn of greater haste.\n\nTurns of greater haste remaining: %d.

actors.buffs.haste.name=haste
actors.buffs.haste.desc=Energy courses through your muscles, allowing you to run at incredible speeds!\n\nWhile under the effects of haste you will run at 3x speed, but will perform all other actions at normal speed.\n\nTurns of haste remaining: %s.

actors.buffs.healing.name=healing
actors.buffs.healing.desc=A magical remedy is causing wounds to close and flesh to knit.\n\nEvery turn health will steadily regenerate until the healing effect expires. The amount of healing may fade over time.\n\nNext heal: %d.\n\nHealing remaining: %d.

actors.buffs.herodisguise.name=disguise
actors.buffs.herodisguise.desc=Illusory magic has altered your physical appearance! The effect is purely cosmetic, but feels very strange regardless.\n\nTurns of disguise remaining: %s.

actors.buffs.hex.name=hexed
actors.buffs.hex.heromsg=You have been hexed!
actors.buffs.hex.desc=Dark magic which saps focus, making the target slightly disoriented.\n\nHexing reduces accuracy and evasion by 20%%, making the target less effective in combat.\n\nTurns of hex remaining: %s.

actors.buffs.highnessbuff.name=highly energized
actors.buffs.highnessbuff.recovering=recovering at low
actors.buffs.highnessbuff.energized_desc=Your mind... and body are overflowing with power of collected weeds!\n\nWhile energized, the Highness is incredibly powerful, moving at 1.5x speed, having 2 extra tiles of reach with weapons and +50%% evasion and accuracy, doing +33%% more physical damage, taking 33%% less damage and quickly recharging her artifacts, wands and health.\n\nHowever, the power is not without a cost: Highness has to consume piece of grass _every %d turns_ to maintain energized state. Once she runs out of grass or manually cancels energize, she will start recovering; the duration of recovery depends on amount of grass consumed.
actors.buffs.highnessbuff.recovering_desc=The post-weed clarity finally hit you!\n\nWhile recovering, the Highness cannot use grass to energize her body.\nRecovery duration depends on total consumed grass during energized state, rapidly increasing after three grass consumed.\n\nTurns left: %s.
actors.buffs.highnessbuff.action_name=start energizing
actors.buffs.highnessbuff.stop_action_name=stop energizing

actors.buffs.hpdebuff.name=Health Degradation
actors.buffs.hpdebuff.desc=Otherworldy magic degrates your toughness.\n\nWhile this debuff is active, your max HP is decreased by _%d_, this stacks as you get more damage as long as your max HP is above 1.\n\nTurns remaining: %s.

actors.buffs.holdfast.name=hold fast
actors.buffs.holdfast.desc=The %s is holding their position, increasing their armor by %2$d-%3$d. This will last until they move.

actors.buffs.holyflames.name=holy flames
actors.buffs.holyflames.heromsg=You are condemned to burn!
actors.buffs.holyflames.ondeath=You burned into sinful ash...
actors.buffs.holyflames.rankings_desc=Ashed by Holy Flames
actors.buffs.holyflames.desc=Your sins are finally recognized by holy forces... and repaid in form of flames.\n\nHoly flames will deal damage, that increases every turn, and remove all positive effects until it expires. Additionally it does more damage to undeads and demons.\n\nFortunately, this kind of fire is known to not interact with inanimate objects, like grass or scrolls.\n\nTurns of holy flames remaining: %s.

actors.buffs.hunger.hungry=hungry
actors.buffs.hunger.starving=starving
actors.buffs.hunger.onhungry=You are hungry.
actors.buffs.hunger.onstarving=You are starving!
actors.buffs.hunger.ondeath=You starved to death...
actors.buffs.hunger.cursedhorn=The cursed horn steals some of the food energy as you eat.
actors.buffs.hunger.rankings_desc=Starved to Death
actors.buffs.hunger.desc_intro_hungry=You can feel your stomach calling out for food, but it's not too urgent yet.
actors.buffs.hunger.desc_intro_starving=You're so hungry it hurts.
actors.buffs.hunger.desc=\n\nHunger slowly increases as you spend time in the dungeon, eventually you will begin to starve. While starving you will slowly lose health instead of regenerating it.\n\nRationing is important! If you have health to spare starving isn't a bad idea if it means there will be more food later. Effective rationing can make food last a lot longer!

actors.buffs.invisibility.name=invisible
actors.buffs.invisibility.desc=You are completely blended into the surrounding terrain, making you impossible to see.\n\nWhile you are invisible enemies are unable to attack or follow you. Physical attacks and magical effects (such as scrolls and wands) will immediately cancel invisibility.\n\nTurns of invisibility remaining: %s.

actors.buffs.invulnerability.name=invulnerable
actors.buffs.invulnerability.desc=This character is suffused with great protective power, granting them a brief period of invulnerability!\n\nTurns remaining: %s.

actors.buffs.levitation.name=levitating
actors.buffs.levitation.desc=A magical force is levitating you over the ground, making you feel weightless.\n\nLevitating characters move silently and ignore all ground-based effects. Traps won't trigger, water won't put out fire, plants won't be trampled, roots will miss, and pits will be hovered over. Be careful, as all these things can come into effect the second the levitation ends!\n\nTurns of levitation remaining: %s.

actors.buffs.lifelink.name=life link
actors.buffs.lifelink.desc=This character's life force is linked to another character nearby. Any damage taken is shared between them.\n\nWhenever this character takes damage, half of it will be dealt to the life link target instead.\n\nTurns of life link remaining: %s.

actors.buffs.light.name=illuminated
actors.buffs.light.desc=Even in the Darkest Dungeon, a steady light at your side is always comforting.\n\nLight helps keep darkness at bay, allowing you to see a reasonable distance despite the environment.\n\nTurns of illumination remaining: %s.

actors.buffs.lockedfloor.name=floor is locked
actors.buffs.lockedfloor.desc=The current floor is locked, and you are unable to leave it!\n\nWhile a floor is locked, you will not gain hunger or take damage from starving. In addition, if you do not work towards defeating this floor's boss, passive regeneration effects will also stop.\n\nAdditionally, if you are revived by an unblessed ankh while the floor is locked, then it will reset.\n\nKill this floor's boss to break the lock.

actors.buffs.lostinventory.name=lost inventory
actors.buffs.lostinventory.desc=Your inventory has been lost somewhere in the dungeon! You won't be able to pick up or use most items until you retrieve it.

actors.buffs.magicalsight.name=magical sight
actors.buffs.magicalsight.desc=Somehow you are able to see with your mind, rather than your eyes.\n\nWhile magical sight is active you will be able to see through all terrain in a 12 tile radius.\n\nTurns of magical sight remaining: %s.

actors.buffs.magicalsleep.name=magical sleep
actors.buffs.magicalsleep.toohealthy=You are too healthy, and resist the urge to sleep.
actors.buffs.magicalsleep.fallasleep=You fall into a deep magical sleep.
actors.buffs.magicalsleep.wakeup=You wake up feeling refreshed and healthy.
actors.buffs.magicalsleep.desc=This character has fallen into a deep magical sleep which they will not wake from naturally.\n\nMagical sleep is similar to regular sleep, except that only damage will cause the target to wake up.\n\nFor the hero and their allies, magical sleep has some restorative properties, allowing them to rapidly heal while resting.

actors.buffs.magicimmune.name=immune to magic
actors.buffs.magicimmune.desc=All magical effects have lost their hold on you, you are completely impervious to them.\n\nWhile magic immune all harmful and helpful magical effects will not apply to you, including curses, enchants, wands, scrolls, rings, artifacts, etc. Heroic armor abilities are strong enough to work regardless of this effect.\n\nTurns of magic immunity remaining: %s.

actors.buffs.mindvision.name=mind vision
actors.buffs.mindvision.desc=Somehow you are able to see all creatures on this floor through your mind. It's a weird feeling.\n\nAll characters on this floor are visible to you as long as you have mind vision. Seeing a creature through mind vision counts as it being seen or nearby for the purposes of many magical effects.\n\nTurns of mind vision remaining: %s.

actors.buffs.warriorparry.name=Blocking Charge
actors.buffs.warriorparry.action_name=block
actors.buffs.warriorparry.desc=The magic of being a warrior charges your defensive capabilities up.\n\nYou just need 1 charge to block an incoming attack; any attack can be blocked, including magical, and successfully doing so grants you shielding depending on blocked attack's damage.\n\nCurrent charge: _%1$s/%2$d_.\nThis charge depends on recharge rate and max shielding of broken seal.
actors.buffs.warriorparry$blocktrock.name=Block Trock
actors.buffs.warriorparry$blocktrock.desc=As long as this effect persists, the next attack will be blocked.\n\nBut moving in any direction will make this effect disappear, ooooo....

actors.buffs.momentum.momentum=building momentum
actors.buffs.momentum.running=freerunning
actors.buffs.momentum.resting=recovering
actors.buffs.momentum.action_name=freerun
actors.buffs.momentum.momentum_desc=As he moves, the %1$s builds momentum, which he can spend to start freerunning.\n\nEach charge of momentum grants two turns of freerunning, and the %1$s can build up to 10 charges. Momentum is rapidly lost when the %1$s stops moving.\n\nCurrent momentum charge: %2$d.
actors.buffs.momentum.running_desc=As he moves, the %1$s builds momentum, which he can spend to start freerunning.\n\nWhile freerunning, the %1$s moves at %3$dx speed and gains bonus evasion based on his level.\n\nTurns remaining: %2$d.
actors.buffs.momentum.resting_desc=As he moves, the %1$s builds momentum, which he can spend to start freerunning.\n\nThe %1$s needs time to regain his stamina before building momentum again.\n\nTurns remaining: %2$d.

actors.buffs.nodeath.name=Do Not Die
actors.buffs.nodeath.desc=AS LONG AS THIS [Beverage] IS [Replenishing Your Thirst], YOU CAN'T [Cease and Desist], BUT YOU HAVE TO [Pay] SOME [Debt]!\n\nTIME [In Your Pocket]: %s.

actors.buffs.scam.name=Scam
actors.buffs.scam.desc=WITH MY [Benevolence] EVERY SHOPKEEPER WILL LOOK AT YOU LIKE A [Recurring Raccoon] AND [Increment Stakes] IN THEIR SHOPS FOR YOUR [Benefit]!\n\nTIME [For Sale]: %s.

actors.buffs.monkenergy.name=energy
actors.buffs.monkenergy.action=Monk Abilities
actors.buffs.monkenergy.desc=As she defeats enemies, the Monk gains energy that she can use on a variety of abilities. Most enemies grant 1 energy when defeated, and the Monk does not lose energy over time.\n\nCurrent energy: %1$d/%2$d.
actors.buffs.monkenergy.desc_chasm=_On a level with bridges of void,_ the Monk's missile weapons are empowering depending on how many chasms are around her and her _Dash_ will spread camouflage gas across its trajectory.
actors.buffs.monkenergy.desc_water=_On a level filled with water,_ the Monk will gain shielding while being on water and her _Meditate_ will spray more water and knock enemies away from the Monk.
actors.buffs.monkenergy.desc_grass=_On a level filled with vegetation,_ the Monk will furrow grass before fully trampling it and her _Focus_ will give her grass on successful parry.
actors.buffs.monkenergy.desc_dark=_On a very dark level,_ the Monk can use torches to create dangerous red fire in cross shape and her _Flurry_ will do an additional attack.
actors.buffs.monkenergy.desc_large=_On a huge and wide level,_ the Monk will get small amounts of money from killing enemies and her _Dragon Kick_ will do double knockback.
actors.buffs.monkenergy.desc_traps=_On a mine-filled level,_ the Monk can get traps in form of a usable item from killing enemies and her _Focus_ will last 10 turns instead of 30, but provide +40% accuracy while it lasts.
actors.buffs.monkenergy.desc_secrets=_On a very mysterious level,_ the Monk will not wake up enemies 3 tiles away from her and her _Meditate_ will last 2 turns instead of 5 and lose any regenerative abilities, but map the level's floor around her and let her see through walls for a moment.
actors.buffs.monkenergy.desc_cooldown=The Monk has recently used an ability, and must wait before using another.\n\nCurrent cooldown: %d turns.
actors.buffs.monkenergy$monkability$flurry.name=flurry of blows
actors.buffs.monkenergy$monkability$flurry.desc=Two instant strikes that deal %1$d-%2$d damage and ignore armor. This ability cannot be used repeatedly.
actors.buffs.monkenergy$monkability$flurry.empower_desc=Two instant strikes that deal %1$d-%2$d damage, ignore armor, _and use your weapon's enchantment._ This ability cannot be used repeatedly.
actors.buffs.monkenergy$monkability$focus.name=focus
actors.buffs.monkenergy$monkability$focus.desc=The Monk takes a turn to focus, letting her parry the next attack made against her.
actors.buffs.monkenergy$monkability$focus.empower_desc=The Monk _instantly focuses,_ letting her parry the next attack made against her.
actors.buffs.monkenergy$monkability$focus$focusbuff.name=focused
actors.buffs.monkenergy$monkability$focus$focusbuff.desc=The Monk is focused on her surroundings, anticipating the next attack made against her. While focused, she is guaranteed to parry the next incoming attack.
actors.buffs.monkenergy$monkability$dash.name=dash
actors.buffs.monkenergy$monkability$dash.prompt=Choose a Location
actors.buffs.monkenergy$monkability$dash.desc=An instant dash up to 4 tiles away. This ability can go over hazards, but not through enemies or solid terrain.
actors.buffs.monkenergy$monkability$dash.empower_desc=An instant dash up to _8 tiles_ away. This ability can go over hazards, but not through enemies or solid terrain.
actors.buffs.monkenergy$monkability$dragonkick.name=dragon kick
actors.buffs.monkenergy$monkability$dragonkick.desc=A devastating kick that deals %1$d-%2$d damage and ignores armor. The kick knocks the target away and paralyzes them for each tile they travel.
actors.buffs.monkenergy$monkability$dragonkick.empower_desc=A devastating kick that deals _%1$d-%2$d damage_ and ignores armor. The kick knocks _all adjacent targets_ away and paralyzes them for each tile they travel.
actors.buffs.monkenergy$monkability$meditate.name=meditate
actors.buffs.monkenergy$monkability$meditate.desc=The Monk focuses energy into her body for 5 turns. This clears most negative effects and grants her 8 turns of wand and artifact recharging.
actors.buffs.monkenergy$monkability$meditate.empower_desc=The Monk focuses energy into her body for 5 turns. This clears most negative effects and grants her 8 turns of wand and artifact recharging. _She also gains 80% damage resistance while meditating, and slowly heals for 20% of her missing HP._

actors.buffs.ooze.name=caustic ooze
actors.buffs.ooze.heromsg=Caustic ooze eats your flesh. Wash it away!
actors.buffs.ooze.ondeath=You melt away...
actors.buffs.ooze.rankings_desc=Dissolved
actors.buffs.ooze.desc=This sticky acid clings to flesh, slowly melting it away.\n\nOoze will deal consistent damage over time, but can be immediately washed off in water.\n\nTurns of ooze remaining: %s.

actors.buffs.paralysis.name=paralysed
actors.buffs.paralysis.heromsg=You are paralysed!
actors.buffs.paralysis.out=resisted paralysis
actors.buffs.paralysis.desc=Oftentimes the worst thing to do is nothing at all.\n\nParalysis completely halts all actions, forcing the target to wait until the effect wears off. The pain from taking damage can cause characters to resist paralysis, breaking them out of the effect.\n\nTurns of paralysis remaining: %s.

actors.buffs.petrified.name=Petrified
actors.buffs.petrified.heromsg=You are petrified!
actors.buffs.petrified.desc=The skin of this creature is completely covered by sturdy granite.\n\nPetrification completely halts all actions, forcing the target to wait until the stone breaks out. Due to stone's hardness, petrified characters get 50%% less damage.\n\nTurns of petrification remaining: %s.

actors.buffs.physicalempower.name=physically empowered
actors.buffs.physicalempower.desc=Your blows have been empowered, increasing the amount of damage you can deal when you hit enemies with physical attacks.\n\nBonus damage: %1$d.\nHits remaining: %2$d.

actors.buffs.pincushion.name=pincushion
actors.buffs.pincushion.desc=The thrown weapons you have used against this character are currently stuck to them and will fall to the floor after they are defeated.\n\nThe following items are currently attached:

actors.buffs.poison.name=poisoned
actors.buffs.poison.heromsg=You are poisoned!
actors.buffs.poison.ondeath=You died from poison...
actors.buffs.poison.rankings_desc=Succumbed to Poison
actors.buffs.poison.desc=Poison works its way through the body, slowly impairing its internal functioning.\n\nPoison deals damage each turn proportional to how long until it expires.\n\nTurns of poison remaining: %s.

actors.buffs.preparation.name=preparation
actors.buffs.preparation.action_name=prepared strike
actors.buffs.preparation.desc=The %s is waiting patiently, preparing to strike from the shadows.
actors.buffs.preparation.desc_dmg=His next attack will deal _%1$d%% bonus damage_, and will execute regular enemies below _%2$d%% health_, or bosses below _%3$d%% health_.
actors.buffs.preparation.desc_dmg_likely=The attack will also be more likely to deal a larger amount of damage.
actors.buffs.preparation.desc_blink=He is able to blink towards an enemy before striking them, with a max distance of _%d._
actors.buffs.preparation.desc_invis_time=Turns spent invisible: _%d._
actors.buffs.preparation.desc_invis_next=Turns for stronger attack: _%d._
actors.buffs.preparation.prompt=Select a target to attack!\nMax blink distance: %d
actors.buffs.preparation.no_target=There's nothing to attack there.
actors.buffs.preparation.out_of_reach=That target is out of reach.
actors.buffs.preparation.assassinated=assassinated

actors.buffs.prismaticguard.name=prismatic Guard
actors.buffs.prismaticguard.desc=You are being guarded by a prismatic image which is currently inactive. When enemies are present the prismatic image will spring to action and protect you!\n\nWhile inactive, the prismatic image will steadily recover from any damage it has taken.\n\nCurrent HP: %d/%d.
actors.buffs.prismaticguard.desc_recover=You are being guarded by a prismatic image which is currently recovering from last death. It will not participate in fighting until the recovery has ended.\n\nCurrent HP: %d/%d.
actors.buffs.prismaticguard.desc_many=This prismatic image is also benefitting from Power of Many. Turns Remaining: %d.

actors.buffs.recharging.name=recharging
actors.buffs.recharging.desc=Energy is coursing through you, improving the rate that your wands and staffs charge.\n\nEach turn this buff will increase current charge by one quarter, in addition to regular recharge.\n\nTurns of recharging remaining: %s.

actors.buffs.robotbuff.action_name=transform

actors.buffs.revealedarea.name=revealed area
actors.buffs.revealedarea.desc=An area of the dungeon has been temporarily revealed to the hero, They will see it no matter where they are.\n\nTurns remaining: %s.

actors.buffs.revealedchar.name=revealed
actors.buffs.revealedchar.desc=This character is revealed to the hero, They will be visible no matter where they are.\n\nTurns remaining: %s.

actors.buffs.rkchampionbuff.action_name=choose champion title
actors.buffs.rkchampionbuff$championcooldown.name=champion title cooldown
actors.buffs.rkchampionbuff$championcooldown.desc=You have recently used champion title window, and must wait before using it again.\n\nTurns remaining: %s.

actors.buffs.roots.name=rooted
actors.buffs.roots.heromsg=You can't move!
actors.buffs.roots.desc=Roots (magical or natural) grab at the feet, forcing them down to the ground.\n\nRoots lock a target in place, making movement and most movement abilities impossible. Other actions are not affected, including teleportation effects.\n\nTurns of root remaining: %s.

actors.buffs.scrollempower.name=scroll empower
actors.buffs.scrollempower.desc=The energy from the %s's recently read scroll is empowering his wands!\n\nLevel Boost: +%d.\nZaps remaining: %d.
actors.buffs.scrollempower.desc_huntress=The energy from the %s's recently read scroll is empowering her wands!\n\nLevel Boost: +%d.\nZaps remaining: %d.
actors.buffs.scrollempower.desc_duelist=The energy from the %s's recently read scroll is empowering her wands!\n\nLevel Boost: +%d.\nZaps remaining: %d.

actors.buffs.spiritbuff.name=Spiritual Charge
actors.buffs.spiritbuff.action_name=summon spirit
actors.buffs.spiritbuff.desc=As Spirit Caller, you can gain charge to eventually summon friendly wraiths. You gain enough charge to summon a wraith in 45 turns but can store up to 90 charge in total.

actors.buffs.shadows.name=shadowmelded
actors.buffs.shadows.desc=You are blended into the shadows around you, granting you invisibility and slowing your metabolism.\n\nWhile you are invisible enemies are unable to attack or follow you. Most physical attacks and magical effects (such as scrolls and wands) will immediately cancel invisibility. Additionally, while shadowmelded, your rate of hunger is slowed.\n\nYou will remain shadowmelded until you leave the shadows or an enemy comes into contact with you.

actors.buffs.slow.name=slowed
actors.buffs.slow.desc=Slowing magic affects the target's rate of time, to them everything is moving super-fast.\n\nA slowed character performs all actions in twice the amount of time they would normally take.\n\nTurns of slow remaining: %s.

actors.buffs.snipersmark.name=sniper's mark
actors.buffs.snipersmark.action_name_snapshot=snapshot
actors.buffs.snipersmark.action_name_volley=volley
actors.buffs.snipersmark.action_name_sniper=sniper shot
# 1 name 2 "she" 3 "She" 4 her
actors.buffs.snipersmark.desc=The %1$s is honed in on the target %2$s most recently attacked. %3$s is able to perform a special attack with %4$s bow which will vary based on how the bow is augmented.\n\nAn unaugmented bow will fire a _snapshot,_ which deals reduced damage but does not take any time to fire.\n\nA bow augmented for speed will fire a _volley_ of three arrows. Each arrow will deal reduced damage, but can still activate enchantment. This volley takes 1 turn to shoot.\n\nA bow augmented for damage will fire a _sniper shot._ This shot is guaranteed to hit, deals bonus damage based on distance from the target, and takes 2 turns to fire.\n\nTurns until the mark expires: %5$s

actors.buffs.snipersmark$freetarget.name=free-targeted sniper's mark
actors.buffs.snipersmark$freetarget.bonus_desc=This mark can be directed at any target of the Sniper's choice.

actors.buffs.soulmark.name=soul marked
actors.buffs.soulmark.desc=The %s has tapped into the soul of this creature, allowing him to heal as it takes physical damage.\n\nTurns of soul mark remaining: %s.
actors.buffs.soulmark.desc_huntress=The %s has tapped into the soul of this creature. She will heal and satisfy her hunger as it takes physical damage.\n\nTurns of soul mark remaining: %s.

actors.buffs.stamina.name=stamina
actors.buffs.stamina.desc=You have unending stamina, allowing for faster movement!\n\nWhile under the effects of stamina you will run at +50%% speed, but will perform all other actions at normal speed.\n\nTurns of stamina remaining: %s.

actors.buffs.vulnerable.name=vulnerable
actors.buffs.vulnerable.heromsg=You feel fragile!
actors.buffs.vulnerable.desc=Vulnerability magic increases all physical damage that a character takes by 33%%, after that damage has been reduced by armor.\n\nTurns of vulnerable remaining: %s.

actors.buffs.terror.name=terrified
actors.buffs.terror.desc=Terror is manipulative magic which forces its target into an uncontrollable panic.\n\nTerrified characters are forced to run away from their opponent, trying to put as many doors and walls between them as possible. The shock of pain will lessen the duration of terror, however.\n\nTurns of terror remaining: %s.

actors.buffs.toxicimbue.name=imbued with toxicity
actors.buffs.toxicimbue.desc=You are imbued with poisonous energy!\n\nAs you move around toxic gas will constantly billow forth from you, damaging your enemies. You are immune to toxic gas and poison for the duration of the effect, as well as for a few turns afterward.\n\nTurns of toxic imbue remaining: %s.

actors.buffs.corrosion.name=corrosion
actors.buffs.corrosion.heromsg=You are melting!
actors.buffs.corrosion.ondeath=You melt away...
actors.buffs.corrosion.rankings_desc=Dissolved
actors.buffs.corrosion.desc=Powerful acid melts away flesh, metal, and bone at an alarming rate.\n\nCorrosion damage increases over time, as the target continues to melt away.\n\nTurns of corrosion remaining: %1$s.\nCurrent corrosion damage: %2$d.

actors.buffs.vertigo.name=vertigo
actors.buffs.vertigo.desc=Walking in a straight line can be difficult when the whole world is spinning.\n\nWhile under the effects of vertigo, characters who attempt to move will go in a random direction, instead of the one they intended to go in.\n\nTurns of vertigo remaining: %s.

actors.buffs.warp.name=Warped
actors.buffs.warp.desc=Succumbing to the dark magic was never this easy!\n\nWarp magic corrupts your mental health, causing #various psychic effects# to appear while you are under warp. Warp will slowly #decay# depending on the strength of magic that caused it.\n\nLetting the darkness surround you will cause #even stronger effects# to happen, eventually _corrupting everything on your path._\n\nCurrent warp: _%s_\nDecay rate: _%s_

actors.buffs.warpedenemy.name=Warped
actors.buffs.warpedenemy.desc=The dark magic surrounds this creature, distorting its behavior.\n\nWarp magic corrupts entities it touches, making them #more aggressive and unhinged# and being able to use paranormal magic.\n\nWarped enemies only come to light when there is #source of warp# somewhere in the dungeon...

actors.buffs.wandempower.name=wands empowered
actors.buffs.wandempower.desc=Your damage-dealing wands have been empowered, increasing the amount of damage they deal for a few hits.\n\nBonus damage: %1$d.\nHits remaining: %2$d.

actors.buffs.weakness.name=weakened
actors.buffs.weakness.heromsg=You feel weakened!
actors.buffs.weakness.desc=Everything suddenly seems much heavier.\n\nWeakening magic reduces a character's physical strength, causing them to deal 33%% reduced damage.\n\nTurns of weakness remaining: %s.

actors.buffs.wellfed.name=well fed
actors.buffs.wellfed.desc=You feel quite satisfied and full.\n\nWhile well fed, your hunger will not increase, and you will heal an additional amount of health over time.\n\nTurns remaining: %d.



###hero

##abilities
actors.hero.abilities.armorability.self_target=You can't target yourself!
actors.hero.abilities.armorability.no_target=There's nothing to target there!
actors.hero.abilities.armorability.prompt=Choose a location to target
actors.hero.abilities.armorability.cost=Charge cost: _%d_

actors.hero.abilities.warrior.heroicleap.name=heroic leap
actors.hero.abilities.warrior.heroicleap.prompt=Choose direction to leap
actors.hero.abilities.warrior.heroicleap.short_desc=The Warrior performs a _Heroic Leap_ towards a targeted location, sailing above enemies and hazards.
actors.hero.abilities.warrior.heroicleap.desc=The Warrior leaps toward a targeted location, going over any enemies or hazards in the way. He cannot leap over walls or other solid terrain however. Enemies adjacent to his ending location take some damage based on the Warrior's defense, and using the ability twice in quick succession has reduced cost.
actors.hero.abilities.warrior.shockwave.name=shockwave
actors.hero.abilities.warrior.shockwave.short_desc=The Warrior releases a _Shockwave_ in a conical AOE by slamming the ground. Enemies caught in the shockwave are damaged and crippled.
actors.hero.abilities.warrior.shockwave.desc=The Warrior slams the ground, producing a shockwave that travels up to 5 tiles in a 60 degree cone.\n\nEnemies caught in this shockwave are crippled for 5 turns. They also take 5-10 damage, plus an additional 1-2 damage for every point of strength the Warrior has above 10.
actors.hero.abilities.warrior.endure.name=endure
actors.hero.abilities.warrior.endure$enduretracker.name=endurance
actors.hero.abilities.warrior.endure$enduretracker.desc=The Warrior is now dealing bonus damage based on the damage he endured.\n\nBonus Damage: %1$d\nHits Left: %2$d
actors.hero.abilities.warrior.endure.short_desc=The Warrior _Endures_, skipping several turns but gaining high damage resistance. He then deals bonus damage based on what he endured.
actors.hero.abilities.warrior.endure.desc=The Warrior endures for 3 turns, taking half damage from all sources. This reduction is applied before damage resisting effects like armor.\n\nAfter enduring, the warrior's next hit within 10 turns gains bonus damage. This bonus damage is equal to half of all the damage inflicted on him while enduring, before any damage reduction effects!\n\nIf the Warrior has any combo, using this ability increases its remaining time by 3 turns.

actors.hero.abilities.mage.elementalblast.name=elemental blast
actors.hero.abilities.mage.elementalblast.no_staff=You can't use this ability without your staff.
actors.hero.abilities.mage.elementalblast.short_desc=The Mage emits an _Elemental Blast_ from his staff, covering a large area around him in an effect that varies based on the wand in his staff.
actors.hero.abilities.mage.elementalblast.desc=The Mage emits a blast of magic, which covers a circular region up to 4 tiles away and deals the same damage as staff's melee strike. The specific effect of elemental blast will vary by the wand imbued in the Mage's staff.
actors.hero.abilities.mage.elementalblast.generic_desc=The effect of elemental blast will be similar to the effect of the wand when zapped at an enemy or ally.
actors.hero.abilities.mage.wildmagic.name=wild magic
actors.hero.abilities.mage.wildmagic.no_wands=You have no wands to zap with!
actors.hero.abilities.mage.wildmagic.short_desc=The Mage unleashes the _Wild Magic_ contained in his wands, randomly firing them multiple times at a chosen target over a single turn.
actors.hero.abilities.mage.wildmagic.desc=The Mage unleashes the power in his wands, randomly firing them up to 4 times in a single turn. The Mage's staff is not included in this effect.\n\nEach wand also has its level boosted by 2, up to +3. This ability uses half a wand charge for each zap, and no one wand can be fired more than 2 times.
actors.hero.abilities.mage.warpbeacon.name=warp beacon
actors.hero.abilities.mage.warpbeacon.depths=You can't warp between depths!
actors.hero.abilities.mage.warpbeacon.locked_floor=You cannot leave a locked floor!
actors.hero.abilities.mage.warpbeacon.too_far=That location is too far!
actors.hero.abilities.mage.warpbeacon.invalid_beacon=You can't place a beacon there!
actors.hero.abilities.mage.warpbeacon.window_desc=Your beacon is currently placed on floor %d.
actors.hero.abilities.mage.warpbeacon.window_tele=teleport to beacon
actors.hero.abilities.mage.warpbeacon.window_clear=clear beacon
actors.hero.abilities.mage.warpbeacon.window_cancel=cancel
actors.hero.abilities.mage.warpbeacon.short_desc=The Mage places a _Warping Beacon_ at his current location, which he can instantly teleport back to.
actors.hero.abilities.mage.warpbeacon.desc=The Mage places a beacon, which can then be warped to at will. Placing the beacon takes 1 turn, but warping to it is instantaneous.\n\nThe Mage can warp between floors by using additional charge, but he cannot use the beacon to reach inaccessible places such as locked rooms. The Mage can teleport into enemies, which will push them aside and deal minor damage (at the cost of some recoil damage).

actors.hero.abilities.rogue.smokebomb.name=smoke bomb
actors.hero.abilities.rogue.smokebomb.fov=You can only jump to an empty location in your field of view
actors.hero.abilities.rogue.smokebomb.prompt=Choose a location to jump to
actors.hero.abilities.rogue.smokebomb$ninjalog.name=wooden decoy
actors.hero.abilities.rogue.smokebomb$ninjalog.desc=Somehow, enemies are easily convinced that this wooden decoy is the real Rogue!
actors.hero.abilities.rogue.smokebomb.short_desc=The Rogue throws down a _Smoke Bomb_ while blinking away. He blinds enemies near his old location.
# shpd = 10->12->6, I'll just perch it at 10.
actors.hero.abilities.rogue.smokebomb.desc=The Rogue throws down a smoke bomb and blinks up to 10 tiles away. He can blink through hazards and enemies, but not through solid terrain like walls.\n\nEnemies that are adjacent to the Rogue's old position will be blinded for 5 turns.
actors.hero.abilities.rogue.deathmark.name=death mark
actors.hero.abilities.rogue.deathmark.ally_target=You can only mark enemies
actors.hero.abilities.rogue.deathmark.short_desc=The Rogue places a _Death Mark_ on a chosen enemy. Marked enemies take bonus damage, but cannot die until the mark ends.
actors.hero.abilities.rogue.deathmark.desc=The Rogue places a mark on a chosen enemy, causing them to take 33% extra damage. The mark is applied instantly and lasts for 5 turns.\n\nMarked enemies take bonus damage but are unable to die until the mark expires. If an enemy has 0 HP when the mark ends, they will immediately die.
actors.hero.abilities.rogue.deathmark$deathmarktracker.name=marked for death
actors.hero.abilities.rogue.deathmark$deathmarktracker.desc=This enemy has been marked, causing them to take 33%% bonus damage, but also rendering them unable to die until the mark ends.\n\nTurns remaining: %s.
actors.hero.abilities.rogue.shadowclone.name=shadow clone
actors.hero.abilities.rogue.shadowclone.short_desc=The Rogue summons a _Shadow Clone_, which can be directed to aid him in combat.
actors.hero.abilities.rogue.shadowclone.desc=The Rogue summons a shadowy mimic of himself, which can be directed to aid him in combat. Directing the shadow clone does not cost any charge, and it can be swapped with instantly.\n\nThe clone has 80 HP, no armor, and deals 10-20 damage. All of these traits can be improved with talents, such that the clone benefits from weapons and armor the hero has.
actors.hero.abilities.rogue.shadowclone$shadowally.name=shadow %s
actors.hero.abilities.rogue.shadowclone$shadowally.direct_defend=Your clone moves to that position.
actors.hero.abilities.rogue.shadowclone$shadowally.direct_follow=Your clone moves to follow you.
actors.hero.abilities.rogue.shadowclone$shadowally.direct_attack=Your clone moves to attack!
actors.hero.abilities.rogue.shadowclone$shadowally.desc=A copy of %1$s made from shadowy darkness. It stands stock still, with empty eyes and tiny wisps of darkness rising from it like steam.\n\nThe clone is not a perfect copy of %s, but is still a decent fighter, and can benefit from %1$s's equipment with the right talents.
actors.hero.abilities.rogue.shadowclone$shadowally.desc_rat=My own doppelganger, conjured from otherworldy chaos. It stands silently, ready to assault any creature that dares to cross my vision.\n\nIt's not perfect, but is still a decent help for me, and can benefit from my items with good training.

actors.hero.abilities.huntress.spectralblades.name=spectral blades
actors.hero.abilities.huntress.spectralblades.short_desc=The Huntress throws _Spectral Blades_ at a target, inflicting damage depending on her currently equipped melee weapon.
actors.hero.abilities.huntress.spectralblades.desc=The Huntress throws out a spectral blade at an enemy, which acts like a ranged strike from her melee weapon. All of the normal effects of a melee weapon will activate, including enchantments. In addition, the blades are slightly magical and can pierce through 1 solid object to hit their target. One additional blade can be thrown for 50% damage if there is an additional character nearby the target.
actors.hero.abilities.huntress.naturespower.name=nature's power
actors.hero.abilities.huntress.naturespower.short_desc=The Huntress calls upon _Nature's Power_, increasing her movement speed and her bow's rate of fire for a short time.
actors.hero.abilities.huntress.naturespower.desc=The Huntress temporarily empowers herself and her bow with the power of nature! This lasts for 8 turns.\n\nDuring this time, the Huntress moves at 2x speed, and attacks 33% faster with her bow. The bonus bow effects do not trigger if the Sniper is using her special attacks. The duration of the power can be extended slightly by killing enemies.
actors.hero.abilities.huntress.naturespower$naturespowertracker.name=nature's power
actors.hero.abilities.huntress.naturespower$naturespowertracker.desc=The Huntress is briefly empowered, increasing her movement speed and attack speed with her bow.\n\nTurns remaining: %s.
actors.hero.abilities.huntress.spirithawk.name=spirit hawk
actors.hero.abilities.huntress.spirithawk.no_space=There is no free space near you.
actors.hero.abilities.huntress.spirithawk.short_desc=The Huntress summons a _Spirit Hawk_ familiar, which can help her scout locations and distract enemies.
actors.hero.abilities.huntress.spirithawk.desc=The Huntress summons a spirit hawk familiar, which can be directed by using the ability again while it is summoned. The hawk lasts for 100 turns, directing the hawk does not cost any charge.\n\nThe hawk has minimal health and attacking power, but is fast, evasive, and accurate. It shares its entire field of vision with the Huntress at all times. It is immune to all area-bound effects, such as fire and poison gas. It will not attack unless specifically directed to.
actors.hero.abilities.huntress.spirithawk$hawkally.name=spirit hawk
actors.hero.abilities.huntress.spirithawk$hawkally.name_rat=royal owl
actors.hero.abilities.huntress.spirithawk$hawkally.direct_follow=Your familiar moves to follow you.
actors.hero.abilities.huntress.spirithawk$hawkally.direct_attack=Your familiar moves to attack!
actors.hero.abilities.huntress.spirithawk$hawkally.direct_defend=Your hawk moves to that position.
actors.hero.abilities.huntress.spirithawk$hawkally.desc=A magical hawk, summoned by the Huntress. It glows a bright ethereal blue, its head constantly shifts around as it surveys the area.\n\nWhile it isn't much of a fighter its speed and vision make it excellent for scouting and distracting enemies.
actors.hero.abilities.huntress.spirithawk$hawkally.desc_remaining=Turns remaining: %d.
actors.hero.abilities.huntress.spirithawk$hawkally.desc_rat=My own arcane familiar, trained by best hunters in my kingdom. It's eyes glow with emerald lights, and the skin resembles my own.\n\nWhile it can't be called a powerhouse its agility and sharp vision make it excellent for discovering and humilating my enemies!\n\nTurns remaining: %d.
actors.hero.abilities.huntress.spirithawk$hawkally.desc_dodges=Guaranteed dodges remaining: %d.

actors.hero.abilities.duelist.challenge.name=challenge
actors.hero.abilities.duelist.challenge.prompt=Choose an enemy to challenge
actors.hero.abilities.duelist.challenge.already_dueling=You can only be in one duel at a time.
actors.hero.abilities.duelist.challenge.ally_target=You can only challenge enemies.
actors.hero.abilities.duelist.challenge.unreachable_target=You must be able to reach your target.
actors.hero.abilities.duelist.challenge.distant_target=That enemy is too far away to challenge.
actors.hero.abilities.duelist.challenge.short_desc=The Duelist _Challenges_ a nearby enemy to a duel, temporarily freezing all other enemies.
actors.hero.abilities.duelist.challenge.desc=The Duelist challenges a nearby enemy to a duel. That enemy is compelled to fight her while all other enemies are temporarily frozen in time.\n\nThe target must be reachable and within 5 tiles of the Duelist. The duel lasts until 10 turns pass, the enemy dies, or the Duelist is more than 5 tiles away from the enemy.\n\nFrozen enemies are invulnerable. The Duelist's allies are not frozen by this ability, but if a boss is targeted its minions will not be frozen either.
actors.hero.abilities.duelist.challenge$duelparticipant.name=duel participant
actors.hero.abilities.duelist.challenge$duelparticipant.desc=This character is participating in a duel. They, and any of their allies or minions, are allowed to act normally while others are frozen.\n\nThe duel will last for a set amount of time, until one participant dies, or until the participants move more than 5 tiles away from eachother.\n\nTurns remaining: %d.
actors.hero.abilities.duelist.elementalstrike.name=elemental strike
actors.hero.abilities.duelist.elementalstrike.short_desc=The Duelist performs an _Elemental Strike_, spreading an effect in a conical AOE based on her weapon enchantment.
actors.hero.abilities.duelist.elementalstrike.desc=The Duelist strikes an enemy or location, performing a regular attack that's guaranteed to hit and spreading a magical effect that travels up to 4 tiles in a 65 degree cone. This magical effect varies based on the enchantment on the Duelist's primary weapon.
actors.hero.abilities.duelist.elementalstrike.generic_desc=An elemental strike with no enchantment will release a small burst of magic, dealing 6-12 damage to all enemies in range.
actors.hero.abilities.duelist.feint.name=feint
actors.hero.abilities.duelist.feint.prompt=Choose a location to dash to
actors.hero.abilities.duelist.feint.too_far=That location is not adjacent to you.
actors.hero.abilities.duelist.feint.bad_location=You can't move to that location.
actors.hero.abilities.duelist.feint.short_desc=The Duelist _Feints_, faking an attack while dashing to an adjacent tile. Enemies will attack her afterimage, leaving them open to a counterattack.
actors.hero.abilities.duelist.feint.desc=The Duelist fakes an attack while dashing to an adjacent tile, leaving behind a momentary afterimage of herself. Enemies that were attacking the Duelist will attack her afterimage instead.\n\nEnemies that attack the afterimage become confused, which cancels their next action and leaves them open to a surprise attack.

actors.hero.abilities.cleric.ascendedform.name=ascended form
actors.hero.abilities.cleric.ascendedform.short_desc=The Cleric assumes an _Ascended Form_, gaining new spells, attack range, and shielding.
actors.hero.abilities.cleric.ascendedform.desc=The Cleric projects holy energy from themselves, assuming an extended radiant form for %d turns. While in this form the Cleric can cast new spells, gains 2 attack range, 30 shielding, and any additional spells they cast will grant 10 shielding per holy tome charge used.\n\nThe shielding from ascended form and its spells does not decay normally, but will immediately fade once ascended form ends. The ability can be re-used to refresh ascended form's duration.\n\n_The ability takes no time to activate_.
actors.hero.abilities.cleric.ascendedform$ascendbuff.name=ascended form
actors.hero.abilities.cleric.ascendedform$ascendbuff.desc=Radiant energy is emanating from the Cleric's body. While in this form the Cleric gains 2 attack range (from the holy energy projecting from them), and 10 shielding whenever they spend a holy tome charge. They are also able to cast the spells which are unlocked via ascended form's talents.\n\nThe shield granted by ascended form and its spells will not decay normally, but will instantly fade when ascended form ends.\n\nCurrent shielding: %1$d.\nTurns remaining: %2$d.
actors.hero.abilities.cleric.trinity.name=trinity
actors.hero.abilities.cleric.trinity.no_imbue=Trinity has no effect set for any of its forms currently, use one of its spells!
actors.hero.abilities.cleric.trinity.no_duplicate=Trinity cannot duplicate an effect that you already have equipped!
actors.hero.abilities.cleric.trinity.ench_glyph_use=Trinity will apply this effect for _%1$d turns_ at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.rare_ench_glyph_use=Trinity will apply this _powerful_ effect for _%1$d turns_ at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.wand_use=Trinity will zap this wand at _+%1$d_ at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.wand_multi_use=Trinity will zap this _multi-charge_ wand at _+%1$d_ at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.thrown_use=Trinity will throw this weapon at _+%1$d_ at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.ring_use=Trinity will apply this ring's effect at _+%1$d_ for 20 turns, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.talent_use=Trinity will apply this talent's effect at max potency for _+%1$d turns_, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.alchemiststoolkit_use=Trinity will apply this artifact's remote alchemy effect, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.chaliceofblood_use=Trinity will apply this artifact's passive health regen effect at _+%1$d_ for 20 turns, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.driedrose_use=Trinity will use this artifact's effect to summon a corrupted friendly wraith with the HP of a _+%1$d_ ghost, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.etherealchains_use=Trinity will apply this artifact's chain-casting effect with reach at _+%1$d_, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.hornofplenty_use=Trinity will apply this artifact's snacking effect, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.masterthievesarmband_use=Trinity will apply this artifact's enemy robbing effect at _+%1$d_, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.sandalsofnature_use=Trinity will apply this artifact's root effect with a random harmful seed, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.talismanofforesight_use=Trinity will apply this artifact's scry effect at _+%1$d_, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.timekeepershourglass_use=Trinity will apply this artifact's time freeze effect with a _%1$d_ turn duration, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.unstablespellbook_use=Trinity will apply this artifact's random scroll effect with a _%1$d/10_ chance to offer the exotic version at no additional cost, at the cost of _%2$s charge._
actors.hero.abilities.cleric.trinity.cost=The charge cost of this ability varies, but is most often _%d._
actors.hero.abilities.cleric.trinity.short_desc=The Cleric gains a _Trinity_ of abilities, which emulate equipment they have seen and can be assigned by using new spells.
actors.hero.abilities.cleric.trinity.desc=The Cleric gains a _Trinity_ of armor abilities, which can be assigned to various item effects by using three new spells. Each of these spells focuses on emulating the effects of different kinds of equipment that the Cleric has identified during this run: body form (weapons and armor), mind form (wands and thrown weapons), spirit form (rings and artifacts) and meta form (talents).\n\nEach Trinity form can be imbued with one effect at a time, and the Cleric chooses which one to activate when using Trinity. Trinity will not duplicate the effect of something you already have equipped.
actors.hero.abilities.cleric.trinity$wndusetrinity.text=Select which form of Trinity to use. The effects of different forms can be active simultaneously.
actors.hero.abilities.cleric.trinity$wndusetrinity.body=_Body Form: %s._
actors.hero.abilities.cleric.trinity$wndusetrinity.mind=_Mind Form: %s._
actors.hero.abilities.cleric.trinity$wndusetrinity.spirit=_Spirit Form: %s._
actors.hero.abilities.cleric.trinity$wndusetrinity.meta=_Meta Form: %s._
actors.hero.abilities.cleric.trinity$wnditemtypeselect.text=Select an effect to be imbued into Trinity. Additional info will be shown before confirmation.
actors.hero.abilities.cleric.trinity$wnditemconfirm.body=Assign to body form
actors.hero.abilities.cleric.trinity$wnditemconfirm.mind=Assign to mind form
actors.hero.abilities.cleric.trinity$wnditemconfirm.spirit=Assign to spirit form
actors.hero.abilities.cleric.trinity.select_talent=Assign to meta form
actors.hero.abilities.cleric.trinity$wndtalentselect.desc=Select a talent to be imbued into Trinity. Additional info will be shown before confirmation.
actors.hero.abilities.cleric.powerofmany.name=power of many
actors.hero.abilities.cleric.powerofmany.prompt_default=Choose an ally or location
actors.hero.abilities.cleric.powerofmany.prompt_ally=Direct your light ally
actors.hero.abilities.cleric.powerofmany.ally_exists=You already have an empowered ally.
actors.hero.abilities.cleric.powerofmany.no_vision=You can't target a location you can't see.
actors.hero.abilities.cleric.powerofmany.only_allies=You can only empower allies.
actors.hero.abilities.cleric.powerofmany.short_desc=The Cleric channels the _Power of Many_, empowering an existing ally or creating a new one.
actors.hero.abilities.cleric.powerofmany.desc=The Cleric channels the _Power of Many_, which either empowers an existing ally or creates a new empowered one for 100 turns. Targeting an empty space creates a new ally.\n\nWhile empowered by Power of Many, any ally deals +25% damage, takes -25% damage, and shares their vision with the Cleric. They also gain 25 shielding when the ability is used.\n\nThe Cleric also gains four new spells that can only be cast with an empowered ally. Power of Many won't end while one of these spells is active.
actors.hero.abilities.cleric.powerofmany$powerbuff.name=power of many
actors.hero.abilities.cleric.powerofmany$powerbuff.desc=This ally has been empowered by Power of Many, granting them +25%% damage dealt and -25%% damage taken. They will also share their vision range with the Cleric, and can benefit from power of many spells.\n\nPower of Many will persist when allies such as prismatic images hide away, but its duration will still count down.\n\nTurns Remaining: %s.
actors.hero.abilities.cleric.powerofmany$lightally.name=light ally
actors.hero.abilities.cleric.powerofmany$lightally.direct_defend=Your ally moves to that position.
actors.hero.abilities.cleric.powerofmany$lightally.direct_follow=Your ally moves to follow you.
actors.hero.abilities.cleric.powerofmany$lightally.direct_attack=Your ally moves to attack!
actors.hero.abilities.cleric.powerofmany$lightally.desc=A copy of one of the Cleric's adventuring companions, made out of solid light. While it has the shape of another hero, it does not have any of their unique abilities. This ally will persist for as long as Power of Many is applied to them.\n\nThis ally can be directed at no cost by re-using the Power of Many armor ability.


actors.hero.abilities.ratmogrify.name=ratmogrify
actors.hero.abilities.ratmogrify.cant_transform=You can't ratmogrify that!
actors.hero.abilities.ratmogrify.too_strong=That enemy is too strong to ratmogrify!
actors.hero.abilities.ratmogrify.short_desc=The hero _Ratmogrifies_ an enemy! This temporarily turns them into a rat with no abilities.
actors.hero.abilities.ratmogrify.short_desc_rat_king=The hero _Ratmogrifies_ an enemy! This permanently turns them into a rat with no abilities.
actors.hero.abilities.ratmogrify.desc=The hero transforms an enemy into a rat for 6 turns! Bosses, allies, and rats cannot be ratmogrified.\n\nRatmogrified enemies retain their original stats, but do not have any abilities.
actors.hero.abilities.ratmogrify.desc_rat_king=The hero transforms an enemy into a rat! Bosses, allies, and rats cannot be ratmogrified.\n\nRatmogrified enemies retain their original stats, but do not have any abilities.
actors.hero.abilities.ratmogrify$transmograt.name=ratmogrified %s
actors.hero.abilities.ratmogrify$transmograt.desc=This enemy has been transformed into a rat. A big improvement, if you ask me! - Rat King
actors.hero.abilities.ratmogrify$transmograt.rankings_desc=Slain by: ratmogrified enemy

##Cleric Spells
actors.hero.spells.auraofprotection.name=aura of protection
actors.hero.spells.auraofprotection.short_desc=Boosts defence for Paladin and nearby allies.
actors.hero.spells.auraofprotection.desc=The Paladin begins radiating protective energy in a sparkling aura around themselves for %3$d turns. Any ally within 2 tiles of the Paladin (including themselves) takes %1$d%% less damage, and gains the effect of the Paladin's armor glyph at +%2$d%% power.\n\nThis damage reduction takes place before other damage-reducing effects (e.g. armor). The glyph power boost will always apply, but this spell cannot cause the Paladin's glyph to apply more than once if a character is already benefitting from it (e.g. the Paladin themselves, or a prismatic image).\n\nCasting spells while this is active will increase its duration by %4$d turns per charge spent.
actors.hero.spells.auraofprotection.name_empower=aura of retribution
actors.hero.spells.auraofprotection.short_desc_empower=Boosts defence for Paladin and nearby allies. Lasts longer than normal, and reflects some damage back upon attackers.
actors.hero.spells.auraofprotection.desc_empower=The Paladin begins radiating protective energy in a sparkling aura around themselves for _%3$d turns_. Any ally within 2 tiles of the Paladin (including themselves) takes %1$d%% less damage, and gains the effect of the Paladin's armor glyph at +%2$d%% power.\n\nThis damage reduction takes place before other damage-reducing effects (e.g. armor) _and is then reflected back at the target_. The glyph power boost will always apply, but this spell cannot cause the Paladin's glyph to apply more than once if a character is already benefitting from it (e.g. the Paladin themselves, or a prismatic image).\n\nCasting spells while this is active will increase its duration by %4$d turns per charge spent.
actors.hero.spells.auraofprotection$aurabuff.name=aura of protection
actors.hero.spells.auraofprotection$aurabuff.desc=The Paladin is radiating protective energy around themselves.\n\nAny nearby ally (including the Paladin themselves) takes reduced damage and gains the effect of the Paladin's armor glyph with boosted power.\n\nCasting spells while this is active will slightly increase its duration.%s
actors.hero.spells.auraofprotection$aurabuff.empower=
actors.hero.spells.auraofprotection$retributionbuff.name=aura of retribution
actors.hero.spells.auraofprotection$retribtuionbuff.empower=\n\nThis enhanced version lasts longer and will reflect double the reduced damage back at the target!

actors.hero.spells.beamingray.name=beaming ray
actors.hero.spells.beamingray.no_space=There's no space for your ally to appear there.
actors.hero.spells.beamingray.out_of_range=That location is out of range.
actors.hero.spells.beamingray.short_desc=Teleports your ally and grants bonus damage.
actors.hero.spells.beamingray.desc=The Cleric channels the power on their ally into a ray of light that beams them to a location. If the ray collides with an enemy it will place the ally nearby and direct them towards the enemy.\n\nThe ray has a maximum range of %1$d tiles, and will increase Power of Many's bonus damage to +%2$d%% for 10 turns against the closest enemy within 4 tiles. Beaming ray can even teleport normally immobile allies, but its ranged is halved in these cases.
actors.hero.spells.beamingray$beamingrayboost.name=beaming ray
actors.hero.spells.beamingray$beamingrayboost.desc=This ally was recently teleported by Beaming Ray, giving them bonus damage against the nearest enemy after the teleport. Power of Many also won't expire when this buff is active.\n\nTurns Remaining: %s.

actors.hero.spells.blessspell.name=bless
actors.hero.spells.blessspell.short_desc=Blesses & shields Cleric, blesses & heals others. Hastens if already blessed.
actors.hero.spells.blessspell.desc=The Cleric places a holy blessing on themselves or another character they can see.\n\nWhen cast on themselves the effect is weaker, granting %1$d turns of bless and %2$d barrier.\n\nWhen cast on other characters the spell is more powerful, granting %3$d turns of bless and %4$d healing. Excess healing is converted into barrier.\n\nWhen cast on a target that is already blessed, the target will gain %5$d adrenaline.
actors.hero.spells.blessspell.name_empower=Fortify
actors.hero.spells.blessspell.short_desc_empower=Blesses & shields Cleric, blesses & heals others. Affects all allies with increased output, and additionally hastens those affected.
actors.hero.spells.blessspell.desc_empower=The Cleric places a holy blessing on _all allied characters_, granting the cleric %1$d turns of bless and %2$d barrier and granting others %3$d turns of bless and %4$d healing. Excess healing is converted into barrier.\n\nAll affected characters will also gain %5$d turns of adrenaline.\n\nThis spell cannot give more than two casts' worth of shielding at a time.

actors.hero.spells.bodyform.name=body form
actors.hero.spells.bodyform.short_desc=Assigns Trinity to an enchant or glyph.
actors.hero.spells.bodyform.desc=The Cleric chooses an enchantment or glyph that they have identified this run and imbues Trinity with its effect.\n\nWhen Trinity is used, The Cleric gains the effect of the chosen enchantment or glyph for %d turns. This temporary enchant or glyph will work with any effect that a regular enchantment or glyph would.\n\nThis spell replaces any other body effect that Trinity is currently imbued with.
actors.hero.spells.bodyform$bodyformbuff.name=body form
actors.hero.spells.bodyform$bodyformbuff.desc=Trinity's body form is currently granting you the power of an enchantment or glyph, as if you had it equipped on your current weapon or armor.\n\nNote that body form cannot provide another copy of an effect that you're already benefitting from.\n\nCurrent Effect: %1$s.\n\nTurns Remaining: %2$s.

actors.hero.spells.cleanse.name=cleanse
actors.hero.spells.cleanse.short_desc=Clears debuffs and grants shielding.
actors.hero.spells.cleanse.desc=The Cleric instantly clears all harmful effects on themselves and visible allies. After the spell ends all characters affected also gain %1$d turns of debuff immunity, and %2$d barrier.
actors.hero.spells.cleanse.name_empower=sacred cleanse

actors.hero.spells.clericspell.prompt=Choose a target
actors.hero.spells.clericspell.no_target=There is no target there.
actors.hero.spells.clericspell.no_targets=There are no valid targets!
actors.hero.spells.clericspell.invalid_target=You can't target that location.
actors.hero.spells.clericspell.invalid_enemy=You can't target that enemy.
actors.hero.spells.clericspell.charge_cost=Charge cost: %s

actors.hero.spells.clericspell$paladinspellextendable.extendable=Casting other spells while %s is active will extend its duration by %d turns per charge spent.

actors.hero.spells.divinesense.name=divine sense
actors.hero.spells.divinesense.name_empower=omniscience
actors.hero.spells.divinesense.short_desc=Gain temporary mind vision in a wide range.
actors.hero.spells.divinesense.short_desc_empower=Gain many turns of mind vision
actors.hero.spells.divinesense.desc=The Cleric focuses their senses on their surroundings, gaining mind vision with a %1$d tile range for 60 turns.
actors.hero.spells.divinesense.desc_empower=The Cleric focuses their senses on their surroundings, gaining mind vision _with infinite range_ for %2$d turns.
actors.hero.spells.divinesense$divinesensetracker.name=divine sense
actors.hero.spells.divinesense$divinesensetracker.desc=This character is temporarily able to see other nearby creatures with their mind!\n\nTurns remaining: %s.

actors.hero.spells.divineintervention.name=divine intervention
actors.hero.spells.divineintervention.short_desc=Massive shield boost to Cleric and allies.
actors.hero.spells.divineintervention.desc=The Cleric pours a tremendous amount of power from their tome into themselves and allies, boosting everyone to %1$d shielding and extending Ascended Form by %2$d turns. This spell's incredible defensive power is weighed against its very high charge cost.\n\nJust like other shielding granted by ascended form, this shielding does not decay normally, but will immediately expire when ascended form ends.

actors.hero.spells.flash.name=flash
actors.hero.spells.flash.prompt=Choose a location
actors.hero.spells.flash.short_desc=Teleport to a nearby location.
actors.hero.spells.flash.desc=The Cleric channels their ascended form at a nearby location and teleports there. Flash can teleport the Cleric to any discovered location that is in range and unoccupied. This spell costs more tome charges every time it is used in the same ascended form.

actors.hero.spells.guidinglight.name=guiding light
actors.hero.spells.guidinglight.short_desc=Deals ranged magic damage and guarantees a hit.
actors.hero.spells.guidinglight.desc=The Cleric fires a bolt of magical energy which strikes a target, dealing 2-6 damage and illuminating them. The next non-encumbered physical attack made against an illuminated enemy is guaranteed to hit them.
actors.hero.spells.guidinglight.desc_priest=_This spell is more powerful when cast by the Priest._ The first cast of the spell every 50 turns costs no tome charges, and illumination will be consumed by wands, other characters, and artifacts that directly affect enemies. When illuminated is used in this way, it deals bonus magic damage equal to the Priest's level.
actors.hero.spells.guidinglight.name_empower=guiding surge
actors.hero.spells.guidinglight.short_desc_empower=Deals ranged magic damage to all foes and guarantees a hit. This spell is cast instantly.
actors.hero.spells.guidinglight.desc_empower=The Cleric _instantly_ fires bolts of magical energy _at every visible target_, dealing 2-6 damage and illuminating them. The next non-encumbered physical attack made against an illuminated enemy is guaranteed to hit them and do some bonus damage.
actors.hero.spells.guidinglight$guidinglightpriestcooldown.name=Guiding Light
actors.hero.spells.guidinglight$guidinglightpriestcooldown.desc=The Priest will be able to cast Guiding Light for free again after this buff expires.\n\nTurns remaining: %s.
actors.hero.spells.guidinglight$illuminated.name=Illuminated
actors.hero.spells.guidinglight$illuminated.desc=This character is glowing as a result of being struck by guiding light. While the glow isn't strong enough to brighten the surrounding area, the magical effect will make landing blows on them much easier for the Cleric.
actors.hero.spells.guidinglight$illuminated.desc_priest=The Priest can additionally consume illuminated with a wand zap, strike from an ally, or effects from some artifacts. Using illuminated in this way will deal bonus damage.
actors.hero.spells.guidinglight$illuminated.desc_generic=Other heroes can still use illuminated to benefit from the searing light talent, but will not gain any accuracy.

actors.hero.spells.hallowedground.name=hallowed ground
actors.hero.spells.hallowedground.name_empower=hallowed domain
actors.hero.spells.hallowedground.prompt=Choose a location
actors.hero.spells.hallowedground.short_desc=Heals allies, slows enemies, and spreads grass in an AOE.
actors.hero.spells.hallowedground.short_desc_empower=Flood field of view with hallowed ground.
actors.hero.spells.hallowedground.desc=The Priest focuses their divine magic into the ground nearby, creating a %1$dx%1$d area of hallowed terrain for 20 turns.\n\nWhen it is cast, this spell heals all allies for %2$d HP (the hero gets shielding), briefly roots enemies, and spreads short grass.\n\nThe hallowed terrain heals allies for 1 HP per turn, cripples enemies, and randomly causes tall grass to grow.\n\nHallowed terrain is destroyed by fire, and will produce furrowed grass and cease to heal the hero if passive regen effects are disabled or the Priest has not gained exp in a while.
actors.hero.spells.hallowedground.desc_empower=The Priest focuses their divine magic into the ground, turning their entire field of view into hallowed terrain.\n\nWhen it is cast, this spell heals all allies for %2$d HP (the hero gets shielding), roots enemies for %3$d turns, and spreads grass.\n\nThe hallowed terrain heals allies for 1 HP per turn (healthy allies get shielding), cripples enemies, and randomly causes tall grass to grow.\n\nHallowed terrain is destroyed by fire, and will produce furrowed grass and cease to heal the hero if passive regen effects are disabled or the Priest has not gained exp in a while.
actors.hero.spells.hallowedground$hallowedterrain.desc=The ground has been hallowed here. Hallowed ground slows enemies, heals allies, and causes grass to spread.

actors.hero.spells.holyintuition.name=holy intuition
actors.hero.spells.holyintuition.name_empower=divine touch
actors.hero.spells.holyintuition.prompt=choose an item
actors.hero.spells.holyintuition.cursed=You sense malevolent magic lurking within this item.
actors.hero.spells.holyintuition.uncursed=This item is free of malevolent magic.
actors.hero.spells.holyintuition.short_desc=identifies whether an item is cursed or not. Sometimes identifies or uncurses items.
actors.hero.spells.holyintuition.short_desc_empower=Removes a curse from a cursed item, identifies it, or both.
actors.hero.spells.holyintuition.desc=The Cleric focuses their senses on an item and determines whether it is cursed or not without having to equip it.\n\n\n\nThe spell is also able to identify uncursed items and remove curses on uncursed items with a 25% chance. Uses on items known to be cursed or uncursed have this chance increased to 33%.
actors.hero.spells.holyintuition.desc_empower=The Cleric channels holy energy into an item.\n\n_If the item was cursed_, the curse will be removed, and the item will be identified with a 33% chance (50% if it was already known to be cursed).\n\n_If the item was not cursed_, the item will be identified.

actors.hero.spells.holylance.name=holy lance
actors.hero.spells.holylance.name_empower=divine barrage
actors.hero.spells.holylance.short_desc=Deals heavy ranged magic damage. Used once per visible foe.
actors.hero.spells.holylance.desc=The Priest concentrates a large amount of energy into a devastating thrown lance made of light. This lance deals %1$d-%2$d damage and always deals maximum damage to undead and demonic targets.
actors.hero.spells.holylance.cooldown=This spell is very expensive, and has a cooldown of 15 turns.
actors.hero.spells.holylance.charge_cost_scale_empower=per target
actors.hero.spells.holylance.cooldown_empower=This spell will cast Holy Lance once per visible foe, but Holy Lance itself will be cheaper than usual. If there is only one foe in view, that character will be targeted twice. It will still incur a cooldown of 15 turns.
actors.hero.spells.holylance$lancecooldown.name=holy lance cooldown
actors.hero.spells.holylance$lancecooldown.desc=The Priest has recently cast Holy Lance, and must wait before casting it again.\n\nTurns remaining: %s.

actors.hero.spells.holyward.name=holy ward
actors.hero.spells.holyward.name_empower=divine ward
actors.hero.spells.holyward.glyph_name=%s of light
actors.hero.spells.holyward.glyph_desc=This glyph slightly increases the amount of damage armor can block.
actors.hero.spells.holyward.short_desc=Temporarily overrides glyphs to boost armor blocking.
actors.hero.spells.holyward.short_desc_empower=Temporarily reduce allies' damage taken from attacks.
actors.hero.spells.holyward.desc=The Cleric imbues their worn armor with glyphs of holy light, increasing the armor's damage blocking by 1-2.\n\nThis glyph lasts for 50 turns, and will override any beneficial glyph the armor has for the duration. The Cleric will benefit from this effect even if they have no armor.
actors.hero.spells.holyward.desc_empower=The Cleric radiates holy energy that _increases all allies' damage blocking_ by 3.\n\nThis effect lasts for _120 turns_. The Cleric will benefit from this effect even if they have no armor _or are attacked by magic_.
actors.hero.spells.holyward.desc_paladin=_This spell is more powerful when cast by the Paladin._ The additional damage blocking is increased to 3, the spell no longer overrides existing glyphs, and casting other spells while holy ward is active will extend its duration by 10 turns per charge used.
actors.hero.spells.holyward.desc_paladin_empower=_This spell is more powerful when cast by the Paladin._ The additional damage blocking is increased to 4-5, and casting other spells while divine ward is active will extend its duration by _15 turns_ per charge used.
actors.hero.spells.holyward$holyarmbuff.name=holy ward
actors.hero.spells.holyward$holyarmbuff.desc=The Cleric has imbued their worn armor with holy energy, temporarily overriding any existing glyph and causing the armor to block an extra 1-2 points of damage.
actors.hero.spells.holyward$holyarmbuff.desc_paladin=The Paladin has imbued their worn armor with holy energy, causing the armor to block an extra 3 points of damage.
actors.hero.spells.holyward$holyarmbuff$empowered.name=divine ward
actors.hero.spells.holyward$holyarmbuff$empowered.desc=The Cleric is radiating with power, causing all attacks against them or any ally to do 3 less damage.
actors.hero.spells.holyward$holyarmbuff$empowered.desc_paladin=The Paladin's armor is radiating with power, causing all attacks against them to do 4-5 less points of damage.

actors.hero.spells.holyweapon.name=holy weapon
actors.hero.spells.holyweapon.name_empower=divine sword
actors.hero.spells.holyweapon.ench_name=holy %s
actors.hero.spells.holyweapon.ench_desc=Enemies struck by a holy weapon will take extra magical damage.
actors.hero.spells.holyweapon.short_desc=Temporarily overrides enchantments to boost damage.
actors.hero.spells.holyweapon.desc=The Cleric enchants their worn weapon with holy energy, causing the weapon to deal an additional %d magical damage any time they strike an enemy with it.\n\nThis enchantment lasts for 50 turns, and will override any beneficial enchantment the weapon has for the duration. Unarmed strikes can also benefit from this effect.
actors.hero.spells.holyweapon.desc_empower=The Cleric's weapon radiates power, causing _all attacks from them and allies_ to deal an additional %d magical damage.\n\nThis enchantment lasts for 100 turns.
actors.hero.spells.holyweapon.desc_paladin=_This spell is more powerful when cast by the Paladin._ The additional magical damage is increased, the spell no longer overrides existing enchantments, and casting other spells while holy weapon is active will extend its duration by 10 turns per charge used.
actors.hero.spells.holyweapon.desc_paladin_empower=_This spell is more powerful when cast by the Paladin._ The additional magical damage is increased, and casting other spells while holy weapon is active will extend its duration by 15 turns per charge used.
actors.hero.spells.holyweapon$holywepbuff.name=holy weapon
actors.hero.spells.holyweapon$holywepbuff.desc=The Cleric has imbued their worn weapon with holy energy, temporarily overriding any existing enchantment and causing the weapon to deal an extra 3 magical damage on each attack.
actors.hero.spells.holyweapon$holywepbuff.desc_paladin=The Paladin has imbued their worn weapon with holy energy, causing their attacks to deal an extra %d magical damage.
actors.hero.spells.holyweapon$holywepbuff$empowered.name=divine sword
actors.hero.spells.holyweapon$holywepbuff$empowered.desc=The Cleric's weapon is radiating holy energy, causing all attacks to deal an extra %d magical damage.
actors.hero.spells.holyweapon$holywepbuff$empowered.desc_paladin=The Paladin's weapon is radiating holy energy, causing all attacks to deal an extra %d magical damage.

actors.hero.spells.judgement.name=judgement
actors.hero.spells.judgement.short_desc=Damages all visible enemies.
actors.hero.spells.judgement.desc=The Cleric slams their fist onto the ground, causing an eruption of light that deals damage to all enemies they can see. This deals %1$d-%2$d damage at base, but also deals an additional 5-10 damage for each spell the Cleric has cast since entering ascended form (or since they last cast Judgement).\n\nCurrently Judgement will deal %3$d-%4$d damage.

actors.hero.spells.layonhands.name=lay on hands
actors.hero.spells.layonhands.short_desc=Instantly hastens and heals an adjacent character or shields the Paladin.
actors.hero.spells.layonhands.desc=The Paladin channels holy energy through their hands, revitalizing whatever they touch.\n\nThe Paladin can cast this spell on any adjacent character to give them %1$d healing and %2$d turns of adrenaline, or on themselves to gain %1$d shielding and %2$d turns of adrenaline. Excess healing from this spell is converted into shielding.\n\nThis spell is cast instantaneously and can be cast repeatedly, but cannot grant more than %5$d worth of shielding at a time.
actors.hero.spells.layonhands.name_empower=divine hand
actors.hero.spells.layonhands.short_desc_empower=Instantly heals adjacent allies and shields the paladin. Hastens all affected. 2x effectiveness on targeted character.
actors.hero.spells.layonhands.desc_empower=The Paladin channels holy energy through their hands, healing or protecting whatever they touch.\n\nThe Paladin can cast this spell on any adjacent character to give them %3$d healing and the Paladin %1$d shielding, or on themselves to gain %3$d shielding. The target will also gain %4$d turns of adrenaline.\n\nAll adjacent allies to the target will gain %1$d healing and %2$d turns of adrenaline.\n\nExcess healing from this spell is converted into shielding.\n\nThis spell is cast instantaneously and can be cast repeatedly, but cannot grant more than %5$d shielding at a time.

actors.hero.spells.lifelinkspell.name=life link
actors.hero.spells.lifelinkspell.short_desc=Shares damage with an ally, and reduces their damage taken.
actors.hero.spells.lifelinkspell.desc=The Cleric strengthens the link between themselves and their empowered ally. With this empowered link, any damage taken will be shared between both the hero and their ally for %1$d turns, and Power of Many's defensive boost will be increased to -%2$d%% damage taken. Note that the damage is shared after armor, but before Power of Many's damage reduction.\n\nWhile this effect is active, beneficial Cleric spells of T3 or below will apply to both the Cleric and their ally if they would have just applied to one of them.
actors.hero.spells.lifelinkspell$lifelinkspellbuff.name=life link protection
actors.hero.spells.lifelinkspell$lifelinkspellbuff.desc=The Cleric recently cast Life Link on this ally.\n\nIn addition to Life Link's regular benefits, this character also takes reduced damage, any positive Cleric spells are applied to both the Cleric and this ally instead of just one, and Power of Many won't expire while this buff is active.\n\nTurns Remaining: %s.

actors.hero.spells.enragespell.name=enrage
actors.hero.spells.enragespell.short_desc=Makes ally enraged, making them both deal and take more damage.
actors.hero.spells.enragespell.desc=The Cleric enrages their empowered ally, making them deal 1.5x more physical damage, but also take 1.5x more physical damage for %1$d turns. Note that the damage is shared after armor, but before Power of Many's damage reduction.
actors.hero.spells.enragespell$enragebuff.name=rage
actors.hero.spells.enragespell$enragebuff.desc=The Cleric recently cast Enrage on this ally.\n\nWhile enraged, this ally will deal 1.5x damage, but also take 1.5x damage, and Power of Many won't expire while this buff is active.\n\nTurns Remaining: %s.

actors.hero.spells.metaform.name=meta form
actors.hero.spells.metaform.short_desc=Assigns Trinity to a talent.
actors.hero.spells.metaform.desc=The Cleric chooses a talent from 10 possible options and imbues Trinity with its effect.\n\nWhen Trinity is used, The Cleric gains the effect of the chosen talent for %d turns. This temporary talent will be fully upgraded and work with any effect that a regular talent would.\n\nThis spell replaces any other meta effect that Trinity is currently imbued with.\n\nThis spell consumes charges before choosing its effect.
actors.hero.spells.metaform$metaformbuff.name=meta form
actors.hero.spells.metaform$metaformbuff.desc=Trinity's meta form is currently granting you the power of a talent, as if you had it alongside with your other talents.\n\nNote that meta form cannot provide another copy of an effect that you're already benefitting from.\n\nCurrent Effect: %1$s.\n\n%2$s\n\nTurns Remaining: %3$s.

actors.hero.spells.mindform.name=mind form
actors.hero.spells.mindform.short_desc=Assigns Trinity to a wand or thrown weapon.
actors.hero.spells.mindform.desc=The Cleric chooses a wand or thrown weapons that they have identified this run and imbues Trinity with its effect.\n\nWhen Trinity is used, The Cleric can make a single attack as if they were using the chosen item at +%d. This will trigger all effects that using that type of item would normally trigger.\n\nThis spell replaces any other mind effect that Trinity is currently imbued with.

actors.hero.spells.mnemonicprayer.name=mnemonic prayer
actors.hero.spells.mnemonicprayer.name_power=mnemonic wish
actors.hero.spells.mnemonicprayer.short_desc=Extends buffs/debuffs on an ally/enemy, & re-applies illuminated.
actors.hero.spells.mnemonicprayer.short_desc_empower=Instantly extends buffs/debuffs on all visible characters, & re-applies illuminated
actors.hero.spells.mnemonicprayer.desc=The Priest instantly utters a prayer that extends the duration of all buffs or debuffs on a specific target by %1$d turns. Positive effects will last longer on allies (including the Priest themselves), and harmful effects will last longer on enemies. This spell will also re-apply illuminated to an enemy that has been illuminated previously.\n\nMnemonic Prayer can only extend a specific instance of a buff or debuff once, and cannot extend buffs granted from armor abilities.
actors.hero.spells.mnemonicprayer.desc_empower=The Priest instantly utters a prayer that extends the duration of all buffs or debuffs on _all visible characters_ by %1$d turns. Positive effects will last longer on allies (including the Priest themselves), and harmful effects will last longer on enemies. This spell will also re-apply illuminated to an enemy that has been illuminated previously.\n\nMnemonic Prayer can only extend a specific instance of a buff or debuff once, and cannot extend buffs granted from armor abilities.
actors.hero.spells.mnemonicprayer.charge_cost_scale_empower=per target

actors.hero.spells.radiance.name=radiance
actors.hero.spells.radiance.name_empower=purge
actors.hero.spells.radiance.short_desc=Illuminates and briefly stuns visible enemies.
actors.hero.spells.radiance.short_desc_empower=Illuminates, damages, and briefly stuns visible enemies.
actors.hero.spells.radiance.desc=The Priest erupts in holy light, stunning all visible enemies for 3 turns and illuminating them as if they were hit by Guiding Light. Radiance will also cause the Priest to glow for 100 turns if the current floor is dark.
actors.hero.spells.radiance.empowered=Enemies burn in the light!

actors.hero.spells.recallinscription.name=recall inscription
# so original
actors.hero.spells.recallinscription.name_empower=recall inscription+
actors.hero.spells.recallinscription.short_desc=Repeats a recently used runestone or scroll.
actors.hero.spells.recallinscription.desc=The Cleric uses holy magic to re-cast the effect of a magical rune found on a runestone or scroll they used in the last %s turns.\n\nRecall Inscription cannot be used to replicate scrolls of upgrade. This spell's charge cost varies based on which item was used recently: 2 for a runestone, 3 for a scroll, 4 for an exotic scroll. This charge cost is also doubled when replicating a scroll of transmutation, or alchemy items that must be crafted using transmutation or upgrade.\n\nThe spell can be cast multiple times, but the charge cost increases by 50%% with each use, unless the spell is currently empowered.
actors.hero.spells.recallinscription.preserved=The rune was preserved!
actors.hero.spells.recallinscription$useditemtracker.name=recently used rune
actors.hero.spells.recallinscription$useditemtracker.desc=The Cleric has recently used an item that works with the inscribed recall spell. The Cleric can cast the spell to repeat the item's effect.\n\nItem Used: %1$s.\n\nTurns Remaining: %2$s.

actors.hero.spells.shieldoflight.name=shield of light
actors.hero.spells.shieldoflight.name_empower=divine shield
actors.hero.spells.shieldoflight.short_desc=Grants temporary armor against a target.
actors.hero.spells.shieldoflight.short_desc_empower=Absorb attacks and reflect projectiles from a target.
actors.hero.spells.shieldoflight.desc=The Cleric instantly creates a thin barrier of light between themselves and an enemy, increasing their armor's block power against that enemy by %1$d-%2$d for %3$d turns.
actors.hero.spells.shieldoflight.desc_empower=The Cleric instantly creates a rather sturdy of light between themselves and an enemy. The shield is able to repel %4$d attacks and can even reflect projectiles but slowly loses effectiveness if not used.
actors.hero.spells.shieldoflight$shieldoflighttracker.name=shield of light
actors.hero.spells.shieldoflight$shieldoflighttracker.desc=A thin shield of light is standing between this character and an enemy. It's not strong enough to outright block attacks, but will soften them.\n\nTurns Remaining: %s
actors.hero.spells.shieldoflight$divineshield.name=divine shield
actors.hero.spells.shieldoflight$divineshield.desc=A rather sturdy shield of light is standing between this character and an enemy. It's able to block most any attack and can even reflect most projectiles.\n\nDurability remaining: %s\nTurns until divine shield weakens: %s
actors.hero.spells.shieldoflight$divineshield.def_verb=

actors.hero.spells.spiritform.name=spirit form
actors.hero.spells.spiritform.short_desc=Assigns Trinity to a ring or artifact.
actors.hero.spells.spiritform.desc=The Cleric chooses a ring or artifact that they have identified this run (except the holy tome) and imbues Trinity with its effect.\n\nIf a ring is chosen, then Trinity grants that ring's effect at +%1$d for 20 turns.\n\nIf an artifact is chosen, then Trinity replicates that Artifact's effect at +%2$d. Each artifact has different specific behaviors and armor charge costs when used with Trinity.\n\nThis spell replaces any other spirit effect that Trinity is currently imbued with.
actors.hero.spells.spiritform$spiritformbuff.name=spirit form
actors.hero.spells.spiritform$spiritformbuff.desc=Trinity's spirit form is currently granting you the power of an item, as if you had it equipped.\n\nNote that spirit form cannot provide another copy of an effect that you're already benefitting from.\n\nCurrent Effect: %1$s.\n\nTurns Remaining: %2$s.

actors.hero.spells.smite.name=smite
actors.hero.spells.smite.short_desc=Guarantees a hit with bonus damage and enchant power.
actors.hero.spells.smite.desc=The Paladin infuses a melee strike with righteous destructive power.\n\nIn addition to dealing normal melee damage, Smite makes non-encumbered attacks guaranteed to hit, has +300%% enchantment power, and deals %1$d - %2$d bonus magic damage.\n\nSmite's bonus magic damage scales with the Paladin's level, and it will always deal maximum bonus magic damage against undead or demonic foes.
actors.hero.spells.smite.desc_override=Using it this way will not consume any limit break charges, unless there are insufficient charges to use Smite.\n\n\n_Limit Break version:_
actors.hero.spells.smite$omnismite.name=OmniSmite
actors.hero.spells.smite$omnismite.short_desc=Spend Limit Break to Smite foes %d times.
actors.hero.spells.smite$omnismite.desc=Spend Limit Break to Smite random foes in range with %s power, up to %d times (limit break charges + tome charges).\n\nAlways ends limit break, even if terminated early.
actors.hero.spells.smite$omnismite.leap=The Paladin may automatically _leap up to %d tiles_ (Triage bonus) while casting this spell to seek out new targets.
actors.hero.spells.smite$omnismite.charge_cost=%s per hit, up to %d charges

actors.hero.spells.stasis.name=stasis
actors.hero.spells.stasis.short_desc=Removes ally from dungeon and preserves them.
actors.hero.spells.stasis.desc=The Cleric focuses their connection with their ally toward themselves, causing the ally to be temporarily held in a sort of energy stasis within the Cleric. The ally will be preserved for up to %d turns, with all positive effects on them being unaffected by their time in stasis.\n\nThe ally will appear next to the Cleric when stasis ends naturally or they can instantly re-cast the spell at no cost to end the effect early. Stasis can even move immobile allies, but cannot transfer them between floors.
actors.hero.spells.stasis$stasisbuff.name=ally in stasis
actors.hero.spells.stasis$stasisbuff.left_behind=Your immobile ally is left behind.
actors.hero.spells.stasis$stasisbuff.desc=The Cleric currently has an ally stored in stasis. All positive effects on this ally are preserved, including Power of Many, and they will reappear next to the Cleric when the effect ends. The effect can also be ended early by re-casting Stasis.\n\nAlly in stasis: %1$s.\nTurns Remaining: %2$s.

actors.hero.spells.sunray.name=sunray
actors.hero.spells.sunray.name_empower=light storm
actors.hero.spells.sunray.short_desc=Deals ranged magic damage and blinds a target once.
actors.hero.spells.sunray.short_desc_empower=Deals ranged magic damage and blinds targets. Targets all enemies.
actors.hero.spells.sunray.desc=The Cleric fires a ray of blinding light at a target, dealing %1$d-%2$d damage and blinding them for %3$d turns. Sunray always deals maximum damage to undead and demonic targets.\n\nAfter being struck with this spell an enemy's vision will adjust, preventing them from being blinded by it again. However, if they are struck again while blinded by this spell, then the light is overwhelming and paralyses them instead.
actors.hero.spells.sunray.multi_target=_The spell will be cast once for every target in view, but not less than twice._
actors.hero.spells.sunray.charge_cost_scale_empower=per target

actors.hero.spells.walloflight.name=wall of light
actors.hero.spells.walloflight.name_empower=fortress of light
actors.hero.spells.walloflight.charge_cost_scale_empower=per tile
actors.hero.spells.walloflight.short_desc=Creates a wall that blocks enemies.
actors.hero.spells.walloflight.short_desc_empower=Draw a wall anywhere in sight that blocks enemies.
actors.hero.spells.walloflight.desc=The Paladin creates a wall made out of panels of solid light directly in front of themselves which is 1 tile thick, %1$d tiles wide, and lasts for 20 turns.\n\nThis wall acts just like a regular one, except it can be seen through. Enemies that are caught in the wall when its created will be momentarily stunned and pushed back if possible. Anything stuck in the wall will be able to move out of it.\n\nThe wall can be cast in any of the four cardinal or four diagonal directions. If a wall is already active, the spell can be re-used for free to instantly clear the wall.
# fixme make walls placed in succession not take additional turns
actors.hero.spells.walloflight.desc_empower=The Paladin creates walls made out of panels of solid light that last for 20 turns anywhere in their field of view.\n\nThis wall acts just like a regular one, except it can be seen through. Enemies that are caught in the wall when its created will be momentarily stunned and pushed back if possible. Anything stuck in the wall will be able to move out of it.\n\nMultiple walls of any length can be created with this spell, but nonconsecutive casts cannot intersect.
actors.hero.spells.walloflight.early_end=You dispel the wall of light.
actors.hero.spells.walloflight.existing=You cannot place walls adjacent to existing walls
actors.hero.spells.walloflight$lightwall.desc=Shimmering panels of light are blocking passage here.

actors.hero.spells.metaexpression.name=metaexpression
actors.hero.spells.metaexpression.name_empower=metadeclaration
actors.hero.spells.metaexpression.short_desc=Imbues the hero with power of random trinket for short amount of time.
actors.hero.spells.metaexpression.short_desc_empower=Imbues the hero with stronger power of random trinket for short amount of time.
actors.hero.spells.metaexpression.desc=The Cleric calls for great advice from above and gets a power of random trinket, upgraded to +%1$d. This power lasts for %2$d turns.
actors.hero.spells.metaexpression.trinket=You are imbued with power of %s!
actors.hero.spells.metaexpression$trinketholder.name=metaexpression
actors.hero.spells.metaexpression$trinketholder.desc=You asked and you shall receive the power of RNGesus.\n\nYou are currently imbued with power of _%s_. %s\n\nTurns remaining: _%s_.

actors.hero.spells.radiantgrappler.name=radiant grappler
actors.hero.spells.radiantgrappler.name_empower=typhoon of hooks
actors.hero.spells.radiantgrappler.short_desc=Casts a grappling hook that can grab objects.
actors.hero.spells.radiantgrappler.short_desc_empower=Creates a cluster of hooks to collect every currently visible item.
actors.hero.spells.radiantgrappler.desc=The Cleric casts a grappling hook at a target cell, that can interact with environment. It can collect items or activate traps from a safe distance.\n\nUpgrading the talent further allows to either grab entities, reeling them next to hero, or hook onto empty tile, moving the hero to that tile. This doesn't allow to go through walls.
actors.hero.spells.radiantgrappler.desc_empower=The Cleric conjures a massive amount of hooks, that will grab onto all items currently visible to them, even through walls.
actors.hero.spells.radiantgrappler.locked_item=You cannot pick up items from containers or on a sale.
actors.hero.spells.radiantgrappler$grappleritem.name=radiant grappler
actors.hero.spells.radiantgrappler$grappleritem.desc=This seemingly ethereal, but sturdy divine hook can be used to interact with environment through anchoring and pulling. You can travel faster, grab items or monsters, pull switches on traps.\n\nThe grapplers are consumable, but you can restock at every shop or just find them lying on levels.

actors.hero.spells.mutareartem.name=mutare artem
actors.hero.spells.mutareartem.name_empower=disce nova
actors.hero.spells.mutareartem.short_desc=Metamorph a talent.
actors.hero.spells.mutareartem.short_desc_empower=Add a new talent to random tier. Cannot go beyond 2x amount of normal talents.
actors.hero.spells.mutareartem.desc=The Cenobite can change one of their talents into a different one from other class.
actors.hero.spells.mutareartem.desc_empower=The Cenobite gets a new random talent in a random tier. They cannot get more talents than double amount of normal talents.
actors.hero.spells.mutareartem.too_many_talents=You have too many talents.

actors.hero.spells.arsretractandi.name=ars retractandi
actors.hero.spells.arsretractandi.name_empower=aspectus unificare
actors.hero.spells.arsretractandi.short_desc=Changes a selected talent into something else, that has the same aspect.
actors.hero.spells.arsretractandi.short_desc_empower=Replaces entire selected tier of talents with new talents, that share the most common aspect of that tier.
actors.hero.spells.arsretractandi.desc=The Cenobite selects a talent to transform into another talent, that shares the same aspect. Unlike Mutare Artem, the Cenobite has no control over the result and resulting talent can be from another tier or subclass entirely.\n\nTier 3 and tier 4 talents have a reduced chance to appear.
actors.hero.spells.arsretractandi.desc_empower=The Cenobite selects a talent tier to completely replace it with new set of talents, that share the most common aspect of previous set. The Cenobite has no control over the result and resulting talents can be from another tier or subclass entirely.\n\nTier 3 and tier 4 talents have a reduced chance to appear.
actors.hero.spells.arsretractandi.choose_desc=Choose a talent to transform. The new talent will have the same aspect.
actors.hero.spells.arsretractandi.metamorphose_talent=change talent
actors.hero.spells.arsretractandi.select_tier=Choose a tier of talents to transform. The new talents will all share the most common aspect of current tier.
actors.hero.spells.arsretractandi.transmutation_complete=The selected tier was turned into set of %s aspect talents!

actors.hero.spells.messispotentiae.name=messis potentiae
actors.hero.spells.messispotentiae.name_empower=furtum potestatis
actors.hero.spells.messispotentiae.short_desc=Enter an empowered state, where each enemy kill grants tome charge.
actors.hero.spells.messispotentiae.desc=The Cenobite enters empowered state of mind for %d turns, which allows them to gather tome charges from every enemy kill. Each kill is worth %.1f tome charges.
actors.hero.spells.messispotentiae.desc_empower=The Cenobite enters prolonged empowered state of mind for %d turns, which allows them to gather tome charges from every enemy kill. Each kill is worth %.1f tome charges (+50%% more if spell empowering is still active).
actors.hero.spells.messispotentiae$empowerbuff.name=energy harvest
actors.hero.spells.messispotentiae$empowerbuff.desc=The Cenobite's mind is currently energized to see the power in everyone.\n\nWhile empowered with energy harvest, the Cenobite will get additional tome charges from killing enemies.\n\nTurns remaining: %s.

actors.hero.spells.petitiomagica.name=petitio magica
actors.hero.spells.petitiomagica.name_empower=magicae provisor
actors.hero.spells.petitiomagica.short_desc=Give a temporary access to another random spell.
actors.hero.spells.petitiomagica.desc=The Cenobite gets a temporary random spell, that they don't currently have, for %d turns. It will be at max level, if spell comes from a talent. Casting this spell again will reroll and refresh the temporary spell.
actors.hero.spells.petitiomagica.spell=You have been granted access to %s!
actors.hero.spells.petitiomagica$spellholder.name=petitio magica
actors.hero.spells.petitiomagica$spellholder.desc=You currently have temporary access to this spell: %s.\n%s\n\nTurns remaining: %s.

# messy messy
actors.hero.spells.spellempower.instant=The spell was cast instantly!
actors.hero.spells.spellempower.short_desc=Temporarily empower spells and ignore charge constraints.
actors.hero.spells.spellempower.depleted=_The Holy Tome is currently depleted from overuse, and needs to recharge more to be able to cast this spell._
actors.hero.spells.spellempower$buff.desc=The Cleric's spells are currently empowered, making them more powerful and also allowing them to be cast without regard for the tome's current charges.\n\nCharges remaining: %s\nTurns until spell empower weakens: %s
actors.hero.spells.spellempower$divineadvent.name=divine advent
actors.hero.spells.spellempower$divineadvent.desc=The Priest temporarily empowers the Holy Tome, allowing them to use up to _%d charges_ worth of spells without limit, in exchange for _100 turns of cooldown_ once the effect has ended.\n\n_This spell can be cast as long as the tome is not currently recovering from divine advent._
actors.hero.spells.spellempower$divineadvent$buff.name=divine advent
actors.hero.spells.spellempower$divineadvent$buff.cooldown=Cooldown once the buff expires: %d
actors.hero.spells.spellempower$divineadvent$cooldown.name=divine advent cooldown
actors.hero.spells.spellempower$divineadvent$cooldown.desc=The Priest has recently cast Divine Advent, and must wait before casting it again.\n\nTurns remaining: %s
actors.hero.spells.spellempower$limitbreak.name=limit break
actors.hero.spells.spellempower$limitbreak.desc=The Paladin temporarily empowers the Holy Tome, allowing them to use up to _%d charges_ worth of spells without limit in exchange for _%d turns_ of cooldown from when the spell is cast.
actors.hero.spells.spellempower$limitbreak.not_critical=At below 30% HP, the cooldown and charge cost is halved, and the spell can be cast with insufficient charge.
actors.hero.spells.spellempower$limitbreak.critical=_Because the Paladin is near death, the spell can be cast with insufficient charge, and its cooldown and charge cost is currently halved._
actors.hero.spells.spellempower$limitbreak$buff.name=limit break
actors.hero.spells.spellempower$limitbreak$buff.cooldown=Turns until limit break can be used again: %s
