actors.hero.abilities.rat_king.omniability.name=omni-ability
actors.hero.abilities.rat_king.omniability.short_desc=Why choose when I don't have to? _Omni-Ability_ gives me access to every ability!
actors.hero.abilities.rat_king.omniability.desc=Every time this ability is used, a random armor ability will be generated and all talents will be transformed into those of the corresponding ability.\n\nAbilities that summon things will remain available as long their corresponding summon remains active.
actors.hero.abilities.rat_king.omniability.ability_desc=When I next use this ability, the following will occur:

actors.hero.abilities.rat_king.wrath.name=rat king's wrath
actors.hero.abilities.rat_king.wrath.short_desc=I channel my infinity _Wrath_ upon my enemies. This takes several turns, however. With great power comes great responsibility!
actors.hero.abilities.rat_king.wrath.desc=By rejecting all conventional abilities, I unlock the ability to channel truly incredible strength. With it, I can blink to any location within 10 tiles in my field of view and not blocked by walls after throwing a smoke bomb down to blind everyone adjacent to my old location. Once I appear at my new location, I slam down, creating a shockwave that damages everyone adjacent to my new location for 5-10 damage + 1-2 additional damage for each strength I have above 10, on top of crippling them for 5 turns. I then follow up the shockwave with an elemental blast from my staff that deals up to 10-20 damage and affects everything within 4 tiles of me, followed up by a fan of spectral blades targeting all nearby enemies.\n\nThe spectral blades are less effective when targeting multiple targets, though this trait can be alleviated through talents.
actors.hero.abilities.rat_king.wrath.desc_shadow_step=Because I am invisible, I am able to instantly blink to any nearby location within 6 tiles that is in my field of view and not blocked by walls.

actors.hero.abilities.rat_king.wrath$ratstatue.name=rat statue
actors.hero.abilities.rat_king.wrath$ratstatue.desc=On top of being a fabulous addition to the dungeon, this magnificent work of art almost perfectly captures His Rattiness's likeness. It's so good, in fact, that enemies seem to easily confuse it for the real thing!

actors.hero.abilities.rat_king.legacywrath.name=divine fury
actors.hero.abilities.rat_king.legacywrath.short_desc=I unleash my _Divine Fury_ upon my enemies. It leaves me exposed for a few turns and drains all my armor charge. Everything must come at price!
actors.hero.abilities.rat_king.legacywrath.desc=I unlock the ability to channel overwhelming power. With it, I can blink to any nearby location no further than 6 tiles, blinding any enemies adjacent to my old location. Once there, I will cast a spell of magical earth on everyone I can see in 6 tiles area (the effect depends on talents) and create a fan of spectral blades targeting any mob within 6 tiles of me before turning invisible.\n\nThis ability takes 2 turns to leap, 1 turn to rooting earth, and one turn to spectral blades, though using this with no enemies in sight will skip the attacking.\n\nUnfortunately, _I have to use all of my armor charge or 33% of my current HP_ to get enough power for this ability.

actors.hero.abilities.rat_king.musrexira.name=mus rex ira
actors.hero.abilities.rat_king.musrexira.short_desc=I conjure the power of _my kingdom_ against enemies. It can materialize in various form depending on place where I will channel them.
actors.hero.abilities.rat_king.musrexira.desc=By targeting myself, I will defend myself by conjuring my _royal owl_ and _shadow clone_ for _10_ charge cost per each. If I still have some armor energy left, I will imbue my bow with _power of nature_ for _20_ charge and defend myself by _enduring_ damage for _40_ charge!\n\n\
  If I select empty space and it's less than 3 tiles away from me, I will place _warp beacon_ here; if beacon already exist, I will be able to choose teleporting to it for _40_ charge or clear it completely. The range of beacon placement can be extended with talents.\n\n\
  If I select enemy creature, I will unleash _wild magic_ of my wands upon its position for _40_ charge!\n\n\
  To cast ability, I need at least _40_ charge.


