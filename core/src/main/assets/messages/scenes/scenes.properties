scenes.titlescene$changesbutton.title=An Update is Available!
scenes.titlescene$changesbutton.versioned_title=Update Available: %s
scenes.titlescene$changesbutton.desc=RKPD2 is regularly updated with overhauls to existing game content, or entirely new content!\n\nGame balance is also frequently improved in game updates, so that specific items/heroes/enemies aren't too strong or too weak.\n\nUpdates also include fixes for bugs and other various stability improvements.
scenes.titlescene$changesbutton.update=Go to Update Page
scenes.titlescene$changesbutton.changes=Current Changes Screen
scenes.titlescene.patreon_body=While RKPD2 is just a small joke mod of Shattered Pixel Dungeon, a substantial amount of effort nevertheless goes into developing it.\n\nIf you're interested in supporting its development, please consider donating to me! There's no perks or anything, but any kind of donation goes a deceptively long way toward letting me put more effort into RKPD2!
scenes.titlescene.patreon_button=Support Page

scenes.welcomescene.welcome_msg=For days and weeks, people have been asking "when will there a be a version of Rat King Dungeon 2 that actually has new content" all to no avail...\n\nMeanwhile, different people complained than people are only making easy mods and there is no more new original, balanced and enjoyable content, but this too, went down to huge depths of void. People watched as new heroes and items got overpowered or completely drained, while Zrp200 spent weeks and weeks on niche spell empower.\n\nOne day, I had enough. I declared than RKPD2 deserves more of new content and created Rat King Adventure.\n\nEnjoy!
scenes.welcomescene.update_intro=Rat King Adventure has been updated!
scenes.welcomescene.update_msg=The cards were burned and the Jokers were lost to the house... But secret Cleric subclass is finally here! His power is shaping his own talents and accepting their will and purpose! Also there is few bugfixes, like entire talents not working.
scenes.welcomescene.patch_intro=Rat King Adventure has been updated!
scenes.welcomescene.patch_bugfixes=2.2.2:\n\n_-_ Edited/revamped Abyss's tileset to properly support all kinds of doors and better stitching.\n_-_ Fixed softlock from Ebony Mimic not being able to spawn during One Against Many challenge.\n_-_ Fixed crashes related to permanent fire and attempts to freeze it.\n_-_ Fixed Steel Axe crashing the journal, if there is no hero available to check.\n_-_ Fixed Possessed Rodent having no text for killing you.
scenes.welcomescene.patch_translations=Please note than this update is still unfinished.
scenes.welcomescene.patch_balance=This patch contains tweaks to game balance.
scenes.welcomescene.patch_msg=This patch also contains some small tweaks and performance improvements.
scenes.welcomescene.what_msg=It seems that your current saves are from a future version of RKPD2!\n\nTread with caution! Your saves may contain things which don't exist in this version, this could cause some very weird errors to occur.
scenes.welcomescene.lang_warning_title=Incomplete Translation
scenes.welcomescene.lang_warning_msg=Some of the new content from this update has not yet been translated.\n\nSome phrases may be written in English.\n\nThe translation teams are working to resolve this and a full translation should be patched in soon.\n\nThank you for your patience.
scenes.welcomescene.continue=Continue
scenes.welcomescene.changelist=Changelist
scenes.welcomescene.save_warning=The game was interrupted while trying to save your game data recently. Luckily, Rat King has built in protections against this, so your game data should be fine!\n\nThis usually happens when your device suddenly loses power, or if it terminates Shattered without letting it close properly. Battery saver features can often cause this on mobile devices. Restarting your device may also help if you are seeing this error frequently.
scenes.welcomescene.controller_title=Controller Input
scenes.welcomescene.controller_body=Playing on a controller? Use the right stick to control an on-screen cursor.\n\nPress RT/R2 or the right stick to select with the cursor.
scenes.welcomescene.controller_okay=Okay