scenes.journalscene.title=Journal

# todo preserve
scenes.introscene.text=For days and weeks, people have been asking "when will there a be a version of Rat King Dungeon 2 that actually has new content" all to no avail...\n\nMeanwhile, different people complained than people are only making easy mods and there is no more new original, balanced and enjoyable content, but this too, went down to huge depths of void. People watched as new heroes and items got overpowered or completely drained, while Zrp200 spent weeks and weeks on niche spell empower.\n\nOne day, I had enough. I declared than RKPD2 deserves more of new content and created Rat King Adventure.\n\nEnjoy!
scenes.introscene.text_no_rk=Many heroes have ventured into the dungeon before you from the city above, most have never been heard from again.\n\nIt is said that an ancient evil lurks in the depths, guarding the almighty Amulet of Yendor. Even now dark energy radiates from below, making its way up through fallen Rat Kingdom's sacred domain and even to the city above.\n\nBut none of those so-called heroes have had the blessings of rats, may he forever be praise. Will you conquer the dungeon and rebuild the Rat Kingdom from scratch? It's time to start your own adventure!

