scenes.supporterscene.title=Support the RKPD2
scenes.supporterscene.intro=RKPD2 is a tiny mod developed by a single person (Zrp200!)
scenes.supporterscene.support_msg=If you enjoy Rat King Adventure and want to help me keep making it, please consider supporting Zrp200 on _BuyMeACoffee!_ There's no benefits, currently, but any support, no matter how small, translates directly into motivation to keep developing RKPD2. Without it, this project wouldn't be possible!\n\nYou should also check out Shattered Pixel Dungeon proper if you haven't already!\n\nThanks for your time, and glory to Rat King!\n\n- Zrp200 and TrashboxBobylev
